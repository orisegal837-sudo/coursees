  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a scale-up plan for a **lignin-removal reactor** that preserves the lab-proven outcomes you care about:\n- **High lignin removal**\n- **Cellulose selectivity / carbohydrate preservation**\n- **Controlled severity across the reactor volume**\n- **Acceptable product quality at plant scale**\n\nYour goal is **not** to simply enlarge the vessel. Your goal is to **replicate the same local reaction environment** that produced good results in the lab.\n\n## Prerequisites\nBefore you start, make sure you have access to these specific tools and references:\n- **Lab-scale reactor data** from the winning condition: temperature profile, solids loading, liquor composition, residence time, mixing speed, and product analysis.\n- **A reactor performance dataset** including lignin removal, cellulose yield, and any degradation markers (for example, sugar loss or viscosity loss).\n- **Process simulation or spreadsheet software** such as Aspen Plus, MATLAB, Python, or Excel for scale calculations.\n- **Basic reactor geometry information** for the target equipment: tank diameter, height, impeller type, heat-transfer surface area, flow configuration, and solids handling method.\n- **A method for measuring or estimating RTD**, such as tracer testing, residence-time modeling, or pilot-plant flow characterization.\n\n## What to define before scaling\n1. **Choose the target reactor type**\n   - Batch, semi-batch, stirred tank, or flow-through.\n   - **Why it matters:** Scale-up rules differ by reactor type.\n   - **How (example):** If the commercial concept is a plug-flow-style pretreatment unit, do not use a stirred flask as the scaling reference; use a lab flow device instead.\n\n2. **List the mechanism that controls performance**\n   - Mixing, heat transfer, mass transfer into biomass particles, or chemistry kinetics.\n   - **Why it matters:** The controlling mechanism determines what must be preserved.\n   - **How (example):** If chip penetration is slow, prioritize liquor exchange and particle wetting instead of only matching power input.\n\n3. **Set your success criteria**\n   - Lignin removal target, cellulose retention target, temperature limits, and acceptable RTD width.\n   - **Why it matters:** Scale-up needs measurable pass/fail criteria.\n   - **How (example):** Define success as \u201c80% lignin removal with less than 10% cellulose loss and no local temperature excursions above the lab maximum.\u201d"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Match the Lab Model to the Final Reactor Concept\n\n## Action 1: Start from the intended plant reactor, then build the lab model around it\n- **Why:** A lab reactor that does not resemble the final equipment can give misleading scale-up rules.\n- **How (example):**\n  - If the plant will use a **flow-through reactor**, run lab experiments in a small flow device with similar feed direction and solids loading.\n  - If the plant will use a **mixed tank**, use a stirred lab reactor with comparable agitation and heating strategy.\n\n## Action 2: Identify the true rate-limiting step\n- **Why:** The wrong scale-up basis can preserve the wrong phenomenon.\n- **How (example):**\n  - If lignin dissolves quickly but chips remain poorly wetted, the bottleneck is **mass transfer into biomass**, not chemistry.\n  - If temperature ramps are slow, the bottleneck may be **heat transfer**.\n\n## Action 3: Choose the scale-up variable that matches the bottleneck\n- **Why:** One scaling rule rarely preserves all reactor behavior.\n- **How (example):**\n  - **Constant power per volume** may help preserve turbulence, but can over-shear solids.\n  - **Constant impeller tip speed** may reduce shear damage, but can weaken bulk circulation.\n  - **Constant mixing time** is useful if feed blending is the main issue, but may not preserve chip penetration.\n\n## Action 4: Build a phenomenon map\nCreate a table with these columns:\n- Reactor phenomenon\n- Risk at scale\n- Measurement method\n- Design response\n\n**Why:** This turns scale-up from a guess into a controlled engineering exercise.\n\n**How (example):**\n- **Phenomenon:** Solids suspension\n- **Risk:** Settling and uneven delignification\n- **Measurement:** Visual hold-up or torque trend\n- **Design response:** Increase circulation or change impeller design"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Control Mixing, Heat Transfer, and RTD\n\n## Action 1: Design mixing to prevent local over-severity\n- **Why:** Poor mixing creates zones of high acid, high alkali, high temperature, or depleted reagent, which harms cellulose selectivity.\n- **How (example):** Use an impeller and vessel configuration that keeps chips suspended and liquor distributed uniformly, rather than relying only on a higher RPM.\n\n## Action 2: Check the three mixing scales separately\n- **Why:** Bulk circulation, eddy dispersion, and molecular diffusion affect delignification differently.\n- **How (example):**\n  - **Bulk circulation:** ensures the whole reactor stays moving.\n  - **Eddy-level dispersion:** helps distribute reagents around solids.\n  - **Molecular diffusion:** governs penetration into particle pores and chip interiors.\n\n## Action 3: Evaluate heat-transfer limits early\n- **Why:** As scale increases, volume grows faster than heat-transfer area, so hot spots become more likely.\n- **How (example):**\n  - If reaction heat is significant, add jackets, coils, or staged heating.\n  - If hot liquor is the heat source, verify that temperature equalizes before severe chemistry starts.\n\n## Action 4: Measure or estimate RTD before piloting\n- **Why:** A broad RTD can create under-treated and over-treated product fractions in the same reactor run.\n- **How (example):** Perform a tracer test and compare the outlet curve to the lab process window. If a fraction exits too early, the reactor may under-delignify that portion; if it stays too long, cellulose damage may rise.\n\n## Action 5: Select the reactor mode that fits the selectivity goal\n- **Why:** The best reactor is the one that best protects product quality, not the one that is easiest to build.\n- **How (example):**\n  - Use **flow-through** when avoiding over-treatment is critical and RTD can be tightly controlled.\n  - Use **batch or semi-batch** when solids penetration and robustness matter more than tight residence-time control.\n\n## Action 6: Run pilot tests that reproduce scale constraints\n- **Why:** Pilot data are only useful if they expose the same transport limits as the final reactor.\n- **How (example):** Pilot a vessel with the same approximate geometry, solids loading, and heat-removal approach as the commercial design, then compare lignin removal and cellulose retention against lab values."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Finalize the Scale-Up Decision and Validate It\n\n## Action 1: Compare lab and pilot product quality side by side\n- **Why:** Good delignification alone is not enough; selectivity must stay intact.\n- **How (example):** Track lignin removal, carbohydrate recovery, and any indicator of degradation. If lignin removal improves but cellulose loss increases, the scale-up has failed functionally even if conversion looks better.\n\n## Action 2: Stress-test the design against scale risks\n- **Why:** Real reactors fail at the boundaries: plugging, channeling, settling, overheating, or maldistribution.\n- **How (example):**\n  - For flow systems, test whether chips or solids bridge passages.\n  - For stirred tanks, test whether solids remain suspended at minimum operating speed.\n  - For heated reactors, test whether the core or inlet region runs hotter than the average.\n\n## Action 3: Adjust the design before committing to full scale\n- **Why:** Small design changes are cheaper than correcting a plant-scale selectivity problem later.\n- **How (example):** Change impeller geometry, add staged heat input, reduce particle size, or modify flow distribution before locking in the final equipment.\n\n## Action 4: Use four final scale-up questions as your checklist\n1. **What is rate-limiting?**\n2. **What physical property changes with scale?**\n3. **What does RTD do to selectivity?**\n4. **How will heat and mixing be maintained across the full volume?**\n\n**Why:** These questions force you to preserve the mechanism, not just the recipe.\n\n**How (example):** If your answers show that chip penetration and RTD are the dominant risks, choose a reactor and pilot setup that minimize channeling and ensure uniform liquor contact, even if that requires sacrificing some simplicity.\n\n## Final rule\n**Scale up the environment, not just the equipment.** If the larger reactor reproduces the same mixing, heat removal, and residence-time behavior as the lab system, you are much more likely to preserve lignin-removal efficiency while protecting cellulose selectivity."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
