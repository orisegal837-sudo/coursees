  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a working way to **quantify pretreatment harshness** using:\n- **log R0** for time + temperature\n- **Combined severity** for time + temperature + acidity\n- **Hammett acidity (H0)** when pH is not valid, especially in **ionic liquids** and **deep eutectic solvents**\n\nBy the end, you should be able to:\n- Compare pretreatment conditions on a common severity scale\n- Explain why two runs with the same log R0 can behave differently\n- Add acidity correction to better predict **delignification**, **hemicellulose removal**, **cellulose preservation**, and **pulp yield**\n- Identify when classical severity is insufficient and a modified metric is needed\n\n## Prerequisites\nUse these tools and data sources before implementing the metric:\n1. **A spreadsheet tool**: Microsoft Excel, Google Sheets, or LibreOffice Calc\n2. **A calculator or scripting environment**: Python 3.10+ with `numpy` and `pandas`, or a scientific calculator\n3. **Pretreatment process data**:\n   - Temperature in \u00b0C\n   - Residence time in minutes or hours\n   - Aqueous pH **or** Hammett acidity value `H0`\n   - Biomass response data such as lignin removal, sugar yield, cellulose loss, or pulp yield\n4. **Access to pH or acidity measurement method**:\n   - pH meter for aqueous systems\n   - Hammett acidity data from literature, titration-based estimation, or solvent-specific acidity measurement for nonaqueous media\n5. **A consistent unit convention** for all experiments, especially for time and temperature\n\n## What to prepare\n- A table with one row per pretreatment condition\n- Columns for: `Temperature_C`, `Time_min`, `pH_or_H0`, `Lignin_Removal`, `Cellulose_Retention`\n- A note on which conditions are aqueous and which are nonaqueous, since that determines whether **pH** or **H0** should be used"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Calculate Classical Severity (log R0)\n\n## Step 1. Define the severity baseline for every run\n\n### The Action\nConvert each pretreatment condition into **log R0** using temperature and time.\n\n### The Why\nThis gives you a single number that captures how strongly time and heat combine to drive biomass deconstruction.\n\n### The How \u2014 Example\nFor each experiment:\n1. Record the temperature `T` and time `t`\n2. Compute the temperature-dependent factor using the standard severity relationship\n3. Take the logarithm to get **log R0**\n\n**Practical template:**\n- Condition A: 160 \u00b0C, 30 min\n- Condition B: 180 \u00b0C, 10 min\n- Compare whether they produce similar log R0 values\n\nIn spreadsheet form, create a column called `log_R0` and populate it for all samples.\n\n## Step 2. Use log R0 to make first-pass comparisons\n\n### The Action\nRank pretreatment runs from mild to severe using only `log_R0`.\n\n### The Why\nThis helps you quickly identify conditions that may be under-treated or over-treated.\n\n### The How \u2014 Example\n- Lower `log_R0` \u2192 likely insufficient lignin/hemicellulose removal\n- Higher `log_R0` \u2192 likely greater delignification, but also higher risk of cellulose loss and sugar degradation\n\n**Example interpretation template:**\n- `log_R0 = 2.5`: likely mild\n- `log_R0 = 3.5`: moderate\n- `log_R0 = 4.2`: harsh, check for cellulose degradation and inhibitory byproducts\n\n## Step 3. Plot response vs log R0\n\n### The Action\nCreate scatter plots of key outcomes versus `log_R0`.\n\n### The Why\nYou need to see whether severity correlates with:\n- lignin removal\n- hemicellulose removal\n- cellulose retention\n- pulp yield\n\n### The How \u2014 Example\nMake four plots:\n- `log_R0` vs `% lignin removed`\n- `log_R0` vs `% cellulose retained`\n- `log_R0` vs `pulp yield`\n- `log_R0` vs `enzymatic digestibility`\n\nIf the points fall along clear trends, severity is useful. If similar `log_R0` values produce very different outcomes, you likely need an acidity correction."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Add Acidity Through Combined Severity\n\n## Step 4. Check whether acidity is affecting the chemistry\n\n### The Action\nDetermine whether your system uses **pH** or **Hammett acidity (H0)**.\n\n### The Why\npH works for aqueous pretreatments, but it is not meaningful in many nonaqueous solvent systems.\n\n### The How \u2014 Example\n- **Aqueous acid pretreatment**: use measured pH\n- **Protic ionic liquid pretreatment**: use `H0`\n- **Deep eutectic solvent system**: use an acidity descriptor that matches the solvent chemistry, often `H0` or a literature-reported equivalent\n\nIf your solvent composition changes the effective acidity, note that in the dataset.\n\n## Step 5. Compute combined severity\n\n### The Action\nModify the temperature-time severity by adding an acidity correction term.\n\n### The Why\nCombined severity better reflects the actual chemical environment experienced by the biomass.\n\n### The How \u2014 Example\nUse a combined severity expression that includes:\n- `log R0`\n- an acidity correction based on **pH** or **H0**\n\n**Workflow template:**\n1. Calculate `log_R0`\n2. Add the acidity term\n3. Store the result as `Combined_Severity`\n\nExample spreadsheet columns:\n- `log_R0`\n- `pH` or `H0`\n- `Combined_Severity`\n\nThen compare whether `Combined_Severity` improves the alignment of:\n- delignification\n- hemicellulose removal\n- cellulose preservation\n- yield\n\n## Step 6. Test whether the modified metric predicts outcomes better\n\n### The Action\nFit or compare outcome trends using both `log_R0` and `Combined_Severity`.\n\n### The Why\nA better severity metric should explain more of the observed variation.\n\n### The How \u2014 Example\nFor each response variable:\n1. Plot response vs `log_R0`\n2. Plot response vs `Combined_Severity`\n3. Compare which plot shows a tighter relationship\n\n**Typical result pattern:**\n- `log_R0` alone groups some conditions together that behave differently\n- `Combined_Severity` separates those conditions because acidity differs\n\nThis is especially important when the same time and temperature are used with different solvent concentrations or acid strengths."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Apply the Metric for Process Optimization\n\n## Step 7. Use severity windows instead of maximizing severity\n\n### The Action\nDefine an operating window where delignification is high but cellulose loss stays low.\n\n### The Why\nThe best pretreatment is usually not the harshest one; it is the one that balances deconstruction and preservation.\n\n### The How \u2014 Example\nSet decision rules such as:\n- Minimum lignin removal target: `> 60%`\n- Maximum cellulose loss: `< 10%`\n- Acceptable pulp yield: `above process threshold`\n\nThen select conditions whose combined severity falls inside that window.\n\n## Step 8. Use severity to guide experimental design\n\n### The Action\nPlan a small matrix of pretreatment conditions around the promising severity range.\n\n### The Why\nThis avoids wasting runs on conditions that are obviously too mild or too harsh.\n\n### The How \u2014 Example\nCreate a design around three levels:\n- **Low severity**: check under-processing\n- **Mid severity**: likely optimum zone\n- **High severity**: check degradation risk\n\nFor each condition, record:\n- `log_R0`\n- acidity descriptor\n- lignin removal\n- cellulose retention\n- inhibitor formation indicators such as furfural or humins\n\n## Step 9. Use the metric in reporting and scale-up\n\n### The Action\nReport pretreatment conditions with the severity metric alongside raw operating parameters.\n\n### The Why\nThis makes your results comparable across reactors, laboratories, and solvent systems.\n\n### The How \u2014 Example\nInstead of reporting only:\n- 170 \u00b0C, 20 min, 1% acid\n\nReport:\n- 170 \u00b0C, 20 min, 1% acid, `log_R0 = X`, `Combined_Severity = Y`, `pH/H0 = Z`\n\n## Final rule of thumb\n- Use **log R0** when time and temperature dominate\n- Use **combined severity** when acidity changes reaction chemistry\n- Use **H0** instead of pH in nonaqueous systems\n- Optimize for the **best selectivity window**, not the highest severity"
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
