  <style>
    /* ========================================
      PREMIUM THEME & TYPOGRAPHY VARIABLES
      ========================================
    */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --stroke-strong: rgba(255, 255, 255, 0.15);
      
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --text-heading: #ffffff;
      
      --accent-primary: #8b5cf6;
      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
      
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      
      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {
      padding: clamp(20px, 4vw, 48px) 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========================================
      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

    /* ========================================
      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .card-h {
      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;
    }

    /* ========================================
      NAVIGATION BOTTOM BAR
      ========================================
    */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      border-top: 1px solid var(--stroke-soft);
      background: rgba(5, 5, 10, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: var(--bg-surface);
      color: var(--text-heading);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .btn:hover:not(:disabled) {
      background: var(--bg-surface-hover);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: var(--accent-gradient);
      border: none;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #9f7aea, #60a5fa);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ========================================
      ENHANCED MARKDOWN TYPOGRAPHY
      ========================================
    */
    .markdown-body {
      max-width: 100%;
      margin: 0 auto;
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-main);
    }

    .markdown-body h1, 
    .markdown-body h2, 
    .markdown-body h3 {

      font-weight: 600;
      margin-top: 2em;
      margin-bottom: 0.75em;
      line-height: 1.3;
    }

    .markdown-body h1 {

    }
    
    .markdown-body h2 { 
      font-size: 1.75em; 
      letter-spacing: -0.01em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--stroke-soft);
    }
    
    .markdown-body h3 { 
      font-size: 1.35em; 
      color: #e2e8f0;
    }

    /* Eliminate top margin for the very first element to align with padding */
    .markdown-body > *:first-child { margin-top: 0; }

    .markdown-body p {
      margin-top: 0;
      margin-bottom: 1.25em;
    }

    .markdown-body ul, 
    .markdown-body ol {
      margin-top: 0;
      margin-bottom: 1.5em;
      padding-left: 1.5em;
    }

    .markdown-body li {
      margin-bottom: 0.5em;
    }

    .markdown-body li > ul, 
    .markdown-body li > ol {
      margin-top: 0.5em;
    }

    .markdown-body strong {
      color: var(--text-heading);
      font-weight: 600;
    }

    .markdown-body a {
      color: var(--accent-secondary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .markdown-body a:hover {
      border-bottom-color: var(--accent-secondary);
    }

    .markdown-body code {
      font-family: var(--font-mono);
      background: rgba(255, 255, 255, 0.08);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;
      color: #93c5fd; /* Light blue tint for inline code */
    }

    .markdown-body pre {
      background: #0d1117;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-md);
      padding: 1.25em;
      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);
      margin: 3em 0;
    }

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .task-card:hover {
      border-color: var(--stroke-strong);
      transform: translateY(-2px);
    }
    .task-card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25em;
      color: var(--accent-secondary);
    }
    .objective-card {
      border-left: 4px solid var(--accent-primary);
    }
    .instructions-list {
      padding-left: 20px;
    }
    .instructions-list li {
      margin-bottom: 12px;
    }
    .criteria-checklist {
      list-style: none;
      padding-left: 0;
    }
    .criteria-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .criteria-checklist li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* KaTeX overrides for dark mode */
    .katex {
      color: var(--text-heading);
      font-size: 1.1em;
    }

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }
  </style>

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a **selective delignification workflow** that removes lignin more effectively by **targeting lignin\u2013carbohydrate complexes (LCCs)**, while **preserving cellulose integrity**. The practical goal is to choose pretreatment or pulping conditions that cleave the most relevant LCC bonds for your biomass type, then verify that lignin removal improves without excessive carbohydrate loss.\n\n## What you will achieve\n- Reduce biomass recalcitrance by **breaking lignin\u2013carbohydrate linkages**\n- Improve lignin extraction and downstream enzyme accessibility\n- Preserve cellulose degree of polymerization and yield\n- Adapt chemistry to biomass type: **softwood, hardwood, or grass**\n\n## Technical prerequisites\nYou need access to the following tools or resources:\n- **A biomass sample**: softwood, hardwood, or herbaceous/grass material\n- **Chemical pretreatment capability**:\n  - alkaline reagents such as **NaOH** or **Na2CO3**\n  - acidic reagents such as **dilute H2SO4** or **organic acids**\n  - optional hydrothermal reactor or sealed pressure vessel\n- **Analytical methods** to assess selectivity:\n  - **Klason lignin** or acid-insoluble lignin measurement\n  - **Carbohydrate composition** analysis by HPLC/GC\n  - **Viscosity**, **GPC**, or **DP** measurement for cellulose damage\n  - optional **FTIR**, **2D HSQC NMR**, or **Py-GC/MS** for LCC evidence\n- **Basic lab safety equipment**: fume hood, PPE, acid/base-resistant containers\n\n## Decision rule before you start\nIdentify your biomass first:\n- **Softwood**: expect more LCC involvement and stronger resistance to delignification\n- **Hardwood**: moderate LCC burden\n- **Grass/herbaceous biomass**: pay special attention to **ferulate cross-links**\n\n## Practical example\nIf you are processing **corn stover**, plan around **ferulate-rich cross-links** and start with an **alkaline pretreatment**. If you are processing **softwood**, prepare for more resistant LCC structures and expect that a single mild treatment may not be enough."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Map the Bond Chemistry in Your Biomass\n\n## 1) Identify the likely dominant LCC bond types\n### The Action\nDetermine whether your material is dominated by **benzyl esters, benzyl ethers, phenyl glycosidic linkages, or ferulate-based cross-links**.\n\n### Why it matters\nDifferent LCC bond types respond differently to acid, alkali, and hydrothermal conditions. If you choose the wrong chemistry, lignin stays attached or cellulose gets damaged unnecessarily.\n\n### How (example)\n- For **grass biomass**: assume **ferulate esters** are a major target\n- For **softwood**: expect more resistant **ether-linked** structures\n- For **mixed feedstocks**: run a small compositional screen first\n\n## 2) Match bond chemistry to a cleavage strategy\n### The Action\nSelect a pretreatment that preferentially attacks the bond type you want to remove.\n\n### Why it matters\nSelective delignification depends on **bond-specific reactivity**, not just \u201cstronger is better.\u201d\n\n### How (example)\n- **Benzyl ester-rich biomass** \u2192 use **mild alkaline treatment**\n  - Example: 1\u20132% NaOH at moderate temperature\n- **Phenyl glycosidic or ether-stabilized biomass** \u2192 consider **acidic or hydrothermal staging** before or after alkali\n  - Example: dilute acid prehydrolysis followed by alkaline extraction\n- **Grass biomass with ferulates** \u2192 start with **alkali** to cleave ferulate esters\n  - Example: NaOH soak to release lignin-polysaccharide cross-links\n\n## 3) Run a small screening matrix\n### The Action\nTest 3\u20135 conditions at bench scale before scaling up.\n\n### Why it matters\nLCC cleavage is highly dependent on severity, so a small matrix quickly identifies the best tradeoff between lignin removal and cellulose protection.\n\n### How (example)\nTry a simple matrix such as:\n- Mild alkali\n- Moderate alkali\n- Dilute acid + mild alkali\n- Hydrothermal + mild alkali\n- Control with no pretreatment\n\nThen compare lignin removal and cellulose retention across conditions."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Tune Process Severity for Selectivity\n\n## 4) Optimize severity instead of maximizing it\n### The Action\nAdjust temperature, time, pH, and reagent concentration to cleave LCCs without overprocessing the carbohydrates.\n\n### Why it matters\nToo mild: lignin remains attached. Too severe: cellulose peeling, hydrolysis, oxidation, and chain scission increase.\n\n### How (example)\n- Increase severity only until lignin release improves\n- Stop when cellulose viscosity or DP begins to fall sharply\n- Use the smallest chemical dose that gives measurable lignin extraction\n\nA practical optimization loop:\n1. Set a baseline condition\n2. Increase one variable at a time\n3. Measure lignin removal and cellulose damage after each run\n4. Pick the weakest condition that achieves acceptable delignification\n\n## 5) Use staged pretreatments when one chemistry is not enough\n### The Action\nCombine treatments in sequence rather than forcing one harsh step to do everything.\n\n### Why it matters\nDifferent LCC bonds respond to different chemistries. Staging helps you cleave multiple bond types while keeping cellulose intact.\n\n### How (example)\nA workable staged sequence might be:\n- **Step A**: dilute acid or hydrothermal treatment to loosen structure\n- **Step B**: alkaline extraction to cleave ester and ferulate links\n- **Step C**: washing and mild oxidative polishing if residual lignin remains\n\n## 6) Monitor cellulose preservation continuously\n### The Action\nTrack not only lignin removal, but also cellulose quality metrics after each condition.\n\n### Why it matters\nSelective delignification is only successful if cellulose remains usable for hydrolysis, pulping, or materials processing.\n\n### How (example)\nMeasure:\n- **Cellulose yield** after treatment\n- **Degree of polymerization** or viscosity\n- **Sugar release** during enzymatic hydrolysis\n\nIf lignin removal improves but cellulose DP drops too much, reduce severity or switch to a staged approach."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Verify LCC Cleavage and Validate the Process\n\n## 7) Confirm that lignin\u2013carbohydrate attachment has been reduced\n### The Action\nAnalyze treated solids and liquors for evidence that lignin is no longer tightly bound to carbohydrates.\n\n### Why it matters\nHigh lignin removal alone does not prove selective delignification. You need to confirm that the stubborn residual lignin fraction has been disrupted.\n\n### How (example)\nUse one or more of the following:\n- **FTIR** to detect changes in ester or ether-associated signals\n- **2D HSQC NMR** to identify loss of specific LCC linkages\n- **Py-GC/MS** to assess lignin-related fragments\n- Compare **solid residue** vs **spent liquor** composition\n\n## 8) Test downstream accessibility\n### The Action\nRun an enzymatic hydrolysis or digestibility test on treated biomass.\n\n### Why it matters\nEven partial LCC cleavage can significantly improve cellulose accessibility and conversion efficiency.\n\n### How (example)\n- Treat biomass under your chosen conditions\n- Wash and neutralize the solids\n- Add cellulase cocktail under standard hydrolysis conditions\n- Compare glucose yield against untreated material\n\n## 9) Use the results to set a process rule\n### The Action\nCreate a biomass-specific operating window for future batches.\n\n### Why it matters\nSelective delignification is best when the process is repeatable and tied to the dominant LCC chemistry of the feedstock.\n\n### How (example)\nWrite a simple rule such as:\n- \u201cFor grass biomass, use alkali-first treatment to target ferulate esters.\u201d\n- \u201cFor softwood, use staged treatment because ether-linked LCCs are more resistant.\u201d\n- \u201cDo not increase severity once cellulose viscosity falls below the acceptable threshold.\u201d\n\n## Final takeaway\nThe best delignification strategy is not the harshest one\u2014it is the one that **cleaves lignin\u2013carbohydrate bonds early and selectively**, so lignin can be removed while cellulose remains structurally intact and ready for downstream use."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
