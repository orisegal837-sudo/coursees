      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);

      /* Dynamic ambient background */

      LAYOUT & SHELL

      min-height: 100vh;
      display: flex;
      align-items: stretch;

    }

      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {

      color: var(--text-muted);

      ========================================

      justify-content: center;

    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nUse steam explosion as a pretreatment strategy to **open lignocellulosic biomass structure**, so that cellulose becomes more accessible to downstream enzymes or chemical conversion processes.\n\nBy the end of this workflow, you should be able to:\n- Select a biomass feedstock for steam explosion\n- Run a steam explosion pretreatment using controlled temperature, residence time, and depressurization\n- Evaluate how much hemicellulose was removed and how much the cell wall structure was opened\n- Identify whether lignin redistribution and cross-link disruption improved cellulose accessibility\n\n## Technical prerequisites\nYou need access to:\n- **A steam explosion reactor or pilot-scale pretreatment unit** with:\n  - High-pressure saturated steam supply\n  - Rapid-release valve or flash depressurization system\n  - Temperature and pressure instrumentation\n- **Biomass feedstock**, such as:\n  - Wheat straw\n  - Miscanthus\n  - Corn stover\n  - Wood chips or other lignocellulosic material\n- **Analytical tools** for verification:\n  - **Compositional analysis setup** for cellulose, hemicellulose, and lignin quantification\n  - **FTIR** for functional-group changes\n  - **2D HSQC NMR** if you want to confirm lignin bond cleavage and repolymerization\n  - **SEM or microscopy** to observe cracks, fibrillation, and surface rupture\n  - **Enzymatic hydrolysis assay** to measure improved digestibility\n\n## What to prepare before starting\n- Dry and size-reduce biomass to a consistent particle size\n- Record initial moisture content\n- Decide your target outcome:\n  - **Maximize hemicellulose removal**\n  - **Improve enzymatic digestibility**\n  - **Preserve cellulose as much as possible**\n- Define your baseline measurements so you can compare untreated vs. treated biomass"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Set the pretreatment conditions\n\n## Action\nChoose your steam explosion settings: **temperature, residence time, and initial biomass loading**.\n\n## Why this matters\nThese parameters control how strongly subcritical water hydrolyzes hemicellulose and weakens lignin\u2013carbohydrate linkages before the pressure release occurs.\n\n## How to do it\nUse a starting range such as:\n- **Temperature:** 170\u2013210\u00b0C\n- **Residence time:** a short-to-moderate hold time, depending on biomass type\n- **pH condition:** natural autohydrolysis, or mild acid if your process design allows it\n\n### Example\nFor wheat straw, start with:\n- 190\u00b0C\n- 5 minutes residence time\n- No added catalyst for a first pass\n\nThen compare this to a more severe run, such as 200\u2013210\u00b0C, to see whether hemicellulose removal improves without excessive sugar degradation.\n\n---\n\n## Action\nLoad the biomass and stabilize steam saturation before the explosion phase.\n\n## Why this matters\nUniform steam contact ensures that heating is distributed through the particles, not just on the outer surface.\n\n## How to do it\n- Load a known dry mass of biomass into the reactor\n- Apply saturated steam until target temperature is reached\n- Hold for the selected residence time\n- Monitor pressure and temperature continuously\n\n### Example\nIf you are processing 1 kg of dry miscanthus, make sure the reactor reaches the target temperature uniformly before initiating the flash release."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Trigger rapid depressurization and inspect structural change\n\n## Action\nRelease pressure **rapidly** to cause the explosion step.\n\n## Why this matters\nThe sudden pressure drop converts stored thermal energy into mechanical rupture, creating cracks, fiber separation, and increased porosity.\n\n## How to do it\n- Open the release valve quickly and fully\n- Capture the exploded material in a receiving vessel\n- Avoid slow venting, which reduces the mechanical rupture effect\n- Keep the valve-opening behavior consistent across trials\n\n### Example\nIf two runs use the same temperature and residence time, but one has a slow vent and the other a fast flash release, the fast release should produce more fibrillation and surface disruption even if the chemistry is similar.\n\n---\n\n## Action\nInspect the treated biomass for evidence of hemicellulose loss, lignin redistribution, and cell wall opening.\n\n## Why this matters\nSteam explosion is not judged only by chemical composition; the physical restructuring of the cell wall is equally important for enzyme access.\n\n## How to do it\nCheck for:\n- **Reduced hemicellulose content** in compositional analysis\n- **Cellulose enrichment** in the remaining solid\n- **Lignin redistribution or condensation** via FTIR or NMR\n- **Surface cracks and fibrillation** via microscopy\n- **Increased enzymatic sugar release** in hydrolysis assays\n\n### Example\nA successful pretreatment of corn stover might show:\n- Large hemicellulose reduction\n- Visible microcracks under SEM\n- Higher glucose release during enzymatic hydrolysis compared with untreated biomass\n\n---\n\n## Action\nCompare treated samples using severity metrics, but do not rely on them alone.\n\n## Why this matters\nLog R0 or combined severity helps organize experiments, but it does not fully capture the effect of the explosion step.\n\n## How to do it\n- Record severity values for each run\n- Also record the **pressure-drop rate**, valve-opening time, and reactor geometry\n- Treat these as part of the process definition, not as optional details\n\n### Example\nTwo experiments may have the same Log R0, but the one with the faster depressurization may produce more disruption and better digestibility."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Optimize for biomass type and downstream conversion\n\n## Action\nTune the process separately for woody and grassy biomass.\n\n## Why this matters\nSteam explosion responses are biomass-specific. Grass residues often contain more ferulic acid cross-links, while woody biomass may respond differently in lignin redistribution and accessibility.\n\n## How to do it\n- Run separate optimization sets for each feedstock type\n- Track hemicellulose removal, sugar yield, and inhibitor formation\n- Select the mildest condition that gives strong enzyme accessibility without excessive degradation\n\n### Example\nFor wheat straw, you may prioritize breaking ferulate-mediated cross-links. For wood chips, you may need to adjust residence time to improve porosity without over-condensing lignin.\n\n---\n\n## Action\nUse downstream hydrolysis results to choose the best pretreatment window.\n\n## Why this matters\nThe real goal is not just structural damage; it is improved conversion performance.\n\n## How to do it\n- Perform enzymatic hydrolysis on pretreated solids\n- Compare glucose and xylose release\n- Choose conditions that maximize conversion efficiency and minimize sugar loss\n\n### Example\nIf 200\u00b0C gives slightly more hemicellulose removal than 190\u00b0C but also creates more inhibitors, the better process may be 190\u00b0C if it produces comparable hydrolysis with fewer side effects.\n\n---\n\n## Final implementation rule\nTreat steam explosion as a **coupled chemistry + mechanics process**:\n- Heat weakens the matrix and hydrolyzes hemicellulose\n- Pressure release fractures the wall\n- Lignin redistributes instead of simply disappearing\n- The best outcome is the condition that most effectively opens cellulose for downstream use"
  }

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
