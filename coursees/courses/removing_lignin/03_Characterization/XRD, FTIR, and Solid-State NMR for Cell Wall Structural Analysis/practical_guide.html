    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }

<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **practical workflow** for characterizing **delignified plant cell walls** using **XRD, FTIR, and solid-state NMR** so you can determine:\n- whether **lignin was actually removed**,\n- whether **cellulose became more exposed**,\n- whether **cellulose packing/crystallinity changed**,\n- and whether the treatment caused **polymer mobility or backbone damage**.\n\n## What you will accomplish\nBy the end of this workflow, you should be able to:\n1. Compare untreated vs. delignified biomass.\n2. Use FTIR to verify loss of lignin-related functional groups.\n3. Use XRD to estimate changes in cellulose order.\n4. Use solid-state NMR to resolve cell-wall structure and dynamics in more detail.\n5. Interpret the three methods together instead of relying on a single metric.\n\n## Technical prerequisites\n- **Biomass samples**: untreated control and delignified/pretreatment-treated plant cell wall material.\n- **FTIR access**: ATR-FTIR instrument or FTIR spectrometer with sample-prep accessories.\n- **XRD access**: powder X-ray diffractometer.\n- **Solid-state NMR access**: ideally a solid-state NMR spectrometer; for advanced analysis, access to **DNP-enhanced solid-state NMR**.\n- **Chemical lignin assays**: at minimum **Klason lignin** and/or **acid-soluble lignin** measurement capability for confirmation.\n- **Data analysis software**: spectral peak-fitting/processing software for FTIR, XRD peak analysis tools, and NMR processing software.\n- **Reference spectra/patterns**: spectra or databases for lignin, cellulose, and hemicellulose comparison.\n\n## Sample set you should prepare\n- **Untreated biomass**: baseline reference.\n- **Delignified biomass**: one or more pretreatment conditions.\n- **Replicates**: at least 3 independent samples per condition.\n- **Optional controls**: purified cellulose and lignin reference materials for band assignment."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Establish the chemical baseline before spectroscopy\n\n## Action\nMeasure lignin content and prepare all samples consistently before running XRD, FTIR, or NMR.\n\n## Why\nYou need a chemical baseline so you can tell whether spectral changes come from **true delignification** or just from sample-to-sample variability.\n\n## How (Example)\n1. Run **Klason lignin** and/or **acid-soluble lignin** on untreated and treated biomass.\n2. Dry all samples to a consistent moisture level.\n3. Mill or homogenize samples to a similar particle size.\n4. Record pretreatment conditions carefully:\n   - temperature,\n   - time,\n   - solvent/chemical used,\n   - pH,\n   - solids loading.\n\n**Template:**\n- Untreated control: 28% total lignin\n- Pretreated sample A: 14% total lignin\n- Pretreated sample B: 9% total lignin\n\nThis gives you a chemical anchor before interpreting XRD or FTIR shifts.\n\n---\n\n## Action\nAssign the first pass of your analysis to FTIR screening.\n\n## Why\nFTIR is the fastest way to confirm whether lignin-associated bands decrease and whether carbohydrate-associated bands shift after treatment.\n\n## How (Example)\n1. Collect ATR-FTIR spectra for control and treated samples.\n2. Focus on these regions:\n   - **aromatic lignin bands**: often around 1500\u20131600 cm\u207b\u00b9,\n   - **carbonyl/acetyl bands**: associated with hemicellulose,\n   - **cellulose OH and C\u2013O bands**: related to hydrogen bonding and polysaccharide structure.\n3. Compare relative peak intensities before and after pretreatment.\n4. Look for:\n   - lower lignin aromatic signal,\n   - changes in hemicellulose carbonyl features,\n   - shifts in cellulose-related bands.\n\n**Interpretation example:**\n- If the lignin aromatic band drops and carbohydrate bands become more visible, the treatment likely removed matrix polymers and exposed cellulose.\n\n---\n\n## Action\nUse XRD to check whether cellulose appears more ordered after delignification.\n\n## Why\nXRD reveals **long-range packing**, so it helps you determine whether treatment changed the apparent cellulose crystallinity.\n\n## How (Example)\n1. Run powder XRD on untreated and treated biomass.\n2. Compare the diffraction pattern, especially cellulose I-associated peaks.\n3. Estimate a **relative crystallinity index** using the same method for every sample.\n4. Compare treated vs. untreated samples side by side.\n\n**Example interpretation:**\n- Untreated biomass: lower apparent crystallinity because lignin and hemicellulose mask cellulose order.\n- Delignified biomass: higher apparent crystallinity because amorphous components were removed.\n\nDo not conclude that cellulose was \u201cmade more crystalline\u201d without checking composition first."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Use solid-state NMR to resolve structure and mobility\n\n## Action\nRun solid-state NMR on selected samples after FTIR/XRD screening.\n\n## Why\nSolid-state NMR gives the most detailed picture of **cellulose environments, xylan conformations, lignin remnants, and polymer motion** inside intact cell walls.\n\n## How (Example)\n1. Select the most informative samples:\n   - untreated control,\n   - strongly delignified sample,\n   - intermediate sample if available.\n2. Acquire one-dimensional and, if possible, two-dimensional solid-state NMR spectra.\n3. If available, use **DNP-enhanced NMR** to improve sensitivity, especially for unlabeled biomass.\n4. Examine whether the spectra resolve:\n   - cellulose interior vs. surface chains,\n   - xylan conformers,\n   - lignin aromatic regions.\n\n**Example outcome:**\n- You may see that surface cellulose becomes more prominent after delignification, indicating increased exposure.\n- You may also detect changes in xylan environments, suggesting altered hemicellulose associations.\n\n---\n\n## Action\nMeasure polymer dynamics with relaxation and motion-sensitive experiments.\n\n## Why\nStructural changes matter less if the wall remains rigid and inaccessible. Dynamics tell you whether pretreatment actually loosened the matrix.\n\n## How (Example)\n1. Measure **13C\u2013T1** and **1H\u2013T1\u03c1** relaxation.\n2. Use dipolar-based experiments to estimate motional amplitudes.\n3. Compare rigid vs. mobile polymer regions across samples.\n\n**Example interpretation:**\n- Shorter or altered relaxation times can indicate a change in polymer mobility.\n- Greater mobility in treated samples may mean the cell wall architecture is less constrained, which often improves enzymatic accessibility.\n\n---\n\n## Action\nIntegrate all three methods into one decision framework.\n\n## Why\nEach method answers a different question. Combining them prevents overinterpretation.\n\n## How (Example)\nUse this decision logic:\n- **FTIR says lignin decreased** \u2192 pretreatment likely removed aromatic matrix material.\n- **XRD says crystallinity increased** \u2192 likely enrichment/exposure of cellulose, not necessarily new crystal formation.\n- **Solid-state NMR says cellulose surface signals and mobility changed** \u2192 the wall architecture was genuinely altered.\n\nIf FTIR and chemical assays show lignin removal but XRD barely changes, the pretreatment may have removed lignin without strongly changing cellulose packing.\n\nIf NMR shows increased mobility and changed xylan/cellulose associations, the pretreatment likely improved accessibility more meaningfully than XRD alone suggests."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Build a robust interpretation workflow for real samples\n\n## Action\nReport results as a layered structural conclusion, not as isolated instrument outputs.\n\n## Why\nThe strongest conclusions come from combining **composition**, **order**, and **dynamics**.\n\n## How (Example)\nWrite your findings in this sequence:\n1. **Chemical change**: lignin content dropped from 28% to 9%.\n2. **Spectroscopic confirmation**: FTIR showed weaker lignin aromatic bands and clearer polysaccharide bands.\n3. **Structural response**: XRD showed higher apparent crystallinity after treatment.\n4. **Molecular mechanism**: solid-state NMR showed altered cellulose surface environments and increased polymer mobility.\n\nThis lets you say something stronger than \u201cthe sample was delignified.\u201d You can say:\n- the matrix was removed,\n- cellulose became more exposed,\n- the cell wall became less tightly packed,\n- and polymer dynamics changed in a way that may improve accessibility.\n\n---\n\n## Action\nUse a caution checklist before finalizing conclusions.\n\n## Why\nXRD, FTIR, and NMR can each be misleading if interpreted alone.\n\n## How (Example)\nCheck these common pitfalls:\n- **XRD**: A higher crystallinity index may reflect loss of amorphous lignin/hemicellulose rather than true cellulose recrystallization.\n- **FTIR**: Overlapping peaks can obscure interpretation; confirm with lignin assays.\n- **Solid-state NMR**: High-quality data require more instrument time and careful sample selection.\n\n---\n\n## Final reporting template\nUse this structure in your results section:\n- **Sample and treatment**\n- **Lignin assay result**\n- **FTIR functional-group changes**\n- **XRD crystallinity/order changes**\n- **Solid-state NMR structural/dynamic changes**\n- **Overall conclusion about cellulose exposure and wall accessibility**\n\n## Bottom line\nTo characterize delignified biomass well, do not ask only \u201cHow much lignin is left?\u201d Ask:\n- What changed chemically?\n- What changed structurally?\n- What changed dynamically?\n\nThat integrated workflow is the most reliable way to determine whether pretreatment truly opened the cell wall while preserving cellulose quality."
  }
]
  </textarea>

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
