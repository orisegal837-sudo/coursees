  <style>
    /* ========================================
      PREMIUM THEME & TYPOGRAPHY VARIABLES
      ========================================
    */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --stroke-strong: rgba(255, 255, 255, 0.15);
      
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --text-heading: #ffffff;
      
      --accent-primary: #8b5cf6;
      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
      
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      
      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {
      padding: clamp(20px, 4vw, 48px) 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========================================
      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

    /* ========================================
      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .card-h {
      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;
    }

    /* ========================================
      NAVIGATION BOTTOM BAR
      ========================================
    */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      border-top: 1px solid var(--stroke-soft);
      background: rgba(5, 5, 10, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: var(--bg-surface);
      color: var(--text-heading);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;

    .btn:hover:not(:disabled) {

      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);

    }

      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

      opacity: 0.4;
      cursor: not-allowed;
      transform: none;

    }

    }

    .markdown-body a {

      border-bottom: 1px solid transparent;

    }

    .markdown-body a:hover {

    }

    .markdown-body code {
      font-family: var(--font-mono);
      background: rgba(255, 255, 255, 0.08);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;
      color: #93c5fd; /* Light blue tint for inline code */
    }

    .markdown-body pre {
      background: #0d1117;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-md);
      padding: 1.25em;
      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);
      margin: 3em 0;
    }

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .task-card:hover {
      border-color: var(--stroke-strong);
      transform: translateY(-2px);
    }
    .task-card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25em;
      color: var(--accent-secondary);
    }
    .objective-card {
      border-left: 4px solid var(--accent-primary);
    }
    .instructions-list {
      padding-left: 20px;
    }
    .instructions-list li {
      margin-bottom: 12px;
    }
    .criteria-checklist {
      list-style: none;
      padding-left: 0;
    }
    .criteria-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .criteria-checklist li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* KaTeX overrides for dark mode */
    .katex {
      color: var(--text-heading);
      font-size: 1.1em;
    }

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **selective oxidative biodelignification workflow** that removes lignin while **minimizing cellulose oxidation, chain scission, and pulp-quality loss**. By the end, you should be able to:\n- Choose a **laccase-, peroxidase-, or hybrid system** based on substrate and target selectivity.\n- Set up conditions that **favor lignin oxidation over cellulose attack**.\n- Control **radical formation, mediator diffusion, and oxidant delivery**.\n- Evaluate whether delignification is improving **without sacrificing viscosity, brightness, or fiber integrity**.\n\n## Prerequisites\nYou need access to the following technical tools/materials:\n- **Lignocellulosic pulp or biomass substrate**: kraft pulp, organosolv pulp, or milled woody biomass.\n- **Oxidative enzymes**: commercial **laccase**, **manganese peroxidase**, **lignin peroxidase**, or **versatile peroxidase**.\n- **Mediator compounds** for laccase\u2013mediator systems: **ABTS**, **HBT**, or a **natural phenolic mediator**.\n- **Hydrogen peroxide supply** or an **in situ peroxide-generating oxidase system**.\n- **Buffer system** for pH control: commonly acetate, tartrate, or phosphate depending on enzyme choice.\n- **Basic analytical access** for quality checks:\n  - UV\u2013Vis spectrophotometer or colorimeter\n  - Viscosity or degree-of-polymerization measurement setup\n  - FTIR, Raman, or NMR access if available\n  - Handsheet or fiber-strength testing tools if working with pulp\n- **Standard lab equipment**: temperature-controlled shaker/incubator, pH meter, filtration setup, and oxygen supply if needed.\n\n## Implementation Mindset\nDo not aim for \u201cmaximum oxidation.\u201d Aim for **targeted oxidation**:\n- Oxidize **lignin-rich regions first**.\n- Keep radicals **short-lived and localized**.\n- Deliver peroxide **slowly and in measured doses**.\n- Stop the process before cellulose quality begins to drop."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up a Selective Delignification Baseline\n\n## 1) Characterize the starting substrate\n**Action:** Measure or estimate lignin content, cellulose content, pH sensitivity, and baseline pulp quality.\n**Why it matters:** You need a reference point to tell whether the process is truly selective.\n**How (Example):**\n- Use Klason lignin or compositional analysis to determine lignin percentage.\n- Measure initial viscosity or DP as a proxy for cellulose integrity.\n- Record brightness, fiber morphology, and kappa number if working with pulp.\n\n## 2) Choose the oxidation system\n**Action:** Pick the enzyme class that matches your substrate and selectivity goal.\n**Why it matters:** Different catalysts expose different control points.\n**How (Example):**\n- **Laccase**: best for phenolic lignin and mediator-based extensions.\n- **Peroxidase systems**: better for broader lignin oxidation but require strict peroxide control.\n- **Hybrid sequence**: best when the substrate is recalcitrant and you need a staged approach.\n\n## 3) Establish a narrow operating window\n**Action:** Define pH, temperature, enzyme dose, mediator dose, and reaction time before starting.\n**Why it matters:** Selectivity is lost quickly outside the safe window.\n**How (Example):**\n- Start with enzyme manufacturer-recommended pH and temperature.\n- Use a low-to-moderate enzyme loading in the first trial.\n- Set a short initial time course, such as 0.5, 1, 2, and 4 hours, to detect early cellulose damage.\n\n## 4) Add oxidant in a controlled way\n**Action:** If using peroxide, feed it gradually rather than all at once.\n**Why it matters:** Excess H2O2 can inactivate enzymes and trigger cellulose oxidation.\n**How (Example):**\n- Replace a single peroxide bolus with **fed-batch additions** every 10\u201330 minutes.\n- Alternatively, generate peroxide in situ using an oxidase couple to keep concentrations low.\n\n## 5) Monitor radical exposure indirectly\n**Action:** Watch process indicators that reflect radical intensity and diffusion.\n**Why it matters:** You usually cannot observe radicals directly, so you track their consequences.\n**How (Example):**\n- Track color change, absorbance increase, or solubilized aromatic fragments as signs of lignin oxidation.\n- Check whether viscosity drops too fast, which suggests cellulose attack."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Execute Staged Delignification and Protect Cellulose\n\n## 1) Use a two-stage or hybrid sequence\n**Action:** Separate aggressive lignin-opening from gentle finishing.\n**Why it matters:** Staging reduces the chance that strong oxidation reaches cellulose-rich domains.\n**How (Example):**\n- **Stage A: structural opening** \u2014 mild chemical pretreatment or short oxidative exposure to loosen the wall and remove accessible lignin.\n- **Stage B: enzymatic cleanup** \u2014 laccase or peroxidase treatment under milder conditions to finish delignification.\n\n## 2) Select mediators with control in mind\n**Action:** Match mediator choice to diffusion and redox behavior.\n**Why it matters:** The mediator determines how far oxidation spreads beyond the enzyme site.\n**How (Example):**\n- **ABTS**: strong, widely used mediator for rapid oxidation but may increase over-oxidation risk.\n- **HBT**: can extend oxidation into less accessible lignin but should be optimized carefully.\n- **Natural phenolic mediators**: often more recyclable and potentially gentler.\n\n## 3) Tune the process to keep oxidation surface-limited\n**Action:** Adjust solids loading, mixing, co-solvent content, and oxygen/peroxide supply.\n**Why it matters:** Bulk destructive oxidation usually starts when reagents diffuse too far or accumulate too long.\n**How (Example):**\n- Use moderate pulp consistency rather than very dilute conditions if you want to limit uncontrolled diffusion.\n- Avoid excessive co-solvent levels that increase mediator penetration into cellulose-rich zones.\n- Maintain enough mixing for contact, but not so much that oxidants rapidly flood the whole matrix.\n\n## 4) Protect cellulose with stop points and wash steps\n**Action:** Stop oxidation when lignin removal gains begin to plateau or viscosity starts falling.\n**Why it matters:** Continued exposure after the useful window increases chain scission risk.\n**How (Example):**\n- Run short trials and sample frequently.\n- Wash out residual peroxide, mediator, metals, and soluble lignin fragments between stages.\n- If needed, add a radical-scavenging or quenching wash before the enzyme-finishing step.\n\n## 5) Check for selectivity, not just delignification\n**Action:** Compare lignin removal metrics with cellulose-quality metrics after each run.\n**Why it matters:** A process that removes more lignin is not successful if it severely weakens pulp.\n**How (Example):**\n- Good outcome: lower kappa number, improved brightness, stable viscosity.\n- Poor outcome: lower kappa number but major viscosity loss, darkening, or weak fibers.\n\n## 6) Optimize iteratively\n**Action:** Change one variable at a time.\n**Why it matters:** Selectivity depends on interactions among enzyme, mediator, and oxidant delivery.\n**How (Example):**\n- Keep enzyme dose constant and vary peroxide feed rate.\n- Keep peroxide constant and compare ABTS vs HBT.\n- Keep chemistry constant and compare reaction time or pH."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Validate Performance and Lock in a Robust Process\n\n## 1) Evaluate pulp quality after treatment\n**Action:** Measure both delignification and cellulose preservation.\n**Why it matters:** The process is only successful if it improves cleaning without damaging fiber performance.\n**How (Example):**\n- Track lignin removal via kappa number, absorbance, or compositional analysis.\n- Track cellulose integrity via viscosity, DP, or reducing-end formation.\n- Assess fiber strength, tear resistance, or handsheet properties if relevant.\n\n## 2) Diagnose common failure modes\n**Action:** Identify whether the problem is over-oxidation, poor accessibility, or enzyme inhibition.\n**Why it matters:** The fix depends on the failure source.\n**How (Example):**\n- **Too much cellulose damage:** lower peroxide feed, shorten time, reduce mediator strength.\n- **Poor delignification:** increase pretreatment severity slightly or improve mediator choice.\n- **Enzyme inactivity:** check pH, remove residual oxidants, and verify that metals or inhibitors are not present.\n\n## 3) Build a reusable operating protocol\n**Action:** Record the final conditions that achieved the best selectivity window.\n**Why it matters:** Selective biodelignification is highly condition-dependent, so reproducibility is essential.\n**How (Example):**\nCreate a standard operating template with:\n- substrate type and particle size\n- enzyme and mediator loading\n- peroxide concentration and feed schedule\n- pH, temperature, and time\n- wash steps and quenching steps\n- endpoint criteria for stopping the reaction\n\n## 4) Final decision rule\n**Action:** Adopt the condition set that gives the best lignin removal with the smallest cellulose penalty.\n**Why it matters:** This is the central design principle of the lesson.\n**How (Example):**\nChoose the process that delivers:\n- substantial lignin reduction,\n- minimal viscosity loss,\n- stable or improved fiber quality,\n- and manageable reagent cost and complexity.\n\n## Practical takeaway\nSelective oxidative biodelignification succeeds when you **direct radicals toward lignin, limit their lifetime, control oxidant dosing, and stop the process before cellulose is harmed**. Use staging, mediator selection, and peroxide management as your main control levers."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
