  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a practical delignification workflow that uses **fungal peroxidases** to remove lignin **selectively** by controlling **hydrogen peroxide (H2O2)** delivery. By the end, you should be able to:\n- Choose between **LiP, MnP, and VP** based on biomass type and lignin accessibility.\n- Set up a peroxide dosing strategy that supports oxidation without enzyme damage.\n- Design a peroxidase-assisted pretreatment sequence that improves lignin removal while protecting carbohydrates.\n\n## What you need before starting\n### Technical prerequisites\n- **A source of fungal peroxidase enzyme(s)**: lignin peroxidase (LiP), manganese peroxidase (MnP), or versatile peroxidase (VP), typically from a commercial supplier, enzyme collection, or fungal culture system.\n- **Hydrogen peroxide (H2O2)** with concentration suitable for controlled dosing.\n- **Buffered reaction system** compatible with peroxidases (commonly acidic to mildly acidic pH depending on the enzyme system).\n- **Biomass substrate** with known or estimated lignin content, preferably pre-characterized for phenolic/non-phenolic composition.\n- **Optional mediators/chelators**:\n  - Mn2+ for MnP/VP systems.\n  - Organic acids or chelators that stabilize Mn3+ for diffusion-based oxidation.\n- **Basic analytical tools** for monitoring delignification and side reactions:\n  - UV-visible spectrophotometer or colorimetric assays.\n  - Lignin and carbohydrate composition analysis.\n  - Viscosity or molecular-weight assessment if working with pulp.\n- **Temperature and agitation control** for maintaining consistent enzyme performance.\n\n## Practical setup decision\nBefore you start, classify your feedstock:\n- **High non-phenolic lignin / difficult biomass** \u2192 prioritize **LiP** or **VP**.\n- **Need for diffusible oxidation over distance** \u2192 prioritize **MnP** or **VP** with Mn2+.\n- **Need one enzyme system with broader substrate scope** \u2192 choose **VP**.\n\n## Why this matters\nPeroxidase-driven delignification succeeds only when **enzyme choice** and **peroxide supply** are matched to the biomass. The process is not just about adding oxidant; it is about controlling where radicals form and how long they survive."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up the Reaction System\n\n## Step 1: Match the enzyme to the lignin problem\n### The action\nSelect LiP, MnP, or VP based on the structure and accessibility of the lignin in your biomass.\n\n### Why this matters\nEach enzyme starts oxidation differently and has a different reach. Choosing the wrong enzyme reduces selectivity and efficiency.\n\n### How (example)\n- **Use LiP** when you need direct oxidation of **non-phenolic lignin**.\n- **Use MnP** when you want **Mn3+-mediated diffusion** into less accessible regions.\n- **Use VP** when you want both direct lignin oxidation and Mn-dependent oxidation in one system.\n\n## Step 2: Prepare a buffered, controlled environment\n### The action\nSet up the reaction at a stable pH and temperature appropriate for the enzyme you selected.\n\n### Why this matters\nPeroxidases are sensitive to operating conditions. Stable conditions help preserve activity and improve reproducibility.\n\n### How (example)\n- Prepare biomass slurry in a **buffered reactor**.\n- Maintain **constant agitation** so peroxide and enzyme distribute evenly.\n- Keep the system at a fixed temperature rather than allowing ambient drift.\n\n## Step 3: Establish a peroxide dosing plan\n### The action\nDo not add H2O2 all at once. Define a **controlled delivery schedule**.\n\n### Why this matters\nToo much peroxide can **inactivate the enzyme**, intensify side reactions, and oxidize carbohydrates. Too little leaves the enzyme underused.\n\n### How (example)\nUse one of these starting strategies:\n- **Stepwise addition**: add small peroxide pulses at intervals.\n- **Fed-batch dosing**: deliver peroxide continuously at a low rate.\n- **Pulse-and-hold**: add a small pulse, then wait for consumption before the next dose.\n\nExample template:\n- Start with a low initial peroxide charge.\n- Measure activity or residual peroxide after a short interval.\n- Add the next increment only when the previous dose is largely consumed.\n\n## Step 4: Add supporting components when needed\n### The action\nInclude Mn2+, chelators, or organic acids only when they fit the enzyme system and the desired oxidation mode.\n\n### Why this matters\nMnP and VP often rely on Mn3+ formation and stabilization to extend oxidation beyond the enzyme surface.\n\n### How (example)\n- For **MnP or VP**, add **Mn2+** as the substrate for oxidation.\n- Include a **chelating or stabilizing organic acid** if you want Mn3+ to diffuse away from the enzyme and oxidize lignin at a distance."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Run the Delignification Process\n\n## Step 5: Start oxidation gradually\n### The action\nIntroduce enzyme first, then begin peroxide dosing slowly.\n\n### Why this matters\nThe enzyme must be in place before peroxide-driven activation starts. This reduces wasted oxidant and supports controlled radical formation.\n\n### How (example)\n1. Load the biomass slurry.\n2. Add the peroxidase enzyme.\n3. Wait briefly for mixing equilibration.\n4. Begin peroxide feed in small increments.\n\n## Step 6: Monitor for the signs of productive delignification\n### The action\nTrack lignin removal and watch for indicators of over-oxidation.\n\n### Why this matters\nYou need to know whether peroxide is helping cleavage or causing damage.\n\n### How (example)\nMonitor:\n- **Lignin solubilization or reduction** in measured lignin content.\n- **Carbohydrate retention** to detect cellulose loss.\n- **Pulp viscosity or molecular weight** if working with fibers.\n- **Residual peroxide** to judge whether dosing is too aggressive or too weak.\n\n## Step 7: Adjust peroxide flow in real time\n### The action\nIncrease, reduce, or pause peroxide input based on enzyme performance and substrate response.\n\n### Why this matters\nPeroxidase chemistry is highly sensitive to oxidant balance. The best selectivity comes from adaptation, not fixed dosing.\n\n### How (example)\n- If lignin removal slows and peroxide is disappearing too fast: **slightly increase feed frequency**.\n- If enzyme activity drops or carbohydrates begin to oxidize: **reduce dose or pause addition**.\n- If residual peroxide accumulates: **stop dosing and let the system consume it** before continuing.\n\n## Step 8: Use a hybrid pretreatment sequence when biomass is highly recalcitrant\n### The action\nCombine peroxidase oxidation with a prior or subsequent pretreatment step.\n\n### Why this matters\nPeroxidases work better when the biomass structure is already partially opened.\n\n### How (example)\nA practical sequence might be:\n1. **Mechanical or mild chemical pretreatment** to open the cell wall.\n2. **Peroxidase-assisted oxidation** to remove lignin selectively.\n3. **Enzymatic hydrolysis** afterward to convert exposed cellulose more efficiently."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Optimize for Selectivity and Scale\n\n## Step 9: Optimize for the specific enzyme behavior\n### The action\nTune the process around the strengths of the enzyme you selected.\n\n### Why this matters\nLiP, MnP, and VP do not behave identically. A one-size-fits-all setup usually wastes oxidant and lowers selectivity.\n\n### How (example)\n- **LiP**: favor conditions that support direct attack on difficult lignin structures.\n- **MnP**: ensure Mn2+ availability and Mn3+ stabilization for diffusion-based oxidation.\n- **VP**: balance direct lignin oxidation with Mn-dependent chemistry.\n\n## Step 10: Protect carbohydrates while maximizing lignin removal\n### The action\nUse the mildest peroxide strategy that still achieves the target delignification.\n\n### Why this matters\nExcess oxidative power can damage cellulose, lower viscosity, and reduce downstream yield.\n\n### How (example)\nSet your success criteria as a balance:\n- High lignin removal\n- Minimal cellulose chain scission\n- Acceptable pulp quality or enzyme digestibility\n\n## Step 11: Standardize the operating template\n### The action\nDocument enzyme loading, peroxide schedule, pH, temperature, Mn2+ use, and pretreatment history for every run.\n\n### Why this matters\nPeroxidase delignification is sensitive to small changes. Standardization makes the process transferable and scalable.\n\n### How (example)\nCreate a run sheet with fields for:\n- Biomass type and particle size\n- Enzyme identity and dose\n- Peroxide addition schedule\n- Mn2+/chelator use\n- pH and temperature\n- Measured lignin removal and carbohydrate retention\n\n## Final takeaway\nEffective fungal peroxidase delignification is a **control problem**, not just a chemistry problem. Select the right enzyme, deliver peroxide gradually, support diffusion where needed, and integrate the reaction into a broader pretreatment workflow. That is how LiP, MnP, and VP remove lignin selectively while preserving the value of the carbohydrate fraction."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
