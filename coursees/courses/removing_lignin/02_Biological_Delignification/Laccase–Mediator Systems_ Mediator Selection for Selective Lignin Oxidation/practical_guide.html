  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **laccase\u2013mediator system (LMS)** that **oxidizes lignin selectively** while minimizing damage to carbohydrates, especially cellulose. By the end, you should be able to:\n1. **Choose a laccase** suitable for your biomass or material.\n2. **Screen mediators** for redox power, diffusion, stability, and enzyme compatibility.\n3. **Run and evaluate** LMS reactions for delignification, bleaching, or surface modification.\n4. **Tune conditions** to reduce repolymerization and cellulose oxidation.\n\n## Prerequisites\nUse specific tools and materials before starting:\n- **A laccase preparation** from a defined source, such as:\n  - *Trametes versicolor* laccase, or\n  - a commercially available fungal laccase with known pH optimum and activity units.\n- **Candidate mediators**, ideally including both synthetic and natural options:\n  - HBT\n  - ABTS\n  - TEMPO\n  - Syringaldehyde\n  - Vanillin\n  - Acetosyringone\n  - 3-hydroxyanthranilic acid\n- **A lignocellulosic substrate** to test, such as:\n  - kraft pulp\n  - bleached pulp\n  - milled wood lignin\n  - pretreated agricultural residue\n- **Buffer systems** covering the likely working pH range, for example:\n  - acetate buffer for acidic conditions\n  - citrate buffer for acidic-to-mildly acidic conditions\n- **Basic analytical access** to assess outcomes:\n  - UV-Vis spectrophotometer\n  - HPLC or GC-MS if you want product profiling\n  - FTIR or Raman for structural changes\n  - carbohydrate/lignin compositional assay access if possible\n- **Shaking/incubation equipment** with controlled temperature and aeration or headspace oxygen access.\n\n## What to keep in mind before you begin\n- Laccase alone mainly attacks **phenolic lignin**, not the full lignin network.\n- The mediator is what extends oxidation into **non-phenolic lignin**.\n- Your goal is not maximum oxidation at all costs; your goal is **selective oxidation** with controlled chemistry."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Build and Screen an LMS\n\n## Step 1: Define the application goal\n**Action:** Decide whether your target is **delignification, bleaching, depolymerization, or surface modification**.\n\n**Why it matters:** The best mediator and reaction conditions change depending on the end goal.\n\n**How (example):**\n- For **pulp bleaching**, prioritize low cellulose damage and good color removal.\n- For **lignin depolymerization**, prioritize mediator reactivity and fragment release.\n- For **surface modification**, prioritize shallow penetration and mild oxidation.\n\n## Step 2: Select a laccase with compatible pH and activity\n**Action:** Choose a laccase whose pH optimum and stability match your substrate and mediator plan.\n\n**Why it matters:** Mediator oxidation only works efficiently if laccase remains active in the same reaction window.\n\n**How (example):**\n- Use a fungal laccase active near **pH 4\u20136** for many biomass systems.\n- Check supplier data for **activity units, temperature stability, and inhibitor sensitivity**.\n- Start with a standard enzyme dose and keep it constant while screening mediators.\n\n## Step 3: Build a mediator screening set\n**Action:** Test at least one mediator from each major class: synthetic high-reactivity, recyclable aromatic, radical-mediated, and natural phenolic.\n\n**Why it matters:** Different mediators behave differently in diffusion, redox potential, toxicity, and side reactions.\n\n**How (example):**\n- **HBT** for strong oxidation capability.\n- **ABTS** for a well-known benchmark mediator.\n- **TEMPO** if you want to probe alternative oxidation behavior.\n- **Vanillin or syringaldehyde** if you want lower-toxicity natural candidates.\n\n## Step 4: Prepare a small matrix screen\n**Action:** Run mini-reactions varying mediator identity and dose.\n\n**Why it matters:** LMS performance is highly dependent on mediator concentration; too little gives poor oxidation, too much can waste oxidizing power or increase side reactions.\n\n**How (example):**\nSet up reactions such as:\n- laccase only\n- laccase + low mediator dose\n- laccase + medium mediator dose\n- laccase + high mediator dose\n\nKeep constant:\n- substrate loading\n- enzyme loading\n- pH\n- temperature\n- reaction time\n\n## Step 5: Monitor immediate reaction behavior\n**Action:** Watch for color change, substrate swelling, soluble product formation, and laccase compatibility.\n\n**Why it matters:** A mediator that looks strong chemically may still fail if it inhibits the enzyme or causes rapid wasteful side reactions.\n\n**How (example):**\n- Measure absorbance changes in the liquid phase.\n- Check whether the enzyme remains active after mediator addition.\n- Compare treated vs untreated substrate visually and by yield of soluble products."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Optimization for Selectivity and Controlled Delignification\n\n## Step 6: Tune pH and oxygen availability\n**Action:** Adjust pH and ensure enough oxygen is present during the reaction.\n\n**Why it matters:** Laccase requires oxygen as the terminal oxidant, and pH strongly affects both enzyme activity and mediator/lignin redox behavior.\n\n**How (example):**\n- Test a narrow pH window around the laccase optimum.\n- Use gentle shaking or aeration to avoid oxygen limitation.\n- Compare sealed, loosely capped, and aerated setups to identify the best balance.\n\n## Step 7: Control mediator dose to reduce repolymerization\n**Action:** Use the lowest mediator concentration that gives measurable lignin oxidation.\n\n**Why it matters:** Excess mediator can generate concentrated radical chemistry that promotes lignin fragment coupling instead of cleavage.\n\n**How (example):**\n- Start with a low dose and increase stepwise.\n- Track whether product profiles shift toward smaller fragments or toward larger coupled structures.\n- If repolymerization increases, reduce dose or shorten reaction time.\n\n## Step 8: Protect cellulose by limiting harsh conditions\n**Action:** Avoid conditions that promote carbohydrate oxidation.\n\n**Why it matters:** A selective LMS should attack lignin preferentially; overly aggressive conditions can damage cellulose and lower material quality.\n\n**How (example):**\n- Keep pH in the mild acidic range rather than strong acid or base.\n- Avoid unnecessary organic solvent content.\n- Stop the reaction once lignin benefits plateau rather than extending it indefinitely.\n\n## Step 9: Compare natural and synthetic mediators against your target outcome\n**Action:** Rank mediators by performance, not by theoretical reactivity alone.\n\n**Why it matters:** The \u201cbest\u201d mediator depends on the substrate and desired endpoint, not just redox potential.\n\n**How (example):**\nCreate a simple decision table with columns such as:\n- lignin removal\n- brightness gain\n- carbohydrate retention\n- product profile\n- enzyme stability\n- mediator cost/toxicity\n\nThen compare:\n- **HBT**: often strong but may be less desirable if side reactions are high.\n- **ABTS**: useful benchmark and often easier to compare across studies.\n- **Natural mediators**: attractive if selectivity and sustainability matter more than peak reactivity.\n\n## Step 10: Evaluate reaction network outcomes\n**Action:** Check whether lignin is being cleaved, repolymerized, or only superficially modified.\n\n**Why it matters:** Selective lignin oxidation is a network problem; you need to know which pathway dominates.\n\n**How (example):**\n- Use FTIR/Raman to detect lignin signature changes.\n- Use HPLC/GC-MS to look for released aromatic fragments.\n- Measure carbohydrate retention to confirm cellulose protection.\n- Compare all treated samples against an untreated control and a laccase-only control.\n\n## Practical decision rule\nIf a mediator gives strong oxidation but also shows more repolymerization or cellulose loss, **downgrade it** even if product formation looks impressive. The best LMS is the one that produces the **cleanest lignin-selective outcome**, not the most radical chemistry."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Advanced Selection Strategy and Final Workflow\n\n## Step 11: Match mediator choice to the biomass matrix\n**Action:** Choose mediators based on how tightly lignin is embedded and how accessible the cell wall is.\n\n**Why it matters:** Small, diffusion-friendly mediators are more effective when they must penetrate dense biomass.\n\n**How (example):**\n- For dense or poorly accessible substrates, prioritize **small mediators with good diffusion**.\n- For more open substrates, broader mediator options may work.\n- Use natural mediators when lower toxicity and lower cost are priorities.\n\n## Step 12: Build a selection workflow you can reuse\n**Action:** Standardize your mediator selection into a repeatable test sequence.\n\n**Why it matters:** LMS optimization is easier when every new substrate is evaluated with the same logic.\n\n**How (example):**\n1. Run laccase-only control.\n2. Screen 3\u20137 mediators at one baseline dose.\n3. Identify the top 2\u20133 performers.\n4. Re-test those mediators across pH and dose.\n5. Choose the best option based on selectivity, not just conversion.\n\n## Step 13: Make the final choice using a balanced scorecard\n**Action:** Score each mediator using a weighted rubric.\n\n**Why it matters:** The best mediator often balances multiple constraints: reactivity, stability, toxicity, cost, and selectivity.\n\n**How (example):**\nAssign scores from 1\u20135 for:\n- lignin oxidation efficiency\n- cellulose preservation\n- mediator stability\n- laccase compatibility\n- cost and availability\n- environmental profile\n\nChoose the mediator with the best overall score for your application.\n\n## Final rule of thumb\n- Use **strong synthetic mediators** when you need maximum oxidation power and can tolerate more optimization.\n- Use **natural phenolic mediators** when sustainability, cost, or lower toxicity matters.\n- Always verify that the system promotes **lignin cleavage over repolymerization** and **lignin oxidation over carbohydrate damage**.\n\n## End point\nA successful LMS is one that uses laccase to generate mediator radicals efficiently, drives oxidation into non-phenolic lignin, and preserves cellulose under mild conditions."
  }
]

  (function () {

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
