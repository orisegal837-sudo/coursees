      --text-heading: #ffffff;

      --accent-secondary: #3b82f6;

      --radius-md: 12px;

      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;

      display: flex;
      align-items: stretch;
      justify-content: center;

      width: 100%;

      align-items: center;

      margin-bottom: 40px;

      gap: 8px;

      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;

      line-height: 1.1;

      -webkit-background-clip: text;
      background-clip: text;

      ========================================
    */

      display: flex;

      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;

      display: flex;

      text-transform: uppercase;

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **lignin valorization workflow** that takes recovered lignin from a biorefinery and routes it into the **highest-value feasible product portfolio** based on its quality, reactivity, and purity.\n\nBy the end of this guide, you should be able to:\n1. **Select a lignin recovery route** that preserves reactivity.\n2. **Classify the recovered lignin** by purity, condensation level, and downstream suitability.\n3. **Choose an upgrading pathway** for either materials or chemicals.\n4. **Integrate process and market constraints** so the route is technically and economically realistic.\n\n## Technical prerequisites\nYou need access to the following technical capabilities and tools:\n- **Biorefinery lignin sample or process data** from kraft, sulfite, organosolv, ionic-liquid, DES, hydrotropic, or enzymatic fractionation.\n- **Analytical equipment** for lignin characterization:\n  - Gel permeation chromatography (GPC/SEC)\n  - 2D HSQC NMR or equivalent structural analysis\n  - FTIR and/or UV-Vis spectroscopy\n  - Ash and carbohydrate contamination analysis\n- **Basic conversion equipment or partner access**:\n  - Batch reactor or catalytic reactor setup\n  - Separation tools for filtration, solvent recovery, and washing\n- **A solvent recovery and wastewater handling plan** if using organosolv, ionic liquids, deep eutectic solvents, or hydrotropes.\n- **Techno-economic assessment (TEA) and life-cycle assessment (LCA) software or templates** such as Excel-based models, Aspen Plus, or open TEA/LCA frameworks.\n\n## What to decide before starting\n- What is your **target product class**?\n  - Specialty chemicals\n  - Engineered polymers\n  - Carbon materials\n  - Bio-based aromatics\n  - Bulk fuel intermediates\n- What is your **acceptable process intensity**?\n  - Mild, preservation-oriented fractionation\n  - Moderate catalytic upgrading\n  - High-severity depolymerization\n- What lignin quality do you already have?\n  - Low-condensation, high-purity lignin\n  - Mixed technical lignin\n  - Highly contaminated or sulfur-rich lignin\n\n## Quick decision rule\n- **If you want high-value chemicals or polymer feedstocks:** prioritize **mild isolation** and **stabilization**.\n- **If you have heterogeneous technical lignin:** prioritize **robust, lower-cost applications**.\n- **If purification is expensive:** avoid forcing lignin into high-spec specialty markets."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Isolate and Stabilize Lignin Correctly\n\n## Step 1: Choose the recovery route based on desired lignin quality\n\n### The Action\nSelect the lignin isolation process before you design upgrading.\n\n### Why it matters\nIsolation conditions determine whether lignin stays reactive or becomes condensed and difficult to convert.\n\n### How to do it\nUse this routing logic:\n- **Kraft or sulfite lignin**: choose when industrial availability and scale matter more than pristine structure.\n- **Organosolv lignin**: choose when you need cleaner lignin with fewer impurities.\n- **Ionic liquid or deep eutectic solvent lignin**: choose when you want tunable fractionation and potentially better structural preservation.\n- **Hydrotropic or enzymatic routes**: choose when mild processing is critical.\n\n**Example template:**\n- Feedstock: hardwood residues\n- Target: phenolic resin feedstock\n- Selected route: **organosolv fractionation** with low-severity conditions\n- Reason: lower ash, better solubility, and higher structural accessibility\n\n---\n\n## Step 2: Stabilize reactive fragments immediately after solubilization\n\n### The Action\nPrevent lignin condensation during and right after extraction.\n\n### Why it matters\nOnce reactive intermediates condense, you lose \u03b2-O-4 content and reduce downstream reactivity.\n\n### How to do it\nApply stabilization-oriented practices such as:\n- Rapid cooling after pretreatment\n- Mild pH control during recovery\n- Capping or protecting reactive aldehyde/quinone-like intermediates when the process allows\n- Short residence times at high temperature\n- Avoiding unnecessary acid severity\n\n**Example template:**\n- During pretreatment, keep residence time below the point where darkening and viscosity spike.\n- Immediately separate the liquor from solids.\n- Wash and neutralize before storage or conversion.\n\n---\n\n## Step 3: Characterize the lignin stream before assigning a use case\n\n### The Action\nMeasure lignin properties that predict conversion behavior.\n\n### Why it matters\nProduct selection should be based on measurable quality, not on lignin source alone.\n\n### How to do it\nTrack these attributes:\n- **Molecular weight distribution** by GPC/SEC\n- **\u03b2-O-4 linkage abundance** by 2D NMR\n- **Ash and carbohydrate impurities** by compositional analysis\n- **Functional groups** by FTIR/UV-Vis\n- **Solubility** in candidate solvents\n\n**Example template:**\n- Low molecular weight + high \u03b2-O-4 + low ash = strong candidate for depolymerization or reactive polymers\n- High ash + broad distribution + high condensation = better suited to binders, carbon materials, or fuel blending\n\n---\n\n## Step 4: Clean and condition the lignin for downstream use\n\n### The Action\nRemove salts, residual solvents, sugars, and catalyst poisons.\n\n### Why it matters\nContaminants reduce catalytic performance, product color quality, and shelf stability.\n\n### How to do it\nUse a conditioning sequence such as:\n1. Filtration\n2. Washing or solvent exchange\n3. Neutralization\n4. Drying under controlled temperature\n5. Storage in moisture-protected containers\n\n**Example template:**\n- Organosolv lignin slurry \u2192 filter \u2192 ethanol wash \u2192 vacuum dry \u2192 sealed drum storage"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Upgrade Lignin Into the Right Product Portfolio\n\n## Step 5: Choose between materials and chemical depolymerization pathways\n\n### The Action\nAssign lignin to either a **polymeric materials route** or a **chemical conversion route**.\n\n### Why it matters\nThe best value comes from matching lignin structure to the product\u2019s performance requirements.\n\n### How to do it\nUse the following decision map:\n- **Materials route** if lignin has moderate-to-high molecular weight and usable functional groups.\n- **Depolymerization route** if lignin is sufficiently reactive and low in condensation.\n\n**Example template:**\n- Lignin from mild organosolv fractionation \u2192 resin modifier\n- Lignin from lignin-first fractionation \u2192 aromatic monomer platform\n\n---\n\n## Step 6: Convert lignin into polymer products when reactivity is sufficient\n\n### The Action\nFunctionalize lignin and incorporate it into polymers and resins.\n\n### Why it matters\nThis route can generate value without fully breaking lignin into monomers.\n\n### How to do it\nTarget these applications:\n- **Phenol-formaldehyde resins**: replace part of fossil phenol with lignin\n- **Polyurethanes**: increase rigidity after hydroxyl functionalization\n- **Epoxy systems**: improve mechanical and thermal properties\n- **Coatings**: exploit UV resistance and aromatic character\n\n**Example template:**\n- Apply hydroxymethylation or demethylation if needed.\n- Replace 20\u201340% of phenol in a resin formulation with lignin.\n- Test viscosity, cure time, and mechanical strength.\n\n---\n\n## Step 7: Convert lignin into chemicals when monomer production is the goal\n\n### The Action\nSelect an appropriate depolymerization chemistry.\n\n### Why it matters\nDifferent reaction families produce different product slates and purity profiles.\n\n### How to do it\nChoose among:\n- **Oxidative depolymerization** for vanillin, syringaldehyde, and related aromatics\n- **Reductive catalytic fractionation** for phenols and stabilized aromatic fragments\n- **Hydrogenolysis** for deoxygenated aromatics and cycloalkanes\n- **Biological funneling** for muconic acid, lipids, PHA, and bioconverted aromatics\n\n**Example template:**\n- Goal: vanillin \u2192 use controlled oxidation with selective catalyst/oxidant system\n- Goal: phenolic monomers \u2192 use reductive catalytic fractionation followed by separation\n- Goal: bioproducts \u2192 send aromatic hydrolysate to engineered microbes\n\n---\n\n## Step 8: Separate products and recycle what you can\n\n### The Action\nBuild a downstream separation plan for monomers, oligomers, catalysts, and solvents.\n\n### Why it matters\nEconomics depend heavily on product isolation and recycle efficiency.\n\n### How to do it\nDesign for:\n- Distillation or membrane recovery of solvents\n- Catalyst filtration or regeneration\n- Fractionation into monomers, oligomers, and residue\n- Purification only to the level required by the market\n\n**Example template:**\n- Collect monomer-rich oil phase\n- Recover solvent by evaporation or distillation\n- Recycle hydrogenation catalyst after filtration\n- Send heavy residue to carbon material or heat recovery"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Match Lignin Quality to Market, Then Validate Economics and Sustainability\n\n## Step 9: Match lignin quality to the highest feasible market\n\n### The Action\nMap lignin quality to product value before scaling.\n\n### Why it matters\nNot every lignin stream justifies the same purification and conversion cost.\n\n### How to do it\nUse this matching logic:\n- **High-purity, low-condensation lignin** \u2192 specialty chemicals, advanced polymers\n- **Technical lignin with moderate heterogeneity** \u2192 binders, dispersants, carbon materials\n- **Highly contaminated or low-value lignin** \u2192 combustion or lower-spec applications\n\n**Example template:**\n- If sulfur content is high and structure is heavily condensed, avoid expensive monomer purification.\n- If lignin has high \u03b2-O-4 content and low ash, pursue value-added chemical conversion.\n\n---\n\n## Step 10: Run a techno-economic check before scale-up\n\n### The Action\nEstimate cost drivers for each product pathway.\n\n### Why it matters\nA route can be chemically successful but economically unviable.\n\n### How to do it\nCalculate or estimate:\n- Feedstock cost\n- Solvent loss\n- Catalyst cost and lifetime\n- Separation and drying energy\n- Wastewater treatment cost\n- Product selling price and market size\n\n**Example template:**\n- If solvent recovery is below an acceptable threshold, redesign the fractionation loop before scaling.\n- If purification cost exceeds product margin, downgrade to a lower-spec application.\n\n---\n\n## Step 11: Check life-cycle impacts and adjust the process design\n\n### The Action\nCompare environmental burdens across candidate routes.\n\n### Why it matters\nA high-yield process may still be unsustainable if it creates excessive energy demand or waste streams.\n\n### How to do it\nAssess:\n- Energy use\n- Solvent leakage\n- Water consumption\n- Wastewater load\n- Catalyst recyclability\n- Carbon footprint per unit product\n\n**Example template:**\n- Route A gives higher monomer yield but high solvent loss.\n- Route B gives slightly lower yield but better solvent recycling.\n- Choose Route B if total footprint and cost are lower.\n\n---\n\n## Step 12: Implement a portfolio strategy instead of a single-product strategy\n\n### The Action\nDesign the lignin platform to produce multiple outputs from different lignin fractions.\n\n### Why it matters\nPortfolio routing improves robustness when lignin quality varies.\n\n### How to do it\nSplit streams by quality:\n- Best fraction \u2192 specialty chemicals or engineered polymers\n- Mid-grade fraction \u2192 dispersants, binders, coatings\n- Residual fraction \u2192 carbon materials or energy recovery\n\n**Example template:**\n- Fraction 1: low-condensation lignin \u2192 polymer feedstock\n- Fraction 2: mixed technical lignin \u2192 resin additive\n- Fraction 3: heavy residue \u2192 process heat or carbon precursor\n\n## Final implementation rule\nDesign lignin recovery, stabilization, conversion, separation, and market selection as **one integrated system**. Do not choose the chemistry first and the product later. Start with lignin quality, then select the least destructive recovery method, and only then assign the conversion route that gives the best value with the lowest processing burden."
  }

          </div>

          <div class="grid">
            <div class="card">
              <div class="card-b">
                <div id="sections-wrapper">
                  </div>
              </div>
            </div>
          </div>
        </div>

        <div class="nav">
          <button type="button" class="btn" id="prevBtn" aria-label="Previous section">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Previous</span>
          </button>
          <button type="button" class="btn btn-primary" id="nextBtn" aria-label="Next section">
            <span>Continue to Next</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
