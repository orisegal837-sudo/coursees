  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a **techno-economic and environmental evaluation workflow** for an integrated delignification and lignin-valorization process. By the end, you should be able to:\n- Map the **full process chain** from biomass feed to final product and waste treatment.\n- Estimate whether the process can be **profitable at scale**.\n- Check whether the process is **environmentally defensible** across its life cycle.\n- Compare process options using the same assumptions so you can identify the **best integrated design**, not just the best reaction.\n\n## Prerequisites\nUse the following technical tools and data sources:\n- **Aspen Plus** or **SuperPro Designer** for process simulation and mass/energy balances.\n- A spreadsheet tool such as **Microsoft Excel** or **Google Sheets** for TEA cash-flow calculations.\n- LCA software such as **SimaPro**, **openLCA**, or **Brightway2** for environmental assessment.\n- Access to **biomass composition data** for your feedstock (e.g., hardwood, corn stover, bagasse).\n- Access to **market prices** for biomass, solvents, chemicals, catalysts, utilities, and target products.\n- Published data or pilot-scale estimates for **recovery efficiencies, yields, and recycle rates**.\n- If relevant, access to **ecoinvent** or another LCA inventory database.\n\n## What to define before you start\n1. **Feedstock type and scale**\n   - Example: 100,000 dry metric tons/year of hardwood biomass.\n2. **Product slate**\n   - Example: lignin-derived phenolics, resin intermediates, or carbon materials.\n3. **System boundary**\n   - Include biomass handling, delignification, separation, lignin upgrading, solvent recycle, wastewater treatment, and utilities.\n4. **Functional unit**\n   - Example: 1 metric ton of product, or 1 MJ-equivalent of product value.\n5. **Comparison basis**\n   - Use the same feedstock, same plant size, same utility prices, and same product assumptions for every process option."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the TEA Model Step by Step\n\n## Step 1: Draw the full process flow diagram\n**Action:** Map every unit operation from biomass delivery to final product recovery and waste handling.\n\n**Why it matters:** TEA fails when hidden costs are omitted. The economics depend on separations, recycle, and effluent treatment as much as on the chemistry.\n\n**How (example):** Create blocks for:\n- Biomass receiving and size reduction\n- Pretreatment or delignification reactor\n- Solid-liquid separation\n- Washing and neutralization\n- Lignin recovery and purification\n- Product upgrading or derivatization\n- Solvent and catalyst recycle\n- Wastewater treatment\n- Steam, cooling, and power utilities\n\n## Step 2: Quantify all mass and energy flows\n**Action:** Build a material and energy balance for each block.\n\n**Why it matters:** TEA uses these flows to calculate operating cost, equipment size, and product yield.\n\n**How (example):** Record values such as:\n- 1,000 kg biomass input/hour\n- 20 wt% lignin removal\n- 85% solvent recovery\n- 5% cellulose loss\n- 2.5 GJ steam per ton biomass\n\n## Step 3: Assign cost assumptions to every major input\n**Action:** Add unit costs for feedstock, solvents, catalysts, chemicals, water, power, and waste disposal.\n\n**Why it matters:** A process can appear promising until solvent loss, alkali use, or wastewater treatment is priced in.\n\n**How (example):** Use line items such as:\n- Biomass: $60/dry ton\n- Ethanol solvent make-up: $0.80/kg lost\n- NaOH: $0.45/kg\n- Electricity: $0.08/kWh\n- Wastewater treatment: $0.30/m\u00b3\n\n## Step 4: Estimate capital and operating costs\n**Action:** Size equipment and calculate capital expenditure (CAPEX) and operating expenditure (OPEX).\n\n**Why it matters:** Scale changes the economics through fixed-cost dilution and equipment sizing.\n\n**How (example):** In a spreadsheet, estimate:\n- Reactor and separator purchase costs\n- Installation factor and total capital investment\n- Labor, maintenance, utilities, and consumables\n- Annualized capital charge\n\n## Step 5: Calculate minimum product selling price (MPSP)\n**Action:** Solve for the product price needed to reach a target return, such as zero net present value.\n\n**Why it matters:** MPSP gives a direct answer to the question: \u201cWhat must the product sell for to make this viable?\u201d\n\n**How (example):** If the plant makes 8,000 tons/year of lignin-derived product, adjust the selling price in Excel until discounted cash flow breaks even.\n\n## Step 6: Test the most important variables\n**Action:** Run sensitivity analysis on yield, solvent recovery, biomass price, utility use, and plant capacity.\n\n**Why it matters:** The most profitable base case can collapse if one key parameter shifts slightly.\n\n**How (example):** Compare scenarios such as:\n- 70%, 80%, and 90% product yield\n- 80% vs. 95% solvent recovery\n- Small plant vs. large plant throughput"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Add LCA and Compare Integrated Design Options\n\n## Step 1: Define the environmental boundary and allocation method\n**Action:** Choose what processes are included and how impacts are shared among coproducts.\n\n**Why it matters:** Lignin valorization often occurs alongside pulp, fuel, or carbohydrate products, so burden allocation can strongly change results.\n\n**How (example):** Specify whether you will use:\n- Mass allocation\n- Energy allocation\n- Economic allocation\n- System expansion or substitution\n\n## Step 2: Quantify environmental inventory data\n**Action:** Collect inputs and outputs for greenhouse gases, energy, water, and emissions.\n\n**Why it matters:** LCA translates operational data into environmental impacts.\n\n**How (example):** Track:\n- kWh electricity per ton product\n- kg solvent lost per batch\n- m\u00b3 wastewater generated\n- kg CO2e from utilities and chemicals\n\n## Step 3: Evaluate the main impact categories\n**Action:** Calculate impacts such as climate change, fossil energy use, and water demand.\n\n**Why it matters:** A process can reduce carbon emissions but increase water use or toxicity.\n\n**How (example):** Compare a baseline fossil aromatic with a lignin-derived alternative using the same functional unit, such as 1 kg product.\n\n## Step 4: Compare process options under identical assumptions\n**Action:** Evaluate alternative delignification and valorization routes side by side.\n\n**Why it matters:** Fair comparison reveals whether a better reaction is actually better once separation and recycle are included.\n\n**How (example):** Compare:\n- Route A: high conversion but poor solvent recovery\n- Route B: moderate conversion but high recycle efficiency\n- Route C: integrated route using existing biorefinery utilities\n\n## Step 5: Link TEA and LCA results\n**Action:** Identify designs that are both economically acceptable and environmentally preferable.\n\n**Why it matters:** A cheap process with high emissions is not deployment-ready, and a low-emission process with extreme cost is also not practical.\n\n**How (example):** Build a decision table with columns for:\n- MPSP\n- CAPEX\n- Energy use\n- CO2e per kg product\n- Water demand\n- Solvent loss\n\n## Step 6: Rank design improvements by leverage\n**Action:** Prioritize changes that improve both cost and sustainability.\n\n**Why it matters:** Some upgrades affect multiple bottlenecks at once.\n\n**How (example):** High-impact improvements often include:\n- Increasing solvent recycle efficiency\n- Reducing washing steps\n- Preserving carbohydrate stream value\n- Integrating heat recovery\n- Matching products to realistic markets"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Decision Rules for Viability\n\n## Use these questions to judge whether the process is ready for scale-up\n1. **Is the product slate realistic?**\n   - Example: Are you targeting a market that can absorb the expected production volume?\n2. **Does the process preserve value in the carbohydrate stream?**\n   - Example: Avoid severe delignification conditions that destroy cellulose yield.\n3. **Is recycle efficient enough to control operating cost?**\n   - Example: Target high solvent and catalyst recovery before scaling.\n4. **Are separations and wastewater treatment manageable?**\n   - Example: If washing creates large effluent loads, redesign the separation train.\n5. **Do TEA and LCA both support the same conclusion?**\n   - Example: If one says \u201ccheap\u201d and the other says \u201chigh impact,\u201d the design still needs improvement.\n\n## Practical decision threshold\nTreat the process as promising only if it can show all of the following:\n- Competitive product cost at a realistic plant size\n- High enough yields and recycle rates to support stable operation\n- Acceptable energy and water demand\n- Clear environmental advantage over the fossil-derived alternative\n- Robust performance under sensitivity analysis\n\n## Final implementation checklist\n- [ ] Full integrated flowsheet completed\n- [ ] Mass and energy balance closed\n- [ ] CAPEX and OPEX estimated\n- [ ] MPSP calculated\n- [ ] Sensitivity analysis completed\n- [ ] LCA boundary and allocation defined\n- [ ] Environmental inventory collected\n- [ ] TEA and LCA compared on the same basis\n- [ ] Design bottlenecks identified and prioritized\n\n## Example of a deployment-ready conclusion\n\u201cRoute B is preferred because it combines moderate lignin conversion with high solvent recovery, lower wastewater burden, and a lower minimum product selling price than Route A. Although Route A has higher conversion, its extra separation cost and energy demand make it less viable at commercial scale.\u201d"
  }
]

  <script>
  (function () {
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
