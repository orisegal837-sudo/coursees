  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a practical mental model and workflow for **alkaline delignification in soda and kraft pulping** so you can:\n- predict how lignin is removed from wood chips,\n- understand why kraft is usually more selective than soda,\n- control **time, temperature, and alkali chemistry** to balance delignification against carbohydrate loss,\n- interpret pulp results using metrics like **kappa number, yield, and viscosity/DP**.\n\n## Technical Prerequisites\nBefore you start, make sure you have access to:\n1. **A laboratory or pilot pulping digester** capable of controlled temperature and pressure.\n2. **Sodium hydroxide (NaOH)** for soda pulping trials.\n3. **Sulfide-bearing kraft cooking chemicals** or black-liquor-derived sulfide chemistry for kraft trials.\n4. **A chip preparation setup** for uniform wood chips or biomass chips.\n5. **Analytical methods for pulp evaluation**, ideally:\n   - kappa number testing,\n   - pulp yield measurement,\n   - viscosity or intrinsic viscosity testing,\n   - residual alkali measurement,\n   - optional lignin/cellulose characterization by NMR, FTIR, or wet chemistry.\n6. **A way to track cooking severity**, such as time, temperature logs, or H-factor calculation.\n\n## What You Should Be Able to Measure\n- **How much lignin was removed**: kappa number decrease.\n- **How much carbohydrate was preserved**: yield and viscosity/DP.\n- **How aggressive the cook was**: temperature-time profile and alkali charge.\n- **Whether kraft chemistry improved performance**: compare soda vs kraft at matched conditions.\n\n## Practical Setup Example\n- Run two test cooks on the same chip batch:\n  - **Soda cook**: NaOH only.\n  - **Kraft cook**: NaOH + sulfide chemistry.\n- Hold chip size, liquor-to-wood ratio, and final temperature constant.\n- Compare kappa number and yield after each cook to see how sulfur chemistry changes delignification selectivity."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up and Run a Controlled Delignification Trial\n\n## Step 1: Standardize the feedstock\n### The Action\nPrepare chips with consistent thickness, moisture content, and species.\n### Why\nDelignification rate depends heavily on liquor penetration and surface accessibility; inconsistent chips make the chemistry hard to interpret.\n### How (Example)\n- Screen chips to a narrow size range, such as 2\u20136 mm thickness.\n- Measure chip moisture and adjust charge calculations on an oven-dry basis.\n- Use the same wood species for all comparisons.\n\n## Step 2: Define the cooking chemistry\n### The Action\nSelect soda or kraft chemistry and set the alkali charge, sulfide level, liquor ratio, and target pH.\n### Why\nHydroxide concentration controls reaction rate, while sulfide in kraft increases lignin reactivity and improves selectivity.\n### How (Example)\n- Soda trial: charge NaOH only.\n- Kraft trial: charge NaOH plus a sulfide source.\n- Keep liquor-to-wood ratio constant, such as 4:1 or 5:1.\n\n## Step 3: Establish the severity profile\n### The Action\nChoose the target temperature and cooking time, then calculate or track severity.\n### Why\nHigher temperature and longer time accelerate lignin removal but also increase carbohydrate degradation.\n### How (Example)\n- Heat to a setpoint like 160\u2013170\u00b0C.\n- Hold for a fixed time, such as 30\u201390 minutes depending on target delignification.\n- Record the full time-temperature curve for H-factor comparison.\n\n## Step 4: Collect sampling checkpoints\n### The Action\nTake samples at the beginning, middle, and end of the cook if your equipment allows it.\n### Why\nKraft and soda delignification occur in stages: rapid initial removal, bulk delignification, then residual slow removal.\n### How (Example)\n- Pull samples at 15, 45, and 75 minutes.\n- Measure kappa number or lignin content after each sample to identify which phase dominates.\n\n## Step 5: Separate and wash the pulp\n### The Action\nTerminate the cook, displace liquor, and wash the fibers thoroughly.\n### Why\nResidual cooking liquor can distort yield, kappa number, and alkali balance measurements.\n### How (Example)\n- Filter or drain the cook liquor.\n- Wash with hot water until filtrate conductivity or pH drops significantly.\n- Collect solids for yield and pulp quality testing."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Interpret Reaction Pathways and Optimize Selectivity\n\n## Step 6: Compare lignin removal behavior across stages\n### The Action\nPlot delignification versus time or severity and identify the fast, bulk, and residual phases.\n### Why\nThis tells you whether the cook is limited by bond cleavage, diffusion out of the cell wall, or resistant residual lignin.\n### How (Example)\n- Plot kappa number against cooking time.\n- Expect a steep drop early, then slower decline later.\n- A flattening curve often indicates residual lignin control.\n\n## Step 7: Track carbohydrate preservation alongside lignin removal\n### The Action\nMeasure yield and viscosity/DP for each cook condition.\n### Why\nA good cook removes lignin without unnecessarily degrading cellulose and hemicellulose.\n### How (Example)\n- Compare two conditions with similar kappa numbers.\n- If one condition has much lower viscosity, it is overly severe even if delignification looks successful.\n\n## Step 8: Use kraft vs soda as a selectivity test\n### The Action\nRun side-by-side soda and kraft trials at matched severity.\n### Why\nSulfide chemistry in kraft should improve lignin reactivity and typically achieve the same kappa number with less carbohydrate damage.\n### How (Example)\n- Match temperature, time, and NaOH charge as closely as possible.\n- Add sulfide only in the kraft batch.\n- Compare final kappa, yield, and viscosity; kraft should usually show better delignification efficiency.\n\n## Step 9: Diagnose resistance and side reactions\n### The Action\nLook for signs of lignin condensation or poor liquor penetration.\n### Why\nResidual lignin can become more resistant through condensation, and transport limits can make the outer chip layers cook faster than the interior.\n### How (Example)\n- If kappa stays high despite severe cooking, inspect chip thickness or impregnation quality.\n- If yield drops sharply without much kappa improvement, you may be overcooking carbohydrates.\n\n## Step 10: Tune the process for the desired balance\n### The Action\nAdjust time, temperature, and alkali charge to hit the target kappa with minimum carbohydrate loss.\n### Why\nThe practical goal is not maximum delignification at any cost, but the best tradeoff between lignin removal and pulp quality.\n### How (Example)\n- If kappa is too high: increase temperature slightly, extend time, or increase effective alkali.\n- If viscosity drops too much: reduce severity, improve chip impregnation, or shift to kraft chemistry if available."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Final Decision Rules and Practical Takeaways\n\n## Use these decision rules in real operation\n- **If lignin removal is too slow early on**, check impregnation, chip size, and alkali availability.\n- **If the cook accelerates but pulp strength drops**, your severity is too high.\n- **If soda gives insufficient delignification**, kraft chemistry may be needed for better reactivity and selectivity.\n- **If residual lignin remains stubborn**, focus on transport limitations and resistant lignin structures rather than simply adding more time.\n\n## A simple working template\nFor each trial, record:\n1. raw material and chip size,\n2. NaOH charge and sulfide level,\n3. temperature profile and hold time,\n4. kappa number,\n5. pulp yield,\n6. viscosity/DP,\n7. notes on washing, impregnation, and color/appearance.\n\n## Practical takeaway\nTreat alkaline pulping as a **coupled chemistry-and-transport process**:\n- hydroxide breaks and solubilizes lignin,\n- sulfide in kraft improves lignin reactivity,\n- higher time and temperature increase rate but reduce selectivity,\n- carbohydrates must be protected while lignin is removed.\n\nUse that framework to choose operating conditions that reach the target kappa number without sacrificing more cellulose than necessary."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
