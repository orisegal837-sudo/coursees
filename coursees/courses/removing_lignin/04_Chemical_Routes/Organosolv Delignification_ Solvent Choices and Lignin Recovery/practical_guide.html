<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nImplement an **organosolv delignification workflow** that:\n- **Removes lignin** from lignocellulosic biomass using an organic solvent system.\n- **Preserves as much carbohydrate as possible** in the solid fraction for downstream hydrolysis or pulping.\n- **Recovers a usable lignin coproduct** suitable for further upgrading, materials, or analytical characterization.\n\n## When to use this\nUse organosolv when your goal is to **separate biomass into two high-value streams**:\n1. **Cellulose-rich solids** for enzymatic saccharification, fiber production, or pulping.\n2. **Solubilized lignin** for resin precursors, aromatics upgrading, or lignin chemistry studies.\n\n## Technical prerequisites\n- **A feedstock supply**: e.g., hardwood chips, agricultural residues, corn stover, wheat straw, or bagasse.\n- **A solvent system**:\n  - Alcohol-water system such as **ethanol/water** or **methanol/water**, or\n  - Organic acid system such as **formic acid**, **acetic acid**, or a mixture.\n- **A high-pressure lab digester or sealed reactor** if using low-boiling alcohols at elevated temperature.\n- **A reflux-capable or atmospheric reactor** if using organic-acid routes that can operate near atmospheric pressure.\n- **Solid-liquid separation tools**: filtration setup, centrifuge, or vacuum filtration system.\n- **Lignin recovery setup**: anti-solvent precipitation vessel, rotary evaporator, or solvent recovery unit.\n- **Basic characterization access**: oven for solids, balance, pH meter, and ideally FTIR, GPC/SEC, and carbohydrate analysis.\n\n## Practical starting targets\n- **Temperature**: moderate-to-high, depending on solvent system.\n- **Cooking time**: enough to remove lignin without major carbohydrate loss.\n- **Acid catalyst level**: only as much as needed to promote bond cleavage and limit repolymerization.\n\n## What success looks like\n- A **brown or dark solubilized liquor** containing lignin fragments.\n- A **light-colored solid pulp** with reduced lignin content.\n- **Higher digestibility** of the solid fraction.\n- A **recoverable lignin fraction** with better uniformity than kraft lignin."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Choose the Solvent System and Set the Process Window\n\n## Step 1: Match the solvent to your operational constraint\n\n### The Action\nChoose between an **alcohol-based** or **organic-acid-based** organosolv route based on your equipment and target product quality.\n\n### Why it matters\nSolvent choice determines **pressure requirements, lignin solubility, carbohydrate preservation, and coproduct quality**.\n\n### How (Example)\n- If you already have a **pressurized reactor**, start with **ethanol/water**.\n- If you want a route that may run **near atmospheric pressure**, test **formic acid** or **acetic acid** systems.\n- Example screening matrix:\n  - **Ethanol/water 60:40** for balanced lignin removal and solid preservation.\n  - **Formic acid/water** for stronger delignification and easier operation at lower pressure.\n\n## Step 2: Define the process severity window\n\n### The Action\nSet **temperature, residence time, solvent concentration, and acid level** before running trials.\n\n### Why it matters\nOrganosolv performance is a **trade-off**: too mild leaves lignin behind, too harsh damages cellulose and sugars.\n\n### How (Example)\nCreate a small test matrix such as:\n- Temperature: **140, 160, 180 \u00b0C**\n- Time: **30, 60, 90 min**\n- Acid catalyst: **0, low, medium**\n- Solvent-water ratio: **50:50, 60:40, 70:30**\n\nStart with the mildest condition expected to work, then intensify until lignin removal reaches your target.\n\n## Step 3: Prepare and standardize the feedstock\n\n### The Action\nDry, size-reduce, and homogenize the biomass before treatment.\n\n### Why it matters\nConsistent particle size and moisture content improve **mass transfer, reproducibility, and delignification uniformity**.\n\n### How (Example)\n- Dry biomass to a consistent moisture level.\n- Mill or chop to a uniform size, such as **1\u20135 mm** particles for lab-scale work.\n- Record ash, moisture, and initial lignin content if possible.\n\n## Step 4: Run the first organosolv trial\n\n### The Action\nLoad biomass and solvent into the reactor, seal or configure appropriately, and run the selected condition.\n\n### Why it matters\nThis is the core fractionation step where lignin is solubilized and carbohydrates are retained in the solid phase.\n\n### How (Example)\nFor a lab test:\n1. Add **10 g dry biomass** to reactor.\n2. Add enough solvent to fully wet and suspend the solids.\n3. Heat to the chosen temperature for the set time.\n4. Rapidly cool at the end to stop further reactions.\n\n## Step 5: Separate liquor and solids immediately\n\n### The Action\nFilter or centrifuge the reacted slurry as soon as it is safe to handle.\n\n### Why it matters\nFast separation prevents **continued reaction, condensation, and lignin redeposition** onto the solids.\n\n### How (Example)\n- Vacuum-filter the slurry.\n- Wash solids with fresh solvent or water to recover trapped lignin.\n- Keep the filtrate as the **lignin-rich liquor** for recovery."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Recover the Lignin Coproduct and Evaluate the Solid Fraction\n\n## Step 6: Precipitate and isolate lignin from the liquor\n\n### The Action\nRecover dissolved lignin by removing or diluting the solvent phase.\n\n### Why it matters\nThe value of organosolv comes not only from the solid pulp, but also from a **separate lignin stream** with usable purity and reactivity.\n\n### How (Example)\n- For alcohol systems: concentrate the liquor, then add **water as an anti-solvent** to precipitate lignin.\n- For acid systems: dilute or neutralize as needed, then separate the precipitated lignin by filtration.\n- Dry the isolated lignin at controlled temperature and store it in a sealed container.\n\n## Step 7: Recover and recycle the solvent where possible\n\n### The Action\nRemove solvent from both liquor and wash streams for reuse.\n\n### Why it matters\nSolvent recovery lowers operating cost and improves process sustainability.\n\n### How (Example)\n- Use rotary evaporation for lab-scale ethanol recovery.\n- For organic-acid systems, recover acid-rich fractions if your setup supports it.\n- Track solvent losses per batch to estimate process economics.\n\n## Step 8: Characterize the solid pulp\n\n### The Action\nMeasure how much lignin was removed and how much carbohydrate remains in the solids.\n\n### Why it matters\nYou need to confirm that the process improved **cellulose accessibility** without excessive carbohydrate loss.\n\n### How (Example)\nCheck:\n- **Residual lignin content** in the solid.\n- **Yield of solid fraction** relative to starting biomass.\n- **Enzymatic digestibility** if the goal is saccharification.\n- **Cellulose DP** if preserving polymer length matters.\n\nA good outcome is a solid that is lighter in color, lower in lignin, and easier to hydrolyze.\n\n## Step 9: Characterize the recovered lignin\n\n### The Action\nAnalyze lignin purity, molecular size, and functional groups.\n\n### Why it matters\nOrganosolv lignin is most useful when it is **uniform, reactive, and suitable for downstream upgrading**.\n\n### How (Example)\n- Use **GPC/SEC** to estimate molecular weight.\n- Use **FTIR or NMR** to inspect functional groups and structural features.\n- Measure phenolic hydroxyl content if targeting materials or resin applications.\n\nLook for lignin that is relatively **low in molecular weight** and **less condensed** than harshly pulped lignin."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Optimize the Process for Your Feedstock and End Use\n\n## Step 10: Tune severity to the product you want\n\n### The Action\nAdjust temperature, time, acid level, and solvent composition based on whether you want maximum lignin removal or maximum carbohydrate preservation.\n\n### Why it matters\nThere is no universal organosolv recipe; the best settings depend on your **feedstock and product target**.\n\n### How (Example)\n- If lignin recovery is the priority, increase severity gradually.\n- If enzymatic hydrolysis is the priority, reduce severity to avoid cellulose damage.\n- If lignin condensation becomes a problem, shorten residence time or lower catalyst loading.\n\n## Step 11: Use feedstock-specific optimization\n\n### The Action\nRun separate optimization tests for each biomass type.\n\n### Why it matters\nHardwoods, grasses, and agricultural residues behave differently because of **lignin structure, acetylation, ash, and hemicellulose content**.\n\n### How (Example)\n- **Hardwood**: often responds well to alcohol-based organosolv.\n- **Grassy biomass**: may require tighter control because of ash and silica.\n- **Agricultural residues**: often benefit from careful acid loading to avoid sugar loss.\n\n## Step 12: Decide the downstream route\n\n### The Action\nChoose how each fraction will be used after separation.\n\n### Why it matters\nOrganosolv is valuable only if the fractions fit a downstream application.\n\n### How (Example)\n- Send the **solid fraction** to enzymatic hydrolysis for glucose production.\n- Send the **lignin fraction** to catalytic upgrading, polymer blending, or resin formulation.\n- If purity is insufficient, add an extra wash, reprecipitation, or purification step.\n\n## Final implementation rule\nTreat organosolv as a **controlled fractionation platform**, not just a delignification step. Success means balancing:\n- **Lignin removal**\n- **Carbohydrate preservation**\n- **Lignin quality**\n- **Solvent recovery**\n- **Operational practicality**\n\nIf you optimize those five variables together, organosolv can become a strong biorefinery pretreatment and coproduct recovery process."
  }
]

  (function () {

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
