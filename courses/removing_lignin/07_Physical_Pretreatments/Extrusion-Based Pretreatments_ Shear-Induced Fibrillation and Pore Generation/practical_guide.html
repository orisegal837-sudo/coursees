      PREMIUM THEME & TYPOGRAPHY VARIABLES

    */

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);

      --text-muted: #94a3b8;

      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));

      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);

      --radius-lg: 16px;
      --radius-md: 12px;

      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --content-max-width: 1200px;

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */

      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

      display: flex;
      flex-direction: column;

    }

      TOP HEADER & TYPOGRAPHY
      ========================================

    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;

      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {

      color: var(--text-heading);

      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

      ========================================
    */

      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

      display: flex;

      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);

      padding: clamp(24px, 5vw, 56px);

    }

      align-items: center;
      gap: 8px;
      padding: 4px 12px;

      background: rgba(139, 92, 246, 0.1);

    .markdown-body pre code {

      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;

    }

    .markdown-body blockquote {

      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {

      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);

    .task-card:hover {

    }

      align-items: flex-start;

      margin-bottom: 10px;

      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;

    /* KaTeX overrides for dark mode */

      color: var(--text-heading);
      font-size: 1.1em;

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nUse **extrusion pretreatment** to mechanically open lignocellulosic biomass so cellulose becomes more accessible for **enzymatic hydrolysis** or downstream processing. The goal is to:\n- **Reduce recalcitrance** without relying on harsh solvents\n- **Increase surface area, porosity, and wettability**\n- **Create fibrillation, microcracking, and partial defibrillation** in fibers\n- **Tune pretreatment severity** so biomass is opened, not over-processed\n\n## When to use this approach\nChoose extrusion when you want:\n- A **continuous, scalable pretreatment** process\n- A method that relies primarily on **shear, pressure, friction, and heat**\n- Better access to cellulose without full chemical fractionation\n- A pre-opening step before **enzymatic saccharification**, fermentation, or further refining\n\n## Technical prerequisites\nBefore starting, ensure you have access to:\n- **A lab or pilot extruder** capable of controlled screw speed, barrel temperature, and die geometry\n- **A biomass feeder** for consistent material input\n- **Moisture control tools** such as an oven, balance, and spray bottle or conditioning mixer\n- **Particle size reduction equipment** such as a mill, grinder, or cutter\n- **Temperature and pressure monitoring** on the extrusion setup\n- **Sieves or particle analysis tools** to check size distribution\n- **Basic downstream assays** for accessibility, such as:\n  - Enzymatic hydrolysis setup\n  - Soluble sugar quantification kit or HPLC access\n  - Microscopy or imaging access if structural inspection is needed\n- Optional but useful: **mild acid/alkali dosing equipment** if you plan to test assisted extrusion\n\n## What you should know before beginning\n- Extrusion mainly **changes structure**, not chemistry\n- The main mechanism is **mechanical opening** through deformation and pressure release\n- Success is measured by **better enzyme access**, not by maximum visible damage"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up the Biomass and Define Your Baseline\n\n## Step 1: Select the right feedstock\n### The Action\nChoose a biomass type that matches your pretreatment target, such as grasses, agricultural residues, or fibrous pulp-like materials.\n### Why it matters\nDifferent feedstocks respond differently because they vary in lignin content, hemicellulose composition, moisture behavior, and fiber architecture.\n### How (Example)\n- For **corn stover** or **wheat straw**, expect strong response to moisture and shear.\n- For **harder, more lignified materials**, prepare for higher resistance and possibly reduced effectiveness.\n\n## Step 2: Reduce and standardize particle size\n### The Action\nMill or cut biomass to a consistent size before extrusion.\n### Why it matters\nUniform particle size improves feeding, heat transfer, and deformation consistency inside the barrel.\n### How (Example)\n- Pass biomass through a grinder to reach a roughly consistent fraction, such as **1\u20135 mm** depending on the extruder and feedstock.\n- Remove oversized chunks that could block feeding or create uneven pretreatment.\n\n## Step 3: Condition the moisture content\n### The Action\nAdjust biomass moisture to the target range before extrusion.\n### Why it matters\nMoisture strongly changes the balance between **brittleness, smearing, shear transfer, and fiber opening**.\n### How (Example)\n- If the biomass is too dry, lightly spray water and mix thoroughly.\n- If you are testing multiple conditions, prepare several batches such as:\n  - Low moisture batch\n  - Medium moisture batch\n  - High moisture batch\n- Record the final moisture percentage for every batch.\n\n## Step 4: Measure a baseline before pretreatment\n### The Action\nCharacterize untreated biomass so you can compare results after extrusion.\n### Why it matters\nYou need a reference point to determine whether extrusion improved accessibility.\n### How (Example)\nMeasure one or more of the following before treatment:\n- Initial particle size\n- Bulk density\n- Enzymatic digestibility\n- Microscopic fiber structure\n- Water uptake or wetting behavior"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Run the Extrusion Pretreatment\n\n## Step 5: Set the extrusion conditions\n### The Action\nConfigure screw speed, barrel temperature, die geometry, and feed rate.\n### Why it matters\nThese variables control how much **shear, compression, friction, and pressure drop** the biomass experiences.\n### How (Example)\nStart with a conservative operating window:\n- **Moderate screw speed** to generate repeated deformation\n- **Moderate temperature** to soften matrix components without severe degradation\n- **A die or nozzle that creates a pressure restriction** to promote stress buildup and expansion\n- **Stable feed rate** to avoid surging or starvation\n\n## Step 6: Process the biomass through the extruder\n### The Action\nFeed the conditioned biomass into the extruder and collect the extrudate consistently.\n### Why it matters\nThis is where fiber bundles split, walls delaminate, and pores begin to form.\n### How (Example)\n- Observe whether the material exits as:\n  - More frayed fibers\n  - Looser bundles\n  - Expanded, porous extrudate\n- Watch for signs of under-processing, such as minimal structural change, or over-processing, such as excessive fines or compacted output.\n\n## Step 7: Tune severity rather than maximizing damage\n### The Action\nAdjust process severity in small increments based on the output quality.\n### Why it matters\nThe goal is to open biomass, not destroy carbohydrates or waste energy.\n### How (Example)\nIf the output is too intact:\n- Increase screw speed slightly\n- Raise barrel temperature modestly\n- Reduce particle size further\n- Modify moisture upward or downward depending on whether the material is too brittle or too smeared\n\nIf the output is too degraded:\n- Lower temperature\n- Reduce residence time\n- Decrease screw intensity\n- Use a less restrictive die\n\n## Step 8: Evaluate the structural outcome\n### The Action\nInspect the extruded biomass for physical changes.\n### Why it matters\nYou need evidence that the process improved accessibility.\n### How (Example)\nLook for:\n- **Fiber fibrillation**\n- **Microcracks**\n- **Partial defibrillation**\n- **Visible porosity**\n- **Reduced particle size**\n- **Improved wetting by water or enzyme solution**"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Optimize, Validate, and Integrate Downstream\n\n## Step 9: Validate improvement with a downstream performance test\n### The Action\nCompare untreated and extruded biomass using an accessibility or digestion assay.\n### Why it matters\nStructural change only matters if it improves downstream conversion.\n### How (Example)\n- Run enzymatic hydrolysis on both samples under the same conditions.\n- Measure released sugars after a fixed time.\n- If the extruded sample gives higher sugar release, the pretreatment is working.\n\n## Step 10: Test process variables systematically\n### The Action\nRun a small design-of-experiments study on the key parameters.\n### Why it matters\nExtrusion performance depends strongly on a few controllable variables, and optimization prevents trial-and-error scaling.\n### How (Example)\nVary one factor at a time or use a small matrix covering:\n- Moisture content\n- Screw speed\n- Barrel temperature\n- Residence time\n- Die restriction\n- Feed particle size\n\nCompare outputs for:\n- Enzymatic digestibility\n- Energy use\n- Material flow stability\n- Amount of fines produced\n\n## Step 11: Decide whether to use additives\n### The Action\nEvaluate whether mild acid, alkali, or other additives are worth combining with extrusion.\n### Why it matters\nAdditives can intensify deconstruction, but they also add complexity, cost, and potential downstream cleanup requirements.\n### How (Example)\n- Try a mild additive only after establishing the baseline mechanical effect.\n- Compare plain extrusion versus assisted extrusion using the same biomass and output tests.\n\n## Step 12: Integrate the pretreatment into the full process train\n### The Action\nPlace extrusion where it best supports your overall biomass conversion workflow.\n### Why it matters\nExtrusion is most useful as a **physical opening step** before hydrolysis, refining, or further fractionation.\n### How (Example)\nA practical workflow is:\n1. Size reduction\n2. Moisture conditioning\n3. Extrusion pretreatment\n4. Enzymatic hydrolysis\n5. Fermentation or further processing\n\n## Practical takeaway\nUse extrusion as a **severity-controlled opening strategy**. If the material emerges more porous, more fibrillated, and easier to wet or hydrolyze, you have achieved the right balance. If energy use is high but accessibility gains are small, reduce severity or reassess feedstock suitability."
  }

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
