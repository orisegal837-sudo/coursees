  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild and optimize an **ultrasound-assisted alkaline pretreatment workflow** for lignocellulosic biomass so you can:\n- **Increase delignification** of biomass such as sugarcane bagasse\n- **Improve cellulose accessibility** for downstream enzymatic hydrolysis or further processing\n- **Use cavitation strategically** to intensify alkali penetration without relying on ultrasound as a stand-alone chemical treatment\n\n## What you will do\nYou will set up a pretreatment system that combines:\n- **Sodium hydroxide (NaOH)** for lignin disruption and lignin\u2013carbohydrate bond cleavage\n- **Ultrasound energy** to enhance mass transfer, mixing, and cell wall rupture\n- **Controlled operating conditions** to find the optimum rather than simply maximizing severity\n\n## Technical prerequisites\nHave the following in place before starting:\n- **Biomass source**: dried and milled sugarcane bagasse or similar lignocellulosic feedstock\n- **Alkali reagent**: analytical-grade sodium hydroxide (NaOH)\n- **Ultrasonic reactor**: preferably a **probe/horn sonicator** with adjustable power output; an ultrasonic bath can be used for comparison\n- **Temperature control**: water bath, jacketed reactor, or external heating system to maintain around **70 \u00b0C**\n- **Agitation setup**: magnetic stirrer or mechanical mixing\n- **Filtration and washing tools**: vacuum filtration setup, filter paper, deionized water\n- **Drying equipment**: oven or lyophilizer for recovered solids\n- **Characterization access**: FTIR, XRD, SEM, and BET analysis if you want to confirm structural changes\n- **Basic lab safety gear**: chemical-resistant gloves, eye protection, lab coat, and sonication shielding\n\n## Practical target conditions to test\nUse these as your starting benchmark:\n- **NaOH concentration**: around **1 M**\n- **Treatment time**: up to **60 minutes**\n- **Biomass-to-liquid ratio**: about **1:20**\n- **Temperature**: about **70 \u00b0C**\n- **Ultrasonic power**: about **100 W**\n- **Duty cycle**: about **70%**\n\n## Why these prerequisites matter\n- **NaOH provides the chemistry** needed to solubilize lignin and weaken the matrix.\n- **Ultrasound provides the physics** needed to accelerate penetration and disrupt structure.\n- **Temperature and power control** are essential because cavitation can improve or worsen pretreatment depending on how it is tuned.\n\n## Example setup\nIf you are starting with 10 g of dry bagasse, prepare enough 1 M NaOH solution to maintain a **1:20 solid-to-liquid ratio**. Place the suspension in a sonication vessel with temperature control, then run the horn at **100 W** and **70% duty cycle** while keeping the slurry near **70 \u00b0C**."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Build the Pretreatment Protocol\n\n## 1) Prepare and standardize the biomass\n**Action:** Dry, mill, and sieve the biomass to a consistent particle size.\n\n**Why:** Uniform feedstock improves reproducibility and prevents pretreatment results from being dominated by particle-size variability.\n\n**How (Example):**\n- Oven-dry sugarcane bagasse to constant weight.\n- Mill it and sieve it to a defined range, such as 0.5\u20131 mm.\n- Record moisture content so alkali loading is based on dry mass.\n\n## 2) Prepare the alkaline solution\n**Action:** Make the NaOH solution at the target concentration.\n\n**Why:** Alkali is the main chemical driver for lignin removal and bond cleavage.\n\n**How (Example):**\n- Dissolve NaOH in deionized water to prepare **1 M NaOH**.\n- Prepare enough volume to achieve a **1:20 biomass-to-liquid ratio**.\n- Allow the solution to cool before use if heat is generated during preparation.\n\n## 3) Load the biomass into the reactor\n**Action:** Add the biomass to the NaOH solution in the sonication vessel.\n\n**Why:** Proper immersion and dispersion ensure that ultrasound-generated cavitation affects the whole suspension.\n\n**How (Example):**\n- Add 10 g dry biomass to 200 mL of 1 M NaOH.\n- Stir briefly before sonication to break up clumps.\n- Ensure the probe or bath has enough clearance for good energy distribution.\n\n## 4) Apply ultrasound under controlled conditions\n**Action:** Sonicate the slurry at the target power, duty cycle, and temperature.\n\n**Why:** Cavitation creates microjets, shear, and turbulence that improve alkali penetration and disrupt the biomass matrix.\n\n**How (Example):**\n- Set the ultrasonic horn to **100 W**.\n- Use a **70% duty cycle** for pulsed operation.\n- Keep the suspension at **70 \u00b0C**.\n- Run the treatment for up to **60 minutes** while stirring.\n\n## 5) Recover and wash the treated solids\n**Action:** Separate the biomass from the liquid and wash it thoroughly.\n\n**Why:** Washing removes residual alkali and solubilized lignin fragments so downstream analysis reflects the pretreatment effect, not leftover chemicals.\n\n**How (Example):**\n- Vacuum-filter the slurry immediately after sonication.\n- Wash the solids with deionized water until the filtrate approaches neutral pH.\n- Collect the solid fraction for drying and analysis.\n\n## 6) Dry and weigh the pretreated solids\n**Action:** Dry the recovered biomass and determine mass loss.\n\n**Why:** Mass reduction gives a first-pass indication of solubilization and delignification.\n\n**How (Example):**\n- Dry the washed solids at 60\u201370 \u00b0C to constant mass.\n- Calculate solid recovery and compare it to the untreated biomass.\n- Keep samples labeled by treatment condition for later comparison."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Optimize the Operating Conditions\n\n## 1) Tune treatment time\n**Action:** Test multiple sonication times instead of choosing one duration immediately.\n\n**Why:** Delignification usually rises with time up to an optimum, then plateaus or wastes energy.\n\n**How (Example):**\n- Run 20, 40, 60, and 80 minute trials.\n- Expect performance to improve up to around **60 minutes**.\n- Select the shortest time that gives near-maximal delignification.\n\n## 2) Tune NaOH concentration\n**Action:** Compare several alkali strengths around the target level.\n\n**Why:** More alkali can improve lignin removal, but excessive concentration raises chemical cost and waste.\n\n**How (Example):**\n- Test 0.5 M, 1.0 M, and 1.5 M NaOH.\n- Identify the point where delignification gains begin to level off.\n- Use the minimum concentration that delivers acceptable cellulose accessibility.\n\n## 3) Adjust the solid-to-liquid ratio\n**Action:** Evaluate how much liquor is needed for effective mass transfer.\n\n**Why:** Too little liquid can limit contact and saturate the medium; too much increases cost and downstream handling.\n\n**How (Example):**\n- Compare ratios such as 1:10, 1:20, and 1:30.\n- Use **1:20** as a strong baseline because it often provides good contact without excessive dilution.\n\n## 4) Optimize temperature carefully\n**Action:** Increase temperature gradually while monitoring cavitation performance.\n\n**Why:** Higher temperature can improve reaction rate, but too much heat weakens cavitation by creating vapor cushions.\n\n**How (Example):**\n- Test 50 \u00b0C, 60 \u00b0C, 70 \u00b0C, and 80 \u00b0C.\n- Expect best performance near **70 \u00b0C**.\n- Avoid assuming hotter is better; the cavitation intensity may drop above the optimum.\n\n## 5) Optimize ultrasonic power\n**Action:** Compare low, medium, and high power settings.\n\n**Why:** More power strengthens cavitation only up to the point where bubble coalescence and cushioning reduce efficiency.\n\n**How (Example):**\n- Test 50 W, 100 W, and 150 W.\n- Use **100 W** as a likely optimum starting point.\n- Watch for reduced gains at excessive power.\n\n## 6) Tune duty cycle\n**Action:** Run pulsed sonication rather than continuous sonication when possible.\n\n**Why:** Pulsing can preserve cavitation efficiency, reduce horn wear, and improve reactor stability.\n\n**How (Example):**\n- Compare 50%, 70%, and 90% duty cycle.\n- Expect a strong balance around **70%**.\n- Use the duty cycle that maintains performance without overheating or damaging the probe.\n\n## 7) Compare reactor geometries\n**Action:** Benchmark a horn sonicator against an ultrasonic bath and an alkali-only control.\n\n**Why:** Reactor geometry strongly affects how much cavitation actually reaches the biomass.\n\n**How (Example):**\n- Run the same NaOH treatment in three modes:\n  1. **Alkali only**\n  2. **Ultrasonic bath + alkali**\n  3. **Ultrasonic horn + alkali**\n- Expect the **horn** to outperform the bath because it delivers stronger local energy directly into the suspension."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Verify the Mechanism and Use the Pretreated Biomass\n\n## 1) Confirm delignification and structural change\n**Action:** Characterize the pretreated solids using analytical tools.\n\n**Why:** You need evidence that the process changed the biomass structure, not just the mass.\n\n**How (Example):**\n- Use **FTIR** to look for reduced lignin-associated aromatic bands.\n- Use **XRD** to check whether the cellulose crystallinity index increases after lignin removal.\n- Use **SEM** to observe fiber opening, surface roughening, and cell wall rupture.\n- Use **BET** to quantify increased surface area and accessible porosity.\n\n## 2) Link process conditions to outcomes\n**Action:** Correlate each operating variable with delignification and accessibility metrics.\n\n**Why:** Optimization is only useful if you can explain which factor controls the process.\n\n**How (Example):**\n- Plot delignification versus time, NaOH concentration, temperature, power, and duty cycle.\n- Identify the point where each variable stops improving performance.\n- Use these curves to define your practical operating window.\n\n## 3) Move the optimized solids into downstream conversion\n**Action:** Send the treated biomass to enzymatic saccharification or further chemical conversion.\n\n**Why:** The purpose of pretreatment is to make cellulose easier to access and convert.\n\n**How (Example):**\n- Neutralize and wash the solids thoroughly.\n- Set up enzymatic hydrolysis using your standard cellulase loading.\n- Compare sugar release from untreated vs ultrasound-alkali pretreated bagasse.\n\n## 4) Use the optimized condition as your reference protocol\n**Action:** Standardize the best-performing settings for routine use.\n\n**Why:** A fixed reference condition makes future experiments comparable and scalable.\n\n**How (Example):**\nUse the following as a reference starting protocol for sugarcane bagasse:\n- **1 M NaOH**\n- **1 hour**\n- **70 \u00b0C**\n- **1:20 biomass-to-liquid ratio**\n- **100 W**\n- **70% duty cycle**\n- **Ultrasonic horn reactor**\n\n## Final takeaway\nUltrasound-assisted alkaline pretreatment works best when you **treat cavitation as a process-intensification tool**, not as the main chemical agent. The alkali does the lignin-disrupting chemistry; the ultrasound improves contact, mixing, and structural opening. When you tune the system correctly, you can get higher delignification, better cellulose accessibility, and a stronger feedstock for downstream conversion with less unnecessary severity."
  }
]

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
