      --bg-base: #05050a;

      font-family: var(--font-sans);
      background-color: var(--bg-base);

      min-height: 100vh;

      align-items: stretch;

      align-items: center;

      gap: 8px;

      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);

    .dot {
      width: 8px; height: 8px; border-radius: 50%;

    }

    .title {

      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);

      line-height: 1.6;

      ========================================

    .grid {
      display: flex;

      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;

      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);

    }

      align-items: center;

      padding: 4px 12px;

    .markdown-body pre code {

      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;

    .markdown-body blockquote {

      border-left: 4px solid var(--accent-primary);

    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }

    .opacity-0 { opacity: 0; transform: translateY(10px); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild and tune an **organosolv fractionation workflow** that:\n- **Removes lignin selectively** from lignocellulosic biomass\n- **Keeps cellulose-rich solids intact** for further use\n- **Minimizes sugar degradation** and lignin condensation\n- Produces a **clean lignin fraction** suitable for downstream analysis or valorization\n\n## What you will need\n### Technical prerequisites\n- **Lignocellulosic biomass feedstock**: e.g., almond shells, wood flour, corn stover, or straw\n- **Organic solvents for fractionation**: at least one of the following mixed with water as needed:\n  - ethanol\n  - methanol\n  - acetone\n  - dioxane\n  - acetic acid\n  - formic acid\n  - glycerol-based solvent system\n- **A fractionation solvent for cleanup/separation**:\n  - **anhydrous THF** for separating lignin-rich material from saccharides\n- **Reaction equipment**:\n  - sealed pressure-resistant reactor or reflux setup\n  - heating source with temperature control\n  - stirring capability\n- **Separation tools**:\n  - filtration setup\n  - centrifuge optional but useful\n  - rotary evaporator or solvent removal system\n- **Analysis tools**:\n  - balance\n  - oven or moisture analyzer\n  - GPC/SEC system if you want molecular weight analysis\n  - HPLC or sugar analysis capability if available\n- **Safety and handling**:\n  - fume hood\n  - solvent-compatible PPE\n  - proper waste containers for organic solvents and acidic liquors\n\n## Success criteria\nYou know the process is working when:\n- the **liquid fraction contains dissolved lignin**\n- the **solid residue is enriched in cellulose**\n- sugar release is limited to the desired amount\n- lignin recovered from the solvent is **reasonably pure** and not heavily degraded"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Choose the solvent system and set the extraction target\n\n## 1. Define your target outcome\n### The Action\nDecide whether your process goal is:\n- **high lignin recovery** with moderate carbohydrate loss, or\n- **maximum cellulose preservation** with mild delignification\n\n### Why this matters\nSolvent choice depends on the desired balance between extraction strength and biomass preservation.\n\n### How to do it\n- For **clean lignin extraction with cellulose preservation**, start with a **dioxane/water** or **ethanol/water** system.\n- For **more aggressive delignification**, consider **acidified alcohols** or stronger organosolv systems.\n- For **gentler conditions**, use **higher organic content and lower acidity**.\n\n## 2. Match solvent polarity to the fraction you want to move\n### The Action\nPick a solvent system whose polarity supports lignin dissolution but does not fully solubilize cellulose.\n\n### Why this matters\nLignin is aromatic and relatively hydrophobic, so it dissolves better in solvents with moderate polarity. Cellulose resists dissolution because of its crystalline hydrogen-bonded network.\n\n### How to do it\n- Use **organic-rich mixtures** to favor lignin extraction.\n- Use **more water-rich mixtures cautiously**, because they can increase hydrolysis and carbohydrate co-extraction.\n- Example starting point: **dioxane/water** at a moderate ratio for biomass like almond shell.\n\n## 3. Set process severity before running experiments\n### The Action\nChoose initial temperature, time, and solids loading.\n\n### Why this matters\nSeverity controls whether you get selective delignification or broad biomass breakdown.\n\n### How to do it\n- Start with **moderate temperature** and **short-to-medium residence time**.\n- Keep **solids loading manageable** so solvent can penetrate biomass.\n- Record every condition so you can compare extraction selectivity later."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Run the organosolv extraction and separate the phases\n\n## 4. Perform the extraction under controlled conditions\n### The Action\nTreat the biomass with the chosen solvent system in a sealed or refluxing setup.\n\n### Why this matters\nYou need enough thermal and solvent energy to release lignin without over-degrading carbohydrates.\n\n### How to do it\n1. Load dry, milled biomass into the reactor.\n2. Add the solvent mixture at the selected solids loading.\n3. Heat to the target temperature while stirring.\n4. Maintain for the chosen time.\n5. Cool the mixture before opening the system.\n\n**Example template:**\n- Biomass: almond shell\n- Solvent: dioxane/water\n- Temperature: moderate organosolv conditions\n- Time: enough to extract lignin without obvious darkening or excessive sugar formation\n\n## 5. Separate liquid extract from solid residue\n### The Action\nFilter or centrifuge the reaction mixture to collect the solid and liquid fractions.\n\n### Why this matters\nThis is the first checkpoint for selectivity: lignin should be mostly in the liquid, cellulose mostly in the solid.\n\n### How to do it\n- Filter the slurry while still manageable.\n- Wash the solid residue with fresh solvent to recover trapped lignin.\n- Dry the solid residue and measure its mass if you want yield data.\n\n## 6. Recover lignin from the extract\n### The Action\nRemove the solvent and precipitate or isolate the lignin fraction.\n\n### Why this matters\nThe extracted liquor contains lignin plus possible sugars and degraded fragments, so cleanup is necessary.\n\n### How to do it\n- Concentrate the organic phase under reduced pressure.\n- If needed, add a non-solvent or change solvent conditions to precipitate lignin.\n- Collect and dry the lignin-rich fraction.\n\n**Example:**\nIf the extract contains lignin plus sugar-derived impurities, move to the THF cleanup step before analysis."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Clean up the lignin fraction, evaluate selectivity, and optimize conditions\n\n## 7. Use THF fractionation to remove saccharide contamination\n### The Action\nDissolve the lignin-rich material in **anhydrous THF** and separate insoluble saccharides.\n\n### Why this matters\nTHF can dissolve lignin-rich material while leaving sugar-like impurities insoluble, giving a cleaner lignin fraction for analysis.\n\n### How to do it\n1. Add anhydrous THF to the crude lignin fraction.\n2. Stir until the lignin-rich portion dissolves.\n3. Filter out insoluble saccharides.\n4. Evaporate THF to recover purified lignin.\n\n**Example template:**\n- Crude organosolv extract \u2192 THF soluble lignin fraction\n- THF insoluble residue \u2192 saccharide-rich impurities\n\n## 8. Check whether cellulose stayed intact\n### The Action\nAnalyze the solid residue for cellulose enrichment and evidence of damage.\n\n### Why this matters\nA successful organosolv process preserves the cellulose-rich fraction for downstream use.\n\n### How to do it\n- Measure mass balance of solids before and after extraction.\n- Inspect residue for excessive darkening or loss of structural integrity.\n- If available, run compositional analysis for cellulose, hemicellulose, and lignin content.\n\n## 9. Optimize solvent severity iteratively\n### The Action\nAdjust solvent ratio, temperature, time, and catalyst use based on the results.\n\n### Why this matters\nThe best solvent system is the one that gives the right tradeoff between delignification and preservation.\n\n### How to do it\n- If lignin recovery is low, **increase organic solvent strength or temperature slightly**.\n- If cellulose loss is high, **reduce water content, lower temperature, shorten time, or remove acid catalyst**.\n- If lignin quality is poor or condensed, **use milder or catalyst-free conditions**.\n\n## Practical rule to apply\n- **Stronger extraction** is not always better.\n- Aim for the solvent conditions that produce:\n  - high lignin purity\n  - intact cellulose residue\n  - minimal sugar degradation\n  - lignin chemistry suitable for downstream use"
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
