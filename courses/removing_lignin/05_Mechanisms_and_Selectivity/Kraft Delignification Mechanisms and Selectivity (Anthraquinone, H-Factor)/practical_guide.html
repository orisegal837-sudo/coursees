    @media (prefers-reduced-motion: reduce){

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBy the end of this guide, you will be able to **design and evaluate a kraft pulping workflow** that:\n- **Maximizes lignin removal** from wood chips\n- **Minimizes cellulose loss and fiber damage**\n- Uses **sulfide chemistry**, **anthraquinone (AQ)**, and **H-factor control** to improve selectivity\n- Interprets cook outcomes in terms of **delignification efficiency vs. carbohydrate preservation**\n\n## Prerequisites\nYou need access to the following technical resources:\n- **Kraft pulping lab setup** or a pilot digester capable of controlled temperature, time, and chemical charge\n- **Sodium hydroxide (NaOH)** and **sodium sulfide (Na2S)** for kraft liquor preparation\n- **Anthraquinone (AQ)** additive, if you want to test selectivity enhancement\n- **Wood chips** of known species and chip size distribution\n- Analytical tools for evaluation:\n  - **Kappa number** testing setup or lab access\n  - **Pulp yield** measurement tools\n  - **Viscosity or degree of polymerization** testing for cellulose damage\n  - Optional: **microscopy** or **freeness testing** for fiber quality\n- A way to control and record **temperature, time, alkali charge, and sulfidity**\n\n## What you will optimize\nYou will tune four main variables:\n1. **Chemical strength** \u2014 enough to cleave lignin linkages\n2. **Sulfide content** \u2014 to accelerate lignin fragmentation\n3. **AQ addition** \u2014 to suppress peeling and protect carbohydrates\n4. **Cook severity (H-factor)** \u2014 to reach target delignification without overcooking\n\n## Practical target\nA successful kraft cook should:\n- Remove a large fraction of lignin\n- Leave cellulose sufficiently intact for downstream bleaching or papermaking\n- Avoid excessive carbohydrate loss from peeling and alkaline degradation"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build and Run the Kraft Cook\n\n## Step 1: Prepare the wood chips\n**Action:** Sort and condition chips to a consistent size and moisture level.\n\n**Why:** Uniform chips cook more evenly, which improves delignification consistency and reduces overcooked or undercooked regions.\n\n**How (Example):**\n- Screen chips to remove fines and oversized pieces.\n- Use chips from one wood species for your first trial.\n- Record chip thickness, moisture content, and batch mass.\n\n## Step 2: Prepare kraft liquor\n**Action:** Mix NaOH and Na2S to form the active kraft cooking liquor.\n\n**Why:** The alkaline, sulfide-rich environment is what drives lignin fragmentation and solubilization.\n\n**How (Example):**\n- Set an initial active alkali charge based on your process target.\n- Maintain a defined sulfidity level so sulfide ions are available for nucleophilic lignin bond cleavage.\n- Keep the liquor-to-wood ratio constant across trials.\n\n## Step 3: Load and heat the digester\n**Action:** Cook the chips under controlled temperature and time conditions.\n\n**Why:** Delignification rate depends strongly on cook severity; both temperature and duration affect how far lignin breakdown proceeds.\n\n**How (Example):**\n- Heat to your chosen cooking temperature in a controlled ramp.\n- Hold at temperature for the planned cook time.\n- Record the full temperature-time profile for later H-factor calculation.\n\n## Step 4: Optional AQ trial\n**Action:** Add a small amount of anthraquinone to a test batch.\n\n**Why:** AQ can improve selectivity by suppressing carbohydrate peeling while helping lignin removal.\n\n**How (Example):**\n- Run a control cook with no AQ.\n- Run a second cook with a small AQ dose added to the liquor before cooking.\n- Compare yield, kappa number, and viscosity between the two cooks.\n\n## Step 5: Wash and recover pulp\n**Action:** Stop the cook, discharge the pulp, and wash it thoroughly.\n\n**Why:** Washing removes dissolved lignin fragments and residual chemicals, allowing accurate pulp evaluation.\n\n**How (Example):**\n- Separate spent liquor from pulp.\n- Wash until the filtrate is clear or neutralized according to your lab protocol.\n- Collect pulp samples for yield and quality testing."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Measure Selectivity and Control Severity\n\n## Step 6: Calculate or estimate H-factor\n**Action:** Convert the cook\u2019s time-temperature history into an H-factor value.\n\n**Why:** H-factor gives a single measure of effective cook severity, helping you compare different cooks fairly.\n\n**How (Example):**\n- Use your digester\u2019s logged temperature profile.\n- Apply your facility\u2019s H-factor calculator or standard time-temperature severity equation.\n- Compare two cooks such as:\n  - 160\u00b0C for 90 min\n  - 170\u00b0C for 50 min\n  Even if different in time and temperature, they can have similar severity.\n\n## Step 7: Measure delignification\n**Action:** Determine how much lignin remains in the pulp.\n\n**Why:** This tells you whether the cook reached the desired delignification target.\n\n**How (Example):**\n- Measure the **kappa number** of the washed pulp.\n- Lower kappa number usually means more lignin removal.\n- Compare control vs. AQ-added cooks to see which achieves target delignification with less damage.\n\n## Step 8: Measure cellulose preservation\n**Action:** Evaluate pulp yield and cellulose integrity.\n\n**Why:** Kraft pulping should remove lignin more rapidly than it degrades cellulose; this is the core selectivity goal.\n\n**How (Example):**\n- Calculate screened pulp yield as a percentage of original dry wood.\n- Measure viscosity or another cellulose integrity metric.\n- Look for signs of overcooking: lower yield, lower viscosity, and weaker fibers.\n\n## Step 9: Look for carbohydrate degradation\n**Action:** Check whether the cook severity caused excessive peeling or alkaline hydrolysis.\n\n**Why:** Hemicelluloses and cellulose can degrade if the cook is too severe, reducing usable fiber content.\n\n**How (Example):**\n- Compare yields across increasing H-factors.\n- If yield falls sharply while kappa number improves only slightly, the cook may be too severe.\n- Use this pattern to identify the point where further cooking gives diminishing returns.\n\n## Step 10: Optimize the balance\n**Action:** Adjust alkali charge, sulfidity, AQ dose, and H-factor to hit your target.\n\n**Why:** Kraft selectivity is achieved by balancing lignin removal against carbohydrate retention, not by maximizing severity alone.\n\n**How (Example):**\n- If lignin removal is insufficient: increase severity modestly or improve sulfide availability.\n- If cellulose damage is high: reduce H-factor, lower cook time, or test AQ addition.\n- If chip penetration is uneven: improve chip size consistency or liquor circulation."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Decision Rules and Final Workflow\n\n## Decision rules you can apply immediately\n- **If kappa number is too high:** increase cook severity slightly or verify alkali/sulfide availability.\n- **If pulp yield is too low:** reduce severity, check for overcooking, or add AQ to improve selectivity.\n- **If viscosity drops sharply:** the cook is likely too harsh for cellulose preservation.\n- **If results vary between batches:** inspect chip uniformity, liquor-to-wood ratio, and heating profile.\n\n## A simple trial plan\nUse three cooks to map selectivity:\n1. **Mild cook** \u2014 lower H-factor\n2. **Target cook** \u2014 expected process condition\n3. **Severe cook** \u2014 higher H-factor\n\nCompare each for:\n- Kappa number\n- Pulp yield\n- Viscosity\n- Fiber quality\n\nThen choose the condition that gives the **lowest acceptable lignin content with the best cellulose retention**.\n\n## Final implementation template\nFor every kraft trial, record:\n- Wood species and chip size\n- NaOH charge\n- Na2S charge and sulfidity\n- AQ dose, if used\n- Cooking temperature profile\n- Cooking time\n- Calculated H-factor\n- Kappa number\n- Yield\n- Cellulose integrity metric\n\n## Key takeaway\nUse kraft chemistry to make **lignin the easier target** and use process control to keep **cellulose losses small**. Sulfide helps break lignin bonds, AQ improves selectivity, and H-factor tells you whether the cook is too mild, optimal, or too severe."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
