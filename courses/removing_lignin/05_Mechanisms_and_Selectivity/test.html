<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson Module - Agent Task Suites and Evaluation Rubrics</title>
  
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>

  <script>
    // Minimal Tailwind shim (used only if CDN fails). This keeps the page functional without external deps.
    (function(){
      var ok = true;
      try{
        if(!window.tailwind) ok = false;
      }catch(e){ ok = false; }
    })();
  </script>
  <style>
    /* ========================================
      PREMIUM THEME & TYPOGRAPHY VARIABLES
      ========================================
    */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --stroke-strong: rgba(255, 255, 255, 0.15);
      
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --text-heading: #ffffff;
      
      --accent-primary: #8b5cf6;
      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
      
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      
      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {
      padding: clamp(20px, 4vw, 48px) 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========================================
      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

    /* ========================================
      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .card-h {
      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;
    }

    /* ========================================
      NAVIGATION BOTTOM BAR
      ========================================
    */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      border-top: 1px solid var(--stroke-soft);
      background: rgba(5, 5, 10, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: var(--bg-surface);
      color: var(--text-heading);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .btn:hover:not(:disabled) {
      background: var(--bg-surface-hover);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: var(--accent-gradient);
      border: none;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #9f7aea, #60a5fa);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ========================================
      ENHANCED MARKDOWN TYPOGRAPHY
      ========================================
    */
    .markdown-body {
      max-width: 100%;
      margin: 0 auto;
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-main);
    }

    .markdown-body h1, 
    .markdown-body h2, 
    .markdown-body h3 {
      color: var(--text-heading);
      font-weight: 600;
      margin-top: 2em;
      margin-bottom: 0.75em;
      line-height: 1.3;
    }

    .markdown-body h1 { 
      font-size: 2.25em; 
      letter-spacing: -0.02em;
    }
    
    .markdown-body h2 { 
      font-size: 1.75em; 
      letter-spacing: -0.01em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--stroke-soft);
    }
    
    .markdown-body h3 { 
      font-size: 1.35em; 
      color: #e2e8f0;
    }

    /* Eliminate top margin for the very first element to align with padding */
    .markdown-body > *:first-child { margin-top: 0; }

    .markdown-body p {
      margin-top: 0;
      margin-bottom: 1.25em;
    }

    .markdown-body ul, 
    .markdown-body ol {
      margin-top: 0;
      margin-bottom: 1.5em;
      padding-left: 1.5em;
    }

    .markdown-body li {
      margin-bottom: 0.5em;
    }

    .markdown-body li > ul, 
    .markdown-body li > ol {
      margin-top: 0.5em;
    }

    .markdown-body strong {
      color: var(--text-heading);
      font-weight: 600;
    }

    .markdown-body a {
      color: var(--accent-secondary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .markdown-body a:hover {
      border-bottom-color: var(--accent-secondary);
    }

    .markdown-body code {
      font-family: var(--font-mono);
      background: rgba(255, 255, 255, 0.08);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;
      color: #93c5fd; /* Light blue tint for inline code */
    }

    .markdown-body pre {
      background: #0d1117;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-md);
      padding: 1.25em;
      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);
      margin: 3em 0;
    }

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .task-card:hover {
      border-color: var(--stroke-strong);
      transform: translateY(-2px);
    }
    .task-card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25em;
      color: var(--accent-secondary);
    }
    .objective-card {
      border-left: 4px solid var(--accent-primary);
    }
    .instructions-list {
      padding-left: 20px;
    }
    .instructions-list li {
      margin-bottom: 12px;
    }
    .criteria-checklist {
      list-style: none;
      padding-left: 0;
    }
    .criteria-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .criteria-checklist li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* KaTeX overrides for dark mode */
    .katex {
      color: var(--text-heading);
      font-size: 1.1em;
    }

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }
  </style>
</head>
<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "test_main",
    "content": "<div class=\"test-container\">\n            <div class=\"test-question\" id=\"question-0\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">1. In kraft pulping, why are lignin fragments generally removed faster than cellulose under the same cooking conditions?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    Lignin cannot swell in alkaline liquor, but cellulose can, so cellulose is removed first.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    Sulfide ions selectively hydrolyze cellulose glycosidic bonds faster than lignin bonds.\n                </li>\n            \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    Lignin is more chemically vulnerable in strong alkaline sulfide liquor, especially at \u03b2-O-4 ether linkages, while cellulose is more crystalline and regular.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    Cellulose is converted directly into soluble aromatic fragments more readily than lignin in alkali.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> Kraft selectivity comes from lignin\u2019s higher reactivity in alkaline sulfide conditions, not from cellulose being the primary target.</div>\n            </div>\n        \n            <div class=\"test-question\" id=\"question-1\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">2. What is the main role of sulfide ions in kraft delignification?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    They act as strong nucleophiles that accelerate lignin bond cleavage and help stabilize reactive intermediates.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    They dissolve cellulose crystals to free the fibers.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    They neutralize all alkali so cellulose cannot be degraded.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    They primarily prevent chip swelling so lignin can be extracted later.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> Sulfide boosts lignin fragmentation and delignification efficiency.</div>\n            </div>\n        \n            <div class=\"test-question\" id=\"question-2\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">3. Why is anthraquinone (AQ) added in small amounts to some kraft cooks?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    It converts cellulose into a more reactive polymer so lignin can be washed away.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    It replaces sodium hydroxide as the main pulping alkali.\n                </li>\n            \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    It suppresses carbohydrate peeling by stabilizing reducing ends and can also help lignin breakdown through redox chemistry.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    It raises the H-factor without changing cook severity.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> AQ improves selectivity: better lignin removal with less carbohydrate loss.</div>\n            </div>\n        \n            <div class=\"test-question\" id=\"question-3\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">4. What does the H-factor represent in kraft pulping?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    A single severity measure combining cooking time and temperature into effective cook impact.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    A measure of fiber length after refining.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    The amount of hemicellulose left in the pulp after cooking.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    The sulfide concentration required to dissolve lignin completely.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> Higher temperature and longer time both increase H-factor, usually increasing lignin removal and carbohydrate damage risk.</div>\n            </div>\n        \n            <div class=\"test-question\" id=\"question-4\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">5. What is a likely consequence of making a kraft cook too severe?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    Lignin removal stops completely while yield rises.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    Cellulose becomes chemically identical to lignin.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    The pulp always gains viscosity and strength.\n                </li>\n            \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    More lignin is removed, but carbohydrate degradation and cellulose loss also increase.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> Selectivity worsens when severity is pushed too far.</div>\n            </div>\n        \n            <div class=\"test-question\" id=\"question-5\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">6. In peroxide bleaching, why can reactive oxygen species be both useful and harmful?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    They oxidize lignin chromophores and side chains, but excess radicals can also oxidize and depolymerize cellulose.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    They only react with lignin and cannot affect carbohydrates.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    They are needed only to dissolve the pulp, not to brighten it.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    They eliminate the need for pH control in bleaching.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> Radical control is the key to selective oxidative delignification.</div>\n            </div>\n        \n            <div class=\"test-question\" id=\"question-6\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">7. What is the practical advantage of forming more perhydroxyl ion (HOO\u2212) in alkaline hydrogen peroxide bleaching?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    It guarantees cellulose chain length will increase.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    It replaces the need for mixing or temperature control.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    It prevents peroxide from reacting at all.\n                </li>\n            \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    It improves lignin attack and brightening under controlled conditions.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> Alkaline activation can improve selectivity, but too much alkalinity still risks cellulose damage.</div>\n            </div>\n        \n            <div class=\"test-question\" id=\"question-7\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">8. Why can an organosolv solvent system remove lignin selectively while leaving much of the cellulose in the solid residue?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    Because organic solvents only react with hemicellulose and never with lignin.\n                </li>\n            \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    Because solvent polarity and hydrogen-bonding are chosen to favor lignin solubilization more than dissolution of crystalline cellulose.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    Because cellulose is always insoluble in any solvent, regardless of conditions.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    Because lignin is nonpolar enough to dissolve in water better than cellulose does.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> Solvent selection controls whether the process is selective or overly harsh.</div>\n            </div>\n        \n            <div class=\"test-question\" id=\"question-8\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">9. What is the purpose of using anhydrous THF after organosolv extraction in the described workflow?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    To separate lignin-rich material from insoluble saccharide contamination for cleaner lignin recovery.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    To convert cellulose into a more crystalline residue.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    To hydrolyze cellulose into glucose for direct fermentation.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    To increase lignin condensation before analysis.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> THF cleanup helps isolate a cleaner lignin fraction from sugar-derived impurities.</div>\n            </div>\n        \n            <div class=\"test-question\" id=\"question-9\" style=\"margin-bottom: 48px; padding-bottom: 24px; border-bottom: 1px solid var(--stroke-soft);\">\n                <h3 style=\"color: var(--text-heading);\">10. Why is reducing-end stabilization important before or during strong alkaline delignification?</h3>\n                <ul class=\"test-answers\" style=\"list-style: none; padding-left: 0;\">\n                    \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    It turns cellulose into hemicellulose so it cooks faster.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    It makes lignin completely insoluble and impossible to remove.\n                </li>\n            \n                <li class=\"answer-option \" data-is-correct=\"false\">\n                    It raises the H-factor without increasing severity.\n                </li>\n            \n                <li class=\"answer-option correct-answer\" data-is-correct=\"true\">\n                    It reduces alkaline peeling, which otherwise shortens cellulose chains and lowers degree of polymerization.\n                </li>\n            \n                </ul>\n                <div class=\"test-note\" style=\"display:none;\"><strong>Note:</strong> Protecting the reducing end helps preserve cellulose while lignin is removed.</div>\n            </div>\n        \n        <div id=\"dynamic-summary\" class=\"test-summary\" style=\"display: none; margin-top: 40px; padding: 32px; background: rgba(139, 92, 246, 0.08); border: 2px solid var(--accent-primary); border-radius: var(--radius-xl); animation: testFadeIn 0.6s ease-out;\">\n            <h2 style=\"margin-top: 0; color: var(--accent-primary); text-align: center; font-size: 2em;\">\ud83d\udcca Test Results</h2>\n            <div style=\"display: flex; justify-content: space-around; margin: 24px 0; text-align: center;\">\n                <div>\n                    <div id=\"score-text\" style=\"font-size: 3em; font-weight: 700; color: var(--text-heading);\">0/0</div>\n                    <div style=\"color: var(--text-muted); text-transform: uppercase; font-size: 0.8em; letter-spacing: 0.1em;\">Final Score</div>\n                </div>\n                <div>\n                    <div id=\"percentage-text\" style=\"font-size: 3em; font-weight: 700; color: var(--accent-secondary);\">0%</div>\n                    <div style=\"color: var(--text-muted); text-transform: uppercase; font-size: 0.8em; letter-spacing: 0.1em;\">Accuracy</div>\n                </div>\n            </div>\n            <div id=\"performance-msg\" style=\"text-align: center; font-style: italic; margin-bottom: 24px; color: var(--text-main);\"></div>\n            \n        </div>\n    </div>"
  }
]
  </textarea>

  <main>
    <section id="lesson-app" style="width: 100%;">
      <div class="view-shell">
        <div class="view-inner">
          <div class="topbar">

          </div>

          <div class="grid">

                  </div>
              </div>
            </div>

        <div class="nav">

            </svg>

          <button type="button" class="btn btn-primary" id="nextBtn" aria-label="Next section">
            <span>Continue to Next</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>

  </main>

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>

<script>
(function() {
    const totalQuestions = 10;
    let answeredCount = 0;
    let correctCount = 0;

    function initTest() {
        console.log("Initializing test interactivity...");
        // Use event delegation on the document body to catch clicks even if elements are re-into the DOM
        document.body.addEventListener('click', function(e) {
            const element = e.target.closest('.answer-option');
            if (!element) return;

            const questionDiv = element.closest('.test-question');
            if (!questionDiv || questionDiv.classList.contains('answered')) return;

            questionDiv.classList.add('answered');
            const isCorrect = element.getAttribute('data-is-correct') === 'true';
            
            answeredCount++;
            if (isCorrect) correctCount++;
            
            const noteDiv = questionDiv.querySelector('.test-note');
            if (noteDiv) noteDiv.style.display = 'block';
            
            const options = questionDiv.querySelectorAll('.answer-option');
            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.classList.contains('correct-answer')) {
                    opt.classList.add('correct-selection');
                }
            });
            
            if (!isCorrect) {
                element.classList.add('wrong-selection');
            }
            
            if (answeredCount === totalQuestions) {
                showSummary();
            }
        });
    }

    function showSummary() {
        const summaryDiv = document.getElementById('dynamic-summary');
        const scoreText = document.getElementById('score-text');
        const percentText = document.getElementById('percentage-text');
        const msgText = document.getElementById('performance-msg');
        
        if (!summaryDiv) return;

        const percentage = Math.round((correctCount / totalQuestions) * 100);
        if (scoreText) scoreText.textContent = correctCount + '/' + totalQuestions;
        if (percentText) percentText.textContent = percentage + '%';
        
        if (msgText) {
            if (percentage === 100) msgText.textContent = "Perfect! You have a complete grasp of this section.";
            else if (percentage >= 70) msgText.textContent = "Great job! You've mastered most of the concepts.";
            else if (percentage >= 40) msgText.textContent = "Good effort. Review the notes for the questions you missed.";
            else msgText.textContent = "Keep practicing. Re-reading the lessons might help clarify these topics.";
        }
        
        summaryDiv.style.display = 'block';
        setTimeout(() => {
            summaryDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
    }

    // Wait for the template's renderer to populate the DOM
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => setTimeout(initTest, 800));
    } else {
        setTimeout(initTest, 800);
    }
})();
</script>
