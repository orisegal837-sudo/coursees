    */

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);

      --text-muted: #94a3b8;
      --text-heading: #ffffff;

      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));

      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);

      --radius-lg: 16px;

      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --content-max-width: 1200px;

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {
      padding: clamp(20px, 4vw, 48px) 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

    /* ========================================
      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .card-h {
      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;

      NAVIGATION BOTTOM BAR
      ========================================
    */
    .nav {

      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      border-top: 1px solid var(--stroke-soft);
      background: rgba(5, 5, 10, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: var(--bg-surface);
      color: var(--text-heading);

      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;

      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);

      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

      cursor: not-allowed;
      transform: none;

      margin-bottom: 1.25em;
    }

      margin-bottom: 1.5em;

    }

    .markdown-body li {
      margin-bottom: 0.5em;
    }

    .markdown-body li > ol {
      margin-top: 0.5em;
    }

    .markdown-body strong {
      color: var(--text-heading);
      font-weight: 600;
    }

    .markdown-body a {
      color: var(--accent-secondary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .markdown-body a:hover {
      border-bottom-color: var(--accent-secondary);
    }

    .markdown-body code {
      font-family: var(--font-mono);

      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;
      color: #93c5fd; /* Light blue tint for inline code */
    }

    .markdown-body pre {
      background: #0d1117;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-md);
      padding: 1.25em;
      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);
      margin: 3em 0;
    }

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .task-card:hover {
      border-color: var(--stroke-strong);
      transform: translateY(-2px);
    }
    .task-card h3 {
      margin-top: 0;
      margin-bottom: 16px;

      align-items: center;
      gap: 12px;
      font-size: 1.25em;
      color: var(--accent-secondary);
    }

      border-left: 4px solid var(--accent-primary);
    }
    .instructions-list {
      padding-left: 20px;
    }
    .instructions-list li {
      margin-bottom: 12px;
    }
    .criteria-checklist {
      list-style: none;
      padding-left: 0;
    }
    .criteria-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .criteria-checklist li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* KaTeX overrides for dark mode */
    .katex {
      color: var(--text-heading);
      font-size: 1.1em;
    }

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }

  <textarea id="markdown-source" style="display:none;">

  {
    "id": "guide_page_1",
    "content": "# Objective\nStop cellulose chain shortening during alkaline delignification by **stabilizing the reducing end** before it can undergo alkaline peeling. The practical outcome is **higher pulp yield, better degree of polymerization (DP), and stronger fibers** while still removing lignin efficiently.\n\n# Prerequisites\nTo implement this in a lab or pilot process, you need:\n- **Cellulose-containing pulp or biomass feedstock** intended for alkaline treatment\n- A **controlled alkaline delignification setup** capable of maintaining hot, high-pH conditions (for example, kraft-like cooking or lab-scale NaOH treatment)\n- Access to at least one **reducing-end stabilization reagent or route**:\n  - **Sodium borohydride (NaBH4)** for end reduction\n  - **Chlorite oxidation** route for converting the end to a more stable oxidized state\n  - **Reductive amination / oxime / hydrazone chemistry** for end capping in research settings\n- Basic **analytical tools** to verify success:\n  - **Viscometry or GPC/SEC** for degree of polymerization\n  - **Reducing-end assays** if available\n  - **Pulp yield and carbohydrate retention analysis**\n- Standard lab safety infrastructure for **strong alkali, oxidants, and reducing agents**\n\n# What you are trying to control\n- The **reducing end** of cellulose\n- The **open-chain aldehyde form** that triggers alkaline peeling\n- The balance between **lignin removal** and **carbohydrate preservation**"
  },
  {
    "id": "guide_page_2",
    "content": "# Step 1: Identify when cellulose is most vulnerable\n**Action:** Map the parts of your process where cellulose sees the harshest alkaline exposure.\n\n**Why it matters:** Alkaline peeling is promoted by **high pH, heat, and time**. The longest, hottest alkaline exposure usually causes the most DP loss.\n\n**How (example):**\n- In kraft pulping, mark the stages with the **highest alkali concentration and temperature**.\n- In a lab delignification test, note the **NaOH concentration, temperature, and residence time**.\n- Flag the point where cellulose would first encounter conditions severe enough to open the reducing end.\n\n---\n\n# Step 2: Measure or estimate reducing-end vulnerability\n**Action:** Determine whether your cellulose feedstock has enough reactive end groups to matter.\n\n**Why it matters:** Even if crystalline cellulose survives, **a small number of reactive ends can initiate measurable chain shortening**.\n\n**How (example):**\n- Use a **reducing-end assay** if available.\n- If not, infer risk from **low DP feedstock**, **pre-oxidized cellulose**, or **mechanically degraded pulp**, which often has more chain ends per gram.\n- Compare untreated pulp versus pretreated pulp before and after alkali exposure.\n\n---\n\n# Step 3: Stabilize the reducing end before alkaline treatment\n**Action:** Apply an end-group stabilization route that blocks the aldehyde chemistry.\n\n**Why it matters:** The goal is to make the end **less able to open, enolize, and peel** under alkaline conditions.\n\n**How (example):**\nChoose one of these routes based on your setting:\n- **Reduction:** Treat the pulp with **NaBH4** to convert the reducing end to a more stable alcohol-like form.\n- **Oxidation:** Use a **selective oxidation route** so the end becomes a **carboxylate** rather than a reactive aldehyde.\n- **Capping:** In research workflows, form a stable derivative using **oxime, hydrazone, or reductive amination chemistry**.\n\n**Practical template:**\n1. Disperse pulp in water.\n2. Adjust to the required pH for the chosen chemistry.\n3. Add the stabilization reagent under controlled mixing.\n4. Hold for the required reaction time.\n5. Wash thoroughly before alkaline delignification.\n\n---\n\n# Step 4: Keep the stabilization compatible with delignification\n**Action:** Make sure the end-group treatment does not block lignin removal or create downstream problems.\n\n**Why it matters:** A good stabilization method improves **selectivity**, not just cellulose survival.\n\n**How (example):**\n- Run a small screening matrix:\n  - untreated pulp\n  - stabilized pulp\n  - stabilized pulp with reduced alkali severity\n- Compare **lignin removal, pulp yield, and DP**.\n- Prefer the method that preserves cellulose **without leaving excessive chemical residues**.\n\n---\n\n# Step 5: Tune alkaline severity to reduce peeling pressure\n**Action:** After end stabilization, minimize unnecessary alkali overexposure.\n\n**Why it matters:** Stabilization helps, but **excess heat, high alkali, and long cook times still promote degradation**.\n\n**How (example):**\n- Lower the **maximum temperature** if lignin removal still meets target.\n- Shorten the **time at peak alkali**.\n- Avoid holding pulp in strong alkali longer than needed after delignification is complete.\n\n**Process example:**\n- Instead of a long cook at high pH, use a **shorter, more controlled alkaline stage** after pre-stabilization.\n\n---\n\n# Step 6: Verify that cellulose length is preserved\n**Action:** Measure whether your stabilization actually protects polymer length.\n\n**Why it matters:** The real signal of success is **higher DP and less chain scission**, not just a theoretical reduction in reactivity.\n\n**How (example):**\n- Compare **viscosity** or **SEC/GPC** results before and after delignification.\n- Track **pulp yield** and **fiber strength**.\n- If available, measure **reducing-end content** before and after treatment to confirm fewer reactive ends remain.\n\n**Success indicator:**\n- Lower DP loss than the untreated control\n- Better carbohydrate retention at similar lignin removal\n- Stronger fibers in the final pulp"
  },
  {
    "id": "guide_page_3",
    "content": "# Step 7: Use the right stabilization strategy for your application\n**Action:** Match the chemistry to the scale and objective of your process.\n\n**Why it matters:** Different settings need different solutions. A lab method for cellulose chemistry may not be practical for mill-scale pulping.\n\n**How (example):**\n- **Lab / research:** Use precise end-capping chemistry such as **oxime formation** or **hydrazone chemistry** to study reducing-end behavior.\n- **Pilot / mill relevance:** Use simpler and scalable protection such as **chemical reduction** or process additives that improve carbohydrate selectivity.\n- **Mechanistic study:** Compare stabilized versus unstabilized samples to isolate how much peeling contributes to chain loss.\n\n---\n\n# Step 8: Treat end-group control as part of delignification design\n**Action:** Build reducing-end protection into the process design instead of treating it as an afterthought.\n\n**Why it matters:** Selective delignification depends on controlling both sides of the reaction: **lignin solubilization and cellulose preservation**.\n\n**How (example):**\n- Add an end-stabilization step **before** the main alkaline cook.\n- If pre-treatment is not possible, consider **in-process protection** early in the cook.\n- Review whether additives that improve pulp selectivity, such as **anthraquinone-like concepts**, are appropriate for your system.\n\n---\n\n# Step 9: Optimize by comparing yield, DP, and lignin removal together\n**Action:** Optimize the process using a multi-response approach.\n\n**Why it matters:** A process that removes lignin faster but destroys cellulose is not truly selective.\n\n**How (example):**\nBuild a simple comparison table for each condition:\n- **Lignin removal %**\n- **Pulp yield %**\n- **DP or intrinsic viscosity**\n- **Fiber strength or tear index**\n- **Residual reducing-end reactivity**\n\nChoose the condition that gives the best tradeoff, not just the highest delignification rate."
  },
  {
    "id": "guide_page_4",
    "content": "# Final takeaway\nIf you want cellulose to survive alkaline delignification, do not focus only on lignin removal. **Protect the reducing end first**, then run the alkaline process under the mildest conditions that still achieve your lignin target.\n\n# Practical rule of thumb\n- **Stabilize the reducing end early**\n- **Limit harsh alkali exposure**\n- **Confirm DP retention after treatment**\n- **Optimize for selectivity, not severity**\n\nWhen reducing-end chemistry is controlled, cellulose becomes much less vulnerable to alkaline peeling, leading to **better pulp quality, better fiber strength, and better overall process efficiency**."
  }

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
