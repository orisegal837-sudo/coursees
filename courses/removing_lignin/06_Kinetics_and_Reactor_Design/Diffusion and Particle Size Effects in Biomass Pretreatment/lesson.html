  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "Biomass pretreatment is not only a chemistry problem; it is also a transport problem. Even when a solvent or reagent is thermodynamically capable of removing lignin or hemicellulose, it must first penetrate the particle, reach internal cell wall surfaces, and carry dissolved fragments back out. That makes diffusion, pore structure, and particle size central to pretreatment performance.\n\nSmaller particles usually expose more surface area and shorten diffusion paths, so reagents can access the interior faster. But the benefit is not always linear. The particle-size studies in biomass conversion show an important trade-off: smaller particles can improve apparent conversion rates, yet they also cost more energy to produce and can create handling or washing problems. In some systems, very fine particles may even worsen outcomes by increasing lignin re-precipitation or causing excessive solid loss.\n\nThe key idea is that pretreatment severity and particle size interact. A high-severity process may partially overcome mass-transfer limits in larger particles, while a mild process may depend strongly on small particle size to achieve good penetration. So the \u201cbest\u201d particle size is usually process-specific, not universally smallest."
  },
  {
    "id": "lesson_page_2",
    "content": "Diffusion in biomass is difficult because lignocellulose is heterogeneous and strongly structured. Reagents move through irregular pores, swollen cell walls, and fiber bundles rather than through a uniform material. This means diffusion is influenced by porosity, tortuosity, moisture content, swelling, and whether lignin has been redistributed onto the surface.\n\nA useful way to think about this is the competition between reaction rate and transport rate. If the chemical reaction is faster than diffusion, the process becomes diffusion-limited: the outer regions react first while the particle core remains under-treated. If diffusion is fast enough, the whole particle can respond more uniformly and the chemistry becomes the main rate-controlling step. In biomass pretreatment, many operations move between these regimes as temperature, solids loading, mixing intensity, and particle size change.\n\nThe source studies illustrate this clearly. For dilute acid and ionic-liquid pretreatments, smaller particles often showed stronger apparent pretreatment severity because acid or solvent could reach more of the internal structure. In the LFOV imaging study, higher acid severity reduced particle size more strongly and improved structural removal, but the benefit depended on whether pretreatment actually enabled downstream hydrolysis. In the ionoSolv study, larger chips were less efficiently penetrated at bench scale, while stirred scale-up improved heat and mass transfer and changed the penalty of using larger particles."
  },
  {
    "id": "lesson_page_3",
    "content": "Particle size affects not just accessibility, but also selectivity. A pretreatment aimed at removing lignin while preserving cellulose should maximize useful transport into the particle while minimizing overexposure of cellulose to harsh conditions. Fine particles have high surface-area-to-volume ratio, which can speed delignification and hemicellulose removal, but that same geometry can increase cellulose damage, sugar degradation, and lignin re-deposition onto a large available surface.\n\nThis is why particle size is often discussed together with selectivity metrics such as glucose yield, delignification, cellulose recovery, and viscosity retention. In practice, an ideal pretreatment particle size is often the one that gives the best total sugar yield or downstream digestibility at the lowest net cost, not the one with the highest immediate delignification. The particle-size literature repeatedly shows a practical middle ground: millimeter-scale particles are often sufficient for good conversion, especially when mixing, residence time, or solvent choice improves mass transfer.\n\nScale-up changes the answer again. In small, unstirred vessels, diffusion limitations are stronger and the choice of particle size matters more. In larger stirred reactors, improved mixing can partially compensate for larger particles by reducing boundary-layer resistance and promoting solvent renewal at the particle surface. That is why reactor design must be considered alongside particle size: the same feedstock can behave very differently in batch tubes, stirred tanks, and flow-through systems."
  },
  {
    "id": "lesson_page_4",
    "content": "The main lesson is that particle size is a transport variable, not just a preprocessing detail. Smaller particles shorten diffusion distances and usually improve penetration, but they also increase milling energy and can intensify side effects such as re-precipitation or carbohydrate loss. Larger particles are cheaper to prepare and can work well if the reactor provides strong mixing or if the pretreatment chemistry is sufficiently penetrating.\n\nFor biomass pretreatment design, the best practice is to choose particle size together with severity, solvent system, and reactor configuration. The right question is not simply \u201cHow small should the particles be?\u201d but \u201cWhat particle size gives the best overall balance of mass transfer, selectivity, energy use, and scale-up practicality?\u201d"
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
