      PREMIUM THEME & TYPOGRAPHY VARIABLES

    */

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --stroke-strong: rgba(255, 255, 255, 0.15);
      
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --text-heading: #ffffff;
      
      --accent-primary: #8b5cf6;
      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
      
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      
      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {

      display: flex;
      flex-direction: column;
      align-items: center;
    }

      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;

      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;

      NAVIGATION BOTTOM BAR
      ========================================
    */

      align-items: center;
      justify-content: center;

      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      bottom: 0;

      justify-content: center;

      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {

      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);

    }

      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);

    .task-card:hover {

    }

      align-items: center;

      font-size: 1.25em;

    .instructions-list {

    .criteria-checklist {
      list-style: none;
      padding-left: 0;

    .criteria-checklist li {

      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;

    .criteria-checklist li::before {

      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;

    /* KaTeX overrides for dark mode */

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }

<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nDesign a biomass pretreatment workflow that **balances particle size, diffusion, selectivity, and scale-up behavior**. By the end, you should be able to:\n- Choose a **process-specific particle size range** instead of defaulting to the smallest possible size.\n- Predict when pretreatment is likely to be **diffusion-limited** versus **reaction-limited**.\n- Match **milling, solvent choice, severity, and reactor design** to the transport needs of the biomass.\n- Improve **delignification, hemicellulose removal, and downstream hydrolysis** without unnecessary milling energy or carbohydrate loss.\n\n## Prerequisites\nYou need access to the following technical items before implementation:\n- **Biomass feedstock** with a known composition, such as hardwood chips, corn stover, or agricultural residues.\n- A **particle-size reduction method**, such as a knife mill, hammer mill, Wiley mill, or chipper.\n- A **sieving set or particle-size analyzer** to measure size fractions.\n- A **pretreatment reactor**, such as a sealed batch tube, stirred pressure reactor, or flow-through reactor.\n- The relevant **pretreatment chemicals** for your system, such as dilute acid, ionic liquid, alkali, or organosolv solvent.\n- Basic **analytical methods** for assessing performance, such as sugar yield, lignin removal, solid recovery, and cellulose recovery.\n- If available, access to **mixing or stirring control** and **temperature/pressure monitoring** for scale-up tests.\n\n## What to keep in mind before starting\n- Particle size is not just a preparation detail; it directly affects **mass transfer**.\n- A smaller particle is only better if the gain in penetration outweighs **milling cost, handling issues, and side reactions**.\n- The best particle size depends on the **chemistry, severity, and reactor configuration** you plan to use."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Characterize the biomass and set your transport target\n\n## Step 1. Measure the feedstock structure before choosing particle size\n**Action:** Characterize the biomass by measuring its initial particle/chip size, moisture content, bulk density, and visible structural features such as chip thickness, fiber bundle size, or degree of compaction.\n\n**Why it matters:** Diffusion in biomass depends on pore structure, swelling, and tortuosity. You cannot pick an effective particle size until you understand how easily your reagent can move through the native material.\n\n**How (example/template):**\n- Record feedstock type: e.g., **poplar chips**, **corn stover**, or **wheat straw**.\n- Measure moisture content by oven-drying a representative sample.\n- Sieve or image-analyze the material into fractions, for example:\n  - >10 mm\n  - 5\u201310 mm\n  - 1\u20135 mm\n  - <1 mm\n- Note whether the material is highly fibrous, dense, or already partially open.\n\n## Step 2. Define whether your pretreatment is likely to be diffusion-limited\n**Action:** Compare the expected chemical reaction speed with the expected transport speed inside the particle.\n\n**Why it matters:** If the chemistry is faster than diffusion, the outer layers react first and the core stays under-treated. That means smaller particles or stronger mixing may be necessary.\n\n**How (example/template):**\nUse a simple decision check:\n- If your reagent is mild and your residence time is short, assume **transport is likely limiting**.\n- If your chemistry is severe and highly penetrating, diffusion may matter less.\n- Look for signs of diffusion limitation in test runs:\n  - Outer surface appears heavily treated while the interior remains intact\n  - Solid recovery is high but digestibility is uneven\n  - Increasing time helps only slightly after an early plateau\n\nA practical template:\n- **Pretreatment type:** dilute acid\n- **Temperature:** 160\u00b0C\n- **Observation:** 8 mm chips show incomplete interior removal\n- **Conclusion:** reduce particle size or improve mixing before changing chemistry\n\n## Step 3. Select a starting particle-size window, not a single target\n**Action:** Choose 2\u20134 particle-size fractions for comparison rather than committing immediately to one size.\n\n**Why it matters:** The lesson\u2019s main trade-off is that smaller particles improve access, but not always enough to justify the extra milling energy or operational problems.\n\n**How (example/template):**\nTest a realistic range such as:\n- **Large:** 6\u201310 mm chips\n- **Medium:** 2\u20135 mm particles\n- **Fine:** <2 mm milled material\n\nRun each fraction under the same pretreatment conditions and compare downstream performance, not just visual appearance."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Run transport-sensitive pretreatment tests and evaluate selectivity\n\n## Step 4. Test particle size under identical severity conditions\n**Action:** Pretreat each particle-size fraction using the same chemistry, temperature, residence time, and solids loading.\n\n**Why it matters:** This isolates the effect of particle size on diffusion and penetration instead of confounding it with process severity.\n\n**How (example/template):**\nFor a dilute-acid system:\n- Acid concentration: 0.5\u20131.5 wt%\n- Temperature: 150\u2013180\u00b0C\n- Residence time: fixed across all runs\n- Solids loading: fixed across all runs\n- Mixing: keep constant if possible\n\nThen compare:\n- Delignification\n- Hemicellulose removal\n- Solid recovery\n- Glucose yield after enzymatic hydrolysis\n\n## Step 5. Evaluate whether smaller particles actually improve selectivity\n**Action:** Measure not only removal efficiency, but also damage to cellulose and total sugar yield.\n\n**Why it matters:** Fine particles can increase delignification yet also increase cellulose degradation, sugar loss, or lignin re-deposition on exposed surfaces.\n\n**How (example/template):**\nTrack a small set of decision metrics:\n- **Delignification (%)** = how much lignin is removed\n- **Cellulose recovery (%)** = how much cellulose remains available\n- **Glucose yield after hydrolysis (%)** = downstream conversion performance\n- **Mass loss (%)** = how much material is dissolved or destroyed\n\nExample interpretation:\n- 1 mm particles remove more lignin than 5 mm chips, **but** glucose yield falls because cellulose is damaged.\n- In that case, the smaller size is **more severe**, but not necessarily **better**.\n\n## Step 6. Identify the best practical particle size from the data\n**Action:** Choose the smallest particle size that gives near-maximal digestibility or sugar yield without excessive milling or solid loss.\n\n**Why it matters:** The optimal choice is often a middle ground, not the smallest fraction available.\n\n**How (example/template):**\nUse a simple ranking rule:\n1. Highest downstream sugar yield\n2. Acceptable solid recovery\n3. Reasonable milling energy\n4. Good handling and washing behavior\n\nExample outcome:\n- **8 mm chips:** poor penetration, low hydrolysis\n- **3 mm particles:** strong improvement, manageable handling\n- **0.5 mm flour:** slightly better delignification, but worse filtration and higher milling cost\n\nDecision: select **3 mm** as the practical optimum."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Scale up, tune the reactor, and lock in the operating window\n\n## Step 7. Test how reactor design changes the particle-size effect\n**Action:** Repeat the most promising particle-size condition in a more strongly mixed or larger-scale reactor.\n\n**Why it matters:** Scale-up can reduce boundary-layer resistance and partially compensate for larger particles, changing the particle-size optimum.\n\n**How (example/template):**\nCompare at least two reactor modes:\n- **Unstirred batch tube**\n- **Stirred reactor or agitated vessel**\n\nKeep chemistry constant and observe whether larger particles perform better once mixing improves.\n\nExample:\n- In an unstirred tube, 8 mm chips are under-treated.\n- In a stirred reactor, the same chips show improved penetration and similar digestibility to smaller particles.\n- Conclusion: invest in mixing rather than extra milling.\n\n## Step 8. Optimize particle size together with severity and solvent choice\n**Action:** Adjust particle size only after checking whether higher severity, longer residence time, or a more penetrating solvent can solve the transport problem more efficiently.\n\n**Why it matters:** The lesson shows that pretreatment severity and particle size interact. A severe process may overcome mass-transfer limits that a mild process cannot.\n\n**How (example/template):**\nRun a small design matrix:\n- Particle size: large / medium / fine\n- Severity: low / medium / high\n- Reactor: unstirred / stirred\n\nThen look for the least costly combination that reaches your target yield.\n\nExample rule:\n- If mild pretreatment works only with very fine particles, ask whether a slightly higher severity at medium particle size gives better overall economics.\n\n## Step 9. Lock in an operating spec and scale-up rule\n**Action:** Write a practical specification for the feedstock preparation step.\n\n**Why it matters:** Scale-up succeeds when particle size is treated as a controlled process variable with a defined acceptable range.\n\n**How (example/template):**\nCreate a spec such as:\n- Feedstock must be between **2 and 5 mm**\n- Moisture content must stay below **X%**\n- Reactor must provide **minimum agitation level Y**\n- If particle size exceeds the limit, increase residence time or reject the batch\n\n## Final implementation rule\nUse particle size as a **transport-control lever**, not a default milling target. The best pretreatment design balances:\n- Mass transfer\n- Selectivity\n- Milling energy\n- Washing and handling\n- Reactor scale-up practicality"
  }
]
  </textarea>

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
