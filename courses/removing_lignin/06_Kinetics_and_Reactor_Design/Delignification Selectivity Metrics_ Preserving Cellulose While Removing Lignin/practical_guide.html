    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);

      --text-muted: #94a3b8;

      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));

      --radius-lg: 16px;

      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --content-max-width: 1200px;

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;

      display: flex;
      align-items: stretch;

    }

      width: 100%;

      display: flex;

    }

      align-items: center;

    }

    .badge {

      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

    .dot {
      width: 8px; height: 8px; border-radius: 50%;

    .title {

      justify-content: center;

    }

      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);

      -webkit-backdrop-filter: blur(20px);

      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);

      display: flex;

      letter-spacing: 0.1em;
      text-transform: uppercase;

      align-items: center;
      gap: 8px;
      padding: 4px 12px;

      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);

    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }

    .opacity-0 { opacity: 0; transform: translateY(10px); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }

<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a practical workflow to **quantify delignification selectivity** and use it to choose operating conditions that:\n- **Remove lignin efficiently**\n- **Preserve cellulose yield and molecular integrity**\n- **Avoid over-severity, over-oxidation, and excessive chain scission**\n- **Compare conditions fairly across reactors, particle sizes, and scales**\n\nBy the end of this workflow, you should be able to rank pretreatment or pulping conditions using a **selectivity window**, not just raw delignification performance.\n\n## Prerequisites\nYou will need the following technical resources:\n- **Biomass composition lab access** capable of measuring lignin and carbohydrate content\n- **Analytical methods for pulp quality**, especially:\n  - Klason lignin / acid-insoluble lignin analysis\n  - Acid-soluble lignin analysis or UV-based lignin quantification\n  - Cellulose and hemicellulose composition by hydrolysis + HPLC\n  - Pulp viscosity measurement or **degree of polymerization (DP)** measurement\n  - Pulp yield determination by gravimetric drying\n- **Reactor or treatment setup** for screening conditions:\n  - Batch digester, autoclave, stirred reactor, or flow-through reactor\n- **Temperature and residence-time control** for severity studies\n- **Data analysis tool** such as Excel, Python, or R for calculating selectivity metrics\n\n## What you should define before testing\n1. **Your target product**\n   - Example: paper pulp, dissolving pulp, enzymatic hydrolysis feedstock\n2. **Your preservation priority**\n   - Example: maximize cellulose retention, maintain viscosity above a threshold, or retain a minimum pulp yield\n3. **Your comparison basis**\n   - Example: compare all trials at equal temperature-time exposure, equal chemical charge, or equal reactor residence time\n\n## Practical setup example\n- Feedstock: hardwood chips\n- Objective: maximize lignin removal while keeping cellulose yield above 85%\n- Key quality filter: pulp viscosity must remain above a chosen minimum\n- Comparison tool: a spreadsheet with columns for lignin remaining, cellulose retained, yield, viscosity, and severity factor"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the Selectivity Measurement Workflow\n\n## Step 1: Measure the starting material consistently\n**Action:** Characterize the untreated biomass before any delignification trial.\n\n**Why:** You need a baseline to calculate how much lignin was removed and how much cellulose was lost.\n\n**How (example):**\n- Measure initial lignin content, cellulose content, and hemicellulose content.\n- Record feedstock moisture, particle size, and chip thickness.\n- Example baseline table:\n  - Initial lignin: 24.0 wt%\n  - Initial cellulose: 42.0 wt%\n  - Initial hemicellulose: 27.0 wt%\n  - Moisture: 8 wt%\n  - Average particle size: 2\u20135 mm chips\n\n## Step 2: Run a small set of controlled delignification trials\n**Action:** Test several conditions by changing one or two variables at a time.\n\n**Why:** Selectivity is only meaningful when conditions are comparable.\n\n**How (example):**\nRun a matrix such as:\n- 150\u00b0C, 30 min, mild acid charge\n- 170\u00b0C, 30 min, same acid charge\n- 170\u00b0C, 60 min, same acid charge\n- 190\u00b0C, 30 min, same acid charge\nKeep solids loading, liquor ratio, and particle size constant.\n\n## Step 3: Measure the main outputs after each trial\n**Action:** Analyze residual solids and liquors for lignin loss, cellulose retention, and pulp damage.\n\n**Why:** Selectivity requires multiple responses, not just one.\n\n**How (example):**\nFor each trial, measure:\n- Residual lignin in solids\n- Cellulose content in solids\n- Overall pulp yield\n- Pulp viscosity or DP\n- Optional: brightness or digestibility\n\nUse a simple results sheet like:\n- Condition A: lignin 8%, cellulose yield 92%, viscosity high\n- Condition B: lignin 6%, cellulose yield 80%, viscosity low\n\n## Step 4: Calculate a selectivity metric\n**Action:** Convert raw data into a ratio or score that reflects lignin removal relative to cellulose loss.\n\n**Why:** A process is only truly selective if lignin removal is greater than cellulose damage.\n\n**How (example):**\nUse one of these practical forms:\n- **Lignin removed / cellulose lost**\n- **Lignin removed / yield lost**\n- **Lignin removal at fixed viscosity retention**\n\nExample:\n- Trial A removes 60% of lignin and loses 10% cellulose\n  - Selectivity ratio = 60 / 10 = 6\n- Trial B removes 70% of lignin and loses 25% cellulose\n  - Selectivity ratio = 70 / 25 = 2.8\nEven if Trial B removes more lignin, Trial A is more selective."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Use Severity, Transport, and Reactor Behavior to Choose Conditions\n\n## Step 5: Map selectivity against severity\n**Action:** Plot lignin removal, cellulose retention, and viscosity against temperature-time or another severity indicator.\n\n**Why:** Severity helps reveal the operating window where lignin removal improves faster than cellulose damage.\n\n**How (example):**\nCreate plots of:\n- Lignin removal vs severity\n- Cellulose yield vs severity\n- Viscosity vs severity\n\nLook for the **selectivity window**:\n- Too mild: low lignin removal\n- Optimal window: strong lignin removal with acceptable cellulose retention\n- Too harsh: lignin removal may continue, but cellulose damage rises sharply\n\n## Step 6: Check for transport limitations\n**Action:** Compare results across particle sizes, chip thicknesses, and liquor-to-solid ratios.\n\n**Why:** A condition that looks selective in fine particles may fail in larger chips because diffusion limits chemical access.\n\n**How (example):**\nRun the same chemical condition on:\n- Fine milled biomass\n- Small chips\n- Larger chips\n\nIf larger chips show poor delignification at the center while the surface is overtreated, transport is limiting. Reduce chip size, increase impregnation time, improve mixing, or redesign the reactor.\n\n## Step 7: Choose the reactor mode that protects selectivity\n**Action:** Decide whether batch or flow-through operation better supports your target selectivity.\n\n**Why:** Reactor behavior affects heat transfer, chemical stability, and exposure time.\n\n**How (example):**\n- Use **batch** for fast screening and chemistry development\n- Use **flow-through** when you need stable temperature, stable liquor composition, and rapid removal of dissolved lignin fragments\n\nIf batch trials show good lab-scale selectivity but poor larger-scale results, the issue may be nonuniform heating or local overexposure.\n\n## Step 8: Rank conditions using a decision rule\n**Action:** Select the condition that meets your lignin-removal target while staying above your cellulose-preservation threshold.\n\n**Why:** The best condition is not the harshest one; it is the one that gives the best tradeoff.\n\n**How (example):**\nSet acceptance rules such as:\n- Residual lignin below 10 wt%\n- Cellulose yield above 85%\n- Viscosity above minimum threshold\nThen rank all trials that satisfy those limits by highest lignin removal or highest selectivity ratio."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Apply the Results for Optimization and Scale-Up\n\n## Step 9: Optimize around the best window, not the maximum severity\n**Action:** Fine-tune temperature, time, chemical charge, and solids loading around the best-performing region.\n\n**Why:** A small shift in severity can move you from selective delignification into carbohydrate loss.\n\n**How (example):**\nIf 170\u00b0C for 45 min gives the best balance, test nearby conditions:\n- 165\u00b0C for 45 min\n- 170\u00b0C for 35 min\n- 175\u00b0C for 35 min\n- 170\u00b0C for 55 min\nKeep the best combination that preserves viscosity and yield.\n\n## Step 10: Build a scale-up checklist\n**Action:** Preserve the same transport and reaction balance as you move from lab to pilot scale.\n\n**Why:** Scale-up often changes selectivity because mixing, residence time, and heat transfer are no longer identical.\n\n**How (example):**\nBefore scaling, verify:\n- Same effective particle size distribution\n- Similar liquor-to-solid ratio\n- Comparable temperature ramp rate\n- Similar residence-time distribution\n- Adequate impregnation and mixing\n\n## Step 11: Document the selectivity window for future runs\n**Action:** Save the operating range where selectivity is acceptable and reproducible.\n\n**Why:** This becomes your process design space.\n\n**How (example):**\nRecord a final summary like:\n- Preferred condition: 170\u00b0C, 45 min, medium acid charge\n- Outcome: 68% lignin removal, 88% cellulose yield, high viscosity retention\n- Reject conditions above 180\u00b0C because cellulose damage rises sharply\n\n## Final practical rule\nWhen choosing delignification conditions, ask three questions:\n1. **Did lignin removal improve enough to matter?**\n2. **Did cellulose remain intact enough for the intended product?**\n3. **Did reactor and transport effects distort the result?**\n\nIf the answer to all three is yes, you have found a truly selective condition\u2014not just a severe one."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
