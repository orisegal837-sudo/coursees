  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a **complete biomass fractionation workflow** that turns a lignin-removal pretreatment into a **cellulose-rich, industrially usable process**. By the end, you should be able to:\n- Select a pretreatment chemistry that improves cellulose accessibility.\n- Add the **washing, neutralization, and recovery** steps needed to protect cellulose.\n- Design a workflow that also captures **lignin as a usable coproduct**.\n- Check whether the process is ready for scale based on **economics, EHS, and effluent load**.\n\n## Prerequisites\nYou will need access to these technical resources:\n- **Biomass preprocessing equipment**: grinder or mill, sieves, drying oven.\n- **Pretreatment setup** appropriate to your chemistry: heated reactor, pressure vessel, stirred flask, or autoclave.\n- **Solid\u2013liquid separation tools**: vacuum filtration unit, centrifuge, or filter press.\n- **Analytical tools** for process verification:\n  - pH meter\n  - conductivity meter\n  - balance\n  - oven or moisture analyzer\n  - HPLC, UV-Vis, or TOC analyzer for dissolved organics if available\n  - FTIR or NMR if lignin characterization is required\n- **Solvent recovery or cleanup tools** depending on the system:\n  - rotary evaporator\n  - membrane filter unit\n  - antisolvent addition setup\n  - evaporator or distillation unit\n- **Safety and EHS access**:\n  - chemical-resistant PPE\n  - fume hood\n  - corrosion-compatible containers\n  - wastewater collection and neutralization capacity\n\n## What to prepare before starting\n- A biomass feedstock with known composition or prior characterization.\n- The target product route: **enzymatic hydrolysis**, **pulping**, **lignin coproduct**, or **all three**.\n- A lab notebook or process sheet to record:\n  - chemical dosage\n  - temperature and time\n  - wash volumes\n  - pH after neutralization\n  - solid yield and lignin recovery\n"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Build the Pretreatment + Clean-Up Train\n\n## 1) Define the process target before choosing the chemistry\n**Action:** Decide whether your main goal is cellulose accessibility, lignin recovery, or balanced coproduct generation.\n\n**Why:** The downstream workflow changes depending on whether you want maximum digestibility, clean pulp, or high-value lignin.\n\n**How (Example):**\n- If the target is enzymatic hydrolysis, prioritize **cellulose preservation and inhibitor removal**.\n- If the target is lignin coproducts, choose a route that preserves lignin quality and limits condensation.\n- Example decision: \u201cUse mild alkaline pretreatment because the goal is high glucose yield and moderate lignin recovery.\u201d\n\n## 2) Run the pretreatment under controlled severity\n**Action:** Apply the chosen chemistry with controlled temperature, time, and reagent loading.\n\n**Why:** Delignification must be strong enough to open the cell wall, but not so harsh that it damages carbohydrates.\n\n**How (Example):**\n- Alkali route: treat biomass with dilute NaOH at elevated temperature for a fixed residence time.\n- Organosolv route: use aqueous ethanol or similar solvent at process temperature in a sealed reactor.\n- Deep eutectic solvent route: maintain solvent composition and temperature tightly to prevent performance loss.\n\n## 3) Separate the solid cellulose-rich fraction immediately\n**Action:** Remove the treated solids from the liquor as soon as the pretreatment ends.\n\n**Why:** Leaving solids in spent liquor can continue degradation and increase contamination.\n\n**How (Example):**\n- Filter or centrifuge the slurry right after cooling to handling temperature.\n- Keep the solid fraction labeled as the **cellulose-rich pulp** and the liquid fraction as the **lignin-containing spent stream**.\n\n## 4) Wash the solids in a staged or countercurrent manner\n**Action:** Wash the treated biomass with fresh or partially recycled water/solvent in multiple stages.\n\n**Why:** Washing removes residual alkali, acids, solvent, and dissolved lignin fragments without excessive water use.\n\n**How (Example):**\n- Stage 1: rinse with a small volume of warm water.\n- Stage 2: wash again until conductivity drops.\n- Stage 3: use countercurrent wash water from a later stage to reduce fresh-water demand.\n\n## 5) Neutralize residual chemicals in a controlled way\n**Action:** Adjust pH gradually to stop further reaction and protect the cellulose.\n\n**Why:** Residual caustic or acid can keep damaging carbohydrates and can inhibit enzymes later.\n\n**How (Example):**\n- If the pulp is alkaline, neutralize with dilute acid in small additions while stirring.\n- Target a near-neutral pH appropriate for the next step, often around pH 5\u20137 depending on use.\n- Verify pH after each addition rather than adding neutralizer all at once.\n"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step-by-Step Implementation: Recover Value from Both Streams\n\n## 6) Recover or recycle the pretreatment solvent\n**Action:** Design a solvent-reuse step for any organosolv, ionic liquid, or deep eutectic solvent system.\n\n**Why:** These systems can be effective but become uneconomical if solvent loss and contamination are not controlled.\n\n**How (Example):**\n- Organosolv: distill ethanol-water mixtures and return the recovered solvent to the reactor feed.\n- Ionic liquid: use antisolvent precipitation or membrane cleanup to separate dissolved biomass components before reuse.\n- Deep eutectic solvent: remove water and impurities by evaporation or selective separation before recycling.\n\n## 7) Isolate lignin as a usable coproduct\n**Action:** Capture lignin from the spent liquor instead of treating it only as waste.\n\n**Why:** Lignin value can improve process economics if recovery preserves its structure and limits salt contamination.\n\n**How (Example):**\n- Precipitate lignin by adding water or an antisolvent to an organosolv liquor.\n- Remove salts and fine solids by filtration or dialysis-like cleanup if needed.\n- Dry the lignin gently to avoid thermal degradation.\n- Route the product toward resin modification, dispersants, carbon materials, or depolymerization feedstock.\n\n## 8) Choose the wash-train and effluent strategy based on the feedstock\n**Action:** Match the cleanup sequence to the biomass chemistry and the target products.\n\n**Why:** Different feedstocks respond differently; a universal wash strategy is rarely optimal.\n\n**How (Example):**\n- For a lignin-rich hardwood, use more aggressive delignification and stronger lignin recovery.\n- For a cellulose-sensitive agricultural residue, use a mild acid\u2013alkali sequence or hydrothermal pre-extraction to protect sugars.\n- If lignin coproduct value is high, keep recovery conditions mild enough to reduce condensation and preserve reactivity.\n\n## 9) Verify process readiness with simple performance checks\n**Action:** Measure whether the workflow actually produced a clean cellulose-rich solid and a recoverable lignin stream.\n\n**Why:** Chemical success alone does not prove industrial usefulness; the streams must be clean, recoverable, and safe.\n\n**How (Example):**\n- Check pulp pH and conductivity after washing.\n- Measure solid yield and ash content.\n- Run enzymatic digestibility tests on the cellulose-rich solids.\n- Characterize lignin purity, salt content, and solubility.\n- Estimate wastewater volume and chemical oxygen demand if possible.\n"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Scale-Up Judgment and Practical Design Rules\n\n## 10) Evaluate the whole process as an integrated system\n**Action:** Compare pretreatment severity, washing demand, solvent recovery effort, lignin quality, and wastewater burden together.\n\n**Why:** A process is only practical when all unit operations work together economically and safely.\n\n**How (Example):**\nUse a simple decision checklist:\n- Does the pretreatment expose cellulose well enough for the next conversion step?\n- Are residual chemicals removed to levels that will not inhibit enzymes or downstream chemistry?\n- Can the solvent or reagent be recovered at acceptable cost?\n- Is the lignin stream clean enough for its intended market?\n- Are corrosion, wastewater, and worker-safety risks manageable?\n\n## 11) Use the result to choose the right integration strategy\n**Action:** Select one of three practical design directions based on your results.\n\n**Why:** The best flow sheet depends on whether your priority is pulp quality, lignin value, or simplest operation.\n\n**How (Example):**\n- **Cellulose-first strategy:** maximize washing and neutralization, accept lower lignin recovery.\n- **Lignin-first strategy:** optimize lignin isolation and solvent recycling, then refine the cellulose stream.\n- **Balanced coproduction strategy:** moderate pretreatment severity, staged cleanup, and dual-product recovery.\n\n## 12) Convert the lesson into a repeatable design rule\n**Action:** Document the final workflow as a standard operating sequence.\n\n**Why:** Repeatability is what turns a successful case study into a real biorefinery process.\n\n**How (Example):**\nWrite the workflow in this order:\n1. Feedstock prep\n2. Pretreatment\n3. Solid\u2013liquid separation\n4. Staged washing\n5. Neutralization\n6. Solvent recovery\n7. Lignin isolation\n8. Effluent treatment\n9. Product testing\n10. Recycle loop adjustment\n\n**Final rule of thumb:** If you cannot explain how the process removes residual chemicals, recovers solvent, handles lignin, and manages effluent, then the pretreatment is not yet industrially complete."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
