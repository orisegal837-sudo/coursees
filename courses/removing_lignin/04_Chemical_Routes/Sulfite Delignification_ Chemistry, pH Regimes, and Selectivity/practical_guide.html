      PREMIUM THEME & TYPOGRAPHY VARIABLES

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);

      --text-muted: #94a3b8;
      --text-heading: #ffffff;

      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));

      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
      
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      
      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --content-max-width: 1200px;

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {
      padding: clamp(20px, 4vw, 48px) 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

      TOP HEADER & TYPOGRAPHY
      ========================================
    */

      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;

      NAVIGATION BOTTOM BAR
      ========================================
    */

      align-items: center;
      justify-content: center;

    .markdown-body pre {

      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-md);
      padding: 1.25em;
      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);
      margin: 3em 0;
    }

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .task-card:hover {
      border-color: var(--stroke-strong);
      transform: translateY(-2px);
    }
    .task-card h3 {
      margin-top: 0;
      margin-bottom: 16px;

      align-items: center;
      gap: 12px;
      font-size: 1.25em;

    }

    }
    .instructions-list li {

    .criteria-checklist {
      list-style: none;
      padding-left: 0;
    }
    .criteria-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .criteria-checklist li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* KaTeX overrides for dark mode */
    .katex {
      color: var(--text-heading);
      font-size: 1.1em;
    }

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nImplement a **sulfite delignification workflow** that removes lignin from biomass by using sulfur dioxide-derived chemistry, while **preserving cellulose and limiting carbohydrate loss**.\n\nBy the end, you should be able to:\n1. **Choose a sulfite pulping regime** based on desired selectivity and pulp properties.\n2. **Set up the liquor chemistry** so sulfurous acid species, bisulfite, and sulfite are available in the right pH window.\n3. **Tune the cook** to improve lignin solubilization without over-damaging cellulose.\n4. **Evaluate delignification performance** using practical indicators like lignin removal, yield, and fiber integrity.\n\n## Technical Prerequisites\nYou need access to the following:\n- **Biomass feedstock**: wood chips or lignocellulosic biomass with known species/composition.\n- **Sulfite pulping chemicals**: sulfur dioxide source or sodium/potassium/ammonium/calcium sulfite/bisulfite salts, depending on the process route.\n- **pH measurement tools**: calibrated pH meter and buffers.\n- **Thermal reactor or digestor**: pressure-rated lab digester, autoclave-compatible reactor, or pilot pulping vessel.\n- **Mixing and liquor penetration setup**: agitation or circulation system for uniform chip impregnation.\n- **Basic analytical tools**:\n  - oven or moisture analyzer\n  - balance\n  - filtration setup\n  - methods for lignin estimation and pulp yield measurement\n- **Safety gear and ventilation**: fume hood, acid-resistant gloves, eye protection, and SO2 handling controls if using sulfur dioxide directly.\n\n## What to Decide Before You Start\n- **Pulp goal**: high yield, easier bleaching, or better enzymatic accessibility.\n- **Process regime**: acidic, neutral sulfite, or alkaline sulfite.\n- **Severity target**: enough to remove lignin, not enough to destroy carbohydrates.\n\n## Example Setup\nIf your goal is **pre-treatment for enzymatic hydrolysis**, you would typically prioritize:\n- moderate delignification\n- minimal cellulose depolymerization\n- a regime that avoids excessive carbohydrate hydrolysis\n\nIf your goal is **chemical pulp production**, you may accept a stronger cook if the resulting fiber liberation and lignin removal are improved."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Establish the Sulfite Chemistry\n\n## 1) Select the sulfite regime\n### The Action\nChoose whether to run **acidic sulfite**, **neutral sulfite**, or **alkaline sulfite** conditions.\n\n### Why It Matters\nThe pH controls which sulfur-containing species dominate and how aggressively lignin is modified and solubilized.\n\n### How (Example)\n- **Acidic sulfite**: use when strong lignin cleavage and lignosulfonate formation are desired.\n- **Neutral sulfite**: use when you want milder chemistry and better carbohydrate preservation.\n- **Alkaline sulfite**: use when you need buffered conditions and lower carbohydrate degradation.\n\n## 2) Prepare the cooking liquor\n### The Action\nMix the sulfite/bisulfite chemistry in water and adjust the pH to the target range for your regime.\n\n### Why It Matters\nSulfite delignification depends on the presence of sulfurous acid species, bisulfite, and sulfite in proportions set by pH.\n\n### How (Example)\n- Dissolve a sulfite salt or introduce SO2 into water.\n- Measure pH continuously.\n- Adjust with acid or base to maintain the desired regime.\n- Confirm liquor homogeneity before adding biomass.\n\n**Template:**\n- Target pH: ___\n- Sulfite source: ___\n- Liquor-to-biomass ratio: ___\n- Temperature setpoint: ___\n\n## 3) Impregnate the biomass thoroughly\n### The Action\nLoad biomass chips into the liquor and ensure full penetration before/during heating.\n\n### Why It Matters\nReactive species must reach the interior of the chip for uniform delignification; poor penetration causes undercooked cores and inconsistent pulp.\n\n### How (Example)\n- Pre-wet chips if needed.\n- Use agitation or circulation.\n- Hold at a lower temperature soak phase before ramping up heat.\n- Avoid overpacking the reactor.\n\n## 4) Run the cook under controlled severity\n### The Action\nHeat the system to the selected temperature and hold for the planned time.\n\n### Why It Matters\nTemperature and time determine the balance between lignin removal and carbohydrate damage.\n\n### How (Example)\n- Start with a conservative temperature/time profile.\n- Increase severity only if residual lignin remains too high.\n- Record pressure, pH drift, and liquor color during the cook.\n\n**Practical rule:** if delignification is incomplete, extend time or adjust liquor chemistry before drastically increasing temperature."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step-by-Step Implementation: Optimize Selectivity and Validate Results\n\n## 5) Monitor lignin modification and solubilization\n### The Action\nCheck whether lignin is being converted into more water-soluble sulfonated fragments.\n\n### Why It Matters\nThe process works by making lignin hydrophilic and easier to remove from the fiber matrix.\n\n### How (Example)\n- Observe spent liquor darkening and dissolved solids.\n- Measure residual lignin in the pulp using your chosen analytical method.\n- Compare untreated vs. cooked material.\n\n**Indicator:** increasing dissolved lignin in liquor with declining residual lignin in solids.\n\n## 6) Protect carbohydrates by controlling severity\n### The Action\nWatch for signs of cellulose and hemicellulose damage, then back off if needed.\n\n### Why It Matters\nToo much acidity, temperature, or time can hydrolyze carbohydrates and reduce pulp yield.\n\n### How (Example)\n- If yield drops sharply, reduce cooking time or acidity.\n- If fiber strength declines, lower severity and improve impregnation instead.\n- Track cellulose degree of polymerization if available.\n\n**Decision guide:**\n- **Incomplete delignification** \u2192 increase reaction effectiveness slightly.\n- **Carbohydrate loss** \u2192 decrease severity immediately.\n\n## 7) Assess pulp quality and fiber liberation\n### The Action\nEvaluate how well the fibers separated and how intact the pulp remains.\n\n### Why It Matters\nThe practical goal is not just lignin removal, but usable fibers with good downstream performance.\n\n### How (Example)\nMeasure or inspect:\n- **pulp yield**\n- **residual lignin/kappa number or equivalent lignin index**\n- **fiber length and integrity**\n- **brightness or bleachability**\n- **enzymatic accessibility**, if relevant\n\n## 8) Tune the process iteratively\n### The Action\nAdjust pH, sulfite concentration, temperature, time, chip size, or species-specific conditions in small steps.\n\n### Why It Matters\nSelectivity is a window, not a fixed point; optimization requires balancing lignin removal against carbohydrate preservation.\n\n### How (Example)\nUse this iteration loop:\n1. Run a baseline cook.\n2. Measure lignin removal and yield.\n3. Identify whether the cook is too mild or too severe.\n4. Change only one or two variables at a time.\n5. Repeat until you hit the desired balance.\n\n## Practical Optimization Template\n- **If lignin removal is low:**\n  - raise sulfite availability\n  - extend cooking time\n  - improve impregnation\n- **If carbohydrates are damaged:**\n  - reduce acidity\n  - shorten cook time\n  - lower temperature\n- **If penetration is poor:**\n  - reduce chip size\n  - increase soak time\n  - improve circulation"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Final Checklist and Operating Logic\n\n## Use this operating logic\n- **Goal is not maximum chemistry**; it is **maximum useful selectivity**.\n- Favor conditions that **convert lignin into soluble sulfonated fragments**.\n- Keep the cook within the window where **cellulose remains intact enough for downstream use**.\n\n## Final Checklist\nBefore concluding a run, confirm that you have:\n- achieved the intended pH regime\n- maintained liquor penetration through the biomass\n- observed meaningful lignin solubilization\n- avoided excessive carbohydrate loss\n- recorded yield and pulp quality metrics for comparison\n\n## Good End-State\nA successful sulfite delignification run should produce:\n- lower residual lignin\n- better fiber liberation\n- acceptable pulp yield\n- preserved cellulose framework\n- liquor containing dissolved lignosulfonates that reflect successful lignin modification\n\n## Example Success Criterion\nFor a biomass pretreatment workflow, success may mean:\n- lignin reduced enough to improve enzymatic access\n- cellulose mass largely retained\n- no severe loss of fiber integrity\n\nFor a pulping workflow, success may mean:\n- fibers separated cleanly\n- pulp strength remains usable\n- delignification is sufficient for bleaching or finishing\n\n## Practical Takeaway\nTreat sulfite pulping as a **controlled selectivity problem**:\n1. set the correct sulfurous chemistry,\n2. control pH and severity,\n3. solubilize lignin through sulfonation and bond cleavage,\n4. preserve carbohydrates by stopping at the right endpoint."
  }

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
