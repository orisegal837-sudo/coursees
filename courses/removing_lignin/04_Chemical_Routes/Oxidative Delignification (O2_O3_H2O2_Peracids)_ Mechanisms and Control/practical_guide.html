    /* ========================================
      PREMIUM THEME & TYPOGRAPHY VARIABLES
      ========================================
    */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --stroke-strong: rgba(255, 255, 255, 0.15);

      --text-muted: #94a3b8;
      --text-heading: #ffffff;
      
      --accent-primary: #8b5cf6;
      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
      
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      
      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {
      padding: clamp(20px, 4vw, 48px) 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

    /* ========================================
      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .card-h {
      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;
    }

      NAVIGATION BOTTOM BAR
      ========================================
    */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      border-top: 1px solid var(--stroke-soft);
      background: rgba(5, 5, 10, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .btn {

      justify-content: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: var(--bg-surface);
      color: var(--text-heading);

      font-size: 15px;
      font-weight: 600;

      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);

      cursor: not-allowed;
      transform: none;

    }

    }

    .markdown-body a {

      border-bottom: 1px solid transparent;

    }

    .markdown-body a:hover {

    .markdown-body code {

      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;

    }

    .markdown-body pre {
      background: #0d1117;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-md);
      padding: 1.25em;
      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);
      margin: 3em 0;
    }

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .task-card:hover {
      border-color: var(--stroke-strong);
      transform: translateY(-2px);
    }
    .task-card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25em;

    }

      border-left: 4px solid var(--accent-primary);

    .instructions-list {
      padding-left: 20px;
    }
    .instructions-list li {
      margin-bottom: 12px;
    }
    .criteria-checklist {
      list-style: none;
      padding-left: 0;
    }
    .criteria-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .criteria-checklist li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* KaTeX overrides for dark mode */
    .katex {
      color: var(--text-heading);
      font-size: 1.1em;
    }

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }

<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nImplement an **oxidative delignification workflow** that:\n- **Removes or modifies lignin** so it becomes smaller, less colored, and more soluble\n- **Exposes cellulose** for downstream bleaching, enzymatic hydrolysis, or fractionation\n- **Preserves fiber quality** by minimizing cellulose oxidation, depolymerization, and strength loss\n\n## What you will control in practice\n- **Oxidant choice**: oxygen, ozone, hydrogen peroxide, or peracids\n- **Process severity**: pH, temperature, time, dose, consistency\n- **Selectivity**: push oxidation toward lignin, not carbohydrates\n- **Metal management**: limit catalyzed peroxide decomposition and radical damage\n\n## Technical prerequisites\nUse the specific equipment or access below:\n- **Pulp or lignocellulosic feedstock**: kraft pulp, dissolved pulp, or pretreated biomass\n- **Reactor with agitation and temperature control**\n  - Oxygen stage: sealed pressure reactor or oxygen-delignification digester\n  - Ozone stage: ozone-compatible reactor, gas sparger, off-gas destructor\n  - Peroxide/peracid stage: corrosion-resistant stirred vessel\n- **pH meter and dosing pumps** for alkali and oxidant control\n- **Temperature probe and timer** for residence-time management\n- **Safety systems**\n  - Pressure relief for oxygen systems\n  - Ozone exhaust treatment\n  - PPE resistant to oxidants\n- **Analytical access** to at least a few of these:\n  - Kappa number or lignin content\n  - Brightness or color measurements\n  - Viscosity or degree of polymerization\n  - Carbohydrate retention / cellulose yield\n  - Metal ion analysis if peroxide is used\n\n## Practical success criteria\nYour process is working if you see:\n- **Lower residual lignin / kappa number**\n- **Higher brightness or lower chromophore content**\n- **Stable viscosity and fiber strength**\n- **Better bleachability or enzymatic digestibility**"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up a Selective Delignification Stage\n\n## 1) Choose the oxidant based on your goal\n### Oxygen\n- **Action:** Use oxygen as a first-stage delignification step in alkaline medium.\n- **Why:** It is the mildest route and can reduce lignin before more expensive bleaching.\n- **How (Example):** Run an oxygen stage on brownstock pulp at alkaline pH with moderate temperature and oxygen pressure to cut kappa before chlorine-free bleaching.\n\n### Ozone\n- **Action:** Use ozone when you need fast lignin attack and high reactivity.\n- **Why:** It rapidly attacks aromatic lignin structures and double bonds.\n- **How (Example):** Apply a short ozone stage to a washed pulp stream at controlled consistency and low temperature to avoid carbohydrate damage.\n\n### Hydrogen peroxide\n- **Action:** Use peroxide for bleaching, chromophore removal, or moderate delignification.\n- **Why:** It is versatile and can oxidize lignin under alkaline or activated conditions.\n- **How (Example):** Treat pulp with peroxide in alkaline solution while controlling metal ions and temperature to avoid excessive cellulose loss.\n\n### Peracids\n- **Action:** Use peracetic acid or an in situ generated peracid system for strong but relatively mild oxidation.\n- **Why:** Peracids can delignify effectively under conditions that may be gentler than harsher bleaching systems.\n- **How (Example):** Generate peracetic acid from acetic acid and peroxide, or use an activator-based system such as TAED, then apply it to pulp at controlled pH and residence time.\n\n## 2) Prepare the feedstock for selectivity\n- **Action:** Wash or precondition the pulp to remove extractives, residual alkali, and metal contaminants.\n- **Why:** Dirt, metals, and uneven pH reduce selectivity and increase side reactions.\n- **How (Example):** Perform an acid wash or chelation step before peroxide bleaching to reduce Mn, Fe, and Cu that would otherwise decompose peroxide.\n\n## 3) Establish your operating window before running\n- **Action:** Define the target pH, temperature, consistency, oxidant charge, and time.\n- **Why:** Oxidative delignification is highly sensitive to severity.\n- **How (Example):** Start with a conservative peroxide trial: moderate alkalinity, controlled heat, short residence time, then increase only if kappa reduction is insufficient."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Run the Process and Control Side Reactions\n\n## 1) Match the oxidant mechanism to the lignin chemistry\n### Oxygen stage\n- **Action:** Keep oxygen delignification alkaline so phenolic lignin groups deprotonate and react more readily.\n- **Why:** Deprotonated phenolics are easier to oxidize, improving lignin removal.\n- **How (Example):** Maintain alkaline pH during oxygen treatment and use enough pressure/agitation to distribute oxygen evenly through the pulp.\n\n### Ozone stage\n- **Action:** Apply ozone briefly and uniformly with tight control of dose and consistency.\n- **Why:** Ozone is highly aggressive and can damage carbohydrates if overdosed.\n- **How (Example):** Inject ozone into a high-consistency pulp mixer for a short contact time, then quench immediately after the target charge is consumed.\n\n### Peroxide stage\n- **Action:** Use alkaline peroxide carefully and avoid excessive heat or pH.\n- **Why:** Peroxide can form radicals that bleach lignin, but it can also attack cellulose.\n- **How (Example):** Run a peroxide bleaching stage with stabilizers and metal control to reduce oxycellulose formation.\n\n### Peracid stage\n- **Action:** Use peracids at mild-to-moderate conditions and watch oxidant strength closely.\n- **Why:** Peracids are powerful enough to over-oxidize the fiber if dosing is uncontrolled.\n- **How (Example):** Dose peracetic acid incrementally and monitor brightness gain versus viscosity loss after each trial.\n\n## 2) Control the main process variables\n- **Action:** Tune pH, temperature, time, oxidant dose, pulp consistency, and catalyst/activator selection.\n- **Why:** These variables determine whether oxidation hits lignin or cellulose.\n- **How (Example):** If lignin removal is weak, increase residence time or oxidant charge slightly before raising temperature.\n\n## 3) Prevent carbohydrate damage\n- **Action:** Limit alkali severity, heat, and transition metals; stop the reaction as soon as targets are met.\n- **Why:** Too much severity causes cellulose peeling, chain scission, brightness reversion, and viscosity loss.\n- **How (Example):** For peroxide, use chelation and stabilizers; for oxygen, avoid overcooking; for ozone, use short pulses and immediate quenching.\n\n## 4) Measure performance after each trial\n- **Action:** Track lignin removal, brightness, viscosity, and yield after each run.\n- **Why:** You need to verify selectivity, not just oxidation.\n- **How (Example):** Compare two peroxide trials: if brightness rises but viscosity collapses, reduce pH or temperature in the next run."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Optimize, Scale, and Decide the Best Route\n\n## 1) Build a simple decision rule\n- **Action:** Choose the oxidant based on your process objective.\n- **Why:** No single oxidant is best for every feedstock or end use.\n- **How (Example):**\n  - Use **oxygen** for cost-effective first-stage delignification\n  - Use **ozone** for rapid, high-reactivity treatment\n  - Use **hydrogen peroxide** for versatile, environmentally attractive bleaching\n  - Use **peracids** for strong oxidation under relatively mild conditions\n\n## 2) Optimize by tradeoff, not maximum oxidation\n- **Action:** Search for the point where lignin removal improves without unacceptable fiber loss.\n- **Why:** The goal is selectivity, not complete carbohydrate dissolution.\n- **How (Example):** Plot kappa reduction versus viscosity retention and pick the operating point with the best balance.\n\n## 3) Scale the process cautiously\n- **Action:** Validate mixing, heat transfer, and gas-liquid contact before moving to larger equipment.\n- **Why:** Oxidative systems are sensitive to mass transfer and local overexposure.\n- **How (Example):** In scale-up, confirm that oxygen or ozone distribution remains uniform and that no zones of extreme pH or oxidant concentration develop.\n\n## 4) Use a practical acceptance checklist\n- **Action:** Approve the process only if the following are acceptable:\n  - Residual lignin is reduced\n  - Brightness or whiteness improves\n  - Viscosity remains within target\n  - Fiber strength is preserved\n  - Downstream bleaching or hydrolysis performance improves\n- **Why:** These indicators show that delignification was selective and useful.\n- **How (Example):** If brightness improves but viscosity and strength fall below target, lower severity and rerun with better pH or metal control.\n\n## Final takeaway\nSelective oxidative delignification works when you **push oxidation toward lignin and away from cellulose**. The winning process is the one that achieves enough delignification for downstream processing while keeping fiber integrity intact."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
