      TRANSITIONS & ANIMATIONS
      ========================================

    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }

<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nDesign and evaluate a **task-specific ionic liquid (IL)** process that:\n1. **Selectively dissolves lignin** from lignocellulosic biomass,\n2. **Preserves cellulose** as much as possible,\n3. **Improves downstream enzymatic hydrolysis**, and\n4. **Allows lignin and IL recovery for reuse**.\n\nYour practical goal is to treat IL design as a **two-part engineering problem**:\n- **Pretreatment performance**: maximize lignin disruption and biomass deconstruction.\n- **Process viability**: keep viscosity manageable, maintain stability, and enable solvent recycling.\n\n## Prerequisites\nUse these specific tools and access points before starting:\n- **A molecular modeling package** capable of geometry optimization and property calculations, such as:\n  - Gaussian, ORCA, or similar quantum chemistry software\n- **COSMO-RS software or access to a COSMO-RS implementation** for screening ionic liquids\n- **Molecular dynamics software** such as GROMACS, AMBER, or LAMMPS\n- **A lignocellulosic biomass source** for wet-lab validation, such as hardwood, softwood, or agricultural residue\n- **Analytical equipment** for pretreatment evaluation:\n  - HPLC or IC for sugar analysis\n  - GPC/SEC for lignin molecular weight\n  - FTIR and/or NMR for lignin functional-group analysis\n  - Rheometer or viscometer for IL viscosity\n  - Enzymatic hydrolysis assay setup\n- **Candidate ionic-liquid components** with known synthesis or purchasing routes, especially:\n  - Anions: acetate, glycinate, alaninate, valinate, lysinate\n  - Cations: tetraalkylammonium, tetraalkylphosphonium, pyridinium, pyrrolidinium\n\n## What to optimize first\nBefore running experiments, define these screening targets:\n- **High lignin affinity**\n- **Low to moderate viscosity**\n- **Low cellulose degradation**\n- **Good recyclability**\n- **Chemical stability under pretreatment conditions**"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build and Screen Candidate Ionic Liquids\n\n## Step 1: Choose a small IL library\n### The Action\nCreate a shortlist of ILs by pairing **strong hydrogen-bond-accepting anions** with **weakly coordinating cations**.\n### Why\nLignin dissolution improves when the anion can compete with lignin\u2013lignin hydrogen bonding and the cation does not trap the anion too strongly.\n### How\nStart with combinations such as:\n- **[TBA][OAc]** \u2014 tetraalkylammonium acetate\n- **[TBA][Gly]** \u2014 tetraalkylammonium glycinate\n- **[P4444][OAc]** \u2014 tetraalkylphosphonium acetate\n- **pyrrolidinium acetate** variants\n- **cholinium lysinate** as a benchmark, not necessarily the top candidate\n\n## Step 2: Screen with COSMO-RS\n### The Action\nRun COSMO-RS calculations to rank each IL by lignin affinity and solvent performance descriptors.\n### Why\nThis quickly narrows the field before expensive synthesis and pretreatment trials.\n### How\nFor each IL, extract:\n- **Activity coefficient** for lignin models\n- **Excess enthalpy**\n- **Sigma profile / sigma potential**\n- **Solubility parameters**\n\nInterpretation template:\n- **Lower activity coefficient** = better lignin solvation\n- **More favorable excess enthalpy** = stronger solvent-lignin interaction\n- **Balanced sigma profile** = likely good interaction with aromatic and polar lignin regions\n\n## Step 3: Reject solvents with poor processability\n### The Action\nFilter out ILs that are too viscous or overly tightly paired.\n### Why\nA solvent can have good lignin affinity but still fail in practice if it is too hard to mix, pump, or recover.\n### How\nUse a simple decision rule:\n- Keep ILs with **high predicted lignin affinity** and **acceptable viscosity**\n- Exclude ILs that show **very strong ion pairing** or highly sluggish flow behavior\n\nA practical example:\n- If two ILs show similar lignin affinity, prefer the one with **lower viscosity and easier handling**, even if its theoretical interaction score is slightly lower."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Validate Selectivity, Mechanism, and Pretreatment Performance\n\n## Step 4: Verify lignin selectivity experimentally\n### The Action\nPretreat biomass with the top-ranked ILs and measure how much lignin is removed versus how much cellulose is preserved.\n### Why\nComputational ranking must be confirmed in real biomass, where lignin is embedded in lignin\u2013carbohydrate complexes.\n### How\nRun a standard pretreatment workflow:\n1. Heat biomass with IL under controlled time and temperature.\n2. Separate the liquid and solid fractions.\n3. Measure:\n   - **Residual lignin in solids**\n   - **Recovered lignin yield**\n   - **Cellulose retention**\n   - **Sugar release after enzymatic hydrolysis**\n\nSuccess example:\n- A good IL lowers residual lignin, increases hydrolysis yield, and avoids major cellulose loss.\n\n## Step 5: Examine lignin structural changes\n### The Action\nCharacterize lignin before and after dissolution/regeneration.\n### Why\nThe quality of recovered lignin determines whether the process is useful for upgrading or materials applications.\n### How\nCompare regenerated lignin using:\n- **GPC/SEC** for molecular weight and dispersity\n- **FTIR/NMR** for functional-group changes\n- **Elemental analysis** if available\n\nLook for these signs of good selectivity:\n- Lignin is removed without excessive fragmentation\n- Functional groups remain usable for downstream valorization\n- Cellulose-rich solids remain relatively intact\n\n## Step 6: Use MD simulation to explain the result\n### The Action\nRun molecular dynamics on the most promising IL-lignin systems.\n### Why\nMD helps confirm whether the solvent actually expands lignin and disrupts intramolecular hydrogen bonding.\n### How\nTrack these outputs:\n- **Lignin radius of gyration** or coil expansion\n- **Solvent-accessible surface area**\n- **Intramolecular hydrogen bonding in lignin**\n- **Lignin\u2013solvent contact frequency**\n\nInterpretation example:\n- If lignin becomes more expanded and solvent contact rises, your IL is likely disrupting lignin aggregation effectively.\n\n## Step 7: Optimize pretreatment conditions\n### The Action\nTune temperature, time, biomass loading, and IL concentration.\n### Why\nEven a good IL can underperform if process conditions are too mild or too aggressive.\n### How\nAdjust one variable at a time around a baseline condition, for example:\n- Increase temperature slightly if lignin removal is incomplete\n- Reduce residence time if cellulose begins to degrade\n- Lower biomass loading if mixing becomes too difficult"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Recover the Solvent and Close the Loop\n\n## Step 8: Regenerate lignin with an antisolvent\n### The Action\nAdd water or another antisolvent to precipitate lignin after dissolution.\n### Why\nRecovery is required to separate lignin from the IL and to produce a usable lignin fraction.\n### How\nUse a controlled antisolvent addition protocol:\n1. Cool the IL solution if needed.\n2. Add water gradually with stirring.\n3. Collect precipitated lignin by filtration or centrifugation.\n4. Wash and dry the lignin for analysis.\n\nExample outcome:\n- Lignin precipitates as a solid while the IL remains in the liquid phase for recovery.\n\n## Step 9: Recover and reuse the ionic liquid\n### The Action\nSeparate the IL from water and contaminants, then recycle it into the next pretreatment cycle.\n### Why\nA sustainable biorefinery needs low solvent loss and stable performance over multiple cycles.\n### How\nApply one or more recovery methods:\n- **Distillation** to remove water\n- **Vacuum drying** for residual moisture\n- **Phase separation or membrane-based cleanup** if impurities accumulate\n\nTrack these reuse metrics:\n- IL mass recovery percentage\n- Change in viscosity after each cycle\n- Change in lignin removal efficiency\n- Change in cellulose preservation\n\n## Step 10: Decide whether the IL is process-ready\n### The Action\nCombine all data into a go/no-go decision.\n### Why\nThe best IL is not just the one that dissolves lignin; it must also be scalable, reusable, and selective.\n### How\nAdvance only ILs that meet all of these criteria:\n- Strong lignin dissolution\n- High cellulose retention\n- Acceptable viscosity and mixing behavior\n- Stable performance over recycling cycles\n- Lignin recovery without severe degradation\n\n## Final practical rule\nTreat **solvent design, pretreatment, and recovery as one integrated workflow**. If an IL performs well in delignification but fails in regeneration or reuse, it is not a viable process solvent for a biorefinery."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
