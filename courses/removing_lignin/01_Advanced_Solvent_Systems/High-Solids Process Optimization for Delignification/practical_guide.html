      PREMIUM THEME & TYPOGRAPHY VARIABLES
      ========================================
    */

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --stroke-strong: rgba(255, 255, 255, 0.15);
      
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --text-heading: #ffffff;
      
      --accent-primary: #8b5cf6;
      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
      
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      
      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {
      padding: clamp(20px, 4vw, 48px) 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========================================
      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

    /* ========================================
      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .card-h {
      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;
    }

    /* ========================================
      NAVIGATION BOTTOM BAR
      ========================================
    */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      border-top: 1px solid var(--stroke-soft);
      background: rgba(5, 5, 10, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: var(--bg-surface);
      color: var(--text-heading);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .btn:hover:not(:disabled) {
      background: var(--bg-surface-hover);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: var(--accent-gradient);
      border: none;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #9f7aea, #60a5fa);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

      ENHANCED MARKDOWN TYPOGRAPHY
      ========================================
    */
    .markdown-body {
      max-width: 100%;
      margin: 0 auto;
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-main);
    }

    .markdown-body h1,

      margin-top: 2em;
      margin-bottom: 0.75em;

      letter-spacing: -0.01em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--stroke-soft);
    }

      color: #e2e8f0;
    }

      margin-top: 0;
      margin-bottom: 1.25em;
    }

      margin-bottom: 1.5em;
      padding-left: 1.5em;
    }

    .markdown-body li {
      margin-bottom: 0.5em;
    }

    .markdown-body li > ol {
      margin-top: 0.5em;
    }

    .markdown-body strong {
      color: var(--text-heading);
      font-weight: 600;
    }

    .markdown-body a {
      color: var(--accent-secondary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .markdown-body a:hover {
      border-bottom-color: var(--accent-secondary);
    }

    .markdown-body code {
      font-family: var(--font-mono);
      background: rgba(255, 255, 255, 0.08);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;
      color: #93c5fd; /* Light blue tint for inline code */
    }

    .markdown-body pre {
      background: #0d1117;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-md);
      padding: 1.25em;
      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);
      margin: 3em 0;
    }

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .task-card:hover {
      border-color: var(--stroke-strong);
      transform: translateY(-2px);
    }
    .task-card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25em;
      color: var(--accent-secondary);
    }
    .objective-card {
      border-left: 4px solid var(--accent-primary);
    }
    .instructions-list {
      padding-left: 20px;
    }
    .instructions-list li {
      margin-bottom: 12px;
    }
    .criteria-checklist {
      list-style: none;
      padding-left: 0;
    }
    .criteria-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .criteria-checklist li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* KaTeX overrides for dark mode */
    .katex {
      color: var(--text-heading);
      font-size: 1.1em;
    }

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }

<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild and optimize a **high-solids delignification pretreatment workflow** for advanced solvent systems so you can:\n- **Increase lignin removal** at concentrated biomass loadings\n- **Preserve cellulose and fermentable sugars**\n- **Reduce water use and downstream recovery costs**\n- **Run the solvent in repeated cycles** without losing performance\n\n## What you need before you start\n### Technical prerequisites\n- **A target biomass feedstock**: e.g., wheat straw, beech, pine, corn stover, bagasse, or another lignocellulosic substrate\n- **One advanced solvent system** to test:\n  - Ionic liquid such as 1-ethyl-3-methylimidazolium acetate\n  - Deep eutectic solvent such as choline chloride:lactic acid\n  - Hydrotrope such as sodium cumene sulfonate\n  - Organosolv mixture such as ethanol/water or acetone/water\n- **Heating and pressure-capable reactor**:\n  - Sealed batch reactor, Parr reactor, microwave reactor, or pressurized digestion setup\n- **Mixing equipment** capable of handling viscous slurries\n- **Particle size reduction tools**:\n  - Knife mill, grinder, or sieves for controlled biomass sizing\n- **Basic analytical tools**:\n  - Drying oven or moisture analyzer\n  - Balance\n  - Fiber/solids filtration setup\n  - HPLC or equivalent sugar analysis system\n  - Lignin quantification method such as Klason lignin, acid-insoluble lignin, or UV/Vis assay\n  - Optional but useful: FTIR, NMR, viscosity meter\n- **Solvent recovery setup**:\n  - Rotary evaporator, antisolvent addition system, filtration, membrane unit, or distillation setup depending on solvent type\n\n## Success criteria to define upfront\nSet target values before experimentation:\n- **Delignification target**: e.g., >50% lignin removal\n- **Cellulose loss limit**: e.g., <10\u201315%\n- **Sugar degradation limit**: minimal glucose/xylan loss\n- **Recycle stability**: performance retained over 3\u20135 cycles\n\n## Experimental mindset\nTreat the process as a **trade-off problem**:\n- Higher solids loading improves downstream economics\n- But higher solids loading reduces mass transfer and mixing quality\n- Stronger solvent/temperature/pressure improve lignin removal\n- But they also raise carbohydrate loss and recovery difficulty"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up the First Optimization Loop\n\n## Step 1: Choose a feedstock-specific baseline\n### The Action\nSelect one biomass type and establish a baseline pretreatment condition at moderate solids loading.\n\n### Why it matters\nDifferent feedstocks respond very differently. Non-wood biomasses usually delignify more easily than softwoods because softwoods have more condensed lignin and tighter cell-wall structure.\n\n### How to do it\nUse a simple starting matrix such as:\n- **Wheat straw**: 20\u201340% w/v solids\n- **Beech**: 15\u201330% w/v solids\n- **Pine**: 10\u201325% w/v solids\n\nExample baseline:\n- Biomass: **wheat straw, milled to 1\u20132 mm**\n- Solvent: **40% sodium cumene sulfonate hydrotrope solution**\n- Solids loading: **20% w/v**\n- Temperature: **120\u2013140\u00b0C**\n- Time: **30\u201360 min**\n- Pressure: **sufficient to keep the system liquid**\n\n## Step 2: Control particle size before changing chemistry\n### The Action\nStandardize biomass particle size before testing solvent strength or temperature.\n\n### Why it matters\nSmaller particles improve solvent penetration and reduce internal mass-transfer limitations.\n\n### How to do it\n- Mill biomass to a narrow size range\n- Sieve into fractions and select one size band\n- Keep the same particle size across all test runs\n\nExample:\n- Pine chips: reduce from chips to **<2 mm particles** before testing DES\n- Wheat straw: cut/mill to **1\u20132 mm** and keep constant for the full study\n\n## Step 3: Map the main operating window\n### The Action\nRun a small screening matrix across solids loading, solvent concentration, temperature, and time.\n\n### Why it matters\nYou need to find the narrow zone where lignin removal rises faster than cellulose damage.\n\n### How to do it\nVary one or two parameters at a time or use a simple design of experiments.\n\nExample screening matrix:\n- Solids loading: **15%, 25%, 35%, 40% w/v**\n- Solvent concentration: **30%, 40%, 50%**\n- Temperature: **100, 120, 140\u00b0C**\n- Time: **15, 30, 60 min**\n\nFor a hydrotrope run, a strong starting point is:\n- **40% w/v sodium cumene sulfonate**\n- **117 PSI**\n- **60 min**\n- Compare wheat straw, beech, and pine under the same condition to see feedstock sensitivity\n\n## Step 4: Measure the right outputs after each run\n### The Action\nQuantify delignification and carbohydrate preservation for every condition.\n\n### Why it matters\nA visually lighter solid is not proof of better pretreatment. You need data that distinguish true delignification from simple extraction.\n\n### How to do it\nMeasure:\n- **Residual lignin in solids**\n- **Glucose and xylose release after enzymatic hydrolysis**\n- **Mass yield of solids**\n- **Solvent viscosity after treatment**\n- **pH or water content if relevant**\n\nExample interpretation:\n- If lignin drops but glucose recovery also collapses, the condition is too harsh\n- If glucose release improves and solids remain structurally intact, the condition is closer to optimal"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Tune Mass Transfer, Solvent Strength, and Recycling\n\n## Step 5: Improve mass transfer before escalating severity\n### The Action\nIf delignification is weak at high solids, improve transport before adding harsher chemistry.\n\n### Why it matters\nAt high solids, the main bottleneck is often solvent access, not solvent reactivity.\n\n### How to do it\nTry these levers in order:\n1. **Increase mixing intensity**\n2. **Reduce particle size slightly**\n3. **Extend residence time**\n4. **Adjust moisture or water content** to reduce viscosity\n5. **Only then increase temperature or solvent strength**\n\nExample:\n- DES run at 35% solids gives poor penetration\n- First reduce particle size from 2 mm to 1 mm\n- Then add 5\u201310% water if the solvent tolerates it\n- Then test 10\u00b0C higher temperature before changing solvent composition\n\n## Step 6: Balance solvent strength with selectivity\n### The Action\nTune solvent composition and operating severity so lignin removal rises without excessive cellulose loss.\n\n### Why it matters\nStronger conditions can improve lignin solubilization but also trigger sugar degradation, lignin condensation, or solvent decomposition.\n\n### How to do it\nUse a controlled comparison:\n- Low severity: lower temperature, shorter time, lower solvent concentration\n- Medium severity: moderate temperature and time\n- High severity: maximum condition likely to work\n\nExample for DES:\n- Choline chloride:lactic acid with 10% water\n- Compare **120\u00b0C vs 140\u00b0C** and **30 min vs 60 min**\n- Pick the condition with the best ratio of lignin removal to cellulose retention\n\n## Step 7: Build the recovery plan at the same time\n### The Action\nDesign solvent recycling experiments from the first optimization round.\n\n### Why it matters\nA pretreatment that works once but fails after recycle is not scalable.\n\n### How to do it\nAfter each run:\n- Separate solids\n- Recover the liquid fraction\n- Remove dissolved lignin and impurities\n- Reconstitute the solvent to the original composition\n- Reuse it for the next cycle\n\nRecovery approaches by solvent type:\n- **Hydrotropes**: dilute to precipitate lignin, then reconcentrate\n- **Ionic liquids**: use antisolvent addition, evaporation, or membrane separation\n- **DES**: apply evaporation, antisolvent cleanup, or hybrid separation\n- **Organosolv**: recover by distillation and solvent-water ratio adjustment\n\nExample recycle test:\n- Run the same pretreatment **3 times in a row**\n- Track lignin removal, viscosity, and sugar release each cycle\n- Stop if performance drops sharply or solvent contamination rises too much"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Validate, Compare, and Lock the Best Process\n\n## Step 8: Check whether the process is truly optimal\n### The Action\nCompare all conditions using both performance and stability metrics.\n\n### Why it matters\nThe best condition is not the one with the highest single-run delignification. It is the one that performs well, protects carbohydrates, and remains recyclable.\n\n### How to do it\nCreate a decision table with:\n- Lignin removal percentage\n- Enzymatic digestibility improvement\n- Cellulose loss percentage\n- Solvent recovery efficiency\n- Viscosity after recycle\n- Number of stable reuse cycles\n\nExample selection rule:\nChoose the condition that:\n- Removes the most lignin **while keeping cellulose loss below your limit**\n- Maintains solvent performance for **at least 3 cycles**\n- Does not require excessive energy or unrecoverable additives\n\n## Step 9: Validate across biomass types if scale-up is planned\n### The Action\nTest the best condition on at least one additional feedstock.\n\n### Why it matters\nA condition optimized for wheat straw may underperform on pine or beech because structure and lignin chemistry differ.\n\n### How to do it\n- Keep the solvent and operating conditions fixed\n- Switch only the feedstock\n- Compare delignification, sugar release, and recycle behavior\n\nExample:\n- Best condition for wheat straw: hydrotrope at 40% w/v, 117 PSI, 60 min\n- Apply the same protocol to beech and pine\n- Adjust only if the softwood shows clear mass-transfer limitations or poor lignin removal\n\n## Step 10: Freeze the process window and document it\n### The Action\nWrite down the final operating window, control limits, and recycle protocol.\n\n### Why it matters\nThis turns an experiment into a reproducible process.\n\n### How to do it\nDocument:\n- Feedstock type and particle size\n- Solids loading range\n- Solvent composition and allowable water content\n- Temperature, pressure, and residence time\n- Mixing requirements\n- Recovery method and recycle limit\n- Analytical checkpoints for each cycle\n\n## Final practical rule\nUse this priority order when optimizing:\n1. **Match solvent chemistry to the biomass**\n2. **Fix mass transfer limitations**\n3. **Tune severity for selectivity**\n4. **Verify solvent recovery and reuse**\n5. **Lock the most stable multi-cycle condition**"
  }
]

      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
