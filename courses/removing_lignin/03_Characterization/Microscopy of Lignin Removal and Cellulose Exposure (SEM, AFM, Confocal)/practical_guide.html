<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nUse microscopy to **verify where lignin remains after delignification** and to **assess how exposed the cellulose surface really is**. By the end of this workflow, you should be able to:\n- Distinguish **clean fibrillated cellulose** from **lignin-coated or particle-like surfaces**\n- Use **SEM** to inspect surface morphology\n- Use **AFM** to map lignin-like nanoscale domains via force interactions\n- Use **confocal-style imaging** to visualize lignin/cellulose distribution in thicker or intact samples\n- Combine microscopy with chemical data so you do not mistake **bulk lignin reduction** for **true surface removal**\n\n## Prerequisites\nHave these ready before you start:\n1. **Delignified biomass samples** and a comparison set of **less-treated or untreated controls**\n2. Access to a **scanning electron microscope (SEM)** with sample coating capability if required by your instrument\n3. Access to an **atomic force microscope (AFM)** capable of **force-curve mapping** or force volume / PeakForce-type measurements\n4. A **thiophenol-modified AFM cantilever** or equivalent aromatic-functionalized probe for lignin-sensitive interaction mapping\n5. A **confocal laser scanning microscope** or confocal-capable fluorescence microscope\n6. A suitable **fluorescent dye, labeled probe, or autofluorescence setup** for distinguishing biomass regions\n7. Basic sample prep tools: **drying setup, mounting substrates, conductive stubs, adhesive tape, tweezers, and clean coverslips**\n8. Image analysis software such as **ImageJ/Fiji**, plus your microscope vendor\u2019s analysis tools\n\n## What success looks like\nYou should end up with:\n- SEM images showing whether fibers are **open, fibrillated, smooth, rough, or grain-covered**\n- AFM maps showing **localized adhesion hotspots** consistent with lignin-rich regions\n- Confocal images showing **spatial patterns** of lignin or cellulose exposure through the sample thickness"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Prepare the Samples for Microscopy\n\n## 1) Prepare a sample set that lets you compare structure before and after delignification\n\n### The Action\nCollect at least three sample types:\n- **Untreated biomass** or minimally processed reference\n- **Delignified / refined cellulose-rich sample**\n- **Partially delignified sample** or a sample with known residual lignin\n\nPrepare each for imaging using the least destructive method that fits the microscope.\n\n### Why it matters\nMicroscopy becomes much more informative when you can compare a clean reference against samples with different lignin levels. This makes it easier to tell whether a feature is caused by delignification or by sample handling.\n\n### How (Example)\n- Air-dry a small biomass aliquot for SEM mounting\n- Keep a second portion hydrated or gently dried for AFM if your protocol requires it\n- Mount a thin section or intact fragment for confocal imaging\n- Label all samples clearly, for example:\n  - `U1 = untreated wood pulp`\n  - `D1 = alkali-delignified pulp`\n  - `D2 = strongly refined cellulose nanofibers`\n\n---\n\n## 2) Reduce imaging artifacts before you collect data\n\n### The Action\nStandardize sample preparation so surface features reflect biology, not damage from prep.\n\n### Why it matters\nDrying, folding, collapse, and contamination can mimic lignin deposits or obscure cellulose fibrils.\n\n### How (Example)\n- For SEM: dry samples gently, mount flat, and sputter-coat if needed to reduce charging\n- For AFM: immobilize fibers on a clean substrate such as mica, glass, or silicon wafer\n- For confocal: place a thin sample in a chamber slide or between slide and coverslip with compatible mounting medium\n- Avoid thick clumps, dust, and excess salts that can distort signal\n\n---\n\n## 3) Define the imaging question for each method before you start\n\n### The Action\nWrite one primary question per technique.\n\n### Why it matters\nEach microscope answers a different question. Clear goals prevent overinterpreting the wrong signal.\n\n### How (Example)\n- **SEM question:** \u201cHas delignification opened the fiber surface and reduced particle-like deposits?\u201d\n- **AFM question:** \u201cWhere are lignin-like nanoscale domains located on the surface?\u201d\n- **Confocal question:** \u201cHow are lignin-rich or cellulose-rich regions distributed across the intact sample?\u201d"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Use SEM, AFM, and Confocal Imaging Strategically\n\n## 4) Run SEM first to evaluate surface morphology\n\n### The Action\nImage representative regions at low and high magnification to inspect fiber architecture, surface roughness, and deposits.\n\n### Why it matters\nSEM gives a fast structural screen. It tells you whether delignification has exposed fibrils or left behind compact, granular, or coated regions.\n\n### How (Example)\n- Start at low magnification to locate uniform regions\n- Increase magnification to inspect fiber surfaces\n- Compare features such as:\n  - **Thin fibrils** \u2192 often consistent with better cellulose exposure\n  - **Thick bundles** \u2192 less liberated structure\n  - **Grained deposits** \u2192 possible residual lignin or other surface residues\n- Document both top-view and angled views if your SEM setup allows it\n\n### Practical interpretation\nIf refined cellulose nanofibers look thin and fibrillated while lignocellulose nanofibers look thicker and grainier, the sample likely still contains surface-associated residual material.\n\n---\n\n## 5) Use AFM force mapping to locate lignin-like regions\n\n### The Action\nScan the surface with an aromatic-functionalized probe and collect force curves or adhesion maps across the sample.\n\n### Why it matters\nAFM does not just show height; it can reveal **where surface chemistry differs**. Aromatic probes often interact more strongly with lignin-rich regions than with cellulose.\n\n### How (Example)\n- Functionalize the cantilever with **thiophenol** or use a comparable lignin-sensitive aromatic chemistry\n- Acquire a topography map first\n- Overlay force/adhesion data onto the same region\n- Look for hotspots of stronger interaction\n- Compare maps between samples:\n  - **Lower adhesion on refined cellulose**\n  - **Higher or patchy adhesion on lignocellulosic surfaces**\n\n### Practical interpretation\nA smooth region with strong probe interaction may still be lignin-covered. A rough region with weaker interaction may already be cellulose-exposed. Use both topography and force response together.\n\n---\n\n## 6) Add confocal imaging when you need spatial distribution in thicker samples\n\n### The Action\nUse fluorescence or autofluorescence-based confocal imaging to visualize lignin-rich versus cellulose-rich areas in intact or sectioned biomass.\n\n### Why it matters\nConfocal microscopy shows **where** features are distributed through a thicker sample, not just on the outer surface.\n\n### How (Example)\n- Stain the sample with a lignin-sensitive fluorescent dye, if available\n- Or exploit natural autofluorescence if it clearly separates regions\n- Collect z-stacks through the sample\n- Look for enrichment in:\n  - middle lamellae\n  - cell corners\n  - residual patches after pretreatment\n\n### Practical interpretation\nIf the signal remains concentrated in specific zones rather than disappearing uniformly, delignification may have been partial or uneven."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Combine the Results and Make a Decision\n\n## 7) Interpret the three methods as a single evidence chain\n\n### The Action\nCompare SEM, AFM, and confocal results side by side before drawing conclusions about lignin removal or cellulose exposure.\n\n### Why it matters\nNo single microscope proves everything. Using them together reduces false conclusions caused by artifacts or incomplete information.\n\n### How (Example)\nBuild a simple interpretation table:\n- **SEM says:** surface is fibrillated and open\n- **AFM says:** low adhesion, few lignin-like hotspots\n- **Confocal says:** weak residual fluorescence in corners only\n- **Conclusion:** cellulose is substantially exposed and residual lignin is localized\n\nOr:\n- **SEM says:** surface looks smooth but patchy\n- **AFM says:** strong adhesion hotspots remain\n- **Confocal says:** bright lignin-rich zones persist in thicker regions\n- **Conclusion:** bulk delignification may have occurred, but surface lignin is still present\n\n---\n\n## 8) Use the microscopy data to judge cellulose accessibility, not just lignin content\n\n### The Action\nTranslate structural observations into a practical decision about biomass usability.\n\n### Why it matters\nDownstream reactivity depends on whether cellulose is truly accessible to enzymes, reagents, or fibrillation, not only on the total lignin percentage.\n\n### How (Example)\nUse these rules of thumb:\n- **Open fibrils + low AFM adhesion + weak confocal lignin signal** = high cellulose exposure\n- **Smooth but adhesive surface + patchy confocal hotspots** = hidden or redistributed lignin remains\n- **Grain-like deposits in SEM + strong AFM hotspots** = likely lignin-rich surface domains still present\n\n---\n\n## 9) Document your findings in a microscopy report\n\n### The Action\nRecord the imaging settings, sample prep, and key visual evidence in a short report or lab notebook entry.\n\n### Why it matters\nMicroscopy conclusions are only useful if they are reproducible and traceable to a specific preparation and imaging condition.\n\n### How (Example)\nInclude:\n- Sample identity and pretreatment history\n- SEM magnification and coating conditions\n- AFM probe chemistry and force mode\n- Confocal dye, laser line, and z-stack settings\n- A short interpretation statement such as:\n  - \u201cSEM and AFM indicate partial residual lignin on fiber surfaces despite low bulk lignin content, suggesting incomplete cellulose exposure.\u201d\n\n## Final takeaway\nUse **SEM for form**, **AFM for lignin-sensitive surface interaction**, and **confocal for broader spatial distribution**. The strongest conclusion comes from combining all three so you can see not only **how much lignin remains**, but **where it remains and how it affects cellulose exposure**."
  }
]

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
