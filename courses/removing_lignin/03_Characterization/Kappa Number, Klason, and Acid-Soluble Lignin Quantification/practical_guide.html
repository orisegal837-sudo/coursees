  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nUse the **Klason method** and **UV measurement of acid-soluble lignin (ASL)** to quantify:\n- **Acid-insoluble lignin (AIL / Klason lignin)** as a gravimetric residue\n- **Acid-soluble lignin (ASL)** in the hydrolysate by UV spectroscopy\n- **Total lignin = Klason lignin + ASL**\n\nBy the end, you should be able to:\n1. Prepare biomass or pulp for lignin analysis.\n2. Run a concentrated sulfuric acid hydrolysis to isolate insoluble lignin.\n3. Collect, dry, and weigh the residue.\n4. Measure soluble lignin in the liquid fraction by UV.\n5. Calculate total lignin content and compare samples consistently.\n\n## Prerequisites\nYou need the following technical resources:\n- **Analytical balance** capable of at least 0.1 mg readability\n- **Drying oven** or vacuum oven for constant-weight drying\n- **Muffle furnace** or ash furnace for residue correction, if your protocol requires ash correction\n- **Fume hood** for handling concentrated sulfuric acid\n- **Concentrated sulfuric acid (H2SO4, typically 72%)**\n- **Deionized water** for dilution and washing\n- **Filtration setup**: glass crucibles, fritted funnels, or ashless filter paper depending on protocol\n- **UV-Vis spectrophotometer** with quartz cuvettes\n- **Volumetric glassware**: pipettes, flasks, graduated cylinders\n- **Dry, milled biomass or pulp sample** with known moisture content\n- **Reference protocol or standard method** for your feedstock type (important because conditions vary)\n\n## What to prepare before starting\n- Determine **sample dry mass basis** so lignin can be reported consistently.\n- Record whether the sample is **wood, grass, agricultural residue, or pulp**, since soluble lignin behavior differs.\n- Set up a **blank** and, if possible, a **calibration standard or extinction coefficient** for ASL quantification.\n\n## Why this matters\nThe Klason method gives you the **insoluble lignin fraction**, but not the full picture. If you skip ASL, you will underreport total lignin in feedstocks where soluble lignin is significant.\n\n## Example setup\n- Weigh **0.30 g oven-dry biomass** into an acid-resistant vessel.\n- Prepare a UV blank containing the same acid matrix used in the hydrolysate.\n- Confirm your spectrophotometer wavelength choice, e.g. **205 nm or 240\u2013280 nm**, based on your protocol."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Klason Lignin\n\n## Phase 1: Prepare the sample\n\n### 1) Dry and standardize the sample\n**Action:** Dry the biomass to constant mass and determine moisture content.\n\n**Why:** Lignin results must be reported on a **dry weight basis**; wet samples distort yield calculations.\n\n**How (Example):**\n- Dry pulp at 105\u00b0C overnight.\n- Reweigh until mass change is negligible.\n- Use the dry mass to calculate all lignin percentages.\n\n### 2) Weigh the test portion\n**Action:** Accurately weigh a known amount of dry sample.\n\n**Why:** The entire calculation depends on a precise starting mass.\n\n**How (Example):**\n- Weigh **0.3000 g** of dry biomass into a glass hydrolysis vessel.\n- Record mass to 4 decimal places if your balance allows it.\n\n## Phase 2: Perform acid hydrolysis\n\n### 3) Add concentrated sulfuric acid\n**Action:** Treat the sample with concentrated sulfuric acid according to the selected standard method.\n\n**Why:** Strong acid hydrolyzes cellulose and hemicellulose into soluble products, leaving lignin-rich residue.\n\n**How (Example):**\n- Add **72% H2SO4** carefully while mixing to fully wet the sample.\n- Keep the sample at the specified temperature and time in your protocol.\n\n### 4) Dilute and complete hydrolysis\n**Action:** Dilute the acid mixture to the required final concentration and continue hydrolysis.\n\n**Why:** Dilution allows carbohydrates to break down further into soluble forms, improving separation of lignin residue.\n\n**How (Example):**\n- Add distilled water to reduce acid strength to the protocol target.\n- Heat in a water bath or autoclave if your method specifies it.\n\n## Phase 3: Recover the insoluble residue\n\n### 5) Filter the hydrolysate\n**Action:** Separate the solid residue from the acidic liquid.\n\n**Why:** The solid fraction is the **Klason lignin candidate residue**.\n\n**How (Example):**\n- Filter through a pre-weighed fritted crucible.\n- Rinse the vessel thoroughly to collect all solids.\n\n### 6) Wash the residue thoroughly\n**Action:** Wash the residue until acid is removed.\n\n**Why:** Residual acid can affect drying and weighing, and it can also trap soluble material.\n\n**How (Example):**\n- Rinse with hot deionized water until filtrate is near neutral or meets the method\u2019s wash criterion.\n- Avoid over-aggressive washing that loses fine residue particles.\n\n### 7) Dry and weigh the residue\n**Action:** Dry the crucible and residue to constant mass, then weigh it.\n\n**Why:** This gives the raw **acid-insoluble residue mass**.\n\n**How (Example):**\n- Dry at **105\u00b0C** until constant weight.\n- Cool in a desiccator and weigh.\n- Subtract crucible tare to obtain residue mass.\n\n### 8) Correct for ash if required\n**Action:** Ash the residue and subtract inorganic content if your protocol requires it.\n\n**Why:** Some residues contain mineral matter that can inflate lignin mass.\n\n**How (Example):**\n- Place dried residue in a muffle furnace at the protocol temperature.\n- Weigh ash remaining and subtract it from the dried residue mass.\n\n## Calculation example\n- Starting dry sample mass: **0.3000 g**\n- Dried residue mass: **0.1050 g**\n- Ash correction: **0.0050 g**\n- Corrected Klason lignin = **0.1000 g**\n- Klason lignin % = **(0.1000 / 0.3000) \u00d7 100 = 33.3%**"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step-by-Step Implementation: Acid-Soluble Lignin and Total Lignin\n\n## Phase 4: Measure acid-soluble lignin (ASL)\n\n### 1) Collect the hydrolysate\n**Action:** Save the liquid fraction from the Klason procedure for UV analysis.\n\n**Why:** Soluble lignin remains in the acid liquor and will not appear in the insoluble residue.\n\n**How (Example):**\n- Transfer the filtrate to a volumetric flask.\n- Record the total hydrolysate volume accurately.\n\n### 2) Clarify the sample if needed\n**Action:** Remove particulates before UV measurement.\n\n**Why:** Suspended solids scatter light and distort absorbance readings.\n\n**How (Example):**\n- Filter through a syringe filter or fine membrane.\n- Use the same acid matrix for blanks.\n\n### 3) Measure UV absorbance\n**Action:** Read absorbance at the wavelength specified by your ASL protocol.\n\n**Why:** Aromatic lignin absorbs UV light, allowing quantification in solution.\n\n**How (Example):**\n- Measure at **205 nm** or another protocol-defined wavelength.\n- Use a quartz cuvette and an acid blank.\n\n### 4) Convert absorbance to ASL concentration\n**Action:** Apply the protocol\u2019s extinction coefficient or calibration curve.\n\n**Why:** Absorbance alone is not a concentration.\n\n**How (Example):**\n- If using an extinction coefficient, calculate concentration from Beer\u2013Lambert law.\n- If using a calibration curve, interpolate the sample absorbance against standards.\n\n## Phase 5: Calculate total lignin\n\n### 5) Convert ASL to mass\n**Action:** Multiply ASL concentration by total hydrolysate volume.\n\n**Why:** Total lignin requires the amount dissolved in the liquid phase, not just concentration.\n\n**How (Example):**\n- ASL concentration = **2.0 mg/mL**\n- Hydrolysate volume = **50 mL**\n- ASL mass = **100 mg = 0.100 g**\n\n### 6) Add Klason lignin and ASL\n**Action:** Sum the insoluble and soluble fractions.\n\n**Why:** This gives a more complete estimate of total lignin.\n\n**How (Example):**\n- Klason lignin = **0.100 g**\n- ASL = **0.010 g**\n- Total lignin = **0.110 g**\n- Total lignin % = **(0.110 / 0.3000) \u00d7 100 = 36.7%**\n\n## Phase 6: Control common errors\n\n### 7) Check for method bias\n**Action:** Inspect whether the residue seems unusually high or low.\n\n**Why:** Klason can overestimate lignin if sugars are incompletely hydrolyzed or if humins form.\n\n**How (Example):**\n- Compare replicate values.\n- Look for unusually dark residue or inconsistent mass recovery.\n\n### 8) Use consistent conditions across samples\n**Action:** Keep acid strength, time, temperature, and washing steps identical across runs.\n\n**Why:** The method is operational; small procedural differences change results.\n\n**How (Example):**\n- Analyze all pretreatment samples in the same batch.\n- Use the same UV wavelength and blank for every ASL measurement."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Interpretation and Reporting\n\n## How to interpret the results\n- **Higher Klason lignin** usually means more acid-insoluble lignin remains after treatment.\n- **Higher ASL** means more lignin fragments dissolved into the hydrolysate.\n- **Lower total lignin** after pretreatment generally indicates better delignification, but only if cellulose loss is not excessive.\n\n## What to report\nWhen you publish or compare results, include:\n1. **Sample type and particle size**\n2. **Moisture correction method**\n3. **Acid concentration, hydrolysis time, and temperature**\n4. **Ash correction, if used**\n5. **UV wavelength and extinction coefficient or calibration method**\n6. **Klason lignin, ASL, and total lignin as % dry weight**\n7. **Number of replicates and standard deviation**\n\n## Example report line\n- \u201cThe pretreated corn stover contained **28.4% Klason lignin**, **2.1% ASL**, and **30.5% total lignin** on a dry mass basis.\u201d\n\n## Final checklist\nBefore accepting results, confirm:\n- The sample was fully dried and weighed correctly\n- The residue was washed and dried to constant mass\n- Ash correction was applied if required\n- The UV blank matched the hydrolysis matrix\n- Total lignin was calculated as **Klason + ASL**\n\n## Bottom line\nUse Klason lignin to measure what stays solid after acid hydrolysis, use UV to capture what dissolves, and always combine both fractions if you want a realistic total lignin value."
  }
]

    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
