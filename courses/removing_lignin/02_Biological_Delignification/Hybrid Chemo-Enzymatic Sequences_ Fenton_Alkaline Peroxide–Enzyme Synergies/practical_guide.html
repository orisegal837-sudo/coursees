<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **staged hybrid delignification process** that combines:\n1. **A chemical pre-oxidation step** to open the biomass structure and weaken lignin.\n2. **An enzymatic finishing step** to selectively oxidize exposed lignin fragments.\n3. **Process controls** that preserve cellulose while improving accessibility for downstream hydrolysis or pulping.\n\nBy the end, you should be able to design a sequence such as **Fenton \u2192 enzyme** or **alkaline peroxide \u2192 enzyme**, and choose the conditions based on whether your priority is **maximum lignin removal**, **cellulose protection**, or **balanced pulp quality**.\n\n## Prerequisites\nUse these materials, tools, and access points before you start:\n- **Biomass feedstock**: washed lignocellulosic material such as hardwood pulp, wheat straw, corn stover, or bagasse.\n- **Iron salt for Fenton chemistry**: e.g., **FeSO4\u00b77H2O** or **FeCl2**.\n- **Hydrogen peroxide**: analytical or technical grade, with secure storage.\n- **Alkali for peroxide activation**: **NaOH** or **KOH**.\n- **Oxidative enzymes**: one of the following depending on your system:\n  - **Laccase**\n  - **Manganese peroxidase (MnP)**\n  - **Lignin peroxidase (LiP)**\n  - **Versatile peroxidase**\n- **Optional laccase mediator**: e.g., **HBT** or another lab-approved mediator.\n- **pH meter** and **buffering chemicals** for tight pH control.\n- **Temperature-controlled shaker/incubator** or water bath.\n- **Analytical tools** for before/after comparison:\n  - **Kappa number** or lignin assay capability\n  - **UV\u2013Vis** for chromophore loss\n  - **Viscometer** or cellulose DP measurement if available\n  - **Reducing sugar / enzymatic hydrolysis setup** for downstream performance\n- **Safety equipment**: peroxide-rated PPE, fume hood, and compatible containers for radical-forming oxidation steps."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up the Chemical Opening Step\n\n## Step 1: Choose your oxidation route\n### The Action\nDecide whether your pretreatment will begin with **Fenton oxidation** or **alkaline peroxide**.\n\n### Why it matters\nThese two routes create very different lignin modifications. Fenton is fast and aggressive; alkaline peroxide is usually gentler and more cellulose-friendly.\n\n### How (Example)\n- Use **Fenton** when you need strong initial disruption of tough biomass.\n- Use **alkaline peroxide** when you want a milder, more controlled delignification.\n- Example decision rule:\n  - **Hard, recalcitrant feedstock** \u2192 Fenton first\n  - **Cellulose-sensitive pulp** \u2192 alkaline peroxide first\n\n## Step 2: Run a controlled Fenton pretreatment\n### The Action\nPrepare a low-consistency biomass slurry and introduce **iron + peroxide** under tight time and pH control.\n\n### Why it matters\nFenton chemistry generates hydroxyl radicals that can rapidly open lignin structure, but excessive exposure damages cellulose.\n\n### How (Example)\n- Adjust slurry to a low solids content for better mixing.\n- Add a small amount of **Fe2+** catalyst.\n- Introduce **H2O2 slowly** rather than all at once.\n- Keep the treatment **short** and monitor pH closely.\n- Example template:\n  - Biomass slurry: 2\u20135% solids\n  - pH: acidic range suitable for Fenton activity\n  - Add FeSO4, then dose H2O2 incrementally\n  - Stop after a brief oxidation window and immediately quench or wash\n\n## Step 3: Run an alkaline peroxide pretreatment\n### The Action\nTreat biomass with **hydrogen peroxide under alkaline conditions**.\n\n### Why it matters\nAlkaline peroxide favors **perhydroxyl ion** formation, which is generally softer than hydroxyl radicals and better at preserving cellulose.\n\n### How (Example)\n- Raise pH with **NaOH** to activate peroxide.\n- Add peroxide slowly while maintaining mixing.\n- Hold at moderate temperature to promote lignin oxidation.\n- Example template:\n  - Biomass slurry: 5\u201310% solids\n  - pH: strongly alkaline\n  - Temperature: moderate heating, not boiling\n  - Reaction time: long enough to brighten and open fibers, but not so long that carbohydrate loss increases\n\n## Step 4: Stop the chemical reaction cleanly\n### The Action\nQuench, wash, or neutralize the biomass after the oxidation step.\n\n### Why it matters\nResidual peroxide, radicals, or extreme pH can continue damaging cellulose and can also reduce enzyme performance.\n\n### How (Example)\n- For Fenton systems: wash thoroughly and remove residual iron if possible.\n- For alkaline peroxide: neutralize to the enzyme-compatible pH range.\n- Example target: bring the biomass to a pH suitable for the next enzyme stage before adding laccase or peroxidase."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Add the Enzymatic Cleanup Stage\n\n## Step 5: Select the right enzyme system\n### The Action\nChoose an oxidative enzyme based on the lignin fragments created by the chemical step.\n\n### Why it matters\nEnzymes work best after chemical pretreatment has exposed phenolic sites and loosened lignin\u2013carbohydrate structures.\n\n### How (Example)\n- Use **laccase** for phenolic lignin fragments.\n- Use **laccase + mediator** if you need wider oxidation reach.\n- Use **MnP, LiP, or versatile peroxidase** when the pretreatment creates oxidizable aromatic clusters.\n- Example selection:\n  - Phenolic-rich, pre-oxidized biomass \u2192 laccase\n  - More recalcitrant oxidized lignin \u2192 peroxidase system\n\n## Step 6: Apply the enzyme after chemical opening\n### The Action\nIncubate the pretreated biomass with the selected enzyme under its preferred pH and temperature.\n\n### Why it matters\nThe prior chemical step increases porosity, exposes lignin, and lowers non-productive binding, allowing the enzyme to act more selectively.\n\n### How (Example)\n- Adjust the slurry to the enzyme\u2019s working pH.\n- Add enzyme at the recommended activity loading.\n- Maintain gentle agitation for uniform contact.\n- Example template:\n  - Laccase treatment: near mild acidic pH, moderate temperature\n  - Peroxidase treatment: supply the required peroxide carefully if the enzyme needs it\n  - Reaction time: several hours to a day depending on substrate and enzyme activity\n\n## Step 7: Use the sequence logic, not just the chemistry\n### The Action\nKeep the process staged: **chemical opening first, enzymatic refinement second**.\n\n### Why it matters\nIf you reverse the order without a specific reason, the enzyme may have little access to native lignin. If the chemical step is too harsh, cellulose damage cancels the benefits.\n\n### How (Example)\nUse this decision pattern:\n1. **Open** biomass with Fenton or alkaline peroxide.\n2. **Wash/neutralize** to enzyme-compatible conditions.\n3. **Refine** with oxidative enzymes.\n4. **Measure** whether lignin removal improved without a cellulose penalty."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Optimize, Compare, and Scale the Sequence\n\n## Step 8: Measure whether the sequence is working\n### The Action\nCompare untreated, chemically treated, and chemo-enzymatically treated samples.\n\n### Why it matters\nYou need evidence that the hybrid sequence improves delignification without sacrificing cellulose integrity.\n\n### How (Example)\nTrack these indicators:\n- **Lignin reduction**: kappa number, Klason lignin, or UV absorbance decline\n- **Color removal**: decreased chromophore intensity\n- **Cellulose preservation**: viscosity or degree of polymerization\n- **Downstream digestibility**: increased enzymatic saccharification yield\n\n## Step 9: Tune severity and enzyme dose together\n### The Action\nAdjust chemical strength and enzyme loading as linked variables.\n\n### Why it matters\nA stronger oxidation step may reduce the enzyme requirement, but it also increases the risk of cellulose loss. A milder oxidation step may preserve cellulose but require more enzyme time or dosage.\n\n### How (Example)\n- If lignin removal is poor: increase chemical opening slightly or add mediator/enzyme loading.\n- If viscosity drops too much: reduce peroxide dose, shorten reaction time, or lower iron loading.\n- If enzyme has little effect: the pretreatment may be too mild or lignin may have repolymerized.\n\n## Step 10: Build a practical sequence rule\n### The Action\nAdopt a repeatable rule for process design: **open, oxidize, selectively refine**.\n\n### Why it matters\nThis keeps the process centered on sequence control rather than relying on one overly strong treatment.\n\n### How (Example)\nA usable workflow looks like this:\n1. Select feedstock and baseline metrics.\n2. Run either Fenton or alkaline peroxide at controlled severity.\n3. Neutralize and wash.\n4. Apply laccase or peroxidase.\n5. Measure lignin removal and cellulose retention.\n6. Iterate the severity/dose until you hit the best balance.\n\n## Final takeaway\nThe best hybrid delignification process is usually **not the harshest one**. It is the one that uses **chemistry to unlock access** and **enzymes to finish selectively**, while preserving cellulose for the next processing step."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
