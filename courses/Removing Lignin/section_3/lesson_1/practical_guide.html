      font-family: var(--font-sans);
      background-color: var(--bg-base);

      align-items: stretch;

      gap: 8px;

      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;

      font-weight: 500;

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================

    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }

    .opacity-0 { opacity: 0; transform: translateY(10px); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }

<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nSet up and evaluate an **organosolv delignification workflow** that removes lignin efficiently while preserving cellulose and as much hemicellulose as possible. By the end, you should be able to:\n\n- **Choose a solvent system** suited to your biomass and downstream goal.\n- **Select a catalyst strategy** that improves lignin cleavage without over-hydrolyzing carbohydrates.\n- **Define operating conditions** that balance delignification, carbohydrate preservation, and lignin quality.\n- **Measure process performance** using practical outputs like lignin removal, pulp yield, and lignin purity.\n\n## Prerequisites\nUse a small, controlled lab setup and the following specific tools/materials:\n\n- **Biomass feedstock**: milled hardwood chips, softwood chips, or agricultural residue with known moisture content.\n- **Organic solvent**: ethanol (preferred starter system), methanol, or acetone.\n- **Water**: deionized water for solvent dilution.\n- **Acid catalyst**: dilute sulfuric acid, hydrochloric acid, oxalic acid, or acetic acid.\n- **High-pressure reactor or sealed digestor**: rated for heated solvent operation.\n- **Heating and stirring system**: oil bath, reactor heater, or autoclave with agitation.\n- **Filtration setup**: Buchner funnel, vacuum filtration, or centrifuge.\n- **Solvent recovery option**: rotary evaporator or distillation setup.\n- **Basic analytical tools**: balance, oven for dry mass, and access to lignin/cellulose composition analysis if possible.\n\n## What to prepare before starting\n- Dry and mill the biomass to a consistent particle size.\n- Record initial moisture, ash, and extractives if available.\n- Decide your target outcome:\n  - **Clean pulp** for fiber processing\n  - **Digestible cellulose** for enzymatic hydrolysis\n  - **Recoverable lignin** for upgrading or materials"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Choose a solvent system that matches your goal\n\n## Action\nSelect a solvent-water mixture based on lignin solubilization, separation ease, and safety.\n\n## Why\nThe solvent controls how well lignin fragments dissolve and how easily you can recover the solvent afterward. A poor choice can make delignification slow, separation difficult, or energy-intensive.\n\n## How (Example)\nStart with an **ethanol-water system** because it is widely used and relatively practical.\n\n**Example starting point:**\n- 50\u201370% ethanol in water, by volume\n- Adjust based on biomass type and target severity\n\nIf you need a more aggressive or different extraction profile, test:\n- **Methanol-water** for strong solvation behavior\n- **Acetone-water** for alternative lignin extraction behavior\n\n**Selection checklist:**\n- Can you recover it by distillation?\n- Is it safe to run at your operating temperature?\n- Does it keep viscosity manageable for biomass penetration?\n- Does it support downstream lignin recovery?\n\n---\n\n# Page 2 \u2014 Step 2: Add a catalyst only as strongly as needed\n\n## Action\nChoose a dilute acid catalyst to accelerate lignin bond cleavage.\n\n## Why\nSolvent alone often cannot break lignin linkages fast enough. A catalyst improves delignification, but too much acidity damages carbohydrates and can lower lignin quality.\n\n## How (Example)\nUse a **low-dose mineral or organic acid** and start conservatively.\n\n**Example catalyst options:**\n- 0.2\u20131.0 wt% sulfuric acid relative to liquid phase\n- Oxalic acid for a milder organic acid approach\n- Acetic acid if you want weaker acidity and gentler conditions\n\n**Practical rule:**\n- Increase acid only if lignin removal is too low.\n- Decrease acid if hemicellulose loss or sugar degradation becomes excessive.\n\n**What to watch:**\n- Darkening of liquor beyond expected levels\n- Excessive carbohydrate loss in solids\n- Poor lignin purity after recovery"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 3: Set operating conditions to favor selectivity\n\n## Action\nTune temperature, time, solids loading, and solvent-to-water ratio to maximize lignin removal without over-processing the biomass.\n\n## Why\nThese variables determine whether the process is selective or destructive. Severity improves delignification, but too much severity increases carbohydrate degradation and lignin recondensation.\n\n## How (Example)\nUse a staged optimization approach instead of one fixed recipe.\n\n### Start with a moderate condition set\n- **Temperature:** 150\u2013190\u00b0C\n- **Residence time:** 30\u201390 minutes\n- **Solids loading:** 5\u201320% dry biomass in liquid\n- **Solvent-to-water ratio:** test multiple levels, such as 60:40 and 70:30 ethanol:water\n\n### Then adjust one variable at a time\n- Raise **temperature** if lignin removal is incomplete.\n- Shorten **time** if carbohydrates start degrading.\n- Lower **solids loading** if impregnation is poor or mixing becomes difficult.\n- Change **water content** if lignin solubility or biomass swelling is inadequate.\n\n### Example decision logic\n- **Low delignification + intact carbohydrates** \u2192 increase temperature slightly or add more acid.\n- **Good delignification + poor carbohydrate retention** \u2192 reduce acid, temperature, or residence time.\n- **Uneven pulping** \u2192 improve particle size reduction and impregnation before changing chemistry.\n\n---\n\n# Page 3 \u2014 Step 4: Run the process and measure performance\n\n## Action\nCarry out the cook, separate solid and liquid fractions, and quantify the results.\n\n## Why\nYou cannot optimize organosolv delignification by appearance alone. Performance must be measured using solid yield, lignin removal, and fraction quality.\n\n## How (Example)\n1. Load dried biomass into the reactor.\n2. Add the chosen solvent-water mixture and catalyst.\n3. Heat to the target temperature under sealed conditions.\n4. Hold for the planned residence time with agitation.\n5. Cool rapidly to stop further reaction.\n6. Filter or centrifuge to separate the pulp and liquor.\n7. Wash the solids with fresh solvent or water to remove residual lignin fragments.\n\n**Record these outputs:**\n- **Pulp yield**: how much solid remains\n- **Lignin removal**: before/after composition difference\n- **Carbohydrate retention**: cellulose and hemicellulose remaining in pulp\n- **Liquor quality**: clarity, color, and lignin recovery potential\n- **Solvent recovery ease**: how well the solvent can be reused\n\n**Simple example evaluation:**\n- If you start with 100 g dry biomass and recover 65 g pulp with much lower lignin content, the process is likely delignifying effectively.\n- If pulp yield is high but lignin remains high, the cook is too mild.\n- If pulp yield collapses and sugars degrade, the cook is too severe."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 5: Optimize for the intended application\n\n## Action\nChoose your final operating window based on the product you care about most: pulp, cellulose digestibility, or lignin coproduct quality.\n\n## Why\nThe best organosolv condition is not the most severe one. It is the one that best matches your downstream use case.\n\n## How (Example)\n### If your goal is clean pulp\n- Favor moderate acidity and moderate temperature\n- Prioritize carbohydrate retention and fiber integrity\n- Accept slightly lower lignin removal if pulp quality improves\n\n### If your goal is enzymatic digestibility\n- Push delignification enough to open the structure\n- Avoid conditions that generate inhibitors or excessive sugar loss\n- Target cellulose-rich solids with improved accessibility\n\n### If your goal is high-quality lignin\n- Minimize lignin condensation by avoiding overcooking\n- Use conditions that extract lignin fragments quickly\n- Recover lignin promptly from liquor after separation\n\n## Final optimization workflow\n1. Run a small matrix of conditions.\n2. Compare lignin removal, carbohydrate preservation, and solvent recovery.\n3. Rank runs by your primary objective.\n4. Select the mildest condition that still meets your target.\n5. Confirm reproducibility with a repeat run.\n\n## Practical decision rule\n- **Don\u2019t optimize for one number alone.**\n- Use a tradeoff view: delignification, pulp yield, lignin purity, energy use, and safety all matter.\n\n## End state\nA successful organosolv process gives you:\n- A carbohydrate-rich solid fraction\n- A lignin-rich liquid fraction\n- A solvent system that can be recovered and reused efficiently"
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
