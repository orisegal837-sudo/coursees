      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);

      color: var(--text-main);

      font-weight: 500;

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nUse ionic liquids (ILs) to **open lignocellulosic biomass, reduce lignin\u2013carbohydrate association, and improve downstream fractionation**. By the end of this workflow, you should be able to:\n- Select an IL family based on **feedstock type** and **process goal**.\n- Predict whether the IL should favor **cellulose swelling**, **lignin release**, or **full biomass dissolution**.\n- Set up a first-pass screening plan that balances **delignification**, **carbohydrate preservation**, **viscosity**, and **recoverability**.\n\n## Technical prerequisites\nHave access to the following:\n- **A biomass pretreatment setup** with temperature control and stirring or agitation.\n- **A drying oven or vacuum oven** for biomass moisture control.\n- **A glovebox or dry-air handling setup** if testing moisture-sensitive ILs.\n- **Common biomass characterization tools**: FTIR, XRD, NMR, or compositional analysis access.\n- **Solvent recovery equipment** such as rotary evaporation, vacuum stripping, or antisolvent precipitation setup.\n- **Representative biomass samples**: hardwood, softwood, or agricultural residue.\n- **At least one candidate ionic liquid system**, commonly imidazolium-based with chloride or acetate anions.\n\n## What you need to decide before starting\n1. **Your target outcome**\n   - Maximum enzymatic digestibility\n   - Lignin recovery as a co-product\n   - High-purity pulp\n   - Full or partial dissolution for fractionation\n\n2. **Your biomass type**\n   - Softwood, hardwood, or agricultural residue\n   - Particle size and moisture content\n   - Known lignin content if available\n\n3. **Your process constraints**\n   - Maximum acceptable carbohydrate loss\n   - Allowed solvent cost and recovery energy\n   - Viscosity limits for pumping and impregnation\n   - Acceptable residual solvent or salts in products\n\n## Practical example\nIf your goal is **enzymatic hydrolysis of corn stover**, you should prioritize an IL that **opens the matrix and reduces cellulose crystallinity** without heavily degrading sugars. If your goal is **lignin co-product recovery from hardwood**, you should prioritize a system that **releases lignin fragments cleanly** and supports downstream lignin precipitation."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Start with the Process Goal\n\n## Step 1: Define the process target before choosing the solvent\n**Action:** Write down the one primary outcome you want from pretreatment.\n\n**Why it matters:** Different IL chemistries favor different outcomes. The best solvent for dissolving biomass is not always the best solvent for preserving carbohydrates or isolating lignin.\n\n**How (example):**\n- If the goal is **high enzymatic sugar yield**, choose a solvent that strongly disrupts hydrogen bonding and cellulose crystallinity.\n- If the goal is **lignin extraction**, choose a solvent that can release and keep lignin fragments dissolved.\n- If the goal is **pulp production**, prioritize low residue, manageable viscosity, and easy solvent recovery.\n\n## Step 2: Classify the biomass feedstock\n**Action:** Identify whether your biomass is a hardwood, softwood, or agricultural residue, and note its physical structure.\n\n**Why it matters:** Biomass architecture controls solvent penetration. Dense chips behave differently from porous residues.\n\n**How (example):**\n- **Hardwood:** moderate lignin, usually more accessible than softwood.\n- **Softwood:** higher lignin content and denser structure; often harder to penetrate.\n- **Agricultural residue:** often more porous and more responsive to impregnation.\n\nUse this to adjust severity: a dense softwood may need better impregnation and longer residence time than a residue.\n\n## Step 3: Screen ILs by anion first\n**Action:** Start solvent selection with the **anion**, then refine with the cation.\n\n**Why it matters:** The anion often dominates hydrogen-bond disruption and therefore biomass dissolution or swelling.\n\n**How (example):**\n- Use **chloride-containing systems** when strong disruption is needed, but expect higher viscosity or harsher processing.\n- Use **acetate-containing systems** when you want strong interaction with biomass but potentially different selectivity and handling behavior.\n- Compare a small set of candidate ILs under identical conditions rather than assuming one \u201cbest\u201d solvent.\n\n## Step 4: Match the cation to operational needs\n**Action:** Choose the cation based on viscosity, thermal stability, polarity, and handling.\n\n**Why it matters:** Even if the anion is effective, the cation can make the IL too viscous, too expensive, or too difficult to recycle.\n\n**How (example):**\n- If pumping and mass transfer are difficult, avoid very viscous systems.\n- If high-temperature operation is needed, prioritize cations with good thermal stability.\n- If solvent recovery is important, consider a cation system that reduces separation burden."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step-by-Step Implementation: Optimize the Pretreatment Window\n\n## Step 5: Control water content deliberately\n**Action:** Set a target water level and keep it consistent across experiments.\n\n**Why it matters:** Small amounts of water can reduce viscosity and improve impregnation, but too much water weakens the IL\u2019s dissolution power.\n\n**How (example):**\n- For a first screening, compare **dry IL**, **slightly hydrated IL**, and **more heavily hydrated IL**.\n- If chips are not impregnating well, a small amount of water may improve flow.\n- If cellulose dissolution drops sharply, reduce water content and re-test.\n\n## Step 6: Tune temperature, time, and solids loading\n**Action:** Run pretreatment trials across a small matrix of temperature, residence time, and biomass loading.\n\n**Why it matters:** These variables shift the balance between delignification, sugar preservation, and solvent viscosity effects.\n\n**How (example):**\nUse a simple test matrix such as:\n- Low / medium / high temperature\n- Short / medium / long residence time\n- Low / medium solids loading\n\nInterpret results as follows:\n- Better delignification but lower sugar recovery may mean conditions are too severe.\n- Poor delignification with intact sugars may mean conditions are too mild or mass transfer is limited.\n\n## Step 7: Measure the right performance indicators\n**Action:** Evaluate the pretreated solids and any recovered liquor using metrics aligned to your target.\n\n**Why it matters:** You cannot optimize what you do not measure. IL pretreatment success depends on more than visual dissolution.\n\n**How (example):**\nFor digestibility-focused work, measure:\n- Residual lignin\n- Enzymatic hydrolysis yield\n- Cellulose crystallinity change\n\nFor lignin recovery, measure:\n- Lignin yield from precipitation\n- Lignin purity\n- Evidence of chemical modification\n\nFor pulp production, measure:\n- Carbohydrate retention\n- Residual ash/lignin\n- Fiber quality and residue formation\n\n## Step 8: Check for redeposition or incomplete penetration\n**Action:** Inspect whether lignin fragments are being released but then redepositing, or whether the biomass was never fully penetrated.\n\n**Why it matters:** High apparent delignification can hide transport failures or poor lignin solubility.\n\n**How (example):**\n- If outer layers are heavily treated but inner regions remain intact, reduce viscosity, improve agitation, or reduce chip size.\n- If lignin seems to reappear on solids after cooling or dilution, adjust solvent compatibility or precipitation conditions."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Solvent Selection Workflow and Practical Decision Rules\n\n## Step 9: Choose the IL system by process goal\n**Action:** Use a goal-based decision rule instead of chasing maximum solvent strength.\n\n**Why it matters:** The most powerful IL may not be the best overall process solvent.\n\n**How (example):**\n- **Goal: enzymatic hydrolysis** \u2192 choose an IL that strongly disrupts cellulose order and preserves carbohydrates.\n- **Goal: lignin co-product** \u2192 choose an IL that releases lignin efficiently and allows clean precipitation.\n- **Goal: pulp** \u2192 choose a system with lower carbohydrate loss, easier solvent recovery, and manageable viscosity.\n\n## Step 10: Build the selection balance sheet\n**Action:** Score each IL candidate against the main tradeoffs.\n\n**Why it matters:** This makes solvent choice transparent and helps you avoid selecting a solvent that performs well in one area but fails in the full flowsheet.\n\n**How (example):**\nCreate a simple ranking table with columns for:\n- Delignification strength\n- Cellulose preservation\n- Viscosity / pumpability\n- Water tolerance\n- Cost\n- Toxicity / handling burden\n- Recyclability\n- Downstream compatibility\n\nPick the candidate with the best overall score for your target process, not the highest score in only one category.\n\n## Step 11: Validate with a small-scale flowsheet test\n**Action:** Test pretreatment, product recovery, and solvent reuse together.\n\n**Why it matters:** An IL is only practical if it works across the full process sequence.\n\n**How (example):**\n- Pretreat biomass in the IL.\n- Separate or precipitate lignin or cellulose as needed.\n- Recover the IL by removing water or antisolvent and recycling it.\n- Reuse the recovered IL in a second cycle and compare performance.\n\n## Step 12: Final selection rule\n**Action:** Select the solvent system that best matches biomass, target product, and downstream constraints.\n\n**Why it matters:** IL pretreatment is a systems problem, not a single-solvent problem.\n\n**How (example):**\n- Dense softwood + digestibility target + limited recovery budget \u2192 favor a moderate, recyclable IL with good impregnation behavior.\n- Porous agricultural residue + lignin valorization target \u2192 favor a system that releases lignin cleanly and supports precipitation.\n- High-purity pulp target \u2192 prioritize solvent recovery, carbohydrate retention, and low residue formation over maximum dissolution.\n\n## Quick rule of thumb\nIf the IL is **too viscous**, it may not penetrate biomass well. If it is **too water-rich**, it may lose dissolution power. If it is **too harsh**, it may damage carbohydrates. The right IL is the one that gives the best net result for your biomass and process goal."
  }
]

  <script>
  (function () {
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
