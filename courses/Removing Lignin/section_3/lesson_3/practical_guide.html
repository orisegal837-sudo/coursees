<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a **deep eutectic solvent (DES) pretreatment workflow** that can **remove lignin selectively** from lignocellulosic biomass while **preserving carbohydrates** as much as possible. By the end, you should be able to:\n- Choose an appropriate DES family for your biomass.\n- Adjust composition to tune acidity, viscosity, and water affinity.\n- Set up a pretreatment test that measures both **delignification** and **carbohydrate retention**.\n- Decide whether the DES is suitable for **enzymatic hydrolysis**, **lignin recovery**, or **fractionation**.\n\n## Prerequisites\nYou need access to these specific items before starting:\n1. **Chemicals for DES preparation**\n   - **Choline chloride** (common hydrogen-bond acceptor)\n   - At least one hydrogen-bond donor such as:\n     - **Urea**\n     - **Glycerol**\n     - **Lactic acid**\n     - **Oxalic acid**\n     - **Acetic acid** or another carboxylic acid\n2. **Biomass feedstock**\n   - One defined material such as **corn stover, wheat straw, hardwood chips, or softwood sawdust**\n   - Preferably dried and milled to a known particle size\n3. **Basic lab equipment**\n   - Analytical balance\n   - Heating/stirring setup capable of **60\u2013120\u00b0C**\n   - Viscosity-tolerant mixing vessel or sealed reactor\n   - Filtration setup or centrifuge\n   - Drying oven\n4. **Characterization access**\n   - Method to measure **residual lignin** and **carbohydrate composition**\n   - Ideally **Klason lignin**, **HPLC sugar analysis**, or **NREL compositional analysis**\n   - Optional but useful: **FTIR, microscopy, enzymatic digestibility assay**\n5. **Water control tools**\n   - Deionized water\n   - Pipettes or balance for precise water addition\n6. **Safety access**\n   - Fume hood\n   - PPE suitable for acids and heated viscous solvents\n\n## What to Decide Before You Start\n- **If your goal is maximum lignin removal:** start with an **acidic DES** such as choline chloride : lactic acid or choline chloride : oxalic acid.\n- **If your goal is carbohydrate preservation:** start with a **milder DES** such as choline chloride : urea or choline chloride : glycerol.\n- **If you want a balanced fractionation:** test at least one acidic DES and one mild DES side by side."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Prepare and Screen DES Formulations\n\n## Step 1: Select 2\u20134 candidate DESs\n### The Action\nChoose several DES compositions that span the range from mild to acidic.\n### Why it matters\nDES performance depends strongly on donor choice, so screening multiple formulations helps you find the right selectivity window.\n### How (Example)\nTest these starting points:\n- **Choline chloride : urea (1:2 molar ratio)** \u2014 mild, carbohydrate-preserving\n- **Choline chloride : glycerol (1:2)** \u2014 mild to intermediate\n- **Choline chloride : lactic acid (1:2)** \u2014 acidic, often stronger delignification\n- **Choline chloride : oxalic acid (1:1 or 1:2)** \u2014 more aggressive, high acidity\n\n## Step 2: Prepare each DES\n### The Action\nCombine the hydrogen-bond acceptor and donor and heat until a homogeneous liquid forms.\n### Why it matters\nA true DES is formed when the mixture becomes a stable liquid with altered melting behavior and strong hydrogen-bond interactions.\n### How (Example)\n1. Weigh choline chloride and donor at the chosen molar ratio.\n2. Heat to **60\u201390\u00b0C** under stirring.\n3. Continue until the mixture becomes clear and uniform.\n4. Cool and store in a sealed container to prevent water uptake.\n\n## Step 3: Adjust water content deliberately\n### The Action\nPrepare each DES with a controlled water level, rather than leaving it uncontrolled.\n### Why it matters\nSmall amounts of water can reduce viscosity and improve penetration, but too much water weakens solvent structure and lowers lignin solubilization power.\n### How (Example)\nSet up three water levels for one DES:\n- **0 wt% water**\n- **5 wt% water**\n- **10 wt% water**\nThen compare impregnation and delignification.\n\n## Step 4: Record physical properties\n### The Action\nNote viscosity, clarity, and ease of mixing for each formulation.\n### Why it matters\nHighly viscous DESs may perform well chemically but fail in practice because they cannot penetrate biomass efficiently.\n### How (Example)\nUse a simple log sheet:\n- Composition\n- Water content\n- Heating temperature\n- Time to homogeneity\n- Visual viscosity ranking: low / medium / high"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Run Pretreatment and Evaluate Selectivity\n\n## Step 5: Pretreat biomass under controlled conditions\n### The Action\nMix biomass with DES at a fixed solids loading and heat for a set time.\n### Why it matters\nPretreatment severity controls the balance between lignin removal and carbohydrate damage.\n### How (Example)\nStart with one standardized condition:\n- Biomass loading: **5\u201310 wt% solids**\n- Temperature: **100\u2013130\u00b0C**\n- Time: **1\u20134 hours**\n- Agitation: continuous or periodic stirring\nRun the same biomass with each DES so the comparison is fair.\n\n## Step 6: Separate the treated solids and liquor\n### The Action\nFilter or centrifuge the mixture to recover solid pulp and DES liquor.\n### Why it matters\nYou need both streams to evaluate lignin removal and solvent performance.\n### How (Example)\n1. Cool the reaction mixture.\n2. Add a controlled amount of antisolvent or water if needed for separation.\n3. Filter to collect solids.\n4. Wash solids until residual DES is minimized.\n5. Save the liquid phase for lignin recovery analysis.\n\n## Step 7: Measure delignification and carbohydrate retention\n### The Action\nAnalyze treated solids for lignin content and sugar composition.\n### Why it matters\nA good DES is not just a strong delignifier; it must keep cellulose largely intact and minimize unnecessary polysaccharide loss.\n### How (Example)\nMeasure:\n- **Residual lignin** in solids\n- **Pulp yield** after treatment\n- **Cellulose and hemicellulose content**\n- **Enzymatic digestibility** if the goal is sugar production\n\nInterpretation example:\n- Low residual lignin + high pulp yield = strong, selective pretreatment\n- Low lignin + low pulp yield = too harsh; likely carbohydrate loss\n- Moderate lignin removal + high digestibility = often a practical sweet spot\n\n## Step 8: Assess lignin quality if recovery matters\n### The Action\nCharacterize lignin recovered from the DES liquor.\n### Why it matters\nSome DESs remove lignin efficiently but produce degraded fragments that are less useful as co-products.\n### How (Example)\nCheck:\n- Lignin purity\n- Molecular weight distribution\n- Solubility after recovery\n- Evidence of excessive condensation or degradation"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Optimize the Process and Choose the Best DES\n\n## Step 9: Tune severity and composition\n### The Action\nAdjust donor acidity, time, temperature, solids loading, and water content based on your first results.\n### Why it matters\nDES pretreatment is a coupled chemistry-and-transport process, so the best formulation usually emerges only after iterative optimization.\n### How (Example)\nIf delignification is too low:\n- Increase donor acidity\n- Raise temperature slightly\n- Reduce biomass particle size\n- Add a small amount of water to improve mass transfer\n\nIf carbohydrate loss is too high:\n- Switch to a milder donor\n- Lower temperature or time\n- Reduce acidity\n- Increase water only enough to improve handling, not enough to collapse DES structure\n\n## Step 10: Rank candidates using multiple metrics\n### The Action\nScore each DES using more than one performance metric.\n### Why it matters\nThe best DES depends on the application, not on lignin removal alone.\n### How (Example)\nCreate a simple ranking table with:\n- Residual lignin\n- Pulp yield\n- Cellulose preservation\n- Enzymatic digestibility\n- Lignin purity\n- Viscosity / processability\n- Ease of solvent recovery\n\n## Step 11: Match the DES to the end use\n### The Action\nChoose the DES based on whether the next step is hydrolysis, fractionation, or lignin recovery.\n### Why it matters\nA DES optimized for one downstream goal may be poor for another.\n### How (Example)\n- **For enzymatic hydrolysis:** prioritize lignin removal + carbohydrate retention\n- **For lignin co-product recovery:** prioritize lignin purity + solvent recovery\n- **For simple pretreatment:** prioritize practical viscosity, cost, and reproducibility\n\n## Final rule of thumb\nUse **acidic DESs** when delignification is the priority, but monitor carbohydrate damage closely. Use **milder DESs** when preserving polysaccharides matters more. In all cases, evaluate **selectivity, viscosity, water content, and downstream compatibility** together rather than optimizing just one factor."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
