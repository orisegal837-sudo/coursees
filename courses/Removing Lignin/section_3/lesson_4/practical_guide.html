      --text-muted: #94a3b8;
      --text-heading: #ffffff;

      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));

      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);

      --radius-lg: 16px;
      --radius-md: 12px;

      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */

      align-items: stretch;
      justify-content: center;
    }

      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;

      display: flex;

    }

      ========================================

    .topbar {

      flex-direction: column;
      align-items: center;

      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {

      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;

      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;

      ========================================

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nUse Hansen solubility parameters (HSPs) and selectivity maps to **screen and compare solvent systems** for lignin removal in **organosolv, ionic liquid (IL), and deep eutectic solvent (DES)** delignification.\n\nBy the end, you should be able to:\n- Estimate whether a solvent is likely to **dissolve lignin**.\n- Judge whether that solvent is likely to be **selective for lignin over cellulose and hemicellulose**.\n- Compare candidate solvent systems in a **3D interaction space** instead of relying on trial and error.\n- Use the map as a **decision aid** for choosing solvent composition, especially when tuning water content or co-solvent ratios.\n\n## Technical prerequisites\nYou will need:\n- **Hansen solubility parameter data** for:\n  - lignin fractions or representative lignin samples\n  - candidate solvents or solvent mixtures\n  - cellulose and hemicellulose reference materials, if available\n- A way to calculate or estimate HSP components:\n  - software or database that provides **\u03b4D, \u03b4P, \u03b4H**\n  - or a published HSP reference table for common solvents\n- A plotting tool for selectivity maps:\n  - **Python** with `numpy`, `pandas`, and `matplotlib` or `seaborn`\n  - or **Excel/Origin/GraphPad** for manual plotting\n- For solvent-specific comparison:\n  - organosolv mixture compositions you want to test\n  - ionic liquid identities and approximate HSP values\n  - DES component ratios and water contents\n- Access to **feedstock composition data** for the biomass you are studying, if you want to interpret selectivity realistically\n\n## What you are building\nA workflow that lets you:\n1. **Represent each solvent and target polymer in HSP space**.\n2. **Measure compatibility** using distance in that space.\n3. **Overlay lignin and carbohydrate targets** to identify a selective solvent window.\n4. **Rank solvent options** for delignification performance and selectivity."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Build the HSP Screening Workflow\n\n## Step 1: Define the biomass target you want to delignify\n**The Action:** Choose the lignin type and biomass source you are evaluating.\n\n**Why it matters:** Lignin is not uniform. Softwood, hardwood, and grass lignins differ in structure and therefore in solvent compatibility.\n\n**How (Example):**\n- Softwood kraft lignin for a conifer feedstock\n- Hardwood lignin for poplar or eucalyptus\n- Grass lignin for corn stover or wheat straw\n\nCreate a simple target note such as:\n- `Target: hardwood lignin from eucalyptus`\n- `Goal: maximize lignin removal while preserving cellulose`\n\n## Step 2: Collect HSP values for the target and candidate solvents\n**The Action:** Gather the three Hansen components for each material: **dispersion (\u03b4D), polar (\u03b4P), and hydrogen bonding (\u03b4H)**.\n\n**Why it matters:** These three values define the interaction profile used to compare compatibility.\n\n**How (Example):**\nUse a table like this:\n- Lignin: `\u03b4D = 18.0, \u03b4P = 12.0, \u03b4H = 10.0`\n- Ethanol: `\u03b4D = 15.8, \u03b4P = 8.8, \u03b4H = 19.4`\n- Ethanol/water 70/30: estimated mixed values from weighted composition or literature\n- Choline chloride/oxalic acid DES: literature-based HSP estimate\n- [BMIM][Cl]: published HSP proxy values\n\nIf exact lignin values are unavailable, use a published value for the same lignin class and note the source.\n\n## Step 3: Calculate Hansen distance (Ra)\n**The Action:** Compute the distance between each solvent and the lignin target in HSP space.\n\n**Why it matters:** Smaller distance generally indicates stronger compatibility and a higher chance of dissolution.\n\n**How (Example):**\nUse the standard form:\n- `Ra = sqrt[ 4(\u03b4D1 - \u03b4D2)^2 + (\u03b4P1 - \u03b4P2)^2 + (\u03b4H1 - \u03b4H2)^2 ]`\n\nThen rank your solvents:\n- smallest `Ra` \u2192 best initial lignin compatibility\n- largest `Ra` \u2192 poorest initial compatibility\n\nExample interpretation:\n- Solvent A: low Ra, likely good lignin solvent\n- Solvent B: moderate Ra, may need temperature or composition adjustment\n- Solvent C: high Ra, poor match for the target lignin"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step-by-Step Implementation: Add Selectivity and Apply It to Real Solvent Families\n\n## Step 4: Add cellulose and hemicellulose references to build selectivity\n**The Action:** Plot or calculate the position of cellulose and hemicellulose alongside lignin.\n\n**Why it matters:** A good delignification solvent must not only dissolve lignin; it must do so **more selectively** than it dissolves carbohydrates.\n\n**How (Example):**\nCreate a comparison table:\n- Lignin: target you want near the solvent\n- Cellulose: target you want farther from the solvent\n- Hemicellulose: target you usually want to control or partially preserve depending on process goal\n\nIf the solvent is close to all three, it is probably too aggressive.\nIf it is close to lignin but far from cellulose, it is a better delignification candidate.\n\n## Step 5: Build a selectivity map\n**The Action:** Plot solvents in HSP space and mark regions where lignin is favored over carbohydrates.\n\n**Why it matters:** Selectivity maps show the **process window** where lignin removal can occur with less carbohydrate damage.\n\n**How (Example):**\nIn a 2D projection or 3D plot:\n- mark lignin as the preferred center\n- mark cellulose and hemicellulose positions as exclusion zones\n- identify solvent candidates that lie nearer lignin than carbohydrate references\n\nPractical rule:\n- **Inside lignin-favorable region + far from cellulose** = promising\n- **Near all biomacromolecules** = nonselective and potentially harsh\n\n## Step 6: Interpret each solvent family using the map\n**The Action:** Compare organosolv, IL, and DES candidates in the same framework.\n\n**Why it matters:** Each class shifts the HSP profile differently, so the map helps explain why one system performs better than another.\n\n**How (Example):**\n- **Organosolv:**\n  - Compare ethanol/water ratios\n  - Watch how increasing water shifts the solvent toward stronger polarity and hydrogen bonding\n  - Example: ethanol-rich mixtures may better dissolve lignin fragments, while added water may improve swelling but reduce fragment solubility\n\n- **Ionic liquids:**\n  - Compare imidazolium chloride vs acetate systems\n  - Use HSPs as a screening guide, but note that viscosity and ion-specific effects can shift real behavior\n  - Example: an IL may look favorable by HSP distance but still perform poorly if mass transfer is limited\n\n- **Deep eutectic solvents:**\n  - Compare choline chloride-based DESs at different donor ratios and water contents\n  - Example: acidic DESs may sit closer to lignin in HSP space and support stronger delignification than neutral DESs\n\n## Step 7: Rank candidates using both compatibility and selectivity\n**The Action:** Score solvents using two criteria: closeness to lignin and separation from carbohydrates.\n\n**Why it matters:** A solvent can be a strong lignin solvent but still be a poor delignification solvent if it also attacks cellulose.\n\n**How (Example):**\nUse a simple ranking matrix:\n- **Compatibility score:** based on low `Ra` to lignin\n- **Selectivity score:** based on larger distance from cellulose/hemicellulose than from lignin\n- **Process feasibility check:** recovery, viscosity, cost, and safety\n\nExample outcome:\n1. Candidate A: slightly less powerful but highly selective\n2. Candidate B: very strong solvent but too nonselective\n3. Candidate C: poor compatibility and poor selectivity"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step-by-Step Implementation: Validate, Tune, and Use the Results\n\n## Step 8: Tune formulation before changing the whole process\n**The Action:** Adjust solvent composition, water content, or acid/base component before abandoning a system.\n\n**Why it matters:** Small formulation changes can move a solvent significantly in HSP space.\n\n**How (Example):**\n- Organosolv: test ethanol/water at 90/10, 80/20, 70/30\n- DES: vary choline chloride:donor ratio and water content\n- IL: compare chloride vs acetate anions or add a co-solvent if process-compatible\n\n## Step 9: Validate map predictions with process data\n**The Action:** Compare HSP-based predictions with delignification outcomes from experiments.\n\n**Why it matters:** HSPs are a screening tool, not a complete process model.\n\n**How (Example):**\nTrack the following after each experiment:\n- lignin removal percentage\n- cellulose retention\n- hemicellulose loss\n- lignin molecular weight or condensation level\n- solvent recovery and recyclability\n\nIf the solvent looks good on the map but fails experimentally, check:\n- temperature\n- residence time\n- solids loading\n- viscosity and mass transfer limits\n- feedstock anatomy\n\n## Step 10: Use the map for decision-making\n**The Action:** Turn your screening results into a solvent-selection recommendation.\n\n**Why it matters:** The final choice should balance selectivity, practicality, and downstream handling.\n\n**How (Example):**\nWrite a decision statement like:\n- `Select ethanol/water 80/20 for hardwood delignification because it sits close to lignin, farther from cellulose, and remains recoverable by distillation.`\n- `Select a choline chloride-based DES only if acidity and viscosity remain manageable and lignin selectivity remains high.`\n- `Reject an IL candidate if it dissolves both lignin and cellulose too strongly or if viscosity prevents adequate mass transfer.`\n\n## Final takeaway\nUse HSPs to **screen**, selectivity maps to **compare**, and experimental validation to **confirm**. The best solvent is not just the one that dissolves lignin\u2014it is the one that does so **selectively, reproducibly, and with practical recovery**."
  }

    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
