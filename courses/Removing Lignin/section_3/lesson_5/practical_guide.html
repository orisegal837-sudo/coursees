    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);

      /* Dynamic ambient background */

      background-attachment: fixed;

      LAYOUT & SHELL

      min-height: 100vh;
      display: flex;
      align-items: stretch;

    }

      width: 100%;

      display: flex;

    }

      ========================================

    .topbar {

      align-items: center;

    }

      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      border: 1px solid var(--stroke-soft);

      display: flex;
      flex-direction: column;

      display: flex;

      letter-spacing: 0.1em;
      text-transform: uppercase;

      padding: 4px 12px;

      background: rgba(139, 92, 246, 0.1);

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }

<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nDesign a downstream workflow that does **two things at once** after solvent-based delignification:\n1. **Precipitate lignin efficiently** into a filterable, recoverable solid.\n2. **Recover and clean the solvent** so it can be reused with minimal loss in performance.\n\nYour goal is not just maximum lignin yield. You want a **balanced process** that produces:\n- a lignin product with the right purity and properties,\n- a recyclable solvent stream with stable composition,\n- low contamination, low recondensation, and manageable energy demand.\n\n## Prerequisites\nYou should have access to the following before implementation:\n- **A solvent-based pretreatment system** using one of the following:\n  - organosolv solvents (e.g., ethanol/water, acetone/water)\n  - an ionic liquid system used for biomass dissolution\n  - a deep eutectic solvent (DES) formulation\n- **A precipitation/solid-liquid separation setup**:\n  - stirred reactor or mixing vessel\n  - filter unit, centrifuge, or vacuum filtration setup\n- **A solvent recovery unit appropriate to your system**:\n  - distillation setup for volatile organosolv solvents\n  - drying/washing capability for ionic liquids or DESs\n  - optional membrane, extraction, or phase-separation equipment\n- **Basic analytical tools** to verify performance:\n  - balance for mass recovery\n  - moisture measurement or Karl Fischer titration if available\n  - HPLC/GC or equivalent method for solvent contamination checks\n  - lignin characterization tools if available (ash content, molecular weight, UV-Vis, NMR, or SEC)\n\n## What success looks like\nA successful run gives you:\n- a **solid lignin fraction** that filters well and meets your quality target,\n- a **solvent stream** that can be recycled with minimal loss of dissolving power,\n- a process that avoids excessive energy use and repeated solvent makeup."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Define Your Separation Target and Recovery Strategy\n\n## 1) Identify your solvent class and choose the recovery route\n### The Action\nClassify your system as **organosolv**, **ionic liquid**, or **DES**, then select the primary recovery method before running precipitation.\n\n### Why it matters\nEach solvent family behaves differently. If you use the wrong recovery strategy, you can lose solvent, worsen lignin quality, or create a sticky, unfilterable mixture.\n\n### How (Example)\n- **Organosolv**: plan for **anti-solvent precipitation + distillation** of the alcohol/water phase.\n- **Ionic liquid**: plan for **anti-solvent washing, filtration/centrifugation, and drying** of the IL-rich phase.\n- **DES**: plan for **controlled water adjustment, washing, and cleanup** to preserve DES function.\n\n## 2) Define the lignin product specification\n### The Action\nDecide what \u201cgood lignin\u201d means for your application before precipitation.\n\n### Why it matters\nThe best precipitation conditions differ depending on whether lignin is going into materials, adhesives, fuels, or upgrading.\n\n### How (Example)\nSet target limits such as:\n- ash content below a chosen threshold,\n- low carbohydrate contamination,\n- acceptable residual solvent,\n- desired molecular weight range.\n\nExample: for materials use, prioritize **low ash and controlled particle size**; for upgrading, prioritize **high purity and low carbohydrate carryover**.\n\n## 3) Select the anti-solvent and starting ratio\n### The Action\nChoose the anti-solvent that will reduce lignin solubility most effectively in your system.\n\n### Why it matters\nAnti-solvent choice controls particle size, purity, filtration behavior, and risk of co-precipitating impurities.\n\n### How (Example)\n- Use **water** for many organosolv systems.\n- Use **water or alcohol** for ionic liquid or DES systems when compatible.\n- If acidity is important, test **acidified water** or a buffered aqueous stream.\n\nStart with small screening ratios, such as 1:1, 2:1, and 4:1 anti-solvent to liquor, and compare recovery outcomes."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Run Controlled Lignin Precipitation\n\n## 4) Control the addition rate and mixing intensity\n### The Action\nAdd anti-solvent in a controlled manner while maintaining consistent mixing.\n\n### Why it matters\nFast dumping can create ultra-fine lignin particles that are hard to separate. Controlled addition promotes larger, more filterable aggregates.\n\n### How (Example)\n- Use a metering pump or slow pour into a stirred vessel.\n- Start with moderate agitation, then adjust based on particle formation.\n- If the slurry becomes too fine and cloudy, slow the addition rate.\n\nPractical template:\n- Add anti-solvent over 10\u201330 minutes for a lab batch.\n- Keep mixing sufficient to avoid local overconcentration but not so aggressive that particles break apart.\n\n## 5) Tune temperature and pH to favor precipitation\n### The Action\nAdjust temperature and pH to reduce lignin solubility without promoting re-dissolution.\n\n### Why it matters\nSolubility, viscosity, and aggregation behavior all depend on these conditions.\n\n### How (Example)\n- Test precipitation at room temperature and at a cooler setpoint if solubility is still high.\n- If your system is acidic, verify whether a mild pH shift improves particle formation.\n- Avoid unnecessary harsh conditions that can increase lignin condensation.\n\n## 6) Minimize lignin recondensation during and after release\n### The Action\nSeparate lignin promptly once it precipitates and avoid holding it too long in reactive liquor.\n\n### Why it matters\nRecondensation lowers product quality and can make lignin less useful for downstream applications.\n\n### How (Example)\n- Quench the system quickly with anti-solvent.\n- Separate solids by filtration or centrifugation as soon as flocculation is complete.\n- Wash the solid promptly to remove reactive residues.\n\nExample workflow:\n1. Add anti-solvent slowly.\n2. Mix until visible precipitation stabilizes.\n3. Stop agitation.\n4. Separate solids immediately.\n5. Wash with fresh anti-solvent or compatible solvent.\n\n## 7) Wash and dry the lignin product\n### The Action\nRemove residual solvent, sugars, salts, and fine impurities from the solid lignin.\n\n### Why it matters\nA washed product is more usable, more stable, and more reproducible across batches.\n\n### How (Example)\n- Wash with a compatible low-solubility liquid.\n- Repeat until the wash liquid is clearer and lower in dissolved solids.\n- Dry under reduced pressure or controlled temperature to avoid thermal degradation."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Recover and Reuse the Solvent Stream\n\n## 8) Clean the mother liquor before recycle\n### The Action\nRemove suspended solids, dissolved contaminants, and excess water before reusing the solvent.\n\n### Why it matters\nContaminated solvent loses dissolving power and can cause poor fractionation in the next cycle.\n\n### How (Example)\n- Use filtration or centrifugation to remove fine lignin particles.\n- Apply phase separation if the mixture splits into layers.\n- Use membranes, washing, or polishing steps if dissolved impurities remain.\n\n## 9) Recover solvent based on solvent type\n### The Action\nMatch the cleanup method to the solvent system.\n\n### Why it matters\nThe solvent class determines whether evaporation, drying, or nonvolatile cleanup is realistic.\n\n### How (Example)\n- **Organosolv**: distill alcohol/water blends and reuse the recovered fraction.\n- **Ionic liquid**: wash out lignin, remove water carefully, and restore the right composition.\n- **DES**: reduce water and impurity buildup while preserving the hydrogen-bond network.\n\n## 10) Track solvent composition drift over reuse cycles\n### The Action\nMeasure solvent quality after each cycle and correct deviations.\n\n### Why it matters\nEven good recovery systems accumulate water, salts, sugars, and trace lignin, which changes performance over time.\n\n### How (Example)\nCreate a recycle log with:\n- solvent composition,\n- moisture content,\n- contamination level,\n- lignin yield from the next batch,\n- any needed make-up solvent or rebalancing step.\n\nExample rule:\n- If water content rises above the process window, dry or reformulate before reuse.\n- If lignin yield drops across cycles, check for solvent contamination or composition drift.\n\n## 11) Optimize for both economics and product quality\n### The Action\nChoose the simplest recovery setup that still gives stable lignin quality and solvent reuse.\n\n### Why it matters\nThe best process is not the one with the highest single-pass recovery; it is the one with the best overall balance of yield, purity, energy use, and recycle stability.\n\n### How (Example)\nCompare options using a simple scorecard:\n- lignin recovery yield,\n- filtrability,\n- solvent recycle purity,\n- energy requirement,\n- number of recycle cycles before performance drops.\n\n## Final implementation rule\nDesign precipitation and solvent recovery as **one coupled process**. If you improve lignin yield but make the solvent unreusable, the overall process fails. If you recover solvent well but produce impure, hard-to-filter lignin, the process also fails. The practical target is a stable loop: **precipitate cleanly, separate quickly, recover solvent, and recycle with minimal drift**."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
