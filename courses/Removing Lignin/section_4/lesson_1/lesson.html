<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "Oxidative delignification removes lignin by chemically converting aromatic and side-chain structures into more hydrophilic, more fragmented products that can be dissolved, extracted, or further degraded. Unlike purely alkaline cleavage, oxidation changes lignin\u2019s functional groups and often opens new pathways for bond cleavage. The main reagents in this lesson\u2014oxygen (O2), ozone (O3), hydrogen peroxide (H2O2), and peracids\u2014differ in oxidizing strength, selectivity, and operating conditions, but they share a common goal: make lignin less recalcitrant without excessive carbohydrate damage.\n\nA useful way to think about these processes is by target site. Lignin contains phenolic and non-phenolic aromatic units, benzylic alcohols, ether linkages such as \u03b2-O-4, and conjugated side-chain structures. Oxidants often react first at electron-rich sites: phenolic rings, activated side chains, and double bonds. Early oxidation can create carbonyls, quinones, aldehydes, and carboxylic acids; these functional changes increase polarity and can weaken adjacent bonds. Once lignin is chemically \u201cactivated,\u201d fragmentation, solubilization, and sometimes recondensation may follow depending on conditions."
  },
  {
    "id": "lesson_page_2",
    "content": "Oxygen delignification is the most established industrial oxidative stage. In alkaline media, O2 does not usually attack lignin directly as a simple reagent; instead, it is activated through radical and electron-transfer pathways. Phenolate ions form readily under alkali, and these can transfer electrons to oxygen, generating radical intermediates such as superoxide and peroxy species. These intermediates promote oxidation of lignin side chains, cleavage of susceptible bonds, and conversion of phenolic groups to more oxidized structures. The process is typically selective because it is done in a controlled pH and temperature window that favors lignin oxidation over extensive cellulose degradation.\n\nA key mechanistic idea is that oxygen delignification mainly removes lignin that is still accessible and reactive after pulping. It tends to oxidize residual lignin in pulp rather than fully depolymerize all lignin in the biomass. This is why it is often viewed as a bleaching-preparation step. Selectivity depends on maintaining enough alkalinity to activate lignin, but not so much severity that carbohydrate peeling, chain scission, or viscosity loss becomes excessive. Mass transfer also matters: if oxygen cannot penetrate pulp fibers or chips effectively, delignification becomes uneven.\n\nCompared with O2, ozone is much more aggressive and highly electrophilic. O3 reacts very rapidly with electron-rich sites, especially carbon\u2013carbon double bonds, phenolic structures, and other activated aromatic moieties. In lignin, ozone can directly oxidize aromatic rings and side chains, leading to ring opening, formation of muconic-acid-like intermediates, and rapid fragmentation into smaller oxygenated compounds. Because ozone is so reactive, it can delignify quickly, but it also poses a higher risk of carbohydrate oxidation if conditions are not tightly controlled. For that reason, ozonation is often performed at low consistency, low temperature, and short residence time to improve selectivity."
  },
  {
    "id": "lesson_page_3",
    "content": "Hydrogen peroxide is a versatile oxidant used in alkaline peroxide bleaching and related oxidative pretreatments. On its own, H2O2 is relatively mild, but under alkaline conditions it forms the hydroperoxide anion (HOO\u2212), which is more reactive. In the presence of metal ions or catalysts, peroxide can generate radicals such as hydroxyl radicals and perhydroxyl radicals. These species can oxidize lignin phenolics, cleave side chains, and increase lignin hydrophilicity. In practice, alkaline hydrogen peroxide is often used when brightness improvement and moderate delignification are desired, especially when preserving carbohydrate quality is important.\n\nThe mechanism of peroxide-based delignification is strongly affected by catalyst and stabilizer chemistry. Trace metals may decompose H2O2 non-productively, lowering efficiency and creating uncontrolled radical chemistry. Chelation, pH control, and temperature management are therefore important. Peroxide can be more selective than ozone when carefully managed, but it may still cause carbohydrate oxidation and some cellulose depolymerization if severity is too high. The practical benefit is that peroxide systems can often operate under atmospheric or moderate-pressure conditions and fit well into bleaching or mild pretreatment trains.\n\nPeracids, such as peracetic acid, are organic peroxides with strong oxidizing power. They are especially effective at oxidizing lignin because they can transfer oxygen to aromatic and aliphatic structures and can also cleave certain ether linkages under acidic or near-neutral conditions depending on formulation. Peracids often delignify by attacking lignin\u2019s electron-rich sites and generating oxidized fragments that are easier to separate. Compared with alkaline peroxide, peracids can be more effective on some feedstocks and may work well for fractionation, but they can also hydrolyze or oxidize carbohydrates if conditions are too severe.\n\nA major distinction among these oxidants is how they balance selectivity and severity. O2 is relatively economical and scalable but usually slower and less aggressive. O3 is extremely reactive but harder to handle safely and often less forgiving. H2O2 is flexible and cleaner to manage but frequently requires activation and careful control. Peracids are powerful and chemically versatile but may introduce corrosion, safety, and recovery concerns. In all cases, delignification performance depends not only on reagent identity but also on pH, temperature, concentration, residence time, solids loading, and fiber accessibility."
  },
  {
    "id": "lesson_page_4",
    "content": "In summary, oxidative delignification works by converting lignin into more oxidized, fragmented, and extractable forms. Oxygen-based systems rely on alkaline activation and radical pathways; ozone attacks very rapidly and can ring-open lignin structures; hydrogen peroxide operates through peroxide and radical chemistry, often under alkaline and catalytic conditions; and peracids provide strong oxygen transfer and oxidative cleavage. Across all four, the central design challenge is the same: remove enough lignin to improve downstream processing while preserving carbohydrates, pulp strength, and product value.\n\nFor process design, the best oxidant is not simply the strongest one. It is the one that matches feedstock anatomy, accessibility, desired lignin removal, carbohydrate tolerance, and downstream integration. That is why oxidative delignification is usually chosen as part of a broader pretreatment or bleaching strategy rather than as an isolated reaction."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
