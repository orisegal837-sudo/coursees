    */

      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);

      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));

      font-family: var(--font-sans);
      background-color: var(--bg-base);

        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

      LAYOUT & SHELL
      ========================================
    */

      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

      align-items: center;

    }

      gap: 8px;
      padding: 6px 14px;

      background: rgba(255, 255, 255, 0.03);

      font-weight: 500;

      -webkit-background-clip: text;
      background-clip: text;

      ========================================

    }

      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);

      display: flex;

      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;

    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nImplement an oxidative delignification strategy that removes lignin while minimizing carbohydrate loss. By the end, you should be able to:\n- Choose between **O2, O3, H2O2, and peracids** based on feedstock and process goals.\n- Set operating conditions that favor **lignin oxidation over cellulose damage**.\n- Predict which lignin sites will react first and what products to expect.\n- Integrate oxidation as a **pretreatment or bleaching stage** rather than treating it as a standalone cleanup step.\n\n## Technical prerequisites\nYou need access to:\n- A **pulping or biomass pretreatment setup** with temperature and pH control.\n- A **pressurized oxygen reactor** or oxygen-delignification vessel for O2 trials.\n- An **ozonation system** with ozone generator, gas-liquid contactor, and off-gas destruction unit.\n- **Hydrogen peroxide (H2O2)** dosing capability and, ideally, chelating agents for metal control.\n- **Peracetic acid or another peracid supply** with corrosion-compatible materials.\n- Basic analytical tools:\n  - **Kappa number** or equivalent lignin-content measurement\n  - **Viscosity** or DP testing for carbohydrate damage\n  - **Brightness/whiteness** if bleaching is a target\n  - **pH meter, temperature probes, and solids-content measurement**\n\n## What you should define before starting\n1. **Feedstock type**: hardwood, softwood, agricultural residue, or kraft pulp.\n2. **Process target**: partial delignification, bleaching preparation, or fractionation.\n3. **Carbohydrate tolerance**: how much viscosity or yield loss is acceptable.\n4. **Safety limits**: pressure rating, ozone handling, oxidant compatibility, and corrosion constraints.\n\n## Example target statement\n- *\u201cReduce residual lignin by 30\u201350% in oxygen stage while keeping viscosity loss below the plant\u2019s threshold.\u201d*"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Start with Oxygen Delignification\n\n## Step 1: Activate lignin under alkaline conditions\n**Action:** Raise pH to the alkaline range needed to form phenolate ions before introducing oxygen.\n\n**Why:** Phenolate formation makes lignin much more electron-rich and easier to oxidize.\n\n**How (Example):**\n- Adjust pulp slurry to an alkaline pH appropriate for the plant\u2019s oxygen stage.\n- Heat to the operating window used in your line.\n- Then introduce oxygen under pressure with good mixing.\n\n## Step 2: Control oxygen mass transfer\n**Action:** Ensure oxygen reaches fiber surfaces and chip interiors evenly.\n\n**Why:** Oxygen delignification is limited by access; poor transfer causes uneven reaction and poor selectivity.\n\n**How (Example):**\n- Use high-shear mixing or effective reactor circulation.\n- Keep consistency within the recommended range for your equipment.\n- Avoid dead zones in chip beds or pulp plugs.\n\n## Step 3: Monitor selective lignin oxidation\n**Action:** Track lignin removal and carbohydrate preservation during the run.\n\n**Why:** O2 is economical and scalable, but severity can quickly reduce viscosity if pushed too far.\n\n**How (Example):**\n- Sample at intervals and measure kappa number.\n- Check viscosity before and after the stage.\n- Stop increasing severity once kappa reduction plateaus or viscosity starts dropping too quickly.\n\n## Step 4: Use oxygen as a preparation stage\n**Action:** Treat oxygen delignification as a front-end step before bleaching or downstream oxidation.\n\n**Why:** Oxygen typically removes accessible residual lignin rather than fully depolymerizing all lignin.\n\n**How (Example):**\n- Place O2 after pulping and before peroxide or chlorine-free bleaching sequences.\n- Use it to lower the oxidant demand of later stages."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Add Higher-Reactivity Oxidants Strategically\n\n## Step 5: Apply ozone only when rapid, strong oxidation is needed\n**Action:** Use ozone for fast attack on electron-rich aromatic and double-bonded lignin structures.\n\n**Why:** O3 can ring-open lignin and fragment it quickly, but it can also harm carbohydrates if overapplied.\n\n**How (Example):**\n- Run ozonation at low consistency.\n- Keep temperature low.\n- Use short residence time and precise ozone dosage.\n- Install off-gas destruction because unused ozone is hazardous.\n\n## Step 6: Use hydrogen peroxide for moderate, controlled oxidation\n**Action:** Run alkaline peroxide with pH, metal control, and temperature control.\n\n**Why:** H2O2 is milder and often more selective than ozone, especially when you want brightness gain with limited cellulose damage.\n\n**How (Example):**\n- Raise pH to activate H2O2 as hydroperoxide ion.\n- Add chelants to suppress trace-metal decomposition.\n- Maintain a moderate temperature and avoid excess peroxide charge.\n- Track brightness, viscosity, and residual peroxide.\n\n## Step 7: Use peracids when strong oxygen transfer is needed in fractionation\n**Action:** Apply peracids for powerful oxidative cleavage of lignin, especially on feedstocks that respond well to acidic or near-neutral oxidative fractionation.\n\n**Why:** Peracids can oxidize lignin effectively and improve separation, but they can also attack carbohydrates and create corrosion concerns.\n\n**How (Example):**\n- Verify all wetted materials are corrosion-compatible.\n- Limit severity with controlled dose, time, and temperature.\n- Wash and neutralize thoroughly after treatment.\n- Evaluate both lignin removal and carbohydrate retention."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Optimization, Troubleshooting, and Process Integration\n\n## Step 8: Match the oxidant to the feedstock and goal\n**Action:** Choose the oxidant based on accessibility, lignin reactivity, and product requirements.\n\n**Why:** The best reagent is not the strongest one; it is the one that gives the needed delignification with the least collateral damage.\n\n**How (Example):**\n- Use **O2** for scalable, cost-effective partial delignification.\n- Use **O3** for aggressive treatment when rapid lignin opening is worth the higher risk.\n- Use **H2O2** when you need cleaner handling and moderate selectivity.\n- Use **peracids** when strong oxidation and fractionation are the priority.\n\n## Step 9: Tune process variables one at a time\n**Action:** Systematically adjust pH, temperature, concentration, residence time, solids loading, and accessibility.\n\n**Why:** Oxidative delignification performance is governed by conditions as much as reagent identity.\n\n**How (Example):**\n- Run a small design-of-experiments matrix.\n- Hold all variables constant except one.\n- Compare kappa reduction, yield, viscosity, and brightness.\n\n## Step 10: Watch for over-oxidation and recondensation\n**Action:** Stop or soften conditions when lignin removal slows but carbohydrate damage increases.\n\n**Why:** Excess severity can create low-value byproducts, chain scission, or recondensed lignin structures.\n\n**How (Example):**\n- If viscosity drops faster than kappa number, reduce severity.\n- If brightness gains stall, check oxidant depletion or mass transfer limits.\n- If darkening or abnormal insoluble residues appear, suspect recondensation or overoxidation.\n\n## Step 11: Integrate the oxidant into the full process train\n**Action:** Place oxidative delignification where it reduces downstream load without creating unnecessary cost or complexity.\n\n**Why:** Oxidation is most effective when it supports later bleaching, extraction, or fractionation steps.\n\n**How (Example):**\n- Use O2 before peroxide bleaching.\n- Use peroxide in a brightening stage after partial lignin removal.\n- Use ozone only in a carefully engineered, short-contact unit.\n- Use peracids when the downstream process can recover value from selective lignin removal.\n\n## Practical decision rule\n- **Need cheap, scalable, moderate lignin removal?** Start with **O2**.\n- **Need fast, aggressive lignin attack?** Consider **O3** with tight control.\n- **Need mild-to-moderate bleaching and good carbohydrate preservation?** Use **H2O2**.\n- **Need strong oxidation for fractionation or specialized pretreatment?** Evaluate **peracids**.\n\n## Final checkpoint\nA successful oxidative delignification process should show:\n- Lower lignin content or kappa number\n- Acceptable carbohydrate retention\n- Controlled reactor behavior and safe oxidant handling\n- Clear compatibility with downstream bleaching or conversion steps"
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
