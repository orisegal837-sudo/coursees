  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nSet up and run a **selective peroxide or peracid delignification step** that:\n- **Reduces lignin content** or weakens lignin structure\n- **Improves brightness, digestibility, or extractability**\n- **Minimizes carbohydrate damage** such as cellulose depolymerization or hemicellulose loss\n- **Uses pH, activators, and metal control** to keep oxidation efficient and selective\n\n## Technical Prerequisites\nBefore starting, make sure you have:\n1. **A peroxide source**: hydrogen peroxide solution suitable for your process scale.\n2. **A peracid source** if using acid oxidation: e.g., performic acid or peracetic acid prepared from approved reagents.\n3. **pH measurement and adjustment tools**:\n   - Calibrated pH meter\n   - Alkali/acid dosing system\n4. **Temperature-controlled reactor or mixer** capable of maintaining a fixed reaction temperature.\n5. **Agitation or mixing system** that provides uniform liquor penetration.\n6. **Metal management materials**:\n   - Chelating agent compatible with your process\n   - Optional deionized water for lab/prep work\n7. **Biomass or pulp sample** with known starting composition or baseline quality.\n8. **Analytical methods** for tracking results:\n   - Kappa number or lignin-related assay\n   - Brightness or color measurement\n   - Viscosity or degree of polymerization proxy\n   - Sugar yield or carbohydrate retention assay\n\n## What Success Looks Like\nYou will know the step is working when:\n- Lignin-related metrics improve\n- Oxidant consumption is efficient\n- Carbohydrate loss remains low\n- Product quality improves in the next process stage\n\n## Example Target\nFor a pulp bleaching or pretreatment trial, define a goal such as:\n- **Reduce residual lignin by 15\u201325%**\n- **Maintain most of the cellulose viscosity**\n- **Avoid a large drop in sugar yield**"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Build the Oxidation Window\n\n## 1) Characterize the feedstock first\n**Action:** Measure baseline lignin, moisture, pH buffering behavior, and any known metal contamination.\n\n**Why:** You cannot choose the right oxidant dose or pH window without knowing how reactive and contaminated the material is.\n\n**How (Example):**\n- Test a pulp sample for kappa number and viscosity.\n- Run a simple ash or metal screen if available.\n- Record initial pH after slurry preparation.\n\n## 2) Choose the oxidant system\n**Action:** Select peroxide for alkaline oxidative treatment or a peracid for acidic/near-neutral oxidation.\n\n**Why:** Different oxidants perform best in different pH ranges and have different selectivity profiles.\n\n**How (Example):**\n- Use **alkaline peroxide** when you want controlled lignin oxidation under basic conditions.\n- Use **peracid** when you need strong oxygen-transfer oxidation under milder pH.\n\n## 3) Establish the pH operating window\n**Action:** Set a target pH range and keep it stable during the reaction.\n\n**Why:** pH controls peroxide speciation, reactivity, and decomposition rate.\n\n**How (Example):**\n- For peroxide-based systems, test a small pH range rather than a single point.\n- Compare product quality at slightly lower, target, and slightly higher pH to find the best compromise between reactivity and stability.\n\n## 4) Add oxidant in a controlled way\n**Action:** Dose peroxide or peracid gradually or in a staged addition instead of dumping it all at once.\n\n**Why:** Controlled addition reduces local over-oxidation and improves contact with lignin sites.\n\n**How (Example):**\n- Add peroxide in two or three increments during mixing.\n- Monitor residual oxidant to avoid excessive free oxidant late in the run."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step-by-Step Implementation: Improve Selectivity and Protect Carbohydrates\n\n## 5) Add activators only after checking compatibility\n**Action:** Use catalysts, redox mediators, or other activators only if they improve useful oxidation without sharply increasing radical damage.\n\n**Why:** Activators can increase lignin oxidation, but they can also accelerate unselective peroxide decomposition.\n\n**How (Example):**\n- Trial one activator at a time in bench tests.\n- Compare peroxide consumption, brightness gain, and viscosity loss before scaling up.\n\n## 6) Control metals aggressively\n**Action:** Reduce iron, copper, manganese, and other trace metals using chelation or feedstock washing where appropriate.\n\n**Why:** Metal ions catalyze peroxide breakdown into hydroxyl radicals, which attack both lignin and carbohydrates.\n\n**How (Example):**\n- Pre-wash biomass with clean process water if feasible.\n- Add a chelating agent before peroxide addition to bind trace metals.\n\n## 7) Tune severity to the minimum effective level\n**Action:** Adjust temperature, residence time, solids loading, and oxidant dose to the lowest level that still meets the lignin-removal target.\n\n**Why:** Higher severity often increases carbohydrate loss faster than lignin benefit.\n\n**How (Example):**\n- If brightness improves but viscosity drops too much, lower temperature or shorten residence time.\n- If delignification is weak, first improve pH control or metal management before simply increasing dose.\n\n## 8) Improve penetration and mixing\n**Action:** Make sure oxidant reaches the interior of the biomass instead of reacting only at the surface.\n\n**Why:** Poor mass transfer causes uneven treatment and can waste oxidant.\n\n**How (Example):**\n- Adjust solids loading to allow better liquor contact.\n- Reduce particle size if the substrate is too coarse.\n- Use mixing that keeps the slurry uniform without excessive foaming or oxidant loss.\n\n## 9) Track both lignin removal and carbohydrate integrity\n**Action:** Monitor process endpoints together, not one at a time.\n\n**Why:** A process that maximizes bleaching can still fail if it destroys cellulose or sugar yield.\n\n**How (Example):**\nUse a simple scorecard:\n- Kappa number or lignin assay\n- Brightness or color\n- Viscosity or polymer length proxy\n- Yield or sugar recovery\n\n## 10) Use the results to tighten the operating window\n**Action:** Compare runs and keep only the conditions that deliver the best balance of oxidation and preservation.\n\n**Why:** Selective delignification is a balancing act, not a maximum-oxidation exercise.\n\n**How (Example):**\n- If metal removal improves viscosity retention, keep that pretreatment.\n- If higher pH increases brightness but drops yield, move back toward the safer range."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Summary and Optimization Loop\n\n## A simple optimization loop\n1. **Characterize the feedstock**\n2. **Choose peroxide or peracid based on the required pH range**\n3. **Set a stable pH window**\n4. **Control metal ions**\n5. **Test activators cautiously**\n6. **Adjust dose, time, temperature, and mixing**\n7. **Measure lignin removal and carbohydrate retention together**\n8. **Keep the condition set that gives the best tradeoff**\n\n## Decision rules you can apply immediately\n- **If peroxide decomposes too fast:** lower metal contamination, reduce pH extremes, or add stabilization/chelation.\n- **If lignin removal is too weak:** improve pH control, use a compatible activator, or increase contact efficiency before raising dose.\n- **If carbohydrates are being damaged:** reduce severity, shorten exposure, and check for radical-generating metals.\n- **If treatment is uneven:** improve impregnation, mixing, and particle-size uniformity.\n\n## Final principle\nThe best peroxide or peracid delignification process is the one that produces **useful lignin oxidation with minimal carbohydrate damage**. Focus on:\n- **pH control**\n- **metal control**\n- **activator selection**\n- **mass transfer and exposure control**\n- **balanced performance metrics**\n\n## Example operating mindset\nInstead of asking, \u201cHow do I maximize oxidation?\u201d ask:\n- \u201cHow do I get just enough oxidation to weaken lignin while keeping cellulose and hemicellulose intact?\u201d\n\nThat question leads to a more selective, efficient, and scalable process."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
