  <style>
    /* ========================================
      PREMIUM THEME & TYPOGRAPHY VARIABLES
      ========================================
    */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --stroke-strong: rgba(255, 255, 255, 0.15);
      
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --text-heading: #ffffff;
      
      --accent-primary: #8b5cf6;
      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
      
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      
      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {
      padding: clamp(20px, 4vw, 48px) 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========================================
      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

    /* ========================================
      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .card-h {
      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;
    }

    /* ========================================
      NAVIGATION BOTTOM BAR
      ========================================
    */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      border-top: 1px solid var(--stroke-soft);
      background: rgba(5, 5, 10, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: var(--bg-surface);
      color: var(--text-heading);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .btn:hover:not(:disabled) {
      background: var(--bg-surface-hover);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: var(--accent-gradient);
      border: none;
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #9f7aea, #60a5fa);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

      ENHANCED MARKDOWN TYPOGRAPHY
      ========================================
    */
    .markdown-body {
      max-width: 100%;
      margin: 0 auto;
      font-size: 17px;
      line-height: 1.7;

      padding-bottom: 0.3em;
      border-bottom: 1px solid var(--stroke-soft);

    }

      margin-top: 0;
      margin-bottom: 1.25em;
    }

    .markdown-body ul, 
    .markdown-body ol {
      margin-top: 0;
      margin-bottom: 1.5em;
      padding-left: 1.5em;
    }

    .markdown-body li {
      margin-bottom: 0.5em;
    }

    .markdown-body li > ul, 
    .markdown-body li > ol {
      margin-top: 0.5em;
    }

    .markdown-body strong {
      color: var(--text-heading);
      font-weight: 600;
    }

    .markdown-body a {
      color: var(--accent-secondary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .markdown-body a:hover {
      border-bottom-color: var(--accent-secondary);
    }

    .markdown-body code {
      font-family: var(--font-mono);
      background: rgba(255, 255, 255, 0.08);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;
      color: #93c5fd; /* Light blue tint for inline code */
    }

    .markdown-body pre {
      background: #0d1117;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-md);
      padding: 1.25em;
      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);
      margin: 3em 0;
    }

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .task-card:hover {
      border-color: var(--stroke-strong);
      transform: translateY(-2px);
    }
    .task-card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25em;
      color: var(--accent-secondary);
    }
    .objective-card {
      border-left: 4px solid var(--accent-primary);
    }
    .instructions-list {
      padding-left: 20px;
    }
    .instructions-list li {
      margin-bottom: 12px;
    }
    .criteria-checklist {
      list-style: none;
      padding-left: 0;
    }
    .criteria-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .criteria-checklist li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* KaTeX overrides for dark mode */
    .katex {
      color: var(--text-heading);
      font-size: 1.1em;
    }

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }
  </style>

  {
    "id": "guide_page_1",
    "content": "## Page 1 \u2014 Objective & Prerequisites\n\n### Objective\nBy the end of this workflow, you will be able to **design, monitor, and compare pretreatment conditions that promote plant cell-wall swelling** so you can improve biomass accessibility, chemical penetration, and delignification uniformity.\n\n### What you should be able to do\n- Identify whether a pretreatment is likely to be **transport-limited** or **reaction-uniform**.\n- Choose alkali or organosolv conditions that encourage **cell-wall expansion**.\n- Detect when swelling is helping impregnation versus when it is causing **carbohydrate damage** or poor chip-core penetration.\n- Compare two pretreatment routes using practical indicators such as **liquor uptake, delignification depth, and residue integrity**.\n\n### Technical prerequisites\n- Access to a **biomass pretreatment reactor** or sealed laboratory digestion vessel capable of controlled temperature and residence time.\n- A source of **alkali liquor** such as NaOH or KOH for alkaline pretreatment trials.\n- A source of **organosolv solvent system** such as ethanol-water, acetone-water, or another validated organosolv mixture.\n- **Moisture and solids measurement tools** for biomass loading and liquor-to-solid ratio control.\n- A way to assess swelling/accessibility, such as:\n  - optical microscopy or cross-section imaging,\n  - chip thickness or dimensional measurements,\n  - liquid uptake/impregnation tests,\n  - residual lignin or delignification analysis.\n- Optional but useful: **pressure/temperature control logging** and a **sampling protocol** for gradient analysis across chip outer layers and core.\n\n### How to frame the task\nTreat swelling as a **process variable**, not just an observation. Your goal is to create conditions where the liquid enters the wall, the wall expands, and dissolved fragments can escape without over-degrading carbohydrates."
  },
  {
    "id": "guide_page_2",
    "content": "## Page 2 \u2014 Implement Alkali Swelling in a Controlled Way\n\n### Step 1: Prepare biomass for impregnation\n**Action:** Size-reduce or classify biomass to a consistent chip or particle geometry, then measure moisture content and load the reactor with a known solids fraction.\n\n**Why:** Swelling starts with penetration. If biomass is inconsistent or too dry/too wet, you get uneven liquor access and misleading results.\n\n**How (Example):**\n- Use chips in a narrow thickness range, such as 2\u20135 mm for screening.\n- Record initial dry mass and moisture content.\n- Charge the reactor with a fixed liquor-to-solid ratio, for example 8:1 to 15:1 depending on your setup.\n\n### Step 2: Introduce hydroxide-rich liquor and ensure deep penetration\n**Action:** Add alkali liquor and hold the biomass under conditions that favor full impregnation before severe heating begins.\n\n**Why:** Alkali swelling depends on hydroxide reaching internal wall structures, not just wetting the surface.\n\n**How (Example):**\n- Start with a moderate NaOH concentration appropriate to your feedstock.\n- Use a pre-impregnation soak at lower temperature before ramping up to the pretreatment temperature.\n- If possible, compare a short soak versus no soak to see how core penetration changes.\n\n### Step 3: Use swelling to drive matrix loosening\n**Action:** Maintain conditions that promote deprotonation, hydration, and removal of acetyl/bridge structures without excessive severity.\n\n**Why:** This is the point where fixed negative charge and osmotic water uptake expand the wall and open pores.\n\n**How (Example):**\n- Run a small condition matrix:\n  1. low alkali / short time,\n  2. medium alkali / medium time,\n  3. higher alkali / short time.\n- Compare which condition gives the best balance of delignification and structural preservation.\n\n### Step 4: Check whether swelling is uniform\n**Action:** Examine outer and inner chip regions for differences in color, softness, fragmentation, or residual lignin.\n\n**Why:** Alkali swelling can be strong at the surface but weak in the core if impregnation is incomplete.\n\n**How (Example):**\n- Split representative chips after treatment.\n- Compare outer shell versus center using microscopy or visual staining.\n- Look for a gradient: strongly delignified edge but dark, under-treated core indicates poor mass transfer.\n\n### Step 5: Watch for over-severity\n**Action:** Measure carbohydrate preservation indicators such as pulp yield, viscosity, or reducing-sugar loss.\n\n**Why:** Too much swelling or too much alkali can damage cellulose/hemicellulose and reduce product quality.\n\n**How (Example):**\n- Compare yield and viscosity across conditions.\n- If delignification increases but viscosity drops sharply, reduce severity or shorten residence time."
  },
  {
    "id": "guide_page_3",
    "content": "## Page 3 \u2014 Implement Organosolv Swelling and Compare It to Alkali\n\n### Step 1: Select a solvent composition that promotes wall relaxation\n**Action:** Choose an organosolv mixture with a controlled water fraction and run small solvent-composition trials.\n\n**Why:** Solvent polarity and hydrogen-bonding behavior determine whether lignin\u2013carbohydrate interactions weaken enough for the wall to expand.\n\n**How (Example):**\n- Test 2\u20133 solvent blends, such as ethanol-water at different water contents.\n- Hold biomass loading and temperature constant while varying composition.\n- Compare liquor uptake and residue softness after treatment.\n\n### Step 2: Balance water content carefully\n**Action:** Adjust the water fraction until swelling and lignin solubility are both supported.\n\n**Why:** Too little water can limit ionization and swelling; too much water can reduce lignin solubility and fractionation efficiency.\n\n**How (Example):**\n- Run one condition with lower water content and one with higher water content.\n- Use the same residence time and temperature.\n- Select the condition that gives the best combination of delignification and accessible solids recovery.\n\n### Step 3: Control temperature and residence time to avoid recondensation\n**Action:** Use the minimum severity that still achieves good lignin mobilization and wall expansion.\n\n**Why:** Organosolv swelling improves when lignin becomes mobile, but overly harsh conditions can cause lignin recondensation or carbohydrate loss.\n\n**How (Example):**\n- Compare a short high-temperature run with a longer moderate-temperature run.\n- Evaluate which condition gives cleaner lignin extraction and less carbohydrate degradation.\n\n### Step 4: Compare the swelling mechanism to alkali pretreatment\n**Action:** Build a side-by-side comparison of alkali and organosolv results using the same feedstock.\n\n**Why:** The two routes reduce mass-transfer resistance differently, so direct comparison helps you choose the best route for your biomass and product goal.\n\n**How (Example):**\nCreate a simple scorecard with columns for:\n- liquor penetration,\n- delignification uniformity,\n- lignin removal,\n- carbohydrate retention,\n- evidence of core under-treatment,\n- overall accessibility improvement.\n\n### Step 5: Use the comparison to choose the process\n**Action:** Select the pretreatment that gives the best access improvement at the lowest quality loss.\n\n**Why:** The best swelling strategy is not the most aggressive one; it is the one that improves transport without unnecessary degradation.\n\n**How (Example):**\n- Choose alkali if you need strong charge-driven hydration and robust delignification.\n- Choose organosolv if you need solvent-mediated lignin extraction and a cleaner fractionation route.\n- If both work, select the one with the better balance of yield, uniformity, and downstream handling."
  },
  {
    "id": "guide_page_4",
    "content": "## Page 4 \u2014 Practical Decision Rules and Troubleshooting\n\n### Decision rule 1: If the surface looks treated but the core remains dense, increase impregnation quality first\n**Action:** Improve soaking, mixing, particle size, or liquor-to-solid contact before increasing severity.\n\n**Why:** Poor penetration creates false negatives where chemistry looks weak but the real problem is mass transfer.\n\n**How (Example):**\n- Add a pre-soak step.\n- Reduce chip thickness.\n- Increase agitation or vacuum impregnation if available.\n\n### Decision rule 2: If delignification improves but carbohydrates collapse, back off severity\n**Action:** Lower alkali concentration, shorten time, or reduce temperature.\n\n**Why:** Swelling should improve accessibility, not destroy the polysaccharide scaffold.\n\n**How (Example):**\n- Compare current conditions against a milder run.\n- Keep the condition that preserves yield while still improving accessibility.\n\n### Decision rule 3: If organosolv extraction is weak, tune solvent composition before increasing temperature\n**Action:** Adjust the solvent-water balance first.\n\n**Why:** Solvent chemistry often controls swelling and lignin solubility more effectively than brute-force heating.\n\n**How (Example):**\n- Increase or decrease water fraction in small increments.\n- Re-test lignin removal and residue structure.\n\n### Final implementation checklist\n- [ ] Biomass geometry and moisture are controlled.\n- [ ] Liquor penetration is verified.\n- [ ] Swelling is evaluated in both surface and core regions.\n- [ ] Delignification uniformity is measured.\n- [ ] Carbohydrate loss is checked.\n- [ ] Alkali and organosolv results are compared on the same feedstock.\n\n### Bottom line\nUse swelling as your operational signal of improved accessibility: **more effective impregnation, lower internal transport resistance, and more uniform delignification**. The best pretreatment is the one that expands the wall enough to open access while preserving the structural carbohydrates you need for downstream processing."

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
