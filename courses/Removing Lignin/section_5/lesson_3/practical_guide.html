  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nUse Hansen Solubility Parameters (HSP) to **screen and rank solvents** for biomass pretreatment so you can:\n- **predict which solvents will swell lignin most strongly**,\n- **favor lignin accessibility over carbohydrate damage**, and\n- **design a controlled delignification workflow** before doing expensive experiments.\n\n## What you need before starting\n### Technical prerequisites\n- **A solvent-property source** with HSP values, such as a solvent database, published HSP tables, or an HSP calculation tool.\n- **A way to calculate Ra distance** (spreadsheet, Python, or an HSP software package).\n- **A candidate-solvent list** relevant to biomass pretreatment, such as:\n  - organosolv solvents,\n  - ionic liquids,\n  - deep eutectic solvents (DES),\n  - water\u2013organic mixtures.\n- **Basic biomass characterization data** for your feedstock, ideally:\n  - lignin content,\n  - S/G ratio if available,\n  - moisture content,\n  - particle size,\n  - extractives level.\n- **A way to test pretreatment outcomes**, such as:\n  - gravimetric delignification assays,\n  - swelling measurements,\n  - microscopy or porosity/accessibility tests,\n  - carbohydrate retention analysis.\n\n## Practical setup\n1. **Define the biomass target**\n   - Choose one feedstock, such as poplar, corn stover, softwood, or wheat straw.\n   - Note its lignin richness and expected recalcitrance.\n   - **Why:** HSP behavior depends on feedstock composition and lignin structure.\n   - **How (example):** Use corn stover with known lignin content of 15\u201320% and record moisture at 10%.\n\n2. **Define the pretreatment goal**\n   - Decide whether you want:\n     - maximum lignin swelling,\n     - selective lignin extraction,\n     - minimal carbohydrate loss,\n     - or a balance of the three.\n   - **Why:** The best solvent ranking changes depending on the process objective.\n   - **How (example):** Set the goal as \u201cincrease lignin accessibility while keeping glucan loss below 5%.\u201d\n\n3. **Prepare your solvent candidate list**\n   - Include 5\u201315 realistic options instead of trying to screen everything.\n   - **Why:** HSP is most useful as a ranking tool.\n   - **How (example):** Start with ethanol/water, acetone/water, gamma-valerolactone/water, cholinium chloride/urea, and 1-ethyl-3-methylimidazolium acetate.\n\n4. **Gather or estimate HSP values**\n   - Collect the three HSP components for each solvent:\n     - dispersion,\n     - polar,\n     - hydrogen bonding.\n   - **Why:** These values are the basis for compatibility prediction.\n   - **How (example):** Build a table with columns for \u03b4D, \u03b4P, and \u03b4H for each solvent candidate."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the HSP Screening Model\n\n## Step 1: Define the lignin reference point\n- **Action:** Select an HSP center point for the lignin in your feedstock.\n- **Why:** Lignin is heterogeneous, so you need a practical reference point for comparison.\n- **How (example):** Use published HSP values for lignin from a similar biomass type, then adjust the reference if your feedstock is known to be more syringyl-rich or guaiacyl-rich.\n\n## Step 2: Set the solubility sphere radius\n- **Action:** Choose a reasonable interaction radius around the lignin center.\n- **Why:** The radius defines how far a solvent can be from the lignin point and still be considered compatible.\n- **How (example):** If literature reports a lignin sphere radius, use that value; otherwise start with a range and test sensitivity.\n\n## Step 3: Calculate Ra for each solvent\n- **Action:** Compute the distance between each solvent and the lignin reference point in HSP space.\n- **Why:** Smaller Ra values indicate stronger predicted lignin compatibility.\n- **How (example):** In a spreadsheet, calculate Ra for ethanol, acetone, and water, then rank them from lowest to highest distance.\n\n## Step 4: Rank solvents by predicted lignin compatibility\n- **Action:** Sort the solvent list from closest to farthest from lignin HSP values.\n- **Why:** This gives you an initial shortlist for experimental screening.\n- **How (example):** If acetone/water has a lower Ra than pure water, prioritize it for swelling tests.\n\n## Step 5: Compare lignin compatibility against carbohydrate risk\n- **Action:** Check whether the same solvent also interacts strongly with cellulose-rich regions.\n- **Why:** Good delignification requires selective swelling, not blanket dissolution of all biomass components.\n- **How (example):** If a solvent is close to both lignin and cellulose reference regions, reduce its ranking unless carbohydrate preservation is less important.\n\n## Step 6: Screen blends, not only pure solvents\n- **Action:** Evaluate solvent mixtures by varying composition.\n- **Why:** Water content and blending often shift HSP values enough to improve selectivity.\n- **How (example):** Compare 70:30 ethanol/water, 50:50 ethanol/water, and 30:70 ethanol/water to identify the best lignin-swelling window."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Convert HSP Screening into a Pretreatment Strategy\n\n## Step 1: Use HSP to choose the starting pretreatment condition\n- **Action:** Select the best-ranked solvent or blend as your first experimental condition.\n- **Why:** HSP reduces trial-and-error and saves time during process development.\n- **How (example):** If an ethanol/water blend shows the best lignin-selective compatibility, start optimization there instead of testing unrelated solvents.\n\n## Step 2: Tune selectivity with composition changes\n- **Action:** Adjust polarity, hydrogen-bonding strength, and water fraction to move closer to lignin and farther from carbohydrates.\n- **Why:** Selective swelling depends on fine control of solvent quality.\n- **How (example):** Increase water slightly if the solvent is too aggressive, or reduce water if lignin swelling is too weak.\n\n## Step 3: Match HSP choice to process variables\n- **Action:** Align solvent selection with temperature, solids loading, residence time, and impregnation method.\n- **Why:** HSP predicts compatibility, but actual swelling depends on transport and reaction conditions too.\n- **How (example):** Pair a promising solvent with a longer impregnation step before heating to improve penetration into the cell wall.\n\n## Step 4: Test swelling and accessibility directly\n- **Action:** Measure biomass swelling, porosity, and accessibility after pretreatment.\n- **Why:** HSP predictions must be validated by real biomass response.\n- **How (example):** Compare untreated biomass with solvent-treated biomass using microscopy, water uptake, or enzyme accessibility assays.\n\n## Step 5: Measure delignification and carbohydrate retention\n- **Action:** Quantify lignin removal and sugar preservation for each solvent condition.\n- **Why:** The best solvent is the one that improves delignification without excessive carbohydrate loss.\n- **How (example):** Compare acid-insoluble lignin reduction and glucan/xylan recovery across the solvent shortlist.\n\n## Step 6: Refine the solvent ranking\n- **Action:** Update your rankings based on experimental results.\n- **Why:** Lignin HSP values are not fixed constants, so empirical feedback improves the model.\n- **How (example):** If two solvents have similar Ra values but only one gives higher lignin removal, promote the experimentally superior one in your shortlist."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Rules for Using HSP Well\n\n## Rule 1: Treat HSP as a screening tool, not a final answer\n- Use HSP to **narrow options**, then confirm with experiments.\n- Do not assume the closest solvent always performs best at process scale.\n\n## Rule 2: Account for feedstock variability\n- Recalculate or reinterpret HSP expectations for different biomass types.\n- Softwood, hardwood, and herbaceous feedstocks can respond differently because lignin structure changes.\n\n## Rule 3: Watch the role of water carefully\n- Water can either improve swelling or reduce selectivity.\n- Always test at least a few water fractions rather than assuming one optimum.\n\n## Rule 4: Use HSP as part of a workflow\nA practical decision workflow is:\n1. Gather lignin and solvent HSP data.\n2. Calculate Ra.\n3. Rank candidate solvents and blends.\n4. Run swelling and delignification tests.\n5. Retain the best-performing compositions.\n6. Optimize temperature, time, and solids loading afterward.\n\n## Rule 5: Apply the framework to common pretreatments\nHSP screening is especially helpful for:\n- **organosolv pretreatment**,\n- **ionic-liquid systems**,\n- **deep eutectic solvents**,\n- **mixed aqueous solvent systems**.\n\n## Final practical takeaway\nIf your goal is controlled delignification, use HSP to identify solvents that are **close to lignin in solubility space**, then validate whether they create the right balance of:\n- lignin swelling,\n- improved accessibility,\n- and carbohydrate preservation.\n\nThat combination is what turns HSP from a theory tool into a useful pretreatment design method."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
