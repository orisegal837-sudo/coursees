<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBy the end of this guide, you will be able to **evaluate biomass accessibility during delignification** and **choose practical metrics that reveal whether transport or chemistry is controlling the process**. You will learn how to connect **pore architecture, swelling, and liquid penetration** to real process outcomes such as **delignification rate, kappa number reduction, and digestibility**.\n\n## What you will set up\nYou will build a simple workflow to:\n1. **Characterize the biomass structure** at the chip, tissue, and cell-wall level.\n2. **Measure accessibility-related properties** such as swelling, uptake, permeability, and porosity.\n3. **Interpret the results** to decide whether a pretreatment or pulping step is transport-limited.\n4. **Use the metrics to adjust process conditions** for better impregnation and more uniform delignification.\n\n## Technical prerequisites\nHave these specific tools, materials, or access available:\n- **A biomass sample set**: at least 2 different feedstocks or 2 preparation states of the same feedstock, such as chips vs. milled material, never-dried vs. oven-dried, or untreated vs. pretreated.\n- **A liquid penetration or uptake setup**: balance, timers, beakers, and sealed containers for measuring mass gain over time.\n- **A swelling-compatible solvent or process liquor**: water, dilute alkali, ethanol-water mixture, or your actual pretreatment liquor.\n- **Basic microscopy access**: light microscope or SEM images, if available, to inspect pore structure, cell collapse, and tissue connectivity.\n- **A method for porosity or surface-area probing**: nitrogen adsorption, solute exclusion, tracer dye penetration, or a comparable lab method.\n- **Spreadsheet or data-analysis software**: Excel, Google Sheets, or Python/R for plotting uptake curves and comparing metrics.\n- **Safety access**: PPE and standard lab handling approval for alkali, solvents, or biomass pretreatment liquors.\n\n## What to record before you start\nCreate a simple data sheet with these columns:\n- Feedstock name\n- Particle size or chip thickness\n- Initial dry mass\n- Liquid type\n- Time points\n- Wet mass\n- Swelling dimension change\n- Notes on visible penetration or structural changes\n\n## Example setup\nIf you are comparing accessibility in two samples, use:\n- **Sample A**: never-dried hardwood chips\n- **Sample B**: oven-dried hardwood chips\n- **Liquid**: 1% NaOH or water\n- **Readouts**: mass uptake after 5, 15, 30, 60 minutes; thickness change; microscope images before and after soaking"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Measure How Structure Controls Access\n\n## Step 1: Define the accessibility question for your process\n**The Action:** Decide what you need to know: is the biomass hard to impregnate, slow to swell, or resistant to internal diffusion?\n\n**Why it matters:** Different problems require different metrics. A process bottleneck in chip impregnation is not the same as a bottleneck in cell-wall diffusion.\n\n**How (Example):**\n- For kraft pulping, ask: **Does liquor reach the chip core fast enough?**\n- For enzymatic hydrolysis, ask: **Are enzymes blocked from internal surface area?**\n- For organosolv pretreatment, ask: **Does solvent swelling improve lignin access without excessive carbohydrate loss?**\n\n## Step 2: Standardize the biomass geometry\n**The Action:** Cut, sieve, or classify the biomass so samples have comparable size and shape.\n\n**Why it matters:** Particle size, chip thickness, and tissue anatomy strongly influence fluid movement. Without standardization, accessibility measurements are not comparable.\n\n**How (Example):**\n- Prepare chips with a narrow thickness range, such as **2\u20134 mm**.\n- Or mill all samples to the same sieve fraction, such as **40\u201360 mesh**.\n- Record moisture content so wet uptake can be corrected to dry basis.\n\n## Step 3: Measure liquid uptake over time\n**The Action:** Immerse the biomass in a known liquid and track mass gain at fixed time points.\n\n**Why it matters:** Uptake rate is a practical indicator of how quickly the liquid penetrates pores and reaches internal surfaces.\n\n**How (Example):**\n1. Weigh dry sample: **m0**.\n2. Immerse in liquid at a fixed liquid-to-solid ratio.\n3. Remove at 5, 15, 30, and 60 minutes.\n4. Blot consistently and weigh wet mass: **mt**.\n5. Calculate uptake: **(mt - m0) / m0 \u00d7 100%**.\n\n## Step 4: Quantify swelling\n**The Action:** Measure dimensional change after exposure to water, alkali, or solvent.\n\n**Why it matters:** Swelling loosens cell-wall packing, increases pore accessibility, and can expose new reactive surfaces.\n\n**How (Example):**\n- Measure chip thickness before and after soaking.\n- Calculate swelling ratio: **(thickness after - thickness before) / thickness before \u00d7 100%**.\n- Compare swelling in **water vs. dilute alkali** to see which condition opens the structure more effectively.\n\n## Step 5: Check whether transport is uniform or surface-biased\n**The Action:** Inspect cross-sections or use a tracer dye/probe molecule to see how deeply the liquid penetrates.\n\n**Why it matters:** A sample can look highly reactive at the surface while the core remains inaccessible.\n\n**How (Example):**\n- Soak chips in a colored dye for a fixed period.\n- Cut them open and inspect the penetration front.\n- If the outer layer is dark but the center remains pale, penetration is nonuniform and likely transport-limited."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Advanced Implementation: Interpret Metrics and Link Them to Delignification\n\n## Step 6: Estimate pore accessibility using structural probes\n**The Action:** Apply one or more pore-characterization methods to estimate accessible surface area and pore size distribution.\n\n**Why it matters:** Not all pores contribute equally. Large connected pores support bulk flow, while smaller or blocked pores can still limit diffusion near reactive sites.\n\n**How (Example):**\n- Use **nitrogen adsorption** if you have access to surface-area analysis.\n- Use **solute exclusion** to estimate pores accessible to molecules of different sizes.\n- Use **microscopy** to identify collapsed walls, sealed pits, or dense middle lamella regions.\n\n## Step 7: Compare swelling and uptake to reaction performance\n**The Action:** Relate your accessibility metrics to delignification outcomes such as kappa reduction, lignin removal, or digestibility.\n\n**Why it matters:** High reactivity is not always caused by stronger chemistry; it may simply reflect better transport.\n\n**How (Example):**\n- Compare two pretreatment conditions:\n  - Condition A: high alkali charge, fast uptake, moderate carbohydrate loss\n  - Condition B: lower alkali charge, slower uptake, less swelling\n- If A gives faster delignification, determine whether the advantage comes from **improved penetration** or **true chemical severity**.\n\n## Step 8: Diagnose the limiting regime\n**The Action:** Decide whether the system is reaction-limited or diffusion-limited.\n\n**Why it matters:** This determines whether you should change chemistry, residence time, particle size, or impregnation strategy.\n\n**How (Example):**\nUse this practical rule:\n- If the liquid penetrates slowly and the core remains under-treated, the process is **transport-limited**.\n- If uptake is rapid but lignin removal is still slow, the process may be **chemistry-limited**.\n- If outer layers degrade while the core stays intact, the process is **nonuniformly transport-limited**.\n\n## Step 9: Convert the results into process settings\n**The Action:** Use the metrics to choose operating conditions for your feedstock.\n\n**Why it matters:** Accessibility data becomes useful only when it changes how you run the process.\n\n**How (Example):**\n- Increase **impregnation time** if uptake is slow.\n- Reduce **chip thickness** if penetration is poor.\n- Adjust **liquid-to-solid ratio** if pores are not fully filled.\n- Change **solvent composition** if swelling is insufficient.\n- Lower severity if swelling is good but carbohydrate loss is excessive.\n\n## Step 10: Build a feedstock comparison table\n**The Action:** Summarize all measurements in one decision table.\n\n**Why it matters:** This makes it easy to compare different biomass types or pretreatment routes on a fair basis.\n\n**How (Example):**\nCreate a table with columns for:\n- Porosity\n- Permeability\n- Swelling ratio\n- Water uptake rate\n- Penetration depth\n- Delignification rate\n- Carbohydrate loss\n\nThen rank each feedstock or condition as:\n- **Good accessibility**\n- **Moderate accessibility**\n- **Poor accessibility**"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Summary and Decision Rules\n\n## Use these decision rules in the lab\n- **High porosity + high connectivity + strong swelling** usually means better chemical access.\n- **High swelling without penetration** may mean the wall expands but transport is still blocked.\n- **Fast surface reaction with slow core treatment** signals diffusion limitation.\n- **Improved delignification with low carbohydrate loss** is the target balance.\n\n## A simple workflow you can repeat\n1. Prepare biomass with controlled geometry.\n2. Measure uptake and swelling.\n3. Probe pore accessibility with a structural method.\n4. Run the delignification or pretreatment test.\n5. Compare accessibility metrics to process outcomes.\n6. Adjust time, temperature, solvent, or particle size.\n\n## Final example\nIf two feedstocks have similar lignin content but one gives faster delignification, do not assume the chemistry is better. Check whether it has:\n- larger connected pores,\n- faster swelling,\n- better liquor penetration,\n- or less pore blockage from collapsed structures.\n\n## Bottom line\nAccessibility metrics let you see **why** a biomass sample behaves the way it does. They turn biomass structure into actionable process guidance for pretreatment, pulping, and enzymatic conversion."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
