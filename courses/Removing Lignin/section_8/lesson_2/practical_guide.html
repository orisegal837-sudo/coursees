<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **delignification process concept with a recovery loop** that:\n- **Recycles active chemicals or solvent** back into the pretreatment step\n- **Separates lignin or coproducts** from the spent liquor/solvent stream\n- **Controls impurity buildup** over multiple cycles\n- **Reduces energy, chemical losses, and safety risks**\n- Supports **TEA, LCA, EHS**, and product-quality targets\n\n## Prerequisites\nBefore you start, make sure you have access to these specific tools/resources:\n- **Aspen Plus or Aspen HYSYS** for process simulation and recycle convergence\n- **A solvent/property database** or built-in thermodynamic model for your target system\n  - Example: NRTL, UNIQUAC, UNIFAC, or electrolyte/NRTL where appropriate\n- **Basic compositional data** for your liquor or solvent stream:\n  - lignin concentration\n  - water content\n  - salts/ash content\n  - active chemical concentration (e.g., NaOH, Na2S, solvent, acid catalyst)\n- **Mass balance spreadsheet software** such as Excel or Google Sheets\n- **A lab or pilot feed characterization report** for the biomass or black liquor/solvent stream\n- If you are evaluating a real process: access to **TEA/LCA software or models** and **EHS handling data** for solvents or alkaline liquors\n\n## What you will create\nA recovery design that includes:\n1. **A spent-stream characterization step**\n2. **A separation step** to remove lignin/solids\n3. **A regeneration step** for chemicals or solvent\n4. **A recycle loop** with purge and make-up control\n5. **A monitoring plan** for composition drift and operating stability"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Define the Recovery Target and Stream Map\n\n## 1) Map the full delignification loop\n**The Action:** Draw the process from fresh chemical input \u2192 delignification reactor \u2192 spent liquor/solvent \u2192 recovery unit operations \u2192 recycle back to reactor.\n\n**Why it matters:** You cannot design recovery correctly unless you know exactly what must be recovered and where losses occur.\n\n**How (Example):**\n- For kraft pulping, map: **wood chips + NaOH/Na2S \u2192 digester \u2192 black liquor \u2192 evaporator \u2192 recovery boiler \u2192 smelt \u2192 causticizing \u2192 white liquor recycle**.\n- For organosolv, map: **biomass + ethanol/water \u2192 pretreatment reactor \u2192 lignin-rich liquor \u2192 solid-liquid separation \u2192 solvent recovery \u2192 solvent recycle**.\n\n## 2) Identify the main recovery target\n**The Action:** Decide whether the priority is **chemical recovery**, **solvent recovery**, **lignin recovery**, or **water control**.\n\n**Why it matters:** The unit operations and purity targets depend on what must be preserved most carefully.\n\n**How (Example):**\n- **Kraft system:** prioritize recovery of **alkali/sulfide chemicals** and energy.\n- **Organosolv system:** prioritize recovery of **solvent** and **high-purity lignin**.\n- **Ionic liquid system:** prioritize **solvent purity** and removal of water/ash/sugars.\n\n## 3) Characterize the spent stream\n**The Action:** Measure or estimate the spent stream composition before designing separation.\n\n**Why it matters:** Recovery design depends on solids loading, volatility, viscosity, and impurity content.\n\n**How (Example template):**\nCreate a stream table with:\n- Total flow rate: `____ kg/h`\n- Water: `____ wt%`\n- Lignin fragments: `____ wt%`\n- Active chemical: `____ wt%`\n- Salts/ash: `____ wt%`\n- Catalyst: `____ wt%`\n- Temperature and pH: `____`\n\n## 4) Set recovery performance targets\n**The Action:** Define target recycle purity, purge rate, and allowable losses.\n\n**Why it matters:** A loop that recycles too aggressively can accumulate impurities; a loop that purges too much wastes chemicals.\n\n**How (Example):**\n- Set solvent recycle purity to **\u2265 95\u201399%** depending on system sensitivity\n- Limit lignin carryover into recycle to **below a defined threshold**, e.g. `____ ppm`\n- Set purge stream to remove **ash, degraded organics, or catalyst poisons**"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Design the Separation and Regeneration Train\n\n## 1) Choose the primary separation method\n**The Action:** Select the first major separation based on the chemistry of your liquor or solvent.\n\n**Why it matters:** The best separation method is the one that fits volatility, viscosity, thermal stability, and impurity profile.\n\n**How (Example):**\n- **Black liquor:** use **evaporation/concentration** to raise solids before combustion.\n- **Organosolv liquor:** use **distillation or evaporation** to recover the solvent.\n- **Ionic liquid / DES:** use **antisolvent precipitation, extraction, membranes, or washing**, because simple evaporation may be inefficient or unsuitable.\n\n## 2) Add a lignin/product isolation step\n**The Action:** Separate lignin before or during solvent regeneration if the product is valuable.\n\n**Why it matters:** Product recovery can improve economics and reduce contamination of the recycle stream.\n\n**How (Example):**\n- Add **water or antisolvent** to precipitate lignin from organosolv liquor.\n- Use **filtration or centrifugation** to collect the lignin solids.\n- Wash the lignin cake with a compatible solvent to reduce ash/sugar carryover.\n\n## 3) Regenerate the solvent or active chemical stream\n**The Action:** Design the regeneration step that restores the recycle stream to operating quality.\n\n**Why it matters:** Recovered solvent or liquor must perform consistently across cycles.\n\n**How (Example):**\n- **Kraft loop:** burn concentrated black liquor in a **recovery boiler**, then causticize smelt back to white liquor.\n- **Organosolv loop:** distill ethanol from water-rich liquor and return it to the reactor.\n- **Ionic liquid loop:** use membrane cleanup and drying to restore solvent composition.\n\n## 4) Include a purge and make-up strategy\n**The Action:** Define a small purge stream and a fresh make-up stream.\n\n**Why it matters:** Some impurities cannot be fully removed and will accumulate without a purge.\n\n**How (Example):**\n- Purge a fraction of recycle liquor to remove **ash, degraded sugars, colored species, and catalyst poisons**.\n- Add fresh solvent or alkali to compensate for process losses.\n- Track the **recycle-to-fresh make-up ratio** so the loop remains stable."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Verify Stability, Safety, and Operating Windows\n\n## 1) Check operating stability over repeated cycles\n**The Action:** Simulate multiple recycle passes and watch for drift in composition and performance.\n\n**Why it matters:** A loop that works once may fail after impurity buildup changes selectivity or viscosity.\n\n**How (Example):**\nRun a 5\u201310 cycle model and monitor:\n- solvent purity\n- water content\n- pH or alkalinity\n- viscosity\n- lignin yield\n- solids loading\n- recycle losses\n\n## 2) Evaluate energy and heat-integration demand\n**The Action:** Quantify heating, cooling, evaporation, and compression needs.\n\n**Why it matters:** Recovery can dominate the energy footprint of delignification.\n\n**How (Example):**\n- Estimate evaporation duty for solvent recovery\n- Compare direct heating vs heat integration\n- For black liquor, assess evaporator train performance and boiler load\n- For solvent loops, compare low-boiling vs high-boiling solvent choices\n\n## 3) Check corrosion, emissions, and handling risk\n**The Action:** Assess safety and materials compatibility for the selected recovery route.\n\n**Why it matters:** Strong alkali, sulfur species, volatile solvents, and hot concentrated liquors can create major EHS issues.\n\n**How (Example):**\n- Use corrosion-resistant materials for caustic liquor service\n- Add vapor recovery and explosion controls for flammable solvents\n- Verify storage limits and vent controls for solvent emissions\n- Document PPE, containment, and relief requirements\n\n## 4) Tie recovery design to process economics and sustainability\n**The Action:** Compare recovery options using TEA, LCA, and quality metrics.\n\n**Why it matters:** The best chemistry is not useful if the loop is too expensive, unsafe, or carbon intensive.\n\n**How (Example):**\nCreate a comparison table with columns for:\n- chemical loss per ton biomass\n- energy use per cycle\n- lignin product purity\n- recycle stability\n- operating cost\n- emissions impact\n- safety risk\n\n## Final implementation rule\nDesign delignification as a **reaction-separation-recycle system**, not as a one-pass pretreatment step. If the recovery loop is unstable, costly, or unsafe, the process is not ready for scale, even if lignin removal is strong."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
