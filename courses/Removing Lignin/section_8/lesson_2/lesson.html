<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "In delignification, chemical recovery is not a side topic\u2014it is part of the process design itself. When lignin is removed from biomass, the spent liquid carries dissolved lignin fragments, salts, excess alkali or acid, and often valuable organics that should be recovered or recycled. In alkaline systems such as kraft or soda pulping, this spent stream is called black liquor. In solvent-based systems such as organosolv, ionic liquid, or deep eutectic solvent pretreatment, the analogous challenge is to design a solvent loop that can separate lignin, regenerate the solvent, and return it to use with minimal degradation or contamination.\n\nThe core design goal is to close the loop while preserving process performance. That means the recovery system must do several things at once: reclaim useful chemicals, concentrate lignin or other coproducts, remove impurities that would accumulate over cycles, control energy demand, and avoid safety or corrosion problems. This is why chemical recovery is tightly connected to EHS, TEA, LCA, and lignin valorization. A technically elegant delignification step is not viable if the recovery loop is too expensive, too energy intensive, or too unsafe."
  },
  {
    "id": "lesson_page_2",
    "content": "Black liquor recovery is the classic example of integrated chemical recovery in delignification. In kraft pulping, the liquor leaving the digester contains dissolved lignin, sodium hydroxide, sodium sulfide, sodium carbonate, and degraded carbohydrates. Recovery begins with concentration, typically through evaporation, so the liquor can be burned in a recovery boiler. Combustion recovers energy and converts the inorganic chemicals into smelt, which is later causticized back into active pulping chemicals.\n\nThis loop is valuable because it reduces fresh chemical demand and generates process energy, but it also imposes design constraints. Liquor viscosity rises with solids content, making pumping and heat transfer more difficult. Scaling, fouling, and entrained solids affect evaporator performance. The composition of black liquor also changes with feedstock and cooking severity, which influences heating value, recovery efficiency, and downstream causticizing load. In practice, recovery design must balance concentration, heat integration, solid handling, and chemical make-up. The process is not just about recycling; it is about maintaining a stable operating composition across repeated cycles.\n\nFor solvent-based delignification, the same logic applies but the unit operations differ. Instead of combustion and causticizing, the main tasks are solvent-lignin separation, solvent purification, water management, and solvent reconcentration. Membranes, distillation, extraction, antisolvent addition, filtration, and phase separation may all be used depending on the solvent system and the product target."
  },
  {
    "id": "lesson_page_3",
    "content": "Solvent loop design starts with the question: what must be recovered most carefully\u2014solvent, catalyst, lignin product, or water? In organosolv systems, solvent recovery often relies on distillation or evaporation, but solvent choice strongly affects energy demand. A low-boiling solvent may be easier to recover but may create flammability and emissions issues. A high-boiling solvent may be safer in some respects but harder to separate and more energy intensive to regenerate. Water content also matters because it changes solvent polarity, lignin solubility, and phase behavior.\n\nIn ionic liquid and deep eutectic solvent systems, the challenge is often not simple evaporation. These solvents can be thermally stable but expensive, viscous, and sensitive to water and impurity buildup. Recovery may require antisolvent precipitation of lignin, washing, membrane separation, or selective extraction of contaminants. The loop must also manage catalyst loss if acid or metal catalysts are used. If the solvent is recycled without adequate cleanup, dissolved sugars, ash, extractives, and lignin fragments can accumulate and reduce pretreatment selectivity over time.\n\nFrom a process-design perspective, a good loop has defined purge points and quality-control metrics. These metrics may include solvent purity, water content, acidity or alkalinity, ash content, color, viscosity, lignin yield, and recycle-to-fresh make-up ratio. The goal is to prevent gradual drift away from the operating window that produced good delignification in the first place."
  },
  {
    "id": "lesson_page_4",
    "content": "Chemical recovery in delignification is the bridge between chemistry and industrial feasibility. In black liquor systems, recovery closes the alkali loop and supplies energy. In solvent-based systems, recovery keeps the solvent selective, reusable, and economically acceptable. In both cases, recovery design affects safety, emissions, process economics, and product quality.\n\nThe main lesson is that delignification should never be designed as a one-pass reaction alone. It should be designed as a coupled reaction-separation-recycle system. A strong pretreatment route may still fail if its recovery loop is unstable, energy intensive, or unable to control impurity buildup. The best process designs therefore treat chemical recovery as an essential part of delignification performance, not a downstream afterthought."
  }
]
  </textarea>

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
