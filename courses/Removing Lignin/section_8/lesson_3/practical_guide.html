  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a practical evaluation workflow for lignin removal routes that combines:\n- **Techno-Economic Analysis (TEA)** to test commercial viability\n- **Life-Cycle Analysis (LCA)** to test environmental performance\n\nBy the end, you should be able to compare routes such as **kraft pulping, organosolv, oxidative delignification, and lignin-first fractionation** using the same decision framework.\n\n## What you will produce\n- A **process boundary** and **functional unit**\n- A **cost stack** with major CAPEX and OPEX drivers\n- A **minimum lignin selling price** or equivalent economic metric\n- A **screening LCA** with key environmental hotspots\n- A **sensitivity list** for the variables that matter most\n\n## Technical prerequisites\n- **Aspen Plus, SuperPro Designer, or BioSTEAM** for process simulation and mass/energy balances\n- **Excel, Google Sheets, or Python (pandas + numpy)** for TEA calculations\n- **openLCA or Brightway2** for LCA modeling\n- Access to a **life-cycle inventory database** such as **ecoinvent** or **USLCI**\n- Process data for the route you want to evaluate: **yield, chemical charge, solvent recovery efficiency, energy demand, and product purity**\n\n## Set up the evaluation frame\n1. **Choose one route and one comparator.**\n   - Why it matters: TEA and LCA only work if you compare like with like.\n   - How: Example: compare **organosolv pretreatment** vs **kraft pulping** for producing 1 ton of lignin-rich pulp.\n\n2. **Define the product and system boundary.**\n   - Why it matters: revenue and impacts depend on what the process is meant to sell.\n   - How: Example boundaries:\n     - Cradle-to-gate for **1 kg recovered lignin**\n     - Cradle-to-gate for **1 ton lignin-free pulp**\n     - Biorefinery boundary including **sugars + lignin + energy coproducts**\n\n3. **Collect the minimum input data.**\n   - Why it matters: you need consistent inputs before any financial or environmental calculation.\n   - How: Build a table with feedstock cost, solvent makeup rate, steam use, electricity use, yield loss, recovery efficiency, equipment size, and target product price."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the TEA Foundation\n\n## Step 1: Translate process performance into a cost stack\n- **Action:** Break total cost into feedstock, chemicals, utilities, recovery, waste handling, labor, maintenance, and capital charge.\n- **Why:** This reveals whether the route is limited by chemistry, recovery, or plant design.\n- **How (Example):** For an organosolv process, list:\n  - Biomass feedstock: $X/ton\n  - Ethanol makeup: $Y/ton biomass\n  - Steam for solvent recovery: $Z/ton\n  - Wastewater treatment: $W/ton\n  - Annualized capital charge: $C/year\n\n## Step 2: Estimate capital cost drivers\n- **Action:** Identify the equipment that dominates installed cost.\n- **Why:** Lignin removal routes often become expensive because of high-pressure reactors, corrosion-resistant materials, and separation trains.\n- **How (Example):** Flag cost-heavy units such as:\n  - Pretreatment reactor\n  - Solid-liquid separators\n  - Evaporators/distillation columns for solvent recovery\n  - Heat exchangers for heat integration\n\n## Step 3: Calculate operating cost per ton of biomass or product\n- **Action:** Convert each input into an annual operating cost.\n- **Why:** A route can look chemically efficient but still fail if solvent losses or energy demand are high.\n- **How (Example):** If solvent loss is 2% per cycle and solvent costs $1.50/kg, compute annual solvent makeup from the process throughput and multiply by solvent price.\n\n## Step 4: Include coproduct revenue realistically\n- **Action:** Add revenue from recovered lignin, pulp, sugars, or energy only if marketable and specification-compliant.\n- **Why:** Overstating coproduct value is one of the most common TEA errors.\n- **How (Example):** Use conservative price assumptions:\n  - Commodity lignin at a low bulk price\n  - Higher price only for validated specialty lignin grades\n  - Sugars valued at market or internal transfer price, not aspirational premiums\n\n## Step 5: Compute a headline metric\n- **Action:** Calculate one main financial output, such as minimum lignin selling price or payback time.\n- **Why:** You need a single number to compare routes quickly.\n- **How (Example):** If your model sells lignin and pulp together, solve for the lignin price that gives net present value = 0 over 10\u201315 years."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Add LCA and Compare Trade-offs\n\n## Step 1: Define the functional unit and impact categories\n- **Action:** Choose a functional unit and the environmental indicators you will report.\n- **Why:** LCA results are only comparable if the same service is measured.\n- **How (Example):** Use one of these functional units:\n  - 1 kg recovered lignin\n  - 1 ton dry pulp produced\n  - 1 MJ useful product from the biorefinery\n  \n  Track at least:\n  - GHG emissions\n  - Fossil energy demand\n  - Water use\n  - Acidification/eutrophication if relevant\n\n## Step 2: Map the life-cycle hotspots\n- **Action:** Identify the largest contributors to environmental burden.\n- **Why:** In lignin removal, the biggest impacts often come from the same places as the biggest costs.\n- **How (Example):** Check whether hotspots come from:\n  - Chemical manufacture\n  - Steam and electricity use\n  - Solvent recovery and losses\n  - Waste treatment and purge streams\n\n## Step 3: Handle multifunctionality correctly\n- **Action:** Decide how to allocate impacts across lignin, pulp, sugars, and energy coproducts.\n- **Why:** Allocation choice can materially change the result.\n- **How (Example):** Run at least two cases:\n  - Mass allocation\n  - Economic allocation\n  - Optional system expansion if substitutes are clear\n\n## Step 4: Run sensitivity analysis on the most uncertain variables\n- **Action:** Vary the inputs that are most uncertain or most influential.\n- **Why:** This shows whether the route is robust or fragile.\n- **How (Example):** Test a range for:\n  - Solvent recovery efficiency: 90\u201399%\n  - Chemical charge: low/medium/high\n  - Electricity mix: grid vs renewable\n  - Lignin price: conservative vs optimistic\n  - Plant scale: pilot vs commercial\n\n## Step 5: Compare TEA and LCA together\n- **Action:** Put the economic and environmental results side by side.\n- **Why:** A route that wins on one metric may lose on the other.\n- **How (Example):** Create a decision table:\n  - Route A: low cost, high steam demand\n  - Route B: moderate cost, lower emissions\n  - Route C: high recovery efficiency, but solvent-intensive\n\n## Step 6: Use the results to select the best development candidate\n- **Action:** Choose the route that is acceptable on both cost and sustainability.\n- **Why:** The best candidate is usually the one that survives both screening tests.\n- **How (Example):** Prioritize the option that has:\n  - Lowest cost among environmentally acceptable routes\n  - Strong coproduct value without excessive recovery burden\n  - Stable performance across sensitivity scenarios"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Decision Rules and Next Actions\n\n## Decision rules you can apply immediately\n- **If chemical recovery dominates cost,** redesign the solvent loop before improving reaction yield.\n- **If steam demand dominates emissions,** focus on heat integration and lower-severity operation.\n- **If lignin purity improves but yield collapses,** check whether the added purity actually increases net value.\n- **If coproduct revenue drives profitability,** verify market size and specification limits before using that revenue in the base case.\n\n## Build a simple first-pass screening model\n- **Action:** Start with a spreadsheet model before moving to detailed simulation.\n- **Why:** A fast model helps identify whether the route is worth deeper study.\n- **How (Example):** Create tabs for:\n  1. Mass balance\n  2. Energy balance\n  3. CAPEX estimate\n  4. OPEX estimate\n  5. Revenue assumptions\n  6. LCA inventory and impacts\n  7. Sensitivity analysis\n\n## Final validation checklist\n- **Action:** Check that the model is internally consistent.\n- **Why:** TEA/LCA results are only useful if assumptions are transparent and balanced.\n- **How (Example):** Confirm that:\n  - Material balances close\n  - Solvent recovery rates are realistic\n  - Product prices are conservative\n  - Allocation rules are stated clearly\n  - Functional unit matches the decision goal\n\n## What a strong conclusion looks like\nA strong lignin removal concept is one that:\n- Achieves acceptable delignification\n- Preserves valuable carbohydrates when needed\n- Minimizes solvent and chemical losses\n- Uses manageable energy for recovery\n- Produces coproducts with credible market value\n- Shows both economic feasibility and environmental improvement\n\nUse TEA to answer: **Can this route compete?**\nUse LCA to answer: **Does this route improve sustainability?**\nUse both together to decide: **Should we develop this route further?**"
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
