<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1: Objective & Prerequisites\n\n## Objective\nBuild a practical lignin-valorization workflow that turns extracted lignin into a target product stream by:\n1. **Choosing the right pathway**: monomers, oligomers, materials, or fuel.\n2. **Matching chemistry to lignin type**: hardwood, softwood, grass-derived, kraft, organosolv, soda, or lignosulfonate lignin.\n3. **Balancing yield, selectivity, and cost**: avoid over-processing that destroys value.\n4. **Planning for separation and purification** from the start.\n\n## Technical Prerequisites\nYou need access to:\n- **Extracted lignin feedstock** with basic characterization data\n  - molecular weight distribution (e.g., SEC/GPC)\n  - functional-group analysis (e.g., 2D HSQC NMR, FTIR, or 31P NMR)\n  - ash/metal content\n  - moisture content\n- **A catalytic reaction setup** suitable for batch or flow testing\n  - temperature and pressure control\n  - inert gas supply (nitrogen or argon)\n  - hydrogen source if using reductive routes\n- **Solvents and reagents** commonly used for lignin upgrading\n  - alcohols, water, organic co-solvents, acids/bases\n- **Separation tools**\n  - filtration, liquid-liquid extraction, rotary evaporation, precipitation setup\n- **Analytical instruments**\n  - GC-MS or HPLC for product profiling\n  - NMR for structural confirmation\n  - GPC/SEC for polymer size changes\n  - elemental analysis if available\n- **TEA/LCA tools**\n  - spreadsheet model or process simulation software for cost and sustainability screening\n\n## What You Should Decide Before Starting\n- **Target product class**: monomers, oligomers, resins, carbon materials, or combustion fuel\n- **Performance target**: highest monomer yield, highest mass recovery, easiest scale-up, or lowest cost\n- **Constraint limits**: maximum temperature, catalyst budget, allowable solvent, and desired purity\n\n## Practical Example\nIf your lignin is **kraft lignin** with high sulfur content and you want **phenolic monomers**, you would likely prioritize a **reducing depolymerization route** plus a downstream purification plan for phenolics. If your lignin is **organosolv lignin** and you want **resin precursors**, you may favor **partial depolymerization** and preserve functionality instead of fully breaking every bond."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2: Step-by-Step Implementation \u2014 Define the Product Pathway\n\n## Step 1: Classify the lignin feedstock\n**Action:** Identify the lignin source and measure its key properties.\n**Why it matters:** Lignin chemistry varies widely by biomass type and extraction method, which strongly affects reactivity.\n**How (Example):**\n- Run SEC/GPC to estimate molecular weight distribution.\n- Use 2D HSQC NMR to assess beta-O-4 content.\n- Measure ash and metal content to detect catalyst poisons.\n- Example decision: a high beta-O-4 organosolv lignin is a better candidate for monomer production than a highly condensed lignin.\n\n## Step 2: Select the product target before choosing the reaction\n**Action:** Decide whether you want monomers, oligomers, materials, or fuel.\n**Why it matters:** The best chemistry depends on the desired product family; one reaction route rarely fits all goals.\n**How (Example):**\n- **Monomers:** prioritize bond cleavage plus stabilization.\n- **Oligomers:** aim for partial depolymerization and low repolymerization.\n- **Materials:** retain or tailor functionality for adhesives, resins, or composites.\n- **Fuel/combustion:** maximize overall energy recovery rather than aromatic selectivity.\n\n## Step 3: Map the dominant bond targets\n**Action:** Identify which bonds you expect to cleave first, especially beta-O-4 ether linkages.\n**Why it matters:** Beta-O-4 bonds are typically the most accessible route to valuable fragments.\n**How (Example):**\n- For a lignin rich in beta-O-4 linkages, use a route that favors controlled ether cleavage.\n- For a more condensed lignin, accept lower monomer yield or shift toward materials applications.\n\n## Step 4: Choose the reaction family\n**Action:** Match the pathway to the target product and lignin type.\n**Why it matters:** Different catalytic environments produce very different product distributions.\n**How (Example):**\n- **Reductive catalytic fractionation:** use when you want stabilized phenolic monomers.\n- **Hydrogenolysis/hydrogenation-assisted routes:** use to cap reactive intermediates.\n- **Acid/base solvolysis:** use for fractionation or partial depolymerization.\n- **Oxidative cleavage:** use for aldehydes, acids, or carbonyl-rich products.\n- **Transfer hydrogenation:** use when direct H2 supply is limited.\n\n## Step 5: Set initial operating windows\n**Action:** Establish starting conditions for temperature, pressure, catalyst loading, and solvent system.\n**Why it matters:** Lignin can repolymerize quickly if conditions are too harsh or stabilization is too slow.\n**How (Example):**\n- Start with moderate temperature rather than maximum severity.\n- Use a solvent that both dissolves lignin fragments and limits condensation.\n- If testing reductive routes, ensure hydrogen availability is sufficient to cap intermediates quickly."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3: Step-by-Step Implementation \u2014 Stabilize, Separate, and Evaluate\n\n## Step 6: Couple bond cleavage with stabilization\n**Action:** Design the process so fragments are stabilized immediately after release.\n**Why it matters:** Unstabilized lignin fragments can condense and reduce monomer yield.\n**How (Example):**\n- In reductive processes, provide hydrogen or a hydrogen donor during cleavage.\n- In oxidative processes, tune oxidant strength to avoid over-oxidation.\n- If using base-catalyzed conditions, limit residence time to reduce secondary polymerization.\n\n## Step 7: Pull products out of the reaction mixture early\n**Action:** Add a downstream strategy that removes products before they degrade.\n**Why it matters:** Product recovery is part of selectivity; delaying separation lowers final yield.\n**How (Example):**\n- Precipitate residual high-molecular-weight lignin with an antisolvent.\n- Extract phenolic monomers into an organic phase.\n- Use adsorption or membrane steps to recover dilute aromatics.\n\n## Step 8: Purify to the specification demanded by the market\n**Action:** Tailor the separation train to the end use.\n**Why it matters:** A technically successful depolymerization is not useful if the product stream is too impure for sale.\n**How (Example):**\n- For monomers: distillation or chromatography-like polishing may be needed.\n- For resins: a less purified oligomer stream may be acceptable.\n- For carbon materials: control ash and inorganic contamination more than aromatic purity.\n\n## Step 9: Measure performance with the right metrics\n**Action:** Track conversion, yield, selectivity, recovery, and purity together.\n**Why it matters:** High conversion alone can hide low-value polymerization or product loss.\n**How (Example):**\n- Report monomer yield as a fraction of lignin input.\n- Track selectivity to key phenolics.\n- Measure mass balance across reaction and separation.\n- Compare solvent and catalyst recovery after each run.\n\n## Step 10: Screen economics and sustainability early\n**Action:** Run a TEA and LCA comparison before scaling up.\n**Why it matters:** A high-yield route may still fail due to expensive catalysts, high energy demand, or poor solvent recovery.\n**How (Example):**\n- Compare two routes: one with 25% monomer yield and easy solvent recovery versus one with 35% yield but expensive hydrogen and hard separations.\n- Select the route with better net value, not just better chemistry."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4: Practical Decision Rules and Scale-Up Guidance\n\n## Use these decision rules\n- **Choose monomers** when you have a lignin feed rich in labile ether linkages and a clear purification pathway.\n- **Choose oligomers** when feedstock is more condensed but still functional enough for adhesives or resins.\n- **Choose materials pathways** when thermal behavior, functionality, and bulk recovery matter more than full depolymerization.\n- **Avoid over-severity** if it increases condensation, char formation, or catalyst deactivation.\n\n## Common failure modes to avoid\n- **Ignoring feedstock variation**: different lignins behave differently even under identical conditions.\n- **Treating depolymerization and purification separately**: they must be designed together.\n- **Chasing maximum conversion** at the expense of selectivity.\n- **Using an expensive catalyst without a recovery plan**.\n- **Skipping TEA/LCA until the end**.\n\n## Scale-up checklist\n1. Confirm feedstock consistency across batches.\n2. Verify catalyst recyclability and tolerance to ash/metals.\n3. Demonstrate solvent recovery at relevant scale.\n4. Quantify product stability during storage and transport.\n5. Confirm that product specs match the intended market.\n6. Recalculate cost and emissions with pilot-scale assumptions.\n\n## Final practical template\nWhen planning any lignin valorization route, write down:\n- **Feedstock**: what lignin are you using?\n- **Target**: what product are you making?\n- **Chemistry**: how will you cleave and stabilize fragments?\n- **Separation**: how will you isolate the product?\n- **Economics**: what is the catalyst/solvent/energy burden?\n- **Sustainability**: what is the recovery and emissions profile?\n\nIf these six items are aligned, the process is much more likely to be scalable, selective, and commercially relevant."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
