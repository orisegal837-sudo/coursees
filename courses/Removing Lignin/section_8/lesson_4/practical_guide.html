  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nUse life cycle assessment (LCA) to **compare delignification and lignin valorization routes on total environmental performance**, not just on lignin removal or product yield. By the end of the assessment, you should be able to:\n\n- Define a clear LCA goal for a biomass processing decision\n- Set a functional unit that makes alternatives comparable\n- Build a system boundary that captures the full process chain\n- Identify whether a route improves sustainability or simply shifts burdens elsewhere\n- Combine LCA results with techno-economic analysis (TEA) for process selection\n\n## Prerequisites\nBefore starting, make sure you have access to the following technical tools or data sources:\n\n- **LCA software**: openLCA, SimaPro, GaBi, or Brightway2\n- **Life cycle inventory database**: ecoinvent, Agri-footprint, or another regional database relevant to biomass processing\n- **Process simulation or mass/energy balance data**: Aspen Plus, SuperPro Designer, MATLAB, Python, Excel, or published process data\n- **TEA data or model outputs**: capital cost, operating cost, utility demand, and product yields\n- **Chemical and utility datasets**: steam, electricity, solvents, acids, bases, enzymes, wastewater treatment, and transport distances\n- **Defined process alternatives**: for example, alkaline pretreatment vs organosolv, or lignin combustion vs lignin product recovery\n\n## What you need to prepare\n- A **baseline process flow diagram** for the biomass-to-product chain\n- Mass and energy flows for each major unit operation\n- A list of coproducts and waste streams\n- A target decision question, such as: \u201cWhich route has the lowest greenhouse gas footprint per tonne of lignin product?\u201d"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Define the Goal, Scope, and Functional Unit\n\n## 1) Define the decision you want LCA to support\n**The Action:** Write one specific decision question.\n\n**Why it matters:** LCA results are only useful if they answer a real comparison or selection problem.\n\n**How (Example):**\n- Compare **Route A: alkaline pretreatment with lignin combustion** vs **Route B: organosolv pretreatment with lignin recovery for materials use**\n- Determine whether **lignin recovery improves the biorefinery footprint** relative to a pulp-only baseline\n\n## 2) Set the functional unit\n**The Action:** Choose one unit that all alternatives must satisfy.\n\n**Why it matters:** Without a consistent functional unit, you cannot compare routes fairly.\n\n**How (Example):**\n- 1 tonne of **oven-dry biomass processed**\n- 1 tonne of **pulp produced**\n- 1 kg of **lignin product meeting a defined purity and performance specification**\n\n## 3) Draw the system boundary\n**The Action:** Decide which life cycle stages to include.\n\n**Why it matters:** Delignification can look favorable locally while causing higher burdens upstream or downstream.\n\n**How (Example):** Include:\n- Biomass cultivation and harvesting\n- Transport to the plant\n- Pretreatment or pulping\n- Chemical recovery and solvent recovery\n- Lignin isolation and purification\n- Energy generation or coproduct use\n- Wastewater treatment\n- Final disposal or end use\n\nChoose a boundary such as:\n- **Cradle-to-gate**: biomass to product at plant exit\n- **Cradle-to-grave**: include product use and disposal\n\n## 4) Decide how to handle coproducts\n**The Action:** Select an allocation or system expansion method.\n\n**Why it matters:** Multi-product lignin systems can change dramatically depending on how burdens are shared.\n\n**How (Example):**\n- **Mass allocation** if coproducts are physically similar\n- **Economic allocation** if one product dominates value\n- **Energy allocation** if products are fuels or energy carriers\n- **System expansion** if a coproduct displaces an existing market product\n\n## 5) Specify impact categories\n**The Action:** Choose the environmental impacts you will quantify.\n\n**Why it matters:** Lignin valorization can improve one metric while worsening another.\n\n**How (Example):** Track:\n- Climate change\n- Energy demand\n- Water use\n- Acidification\n- Eutrophication\n- Particulate matter formation\n- Toxicity-related indicators"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Build the Inventory and Identify Hotspots\n\n## 1) Compile the life cycle inventory (LCI)\n**The Action:** Collect all major inputs and outputs for every unit operation.\n\n**Why it matters:** The inventory is the data backbone of the LCA; weak data leads to weak conclusions.\n\n**How (Example):** For each step, record:\n- Raw biomass input\n- Reagents: NaOH, acids, oxidants, solvents, enzymes\n- Utilities: steam, electricity, cooling water, compressed air\n- Emissions: CO\u2082, wastewater COD, solvent losses, particulates\n- Solid residues and ash\n- Product and coproduct outputs\n\n## 2) Include the known hotspot areas\n**The Action:** Pay special attention to the most impact-intensive operations.\n\n**Why it matters:** In delignification, a few steps often dominate total impacts.\n\n**How (Example):** Common hotspots include:\n- Steam generation for pretreatment heating\n- Solvent recovery by distillation\n- Acid/base consumption for fractionation or neutralization\n- Oxidant production and use\n- Wastewater treatment for high-organic effluent\n\n## 3) Convert process data into inventory flows per functional unit\n**The Action:** Normalize all inputs and outputs to the chosen functional unit.\n\n**Why it matters:** This ensures results are comparable across routes.\n\n**How (Example):**\n- If the functional unit is **1 tonne of lignin product**, scale all process streams to the amount needed to produce 1 tonne of purified lignin\n- If the functional unit is **1 tonne of dry biomass processed**, divide all flows by the biomass throughput\n\n## 4) Run the impact assessment\n**The Action:** Translate inventory flows into environmental impact results using characterization factors.\n\n**Why it matters:** This shows which route performs better in each environmental category.\n\n**How (Example):**\n- Electricity use contributes to climate change depending on grid intensity\n- Solvent losses contribute to toxicity and fossil resource use\n- Steam demand contributes to climate change and energy demand\n\n## 5) Identify trade-offs and hotspots\n**The Action:** Compare results across categories and unit operations.\n\n**Why it matters:** A route with higher lignin yield may still be worse overall.\n\n**How (Example):**\n- Route A may have lower chemical use but higher wastewater burden\n- Route B may recover more lignin but require more steam for solvent recovery\n- Higher pretreatment severity may improve delignification while increasing carbohydrate loss and energy use"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Interpret Results with TEA and Make a Process Decision\n\n## 1) Compare LCA results with process performance metrics\n**The Action:** Evaluate environmental results alongside technical metrics.\n\n**Why it matters:** A process should not be chosen on environmental performance alone if product quality or recovery is unacceptable.\n\n**How (Example):** Review:\n- Lignin yield\n- Lignin purity\n- Residual lignin in pulp\n- Pulp viscosity\n- Chemical recovery efficiency\n- Product functionality or downstream suitability\n\n## 2) Integrate LCA with TEA\n**The Action:** Examine environmental and economic results together.\n\n**Why it matters:** The most sustainable option must also be economically credible and operationally feasible.\n\n**How (Example):**\n- Route A has lower cost but higher emissions\n- Route B has lower emissions but requires expensive solvent recovery equipment\n- Choose the route that best balances footprint, cost, and product quality\n\n## 3) Test sensitivity and uncertainty\n**The Action:** Recalculate results under different assumptions.\n\n**Why it matters:** LCA conclusions can change if electricity mix, solvent recovery efficiency, or coproduct credit changes.\n\n**How (Example):** Vary:\n- Electricity grid carbon intensity\n- Steam source\n- Solvent recovery rate\n- Allocation method\n- Lignin market value\n- Waste treatment efficiency\n\n## 4) Iterate the design\n**The Action:** Use the hotspot results to revise the process and rerun the LCA.\n\n**Why it matters:** LCA is most valuable as an optimization tool, not just a reporting exercise.\n\n**How (Example):**\n- If solvent recovery dominates impacts, redesign the separation step\n- If steam use is excessive, lower pretreatment severity or improve heat integration\n- If alkali demand is high, test reagent recycling or alternative chemistry\n\n## Final decision rule\nChoose the route that delivers the **best combined outcome** across:\n- Environmental impact\n- Technical performance\n- Economic feasibility\n- Coproduct handling\n- Scalability and operational practicality\n\nUsed this way, LCA helps you avoid solving one problem while creating another elsewhere in the biomass processing system."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
