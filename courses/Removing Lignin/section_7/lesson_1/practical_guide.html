  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nUse **Kappa number** and **permanganate consumption** to estimate **residual lignin** in pulp and make better **pulp quality / process-control decisions**.\n\nBy the end of this workflow, you should be able to:\n- Run or interpret a standardized Kappa test on pulp.\n- Convert permanganate consumption into a Kappa number.\n- Read the result as a **comparative index** for delignification.\n- Use Kappa number together with **yield, viscosity, brightness, and strength** to judge whether the pulp is ready for the next step.\n\n## Prerequisites\n### Technical access you need\n- **Standard Kappa number test method** for your lab or plant (for example, a TAPPI/ISO-based procedure used in your organization).\n- **Potassium permanganate (KMnO4)** reagent of analytical grade.\n- **Acidification reagents** specified by your method.\n- **Back-titration setup** (typically burette, standardized reducing agent, glassware, magnetic stirrer, timer).\n- **Pulp sample preparation tools**: balance, disperser/mixer, filtration or dewatering equipment, and temperature-controlled workspace if required by the method.\n- **Calculation sheet, lab notebook, or LIMS** to record reagent amounts, blank correction, titration result, and final Kappa number.\n\n### What you should have before starting\n- A **well-mixed pulp sample** representative of the batch.\n- A **known test protocol** with fixed time, temperature, acidity, and pulp consistency.\n- A way to compare results against **target Kappa ranges** for your pulp grade or bleaching sequence."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up and Run the Standardized Test\n\n## 1) Prepare a representative pulp sample\n**Action:** Take a sample that truly represents the batch or digester lot, then disperse it thoroughly.\n\n**Why it matters:** Kappa number only helps if the sample reflects the real pulp condition. Poor sampling gives misleading results.\n\n**How (example):**\n- Collect pulp from several points in the batch.\n- Mix the combined sample well.\n- Remove excess water and weigh the required oven-dry equivalent according to the method.\n\n## 2) Prepare the permanganate reaction mixture\n**Action:** Add a known excess of potassium permanganate under the prescribed acidic conditions.\n\n**Why it matters:** The test depends on a controlled oxidation reaction. Fixed acidity, time, and temperature make the result reproducible.\n\n**How (example):**\n- Add the measured pulp portion to the reaction vessel.\n- Introduce the specified KMnO4 solution.\n- Add the required acid solution.\n- Start timing immediately and maintain the required mixing rate.\n\n## 3) Let permanganate react for the specified time\n**Action:** Hold the pulp suspension under the exact test conditions for the full reaction period.\n\n**Why it matters:** The amount of permanganate consumed depends on contact time and reaction conditions, so consistency is essential.\n\n**How (example):**\n- Keep the slurry at the method-defined temperature.\n- Stir at the specified speed.\n- Do not interrupt the reaction timer.\n\n## 4) Measure leftover permanganate by back-titration\n**Action:** Titrate the unreacted permanganate after the reaction period.\n\n**Why it matters:** The difference between starting KMnO4 and remaining KMnO4 is the basis for permanganate consumption.\n\n**How (example):**\n- Stop the reaction at the correct time.\n- Titrate the residual oxidant with the standardized reducing agent.\n- Record the endpoint carefully.\n- Run and subtract the blank as required by the method."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Convert the Result and Interpret It Correctly\n\n## 1) Calculate permanganate consumption\n**Action:** Determine how much KMnO4 was consumed by the pulp.\n\n**Why it matters:** This is the raw measurement that reflects how much oxidizable material is present.\n\n**How (example):**\n- Start with the known KMnO4 charge.\n- Subtract the amount recovered by back-titration.\n- Apply the blank correction.\n- Record the final permanganate consumption value.\n\n## 2) Convert consumption to Kappa number\n**Action:** Use the standard formula in your method to convert permanganate consumption into Kappa number.\n\n**Why it matters:** Kappa number is the normalized index used across labs and mills to compare pulps.\n\n**How (example):**\n- Use the calculation sheet or LIMS formula.\n- Enter pulp weight, titration data, and blank correction.\n- Compute the Kappa number and round according to the method rules.\n\n## 3) Interpret the value as residual lignin, not absolute lignin\n**Action:** Read Kappa as an operational estimate of residual lignin content.\n\n**Why it matters:** Kappa number is strongly related to lignin, but it is not a direct lignin assay and can be influenced by other oxidizable components.\n\n**How (example):**\n- If Kappa is high, expect more residual lignin and a heavier bleaching demand.\n- If Kappa is low, expect better delignification, but check whether carbohydrate loss may have increased.\n- Compare results only against the same wood type and process context when possible.\n\n## 4) Pair Kappa with other quality metrics\n**Action:** Review Kappa alongside yield, viscosity, brightness, and strength.\n\n**Why it matters:** Two pulps can share the same Kappa number but behave differently in bleaching or papermaking.\n\n**How (example):**\n- High Kappa + good viscosity: pulp may still be suitable for controlled bleaching.\n- Low Kappa + low viscosity: cook may have been too severe.\n- Same Kappa + different brightness response: adjust bleach sequence, not just cooking severity."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Use Kappa Number for Process Decisions\n\n## 1) Set a target Kappa window for the grade\n**Action:** Define the acceptable Kappa range for the product you are making.\n\n**Why it matters:** The correct Kappa number depends on end use, bleach strategy, yield targets, and strength requirements.\n\n**How (example):**\n- For a bleach pulp, set a Kappa target that balances bleach demand and fiber preservation.\n- For a unbleached grade, set a range that protects yield and viscosity while meeting brightness needs.\n\n## 2) Use Kappa to guide the next process step\n**Action:** Decide whether the pulp needs more cooking, washing, screening, or bleaching.\n\n**Why it matters:** Kappa number helps you control downstream chemical demand and avoid over- or under-processing.\n\n**How (example):**\n- If Kappa is above target, increase delignification or plan for higher bleaching chemical charge.\n- If Kappa is below target but viscosity is also low, reduce cooking severity in the next batch.\n\n## 3) Track trends, not just single measurements\n**Action:** Monitor Kappa over time for each line, digester, chip lot, or wood species.\n\n**Why it matters:** Trend data reveals process drift, seasonal wood effects, and inconsistent cooking performance.\n\n**How (example):**\n- Plot daily Kappa results against yield and viscosity.\n- Investigate sudden shifts after a chip supplier change or chemical-charge adjustment.\n\n## 4) Document the context with every result\n**Action:** Record wood species, cooking conditions, pulp consistency, and test method version with each Kappa result.\n\n**Why it matters:** Kappa number is process-dependent, so context is necessary for correct interpretation.\n\n**How (example):**\n- Lab record: sample ID, batch number, wood type, cook conditions, KMnO4 lot, titration endpoint, calculated Kappa, brightness, and viscosity.\n\n## Final takeaway\nUse Kappa number as a **fast, standardized proxy for residual lignin**. It is most valuable when you treat it as a **process-control tool**, not a standalone measure of pulp quality."
  }

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
