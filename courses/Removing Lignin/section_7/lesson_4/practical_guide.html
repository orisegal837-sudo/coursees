  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nUse pulp viscosity, measured by the **CED method**, to estimate **cellulose degradation** and infer **degree of polymerization (DP)** in delignified pulp.\n\nBy the end of this workflow, you should be able to:\n- Prepare a pulp sample for viscosity testing\n- Measure viscosity in **cupriethylenediamine (CED)** solution\n- Convert viscosity results into an estimated DP using the correct standard or calibration\n- Interpret the result alongside **kappa number**, brightness, and yield\n- Detect whether delignification conditions are preserving cellulose or damaging it\n\n## Technical prerequisites\n- Access to a **CED viscosity test setup** for pulp analysis\n- A **capillary viscometer** or the instrument specified by your laboratory standard\n- **Cupriethylenediamine (CED) solvent** prepared according to the relevant standard\n- A **temperature-controlled bath** for maintaining the test temperature\n- Analytical balance, volumetric glassware, and sample conditioning equipment\n- The applicable **testing standard** for your pulp type, plus the **DP conversion correlation** used in your lab\n- A clean, dry pulp sample with a known conditioning history\n\n## What you need to control before testing\n- **Pulp type**: hardwood, softwood, dissolving pulp, or other class\n- **Test standard**: do not mix methods or conversion equations\n- **Sample moisture content**: use the correct basis for weighing\n- **Temperature**: viscosity is highly temperature-sensitive\n- **Dissolution quality**: incomplete dissolution will distort the result"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up the Sample and Run the CED Test\n\n## Step 1: Condition and prepare the pulp sample\n**Action:** Bring the pulp to the required conditioning state, then weigh the correct test portion on a dry-mass basis.\n\n**Why:** Moisture variation changes concentration and can make viscosity results unusable.\n\n**How (example):**\n- Condition the pulp according to your lab protocol\n- Record moisture content\n- Weigh the mass needed to give the standard test concentration after correction to oven-dry basis\n\n## Step 2: Dissolve the pulp in CED solvent\n**Action:** Add the prepared pulp to the cupriethylenediamine solution and allow complete dissolution under the specified mixing and time conditions.\n\n**Why:** The test only works if the cellulose is fully and consistently dissolved.\n\n**How (example):**\n- Add the pulp portion to the CED solution in a clean vessel\n- Mix gently but thoroughly\n- Allow the dissolution period required by your method\n- Check for visible undissolved fibers or gels before proceeding\n\n## Step 3: Measure solution viscosity\n**Action:** Transfer the dissolved sample to the viscometer and measure flow time or viscosity at the standard temperature.\n\n**Why:** Viscosity is the analytical signal used to estimate cellulose chain length.\n\n**How (example):**\n- Equilibrate the sample in the temperature bath\n- Run the viscometer exactly as specified\n- Record the flow time or instrument output\n- Repeat if the standard requires replicate readings\n\n## Step 4: Apply the standard calculation\n**Action:** Convert the measured viscosity to intrinsic viscosity or the required viscosity number, then estimate DP using the approved correlation.\n\n**Why:** Raw viscosity is useful, but DP is the value that connects the result to cellulose degradation.\n\n**How (example):**\n- Use the equation in your lab\u2019s standard method\n- Apply the correct conversion for the pulp class being tested\n- Document the standard, equation version, and any assumptions used"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Interpret the Result and Use It in Process Control\n\n## Step 5: Read viscosity as a cellulose preservation indicator\n**Action:** Compare the measured viscosity against your baseline, target range, or historical data for the same pulp grade.\n\n**Why:** A drop in viscosity usually signals cellulose chain scission and lower DP.\n\n**How (example):**\n- If a lot normally gives high viscosity and today\u2019s result is markedly lower, investigate overcooking, oxidation, or hydrolysis\n- If viscosity stays within the expected band, cellulose preservation is likely acceptable\n\n## Step 6: Compare viscosity with kappa number\n**Action:** Interpret viscosity together with residual lignin data rather than alone.\n\n**Why:** A low kappa number is not automatically good if the pulp lost too much cellulose integrity.\n\n**How (example):**\n- **Low kappa + low viscosity**: lignin removal was effective, but the pulp may be over-degraded\n- **High kappa + high viscosity**: cellulose is well preserved, but delignification may be incomplete\n- **Balanced values**: the process likely hit a useful operating window\n\n## Step 7: Check for sources of analytical error\n**Action:** Review whether the result could be influenced by sample or method issues before concluding that the pulp really degraded.\n\n**Why:** Viscosity is sensitive to test conditions and can be misleading if the method is not controlled.\n\n**How (example):**\n- Confirm temperature control was stable\n- Verify dissolution was complete\n- Confirm the same standard and correlation were used for comparison\n- Check whether hemicellulose content or oxidation history could affect interpretation\n\n## Step 8: Use the result for process adjustment\n**Action:** Feed the viscosity/DP result back into cooking or bleaching decisions.\n\n**Why:** The real value of the test is process improvement, not just reporting a number.\n\n**How (example):**\n- If viscosity is falling too far, reduce severity, shorten exposure, or adjust oxidation conditions\n- If viscosity is high but kappa remains high, increase delignification efficiency without over-harsh treatment\n- Track trends lot-by-lot to identify drift before product quality fails"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Usage Rules and Common Pitfalls\n\n## Use CED viscosity as a comparative tool\nTreat it as a **robust process-control metric**, not a perfect direct measurement of molecular weight.\n\n## Only compare like with like\nDo not compare results unless these are the same:\n- Pulp class\n- Standard method\n- Solvent system\n- Test temperature\n- DP correlation\n\n## Watch for common pitfalls\n- **Incomplete dissolution**: causes falsely erratic results\n- **Temperature drift**: changes viscosity significantly\n- **Wrong concentration basis**: corrupts the calculation\n- **Over-interpretation**: viscosity does not identify the exact degradation mechanism by itself\n\n## Final practical takeaway\nIf you want to know whether delignification preserved cellulose, ask two questions together:\n1. **How much lignin remains?** Use kappa number.\n2. **How much cellulose chain length was lost?** Use CED viscosity and DP.\n\nWhen both are considered together, you can judge whether the process removed lignin efficiently while keeping cellulose long enough for the intended pulp quality."

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
