<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "Brightness and colorimetric analysis are standard ways to evaluate how effectively lignin has been removed from pulp and how suitable that pulp is for bleaching or end use. In practice, these methods do not measure lignin directly; they measure how the pulp interacts with light. That makes them especially useful because lignin and its oxidation products are the main sources of yellow-brown color in pulp.\n\nBrightness is typically defined as the percentage of blue light reflected by a pulp pad under standardized conditions. Higher brightness usually indicates lower residual chromophore content, though the relationship is not perfectly one-to-one. Colorimetric analysis goes further by quantifying the pulp color in coordinates such as L*, a*, and b*, where L* reflects lightness, a* the red-green axis, and b* the yellow-blue axis. Together, these metrics help characterize whether a pulp is merely less lignified, or whether it has also been chemically altered in ways that affect color stability.\n\nBecause you already know the chemistry of lignin removal, the key new idea here is the analytical translation: delignification creates optical changes, and those optical changes become process metrics. ISO and TAPPI methods provide the standard framework that makes those measurements comparable across mills, labs, and feedstocks."
  },
  {
    "id": "lesson_page_2",
    "content": "The main ISO and TAPPI brightness methods use carefully controlled sample preparation and optical geometry to ensure reproducible results. Pulp is formed into a standardized sheet or pad, dried and conditioned, and then measured in a brightness meter. The instrument uses defined illumination, filtering, and detector geometry so the result is not just a subjective visual estimate but a standardized reflectance measurement.\n\nA major advantage of brightness testing is that it is rapid and sensitive to bleaching progress. However, brightness is influenced by more than residual lignin. Hexenuronic acids, extractives, metal ions, and lignin oxidation products can all shift the reading. This is why brightness must be interpreted together with Kappa number, viscosity, and sometimes extractive or hexenuronic acid measurements. Brightness is therefore best viewed as an operational quality indicator, not a direct chemical assay.\n\nColorimetric methods add more diagnostic power. For example, a pulp with moderate brightness may still have a high b* value, indicating persistent yellowness. That can signal incomplete lignin removal, lignin-derived chromophores, or reversion-prone structures that may darken during storage or drying. In this sense, color coordinates help separate short-term optical quality from longer-term stability."
  },
  {
    "id": "lesson_page_3",
    "content": "When using brightness and colorimetric data for process control, the central task is linking optical response to upstream delignification severity and downstream requirements. For bleachable kraft pulp, brightness is often used to estimate bleach demand and to check whether residual chromophores are low enough for efficient bleaching. For semichemical or unbleached pulps, color metrics can indicate whether the pulp will meet appearance requirements even if some lignin remains intentionally.\n\nInterpreting these results requires attention to sample history and test conditions. Pulp consistency, drainage, sheet formation, drying, moisture content, and surface smoothness can affect light scattering and therefore apparent brightness. Nonuniform fiber morphology and fines content can also alter reflectance. This is why ISO and TAPPI methods emphasize standard conditioning and repeatable preparation: the measurement must reflect chemical state, not laboratory variability.\n\nA useful analytical strategy is to combine metrics. Brightness tells you the overall optical performance. Kappa number estimates residual lignin-related oxidizability. Viscosity estimates carbohydrate preservation. Color coordinates help identify whether optical deficiencies come from yellowing, redness, or simply low lightness. Together, these measurements give a much more reliable picture of pulp quality than any single number alone."
  },
  {
    "id": "lesson_page_4",
    "content": "Brightness and colorimetric analysis are essential bridges between delignification chemistry and product performance. ISO and TAPPI methods provide standardized, reproducible ways to quantify optical quality in pulp, but the measurements must be interpreted carefully because brightness is affected by multiple chemical and physical factors.\n\nThe most important lesson is that optical measurements are best used as part of a measurement package: brightness for overall whiteness, color coordinates for hue and yellowness, Kappa number for residual lignin, and viscosity for cellulose integrity. In delignification work, the goal is not simply to make pulp look brighter, but to reach the right balance of low residual chromophores, preserved carbohydrates, and downstream fit-for-purpose quality."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
