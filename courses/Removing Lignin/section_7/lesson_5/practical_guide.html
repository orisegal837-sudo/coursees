  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nUse **ISO and TAPPI brightness/colorimetric methods** to evaluate:\n- **Degree of delignification** indirectly through optical response\n- **Residual chromophores** that drive yellow-brown color\n- **Pulp quality** for bleaching suitability or end-use appearance\n\nBy the end, you should be able to:\n- Prepare pulp samples in a standardized form for optical testing\n- Measure **brightness** and **color coordinates** consistently\n- Interpret results alongside **Kappa number, viscosity, and conditioning history**\n- Use the data for **process control** and **quality decisions**\n\n## Technical prerequisites\n- Access to a **brightness meter** compliant with your chosen standard:\n  - **ISO brightness setup** or\n  - **TAPPI brightness setup**\n- The relevant method documents for your lab or mill, such as:\n  - **ISO brightness method** used by your facility\n  - **TAPPI brightness method** used by your facility\n  - A **color measurement instrument** capable of reporting **L\\*, a\\*, b\\***\n- **Standard pulp sheet or pad former** for sample preparation\n- **Controlled drying and conditioning environment**\n- Optional but strongly recommended:\n  - **Kappa number test kit/instrumentation**\n  - **Viscosity testing capability**\n  - Records for **extractives, hexenuronic acids, or metal ion content** if available\n\n## What to prepare before testing\n1. **Choose the pulp stream** you want to evaluate.\n   - Example: oxygen-delignified kraft pulp, bleached kraft pulp, semichemical pulp.\n2. **Confirm the quality question.**\n   - Example: \u201cIs this pulp ready for bleaching?\u201d or \u201cWill this unbleached pulp meet appearance targets?\u201d\n3. **Verify instrument calibration.**\n   - Example: Check the brightness meter with the certified reference tile supplied by the manufacturer."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Prepare Samples Correctly\n\n## Step 1. Form a standardized pulp pad or sheet\n**The Action:** Prepare the pulp according to the ISO/TAPPI method used in your lab.\n\n**Why:** Brightness and color readings depend strongly on sample thickness, moisture, smoothness, and fiber distribution. Poor sample preparation can distort results.\n\n**How (Example):**\n- Disintegrate the pulp consistently.\n- Form a pad or handsheet with uniform basis weight.\n- Press, dry, and condition it according to the method.\n- Use the same preparation route for all samples in a comparison set.\n\n## Step 2. Condition the sample before measurement\n**The Action:** Bring the sample to the required temperature and humidity conditions before testing.\n\n**Why:** Moisture content and surface state affect light scattering and reflectance.\n\n**How (Example):**\n- Place the conditioned sheet in the lab\u2019s standard atmosphere.\n- Wait until it reaches equilibrium before testing.\n- Example workflow: prepare samples in the morning, measure after conditioning in the afternoon.\n\n## Step 3. Calibrate and verify the instrument\n**The Action:** Perform the brightness meter or colorimeter calibration before sample measurement.\n\n**Why:** The instrument must report standardized values, not drift-prone readings.\n\n**How (Example):**\n- Run the white calibration tile or standard reference plaque.\n- Record the calibration check result.\n- If the reading is outside tolerance, clean the optics and recalibrate before proceeding.\n\n## Step 4. Measure brightness using the standard geometry\n**The Action:** Measure pulp brightness using the correct ISO or TAPPI procedure.\n\n**Why:** Standard illumination and detector geometry make results comparable across labs and mills.\n\n**How (Example):**\n- Place the conditioned pulp sheet in the meter.\n- Take multiple readings at different positions on the sheet.\n- Report the average brightness as the final value.\n\n## Step 5. Measure color coordinates when hue matters\n**The Action:** Record **L\\*, a\\*, b\\*** or the equivalent color metrics.\n\n**Why:** Brightness alone can hide useful information about yellowness or redness.\n\n**How (Example):**\n- A pulp with high brightness but **high b\\*** may still appear yellow.\n- A pulp with low **a\\*** and moderate **b\\*** may be visually cleaner than brightness alone suggests."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Interpret the Data with Process Context\n\n## Step 6. Interpret brightness as an operational indicator, not a direct lignin assay\n**The Action:** Read brightness as a proxy for optical cleanliness rather than a direct lignin measurement.\n\n**Why:** Brightness is affected by lignin, but also by hexenuronic acids, extractives, metals, and lignin oxidation products.\n\n**How (Example):**\n- If brightness improves after bleaching, that usually indicates fewer chromophores.\n- If brightness is unexpectedly low despite a moderate Kappa number, check for extractives or metal-related color effects.\n\n## Step 7. Compare brightness with Kappa number and viscosity\n**The Action:** Use a small measurement package instead of relying on brightness alone.\n\n**Why:** Brightness tells you optical performance; Kappa estimates residual oxidizable lignin; viscosity indicates carbohydrate preservation.\n\n**How (Example):**\n- **High Kappa + low brightness**: likely under-delignified pulp.\n- **Low Kappa + low viscosity**: overcooked pulp or carbohydrate damage.\n- **Moderate Kappa + good brightness**: pulp may bleach efficiently.\n\n## Step 8. Use color coordinates to diagnose the type of discoloration\n**The Action:** Examine **L\\***, **a\\***, and **b\\*** to understand whether the pulp is yellowing, reddening, or simply dark.\n\n**Why:** Different chromophore sources affect hue differently, and that affects storage stability and end-use performance.\n\n**How (Example):**\n- **High b\\***: persistent yellowness, often linked to residual chromophores or yellowing-prone structures.\n- **Lower L\\***: overall darker pulp.\n- **Higher a\\***: a redder tone, sometimes associated with specific oxidation products or contamination.\n\n## Step 9. Account for sample-history effects\n**The Action:** Review sheet formation, drainage, drying, fines content, and pulp consistency before trusting a result.\n\n**Why:** Physical structure can change reflectance even if chemistry is unchanged.\n\n**How (Example):**\n- If one sample was over-dried or formed with poor drainage, its brightness may appear artificially low.\n- Re-run the test with properly conditioned and uniformly formed samples before making a process decision."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Turn Measurements into Process Decisions\n\n## Step 10. Use brightness to estimate bleach demand or appearance fit\n**The Action:** Translate the optical result into a production decision.\n\n**Why:** The value of the test is in deciding whether the pulp meets the target or needs further treatment.\n\n**How (Example):**\n- For bleached kraft pulp, use low brightness as a signal that additional bleaching stages may be needed.\n- For semichemical pulp, use the brightness target to decide whether the pulp is acceptable for its intended grade.\n\n## Step 11. Build a local correlation between optical data and process conditions\n**The Action:** Compare brightness and color results with upstream cooking or delignification conditions.\n\n**Why:** Each mill and feedstock can respond differently, so local calibration improves decision-making.\n\n**How (Example):**\n- Track brightness versus effective alkali, time, temperature, or oxygen-delignification severity.\n- Create a simple table showing which operating window reliably produces the desired brightness range.\n\n## Step 12. Use a multi-metric acceptance rule\n**The Action:** Decide pulp quality using brightness, color, Kappa, and viscosity together.\n\n**Why:** A single number can be misleading; combined metrics give a truer picture of delignification and pulp integrity.\n\n**How (Example):**\n- Accept a batch only if it meets all of the following:\n  - Brightness above target\n  - b\\* below yellowness limit\n  - Kappa within residual lignin specification\n  - Viscosity above minimum carbohydrate-preservation threshold\n\n## Step 13. Document the measurement package\n**The Action:** Record the sample preparation, method used, instrument, and all results together.\n\n**Why:** Traceability is essential for comparing data across shifts, labs, and feedstocks.\n\n**How (Example):**\nUse a report template like:\n- Sample ID\n- ISO/TAPPI method used\n- Conditioning conditions\n- Brightness\n- L\\*, a\\*, b\\*\n- Kappa number\n- Viscosity\n- Final decision and comments\n\n## Final takeaway\nBrightness and colorimetric methods are most powerful when treated as part of a **standardized, multi-parameter quality check**. Use them to detect residual chromophores, monitor delignification progress, and confirm whether the pulp is truly fit for bleaching or end use."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
