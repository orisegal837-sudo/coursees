  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a lab workflow that lets you:\n1. **Measure HexA in pulp** using an acid-conversion assay.\n2. **Compare HexA content to the uncorrected Kappa number**.\n3. **Apply a validated Kappa correction** so your delignification assessment better reflects residual lignin instead of carbohydrate interference.\n\n## When to use this workflow\nUse it when you are working with:\n- **Hardwood pulps** with significant xylan content\n- **Highly carbohydrate-preserving cooks**\n- **Bleach plant or pilot-plant control decisions** where small Kappa errors matter\n\n## Technical prerequisites\nYou will need specific laboratory access and materials:\n- **Kappa number test capability** following your plant or standard method (for example, ISO/TAPPI-based Kappa testing)\n- **Acid hydrolysis setup** capable of controlled heating and acidification\n- **Chromatography access** for detecting HexA-related products, ideally:\n  - HPLC with UV detector, or\n  - equivalent chromatographic system validated for 2-furoic acid / 5-formyl-2-furoic acid\n- **Analytical balance** and calibrated volumetric glassware\n- **Certified reference standards** for calibration of the HexA proxy compounds used by your method\n- **Blank reagents and controls** for method correction\n- **Validated correction factors or equations** specific to your pulp type and analytical protocol\n\n## What you should have ready before starting\n- Pulp samples from the same cook or process line\n- Sample labels that preserve cooking conditions, wood species, and batch ID\n- A method sheet defining:\n  - acid concentration\n  - hydrolysis temperature and time\n  - detection wavelength or chromatographic conditions\n  - calculation formula for HexA and Kappa correction\n\n## Why this matters\nIf you skip HexA measurement, your Kappa result can be **systematically inflated** by carbohydrate-derived permanganate consumption. That can lead to:\n- unnecessary overcooking\n- excessive bleaching chemical demand\n- misleading comparisons between cooks or furnishes\n\n## Example setup\n**Typical lab decision point:**\n- Hardwood kraft pulp shows Kappa = 18.5\n- You suspect elevated HexA from strong carbohydrate preservation\n- You run the HexA assay before deciding whether the cook is truly under-delignified"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Measure HexA in the Pulp\n\n## Step 1: Prepare representative pulp samples\n### The Action\nTake a well-mixed pulp sample, wash it if required by the method, and determine moisture content so results can be reported on a dry-pulp basis.\n### Why it matters\nHexA results are only meaningful if the sample represents the bulk pulp and is normalized correctly.\n### How (Example)\n- Weigh out a known amount of wet pulp\n- Wash according to your method to remove residual liquor\n- Determine oven-dry equivalent before analysis\n\n## Step 2: Convert HexA under controlled acid conditions\n### The Action\nTreat the pulp with a defined acid hydrolysis or acid-conversion step that releases HexA-derived marker compounds.\n### Why it matters\nHexA itself is often measured indirectly; the assay depends on converting HexA into detectable products such as **2-furoic acid** or **5-formyl-2-furoic acid**.\n### How (Example)\n- Add pulp to acid at the method-specified concentration\n- Heat for the specified time and temperature\n- Cool and neutralize or dilute as required before analysis\n\n## Step 3: Measure the released compounds\n### The Action\nAnalyze the hydrolysate using your validated chromatographic or spectrophotometric method.\n### Why it matters\nThis step turns the chemical signal into a quantitative HexA estimate.\n### How (Example)\n- Run HPLC with a calibration curve made from reference standards\n- Include blanks to correct background signal\n- Record peak area and convert to concentration\n\n## Step 4: Calculate HexA content\n### The Action\nUse the assay\u2019s conversion factor to express HexA as mmol/kg, mg/g, or the reporting unit required by your plant.\n### Why it matters\nYou need a standardized unit before you can correct Kappa.\n### How (Example)\n- If your calibration indicates 0.42 mmol/L of HexA proxy in the hydrolysate\n- And the sample mass and dilution factors are known\n- Convert that to **HexA per oven-dry ton** or **mmol/kg pulp** per your lab standard\n\n## Step 5: Check method quality\n### The Action\nVerify recovery, blank performance, and repeatability before trusting the number.\n### Why it matters\nPoor hydrolysis control or detector drift can distort the correction.\n### How (Example)\n- Run duplicate samples\n- Check a known reference pulp\n- Confirm blank response is near zero or within allowed limits\n\n## Practical interpretation rule\nIf HexA is high, the uncorrected Kappa value likely includes a meaningful non-lignin contribution. That means the pulp may be more delignified than the raw Kappa number suggests."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Apply the Kappa Correction\n\n## Step 1: Measure the uncorrected Kappa number\n### The Action\nRun the standard Kappa test on the same pulp lot used for HexA analysis.\n### Why it matters\nYou need the baseline Kappa value before you can adjust it.\n### How (Example)\n- Test the pulp using your plant\u2019s standard Kappa procedure\n- Record the result as **Kappa\na** or **Kappa uncorrected**\n\n## Step 2: Convert HexA to Kappa contribution\n### The Action\nUse the validated relationship for your pulp type to translate HexA content into an equivalent Kappa contribution.\n### Why it matters\nHexA does not reduce Kappa directly; it contributes to permanganate consumption, so you need a conversion factor.\n### How (Example)\n- Use the correction equation provided by your standard\n- Apply the factor specific to hardwood vs softwood pulp\n- Confirm whether the method requires a direct subtraction or a formula-based adjustment\n\n## Step 3: Calculate corrected Kappa\n### The Action\nSubtract the HexA-derived contribution from the measured Kappa value.\n### Why it matters\nThe corrected Kappa better reflects true residual lignin.\n### How (Example)\n- If uncorrected Kappa = 18.5\n- And HexA contributes the equivalent of 2.1 Kappa units\n- Then corrected Kappa = **16.4**\n\n## Step 4: Use the corrected value for process decisions\n### The Action\nBase cook evaluation, oxygen delignification targets, and bleach-demand estimates on the corrected Kappa.\n### Why it matters\nThis prevents overestimating lignin content and avoids overprocessing.\n### How (Example)\n- A pulp that appears \u201chigh Kappa\u201d may already be sufficiently delignified once HexA is removed from the signal\n- Use corrected Kappa to decide whether to extend cooking or proceed to bleaching\n\n## Step 5: Validate against other quality indicators\n### The Action\nCross-check corrected Kappa with residual lignin, brightness, or bleach response when the decision is high-stakes.\n### Why it matters\nCorrected Kappa is a strong process-control metric, but not a complete substitute for full pulp characterization.\n### How (Example)\n- Compare corrected Kappa trends against brightness gain in an oxygen stage\n- If corrected Kappa and brightness response agree, confidence in the correction is higher\n\n## Practical decision rule\nUse **uncorrected Kappa** for quick routine monitoring, but use **corrected Kappa** when comparing furnishes, tuning cook severity, or forecasting bleaching chemical demand.\n\n## Example workflow summary\n1. Measure Kappa\n2. Measure HexA\n3. Convert HexA to Kappa-equivalent contribution\n4. Subtract it using the validated method\n5. Make your delignification decision from the corrected result"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Operating Tips and Final Checklist\n\n## Good operating practice\n- **Use the same method consistently** across all samples\n- **Standardize by pulp type and wood species**\n- **Document every correction factor** used in calculations\n- **Retain chromatograms, blanks, and calibration curves** for traceability\n- **Recheck the method when furnish or cook conditions change**\n\n## Common mistakes to avoid\n- Treating Kappa as a pure lignin measurement\n- Applying a correction factor from a different pulp type without validation\n- Comparing corrected and uncorrected Kappa values as if they were interchangeable\n- Ignoring HexA in hardwood pulps where it can materially affect results\n\n## Final checklist before using the result\n- [ ] Pulp sample is representative and dry-weight corrected\n- [ ] HexA assay has acceptable blanks and calibration\n- [ ] Uncorrected Kappa has been measured on the same lot\n- [ ] Correction factor matches pulp type and analytical method\n- [ ] Corrected Kappa has been reviewed against process goals\n\n## Practical takeaway\nThe most reliable workflow is:\n**measure Kappa \u2192 quantify HexA \u2192 apply a validated correction \u2192 interpret in context**.\n\nThat gives you a better estimate of residual lignin, more stable cook control, and more accurate bleach planning."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
