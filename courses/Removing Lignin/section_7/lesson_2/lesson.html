  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "In delignification work, you often need a measurement of the remaining lignin that is more informative than a visual estimate or a process endpoint guess. The most widely used analytical approach is to separate lignin into two fractions: Klason lignin, which is the acid-insoluble residue, and acid-soluble lignin, which stays dissolved in the hydrolysate. Together, these values provide a practical estimate of total lignin content in wood, pulp, and other lignocellulosic samples.\n\nThe Klason method is built on a simple idea: carbohydrates can be hydrolyzed and removed by strong acid treatment, while most lignin resists complete dissolution and remains as a solid residue. That residue is dried and weighed to estimate acid-insoluble lignin. However, lignin is not entirely insoluble, especially after harsh chemical or thermal treatment, so a portion enters the liquid phase. That dissolved fraction must be measured separately by UV-visible spectroscopy to avoid underestimating total lignin.\n\nFor someone already familiar with lignin chemistry, the key new point is analytical partitioning. The method does not directly reveal every structural detail of lignin; instead, it gives a mass balance-based estimate of how much lignin remains after treatment. This makes it essential for comparing pretreatment severity, judging delignification extent, and linking chemical processing to pulp quality targets."
  },
  {
    "id": "lesson_page_2",
    "content": "Klason lignin quantification usually begins with acid hydrolysis of a dried, milled sample. A concentrated acid step is used first to swell and partially depolymerize the carbohydrate matrix, followed by dilution and heating to complete hydrolysis of polysaccharides. The insoluble solid left behind is collected, washed, dried, and weighed. After correction for ash and other non-lignin minerals, this mass is reported as acid-insoluble lignin.\n\nThe acid-soluble lignin fraction is measured from the hydrolysate, commonly by UV absorbance around 205 nm or another validated wavelength depending on method and sample matrix. Because dissolved lignin fragments and degradation products can absorb in the UV, a calibration or extinction coefficient is needed. The analyst must also account for interfering compounds such as extractives, acids, and sugar degradation products, which can bias the measurement.\n\nThis is why sample preparation matters so much. Particle size, extractives removal, moisture correction, and proper mixing all affect accuracy. In pulp samples, incomplete washing or residual chemicals can distort both the solid residue and the spectroscopic reading. In practice, the best results come from carefully standardized protocols and consistent sample handling across all comparative tests."
  },
  {
    "id": "lesson_page_3",
    "content": "The main value of Klason plus acid-soluble lignin analysis is not simply reporting a number, but supporting process decisions. If a pretreatment is supposed to reduce lignin while preserving carbohydrates, total lignin analysis shows whether the process actually achieved that balance. It can also help distinguish true delignification from apparent lignin loss caused by carbohydrate degradation, which can otherwise mislead interpretation.\n\nIn pulp and bleaching applications, lignin content is closely connected to downstream performance. Lower residual lignin generally means lower bleach demand and improved brightness potential, but over-delignification can reduce yield and damage pulp strength. Therefore, lignin quantification is often interpreted alongside kappa number, carbohydrate yield, viscosity, and brightness. Klason lignin is especially useful as a reference method when kappa number may be affected by hexenuronic acids, extractives, or process-specific chemistry.\n\nA useful way to think about the method is as a validation tool. Process conditions may suggest strong delignification, but only analysis can confirm whether lignin removal really happened and whether the treatment preserved the desired pulp quality. In that sense, lignin quantification acts as a bridge between chemistry and product performance."
  },
  {
    "id": "lesson_page_4",
    "content": "Klason and acid-soluble lignin quantification provide a standard, practical estimate of total lignin remaining after treatment. Klason lignin measures the acid-insoluble residue, while UV analysis captures dissolved lignin fragments in the hydrolysate. Together, they support comparison of pretreatment severity, verification of delignification progress, and evaluation of pulp quality outcomes.\n\nThe main takeaways are: use both fractions, control sample preparation carefully, watch for analytical interferences, and interpret lignin data together with other quality metrics. For delignification design, the method is most powerful when used as part of a broader performance framework rather than as a standalone indicator."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
