  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nUse **Klason lignin + acid-soluble lignin analysis** to measure **total residual lignin** in biomass or pulp so you can:\n- verify how far delignification has progressed,\n- compare pretreatment or bleaching conditions,\n- avoid relying on visual estimates or process guesses,\n- relate chemical removal of lignin to pulp quality outcomes.\n\n## What you will produce\nA defensible lignin report containing:\n- **acid-insoluble lignin (Klason lignin)**,\n- **acid-soluble lignin (ASL)**,\n- **total lignin** = Klason + ASL,\n- optional corrections for **ash/mineral residue** and **moisture**.\n\n## Technical prerequisites\nHave these ready before starting:\n1. **Drying oven** capable of 105 \u00b0C for moisture correction and residue drying.\n2. **Analytical balance** with at least 0.1 mg readability.\n3. **Milling/grinding device** for homogenizing biomass or pulp.\n4. **Acid hydrolysis setup** for strong-acid digestion, including:\n   - concentrated sulfuric acid handling setup,\n   - dilution vessels,\n   - heating block, water bath, or autoclave-compatible hydrolysis system.\n5. **Vacuum filtration apparatus** with acid-resistant filters or crucibles.\n6. **UV-Vis spectrophotometer** capable of measuring around **205 nm** or the validated wavelength used in your method.\n7. **Reference extinction coefficient or calibration standard** for lignin quantification in the hydrolysate.\n8. **Deionized water, acid-resistant glassware, and PPE** suitable for concentrated acid work.\n9. **A validated protocol or lab standard** for the exact sample type you are testing (wood, pulp, or residue).\n\n## Recommended starting inputs\n- **Dry biomass or pulp sample** with known sample ID\n- **Replicates**: at least 2\u20133 per condition\n- **Process context**: pretreatment severity, bleaching stage, or delignification step\n\n## Why this setup matters\nIf you skip moisture correction, sample homogenization, or UV calibration, your lignin values can be misleading. This method is only useful when the acid-insoluble and acid-soluble fractions are measured consistently."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation: Measure Klason Lignin\n\n## Step 1: Prepare and standardize the sample\n**Action:** Dry, mill, and homogenize the biomass or pulp before analysis.\n\n**Why:** Uneven particle size or moisture content causes poor acid contact and inconsistent residue recovery.\n\n**How (example):**\n- Dry the sample to constant mass at 105 \u00b0C.\n- Grind biomass to a uniform particle size.\n- Mix thoroughly and weigh a representative aliquot, e.g. **300\u2013500 mg oven-dry basis**.\n\n## Step 2: Perform the primary acid hydrolysis\n**Action:** Treat the weighed sample with concentrated sulfuric acid to start carbohydrate hydrolysis.\n\n**Why:** The acid breaks down polysaccharides so the insoluble lignin fraction can be separated from dissolved material.\n\n**How (example):**\n- Add concentrated H\u2082SO\u2084 to the sample under controlled conditions.\n- Stir to fully wet the solids and allow swelling/partial depolymerization.\n- Maintain the specified temperature and time from your method.\n\n## Step 3: Dilute and complete hydrolysis\n**Action:** Dilute the acid mixture and heat it to complete hydrolysis of carbohydrates.\n\n**Why:** This removes the carbohydrate matrix and leaves behind the acid-insoluble lignin residue.\n\n**How (example):**\n- Dilute the acid to the method-specified concentration.\n- Heat in a water bath or digestion system for the validated time.\n- Mix consistently so the entire slurry hydrolyzes evenly.\n\n## Step 4: Recover the insoluble residue\n**Action:** Filter, wash, dry, and weigh the solid residue.\n\n**Why:** The remaining solid is the basis for Klason lignin measurement.\n\n**How (example):**\n- Filter the hydrolysate through a pre-weighed crucible or filter setup.\n- Wash until acid is removed.\n- Dry the residue to constant weight.\n- Weigh the dried residue and record the mass.\n\n## Step 5: Correct for ash and non-lignin minerals\n**Action:** Measure ash in the residue and subtract non-lignin solids if required by the protocol.\n\n**Why:** Inorganic material can inflate apparent lignin content.\n\n**How (example):**\n- Ignite a portion of the residue or follow your lab ash procedure.\n- Subtract mineral residue from the dried mass.\n- Report the corrected **acid-insoluble lignin** as a percentage of oven-dry sample mass."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step-by-Step Implementation: Measure Acid-Soluble Lignin and Use the Data\n\n## Step 6: Measure acid-soluble lignin in the hydrolysate\n**Action:** Analyze the liquid hydrolysate by UV-Vis spectrophotometry.\n\n**Why:** Some lignin fragments dissolve during hydrolysis, and ignoring them underestimates total lignin.\n\n**How (example):**\n- Prepare a blank using the same acid matrix.\n- Measure absorbance at **205 nm** or the method-validated wavelength.\n- Apply the correct path length and dilution factor.\n- Convert absorbance to lignin concentration using the extinction coefficient or calibration curve.\n\n## Step 7: Check and manage interferences\n**Action:** Evaluate the hydrolysate for compounds that may bias UV absorbance.\n\n**Why:** Sugars, degradation products, extractives, acids, and other chromophores can distort the ASL value.\n\n**How (example):**\n- Run method blanks and matrix controls.\n- If the hydrolysate is highly colored or turbid, dilute or clarify according to protocol.\n- Use the same analytical wavelength and calibration approach for all samples in a study.\n\n## Step 8: Calculate total lignin\n**Action:** Sum the acid-insoluble lignin and acid-soluble lignin fractions.\n\n**Why:** Total lignin is the metric most useful for comparing delignification progress.\n\n**How (example):**\n- Report: **Total lignin = Klason lignin + ASL**\n- Example format:\n  - Klason lignin = 18.6% o.d. basis\n  - ASL = 1.4% o.d. basis\n  - Total lignin = 20.0% o.d. basis\n\n## Step 9: Interpret the result in process context\n**Action:** Compare total lignin against process targets and other quality indicators.\n\n**Why:** Lignin content alone does not tell the full story of delignification quality.\n\n**How (example):**\n- For pretreatment: compare total lignin before and after severity changes.\n- For pulp: interpret lignin alongside **kappa number, brightness, viscosity, and yield**.\n- Use the result to decide whether the process needs stronger delignification, gentler treatment, or better washing.\n\n## Step 10: Use the analysis for control and troubleshooting\n**Action:** Trend lignin measurements across batches or conditions.\n\n**Why:** Repeated measurements reveal whether your process is stable and truly removing lignin.\n\n**How (example):**\n- If Klason lignin drops but yield collapses, your treatment may be over-harsh.\n- If kappa number suggests low lignin but Klason remains high, investigate assay interference or process-specific chemistry.\n- Use lignin data as a verification tool, not just a reportable endpoint."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Reporting Checklist\n\n## Report these items every time\n- Sample type and origin\n- Dry basis or as-received basis\n- Sample preparation details\n- Hydrolysis conditions\n- Klason lignin value\n- Acid-soluble lignin value\n- Total lignin value\n- Ash correction method\n- UV wavelength and extinction coefficient/calibration used\n- Replicate count and variability\n\n## Decision rules you can apply immediately\n- **Use both fractions** whenever you need total lignin.\n- **Standardize sample prep** to reduce error.\n- **Treat UV absorbance as matrix-sensitive** and validate the blank/calibration.\n- **Interpret lignin together with other pulp metrics** instead of alone.\n\n## Quick implementation template\n1. Prepare and dry sample.\n2. Hydrolyze with strong acid.\n3. Collect and weigh insoluble residue.\n4. Measure UV absorbance of hydrolysate.\n5. Calculate Klason, ASL, and total lignin.\n6. Compare results to process targets and pulp quality metrics.\n\n## Bottom line\nKlason lignin gives the acid-insoluble fraction, acid-soluble lignin captures the dissolved fraction, and together they give a practical, process-relevant estimate of lignin remaining after delignification."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
