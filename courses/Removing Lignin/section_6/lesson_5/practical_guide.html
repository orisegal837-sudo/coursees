      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);

      align-items: center;

      background: rgba(255, 255, 255, 0.03);

      color: var(--text-main);

<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **delignification process workflow** that uses **process intensification** to remove lignin faster and more selectively while **preserving carbohydrates** and keeping the process scalable.\n\nBy the end, you should be able to:\n- Choose between **organosolv**, **oxidative**, or **assisted-energy** intensification routes.\n- Define operating conditions that improve **lignin removal** without excessive cellulose or hemicellulose loss.\n- Translate lab-scale delignification concepts into a **reactor-aware process plan**.\n- Evaluate whether a process is practical based on **solvent recovery, oxidant efficiency, and scale-up constraints**.\n\n## Technical Prerequisites\nBefore starting, make sure you have access to:\n- A **biomass pretreatment reactor** capable of controlled **temperature and pressure** operation.\n- Basic **analytical tools** for evaluating delignification, such as:\n  - **Klason lignin** measurement setup or equivalent lignin assay\n  - **Carbohydrate composition** analysis (e.g., HPLC or GC for sugars/oligosaccharides)\n  - **Solid yield** and **mass balance** tracking tools\n- For organosolv work:\n  - Organic solvents such as **ethanol, acetone, or methanol**\n  - Optional **acid catalyst** handling capability\n  - A **solvent recovery** setup, such as rotary evaporation or distillation\n- For oxidative work:\n  - Controlled supply of **oxygen, hydrogen peroxide, ozone, or peracids** depending on the system\n  - **Corrosion-resistant** labware and safety-rated oxidant handling equipment\n- For assisted energy approaches:\n  - Access to **ultrasound**, **microwave**, **high-shear mixing**, or enhanced heating/pressurization equipment if available\n\n## What to Keep in Mind Before You Start\n- The goal is not just to remove lignin; it is to remove it **selectively**.\n- Every intensification choice affects:\n  - **Mass transfer** into biomass\n  - **Reaction kinetics**\n  - **Product quality**\n  - **Recovery cost**\n  - **Scale-up complexity**\n\n## Practical Starting Template\nUse this decision frame before running experiments:\n1. **Define the target**: high pulp yield, low residual lignin, or recoverable lignin stream.\n2. **Choose the biomass**: hardwood, softwood, or agricultural residue.\n3. **Pick the intensification route**: organosolv, oxidative, or assisted energy.\n4. **Set a success metric**: lignin removal %, carbohydrate retention %, and solvent/oxidant efficiency."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement Organosolv Delignification\n\n## Step 1: Select the solvent system\n**Action:** Choose a solvent mixture that balances lignin solubility, biomass swelling, and downstream recovery.\n\n**Why:** The solvent composition controls how well lignin fragments dissolve and how much the biomass structure opens up.\n\n**How (Example):**\n- Start with an **ethanol/water** system such as **60:40 v/v** for a hardwood feedstock.\n- If lignin dissolution is weak, test **70:30 v/v** or add mild acid catalysis.\n- For a more polar feedstock, compare with **acetone/water** under the same solids loading.\n\n## Step 2: Tune temperature, time, and acidity\n**Action:** Run a condition matrix that varies **temperature**, **residence time**, and **acid loading** in small increments.\n\n**Why:** More severe conditions improve delignification, but too much severity causes sugar loss, cellulose DP reduction, and lignin condensation.\n\n**How (Example):**\n- Test three temperatures: **150\u00b0C, 170\u00b0C, 190\u00b0C**\n- Test two residence times: **30 min and 60 min**\n- Test acid catalyst at **0, low, and moderate dose**\n- Track which condition gives the best balance of **lignin removal vs. carbohydrate retention**\n\n## Step 3: Control solids loading and water content\n**Action:** Adjust solids loading and water fraction to avoid poor impregnation or excessive hydrolysis.\n\n**Why:** Water changes solvent polarity, biomass swelling, and the balance between **solubilization** and **hydrolysis**.\n\n**How (Example):**\n- Run solids loadings at **5%, 10%, and 15% w/w**.\n- Compare solvent systems with **30%, 40%, and 50% water content**.\n- Select the condition that gives uniform treatment without excessive hemicellulose loss.\n\n## Step 4: Verify fractionation quality\n**Action:** Measure pulp yield, residual lignin, sugar retention, and lignin recovery from the liquid phase.\n\n**Why:** A good organosolv process must create a clean lignin stream and a carbohydrate-rich solid, not just remove mass.\n\n**How (Example):**\n- Calculate **delignification efficiency** = lignin removed / initial lignin.\n- Measure **pulp brightness or purity** if relevant.\n- Check whether lignin precipitates cleanly after solvent dilution or recovery.\n\n## Step 5: Validate solvent recovery\n**Action:** Test whether the solvent can be recovered and reused with minimal loss.\n\n**Why:** Organosolv processes only scale well if the solvent loop is economically and operationally practical.\n\n**How (Example):**\n- Recover ethanol by **distillation**.\n- Recycle the recovered solvent for at least **3 consecutive cycles**.\n- Record any decline in delignification performance or increase in impurities."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Implement Oxidative and Assisted-Energy Intensification\n\n## Step 1: Choose the oxidative pathway\n**Action:** Select the oxidant system based on feedstock behavior, equipment limits, and selectivity needs.\n\n**Why:** Oxygen, peroxide, ozone, and peracids act through different mechanisms and require different reactor and safety setups.\n\n**How (Example):**\n- Use **alkaline peroxide** for a laboratory-friendly screening study.\n- Use **oxygen delignification** when you can provide strong mixing and gas transfer.\n- Use **ozone** only if you have proper gas handling and fast-contact reactor capability.\n\n## Step 2: Improve oxidant distribution and impregnation\n**Action:** Design the process so the oxidant reaches the biomass interior before it decomposes or overreacts at the surface.\n\n**Why:** Poor distribution causes surface damage, underdelignified cores, and wasted oxidant.\n\n**How (Example):**\n- Pre-impregnate chips in alkaline liquor before adding peroxide.\n- Use staged oxidant addition instead of one large charge.\n- Increase mixing speed or use a plug-flow reactor with controlled feed injection.\n\n## Step 3: Control reaction severity\n**Action:** Adjust oxidant dose, pH, temperature, and reaction time to maximize lignin oxidation without over-oxidizing carbohydrates.\n\n**Why:** The key is to weaken lignin faster than cellulose and hemicellulose are degraded.\n\n**How (Example):**\n- Compare **low, medium, and high oxidant dosage** at constant temperature.\n- Measure residual lignin and carbohydrate loss after each run.\n- Choose the lowest dose that achieves the lignin target.\n\n## Step 4: Add assisted energy inputs where they solve a transport bottleneck\n**Action:** Apply heat, pressure, ultrasound, microwave, or stronger agitation only when it improves transfer or kinetics.\n\n**Why:** Assisted energy can speed reactions, but unnecessary energy input adds complexity and can hurt selectivity.\n\n**How (Example):**\n- Use **moderate heating** to accelerate peroxide delignification.\n- Use **high-shear mixing** to reduce boundary-layer resistance around biomass particles.\n- Test **ultrasound** on a small scale to see whether it improves impregnation before investing in scale-up.\n\n## Step 5: Check scale-up feasibility\n**Action:** Evaluate whether the intensified process can run uniformly in larger equipment.\n\n**Why:** Many lab successes fail at scale because oxidant transfer, heat removal, or mixing becomes uneven.\n\n**How (Example):**\n- Compare batch flask results with a **stirred tank** or **continuous reactor**.\n- Record temperature gradients, gas uptake, and oxidant utilization.\n- Reject designs that only work under unrealistically intense lab conditions."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Integrate, Compare, and Scale\n\n## Step 1: Compare all routes with the same performance metrics\n**Action:** Score organosolv, oxidative, and assisted-energy options using the same evaluation criteria.\n\n**Why:** Direct comparison prevents choosing a route that looks strong chemically but fails economically or operationally.\n\n**How (Example):**\nUse a simple matrix with these columns:\n- **Residual lignin**\n- **Carbohydrate retention**\n- **Solvent/oxidant consumption**\n- **Product purity**\n- **Energy demand**\n- **Recovery complexity**\n- **Scale-up risk**\n\n## Step 2: Identify the operating window\n**Action:** Find the narrow condition range where lignin removal is high and carbohydrate damage is low.\n\n**Why:** Process intensification succeeds when severity is enough to overcome transport barriers but not so high that selectivity collapses.\n\n**How (Example):**\n- Plot **lignin removal vs. carbohydrate loss**.\n- Mark the region where lignin removal exceeds your target, for example **>70%**, while carbohydrate loss stays below a chosen threshold.\n- Choose the center of that region, not the extreme.\n\n## Step 3: Design for downstream recovery\n**Action:** Build solvent, oxidant, and lignin recovery into the process from the start.\n\n**Why:** A process is not practical if the products cannot be separated cleanly or the reagents cannot be reused.\n\n**How (Example):**\n- Add a **lignin precipitation step** after organosolv liquor recovery.\n- Add a **quench or decomposition control step** after oxidation.\n- Recycle solvent or process water wherever purity allows.\n\n## Step 4: Scale with reactor behavior in mind\n**Action:** Move from batch proof-of-concept to a reactor design that preserves contact, mixing, and residence-time control.\n\n**Why:** Delignification performance depends on uniform exposure; scale-up changes how heat, mass transfer, and reaction fronts behave.\n\n**How (Example):**\n- For organosolv, consider **continuous flow or staged reactors**.\n- For oxidation, use **staged oxidant addition** and efficient gas-liquid contactors.\n- For energy-assisted systems, verify that the same heating or mixing pattern exists in the larger unit.\n\n## Final Rule of Thumb\nIf intensification improves lignin removal but causes major carbohydrate loss, poor recovery, or unsafe scale-up, it is not a successful design. The best process is the one that achieves **selective delignification with practical reactor performance**."
  }
]

  function simpleMarkdownToHtml(md){

    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
