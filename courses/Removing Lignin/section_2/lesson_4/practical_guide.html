    /* ========================================
      PREMIUM THEME & TYPOGRAPHY VARIABLES

    */

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);

      --text-muted: #94a3b8;
      --text-heading: #ffffff;

      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));

      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);

      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      --content-max-width: 1200px;

    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

      LAYOUT & SHELL

      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

      display: flex;
      flex-direction: column;

    }

      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {

      flex-direction: column;
      align-items: center;
      text-align: center;

      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;

      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;

      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);

      padding: clamp(24px, 5vw, 56px);

    }

      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;

      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

      margin-bottom: 0;

      height: 1px;

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)

    */
    .task-container {

    }

      border-radius: var(--radius-lg);

    }

      align-items: flex-start;

      font-weight: bold;

      TRANSITIONS & ANIMATIONS
      ========================================

    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }

    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nImplement a **pH-controlled sulfite or NSSC pulping workflow** that uses SO2/bisulfite/sulfite chemistry to achieve the right balance of **delignification, carbohydrate preservation, and pulp yield**.\n\nBy the end of this workflow, you should be able to:\n- Select the right **pH window** for either acidic sulfite pulping or neutral sulfite semichemical (NSSC) pulping.\n- Prepare and control a liquor dominated by **SO2, bisulfite (HSO3\u2212), or sulfite (SO3^2\u2212)** depending on process goals.\n- Track how pH changes lignin reactivity, carbohydrate stability, and overall cook severity.\n- Use impregnation, temperature, and time as process controls rather than treating chemistry in isolation.\n\n## Technical prerequisites\nYou will need access to:\n- **A pulping reactor or autoclave** capable of controlled heating and liquor-to-wood cooking.\n- **SO2 supply or sulfite cooking chemicals** suitable for preparing sulfite or bisulfite liquor.\n- **A calibrated pH meter** with buffers for at least pH 4, 7, and 10.\n- **Temperature control equipment** for maintaining cooking conditions.\n- **Wood chips or semichemical feedstock** for trial cooking.\n- **Basic pulp testing tools** for yield, kappa number, brightness, or residual lignin assessment.\n- **Personal protective equipment** appropriate for acidic sulfur handling.\n\n## What you are controlling\n- **Lower pH** increases molecular SO2 and bisulfite dominance, which favors acidic sulfite delignification.\n- **Near-neutral pH** shifts chemistry toward NSSC-style partial delignification and better carbohydrate retention.\n- **Higher pH** increases sulfite availability and reduces acid-catalyzed carbohydrate damage, but changes lignin reaction pathways.\n\n## Practical target choices\n- Choose **acidic sulfite pulping** if your goal is **more complete lignin removal**.\n- Choose **NSSC** if your goal is **higher yield and partial delignification** before mechanical refining."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the Cooking Liquor and Set the pH Window\n\n## Step 1: Decide the process target before mixing chemicals\n**Action:** Define whether you want acidic sulfite delignification or NSSC semichemical pulping.\n\n**Why:** The target determines the pH range, sulfur species distribution, and how aggressively lignin and carbohydrates will be affected.\n\n**How (Example):**\n- For **acidic sulfite**, set a plan for stronger delignification and lower pH.\n- For **NSSC**, plan for a milder, near-neutral cook that preserves more polysaccharides.\n\n## Step 2: Prepare the sulfur-based liquor\n**Action:** Create a cooking liquor containing SO2-derived species and adjust it to the intended pH.\n\n**Why:** The active chemistry depends on the equilibrium between SO2, bisulfite, and sulfite\u2014not just on the total sulfur added.\n\n**How (Example):**\n- Dissolve the sulfur reagent in water under controlled mixing.\n- Measure pH immediately after preparation.\n- Adjust carefully until the liquor sits in the desired operating window.\n- Record the final pH, temperature, and composition for repeatability.\n\n## Step 3: Verify which sulfur species is likely dominant\n**Action:** Use pH as a practical indicator of whether the liquor is bisulfite-rich or sulfite-rich.\n\n**Why:** Bisulfite is typically more associated with lignin sulfonation under acidic cooking, while sulfite becomes more relevant as pH increases.\n\n**How (Example):**\n- If the liquor is **more acidic**, expect **more molecular SO2 and bisulfite**.\n- If the liquor is **closer to neutral or alkaline**, expect **more sulfite character**.\n- Document the expected dominant species before charging chips.\n\n## Step 4: Match pH to the intended chemistry\n**Action:** Set the pH according to the product you want.\n\n**Why:** pH controls both lignin reactivity and carbohydrate stability.\n\n**How (Example):**\n- **Acidic sulfite cook:** favor stronger lignin modification and higher delignification.\n- **NSSC cook:** keep conditions milder so hemicellulose and cellulose are better preserved."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Run the Cook and Control Penetration, Severity, and Selectivity\n\n## Step 5: Impregnate chips uniformly\n**Action:** Pre-soak or impregnate chips so liquor penetration is as even as possible before the main cook.\n\n**Why:** Uniform penetration reduces overcooking at the chip surface and undercooking in the core.\n\n**How (Example):**\n- Load chips with sufficient liquor contact time before the temperature ramp.\n- Agitate or circulate liquor if equipment allows.\n- Check whether the chip bed is fully wetted and not channeling.\n\n## Step 6: Apply temperature and time as severity controls\n**Action:** Increase temperature and hold time only as far as needed for the desired level of delignification.\n\n**Why:** Sulfite chemistry is severity-sensitive; too much time or heat can damage carbohydrates, especially under acidic conditions.\n\n**How (Example):**\n- For **acidic sulfite**, use severity to drive lignin sulfonation and extraction, but monitor for sugar loss.\n- For **NSSC**, use milder severity to stop after partial delignification and preserve yield.\n\n## Step 7: Track pH drift during cooking\n**Action:** Measure or estimate pH changes during the cook, not just at the start.\n\n**Why:** The liquor can shift as reactions proceed, changing the balance between SO2, bisulfite, and sulfite and altering selectivity.\n\n**How (Example):**\n- Sample liquor at intervals if possible.\n- Note whether the system becomes more acidic or trends upward in pH.\n- Adjust future cooks if the observed pH drift causes poor pulp quality.\n\n## Step 8: Watch for the right chemistry outcome\n**Action:** Evaluate whether lignin is being made more soluble without excessive carbohydrate degradation.\n\n**Why:** Good sulfite/NSSC performance depends on selective lignin modification, not just maximum chemical attack.\n\n**How (Example):**\n- Look for improved fiber separation and reduced residual lignin.\n- In acidic sulfite, expect stronger delignification.\n- In NSSC, expect partial delignification with higher yield and easier downstream refining."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Evaluate Results and Tune the Process\n\n## Step 9: Assess pulp and spent liquor outcomes\n**Action:** Measure pulp yield, residual lignin, and fiber quality after the cook.\n\n**Why:** These results tell you whether your pH and sulfur-species balance matched the intended process window.\n\n**How (Example):**\n- If yield is too low and fibers are weakened, the cook was likely too severe or too acidic.\n- If residual lignin is too high, delignification was insufficient or impregnation was poor.\n\n## Step 10: Adjust the operating window based on the failure mode\n**Action:** Tune pH, liquor charge, penetration, temperature, or time depending on what went wrong.\n\n**Why:** Sulfite and NSSC are process systems; chemistry and transport must be corrected together.\n\n**How (Example):**\n- **Too much carbohydrate loss:** raise pH slightly, shorten cook time, or lower temperature.\n- **Too little delignification:** improve impregnation, increase severity, or shift toward more bisulfite-active conditions.\n- **Nonuniform pulp quality:** improve chip sizing and liquor penetration before changing chemistry.\n\n## Step 11: Lock in the best recipe for the product goal\n**Action:** Standardize the pH, temperature profile, time, and impregnation procedure that gave the best balance of yield and delignification.\n\n**Why:** Repeatability is essential because the same sulfur chemistry can produce very different results under different operating windows.\n\n**How (Example):**\n- Record a final recipe for **acidic sulfite** if your goal is low lignin.\n- Record a final recipe for **NSSC** if your goal is higher yield with later mechanical refining.\n\n## Final takeaway\nUse **pH as the main control knob** for deciding whether SO2 chemistry behaves like an aggressive sulfite delignification system or a milder NSSC system. Then support that chemical choice with **good chip impregnation, controlled temperature, and limited cooking severity** to get the pulp properties you want."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
