  <style>
    /* ========================================
      PREMIUM THEME & TYPOGRAPHY VARIABLES
      ========================================
    */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root{
      --bg-base: #05050a;
      --bg-surface: rgba(17, 18, 28, 0.65);
      --bg-surface-hover: rgba(255, 255, 255, 0.05);
      
      --stroke-soft: rgba(255, 255, 255, 0.08);
      --stroke-strong: rgba(255, 255, 255, 0.15);
      
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --text-heading: #ffffff;
      
      --accent-primary: #8b5cf6;
      --accent-secondary: #3b82f6;
      --accent-gradient: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      
      --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.15);
      
      --radius-xl: 24px;
      --radius-lg: 16px;
      --radius-md: 12px;
      
      --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      
      /* New Wider Content Width */
      --content-max-width: 1200px; 
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Dynamic ambient background */
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.08), transparent 40%),
        radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 40%);
      background-attachment: fixed;
    }

    /* ========================================
      LAYOUT & SHELL
      ========================================
    */
    main {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .view-shell {
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    
    .view-inner {
      padding: clamp(20px, 4vw, 48px) 24px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ========================================
      TOP HEADER & TYPOGRAPHY
      ========================================
    */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: var(--content-max-width);
      animation: fadeDown 0.6s ease-out;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: 1px solid var(--stroke-strong);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-gradient);
      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;
      font-size: clamp(32px, 4vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.03em;
      color: var(--text-heading);
      background: linear-gradient(to right, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(16px, 1.5vw, 18px);
      line-height: 1.6;
      max-width: 60ch;
    }

    /* ========================================
      MAIN CARD (WIDER VIEWPORT)
      ========================================
    */
    .grid {
      display: flex;
      width: 100%;
      justify-content: center;
      flex-grow: 1;
    }

    .card {
      width: 100%;
      max-width: var(--content-max-width);
      border: 1px solid var(--stroke-soft);
      background: var(--bg-surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .card-h {
      padding: 18px 32px;
      border-bottom: 1px solid var(--stroke-soft);
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-h h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .card-b {
      padding: clamp(24px, 5vw, 56px);
      flex-grow: 1;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      border-radius: 999px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-family: var(--font-mono);
      font-size: 13px;
      color: #c4b5fd;
    }

    /* ========================================
      NAVIGATION BOTTOM BAR
      ========================================
    */
    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 24px;
      border-top: 1px solid var(--stroke-soft);
      background: rgba(5, 5, 10, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: sticky;
      bottom: 0;
      z-index: 10;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      border: 1px solid var(--stroke-strong);
      background: var(--bg-surface);
      color: var(--text-heading);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .btn:hover:not(:disabled) {
      background: var(--bg-surface-hover);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .btn-primary {
      background: var(--accent-gradient);
      border: none;
      color: white;
    }

      background: linear-gradient(135deg, #9f7aea, #60a5fa);
      box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

      ENHANCED MARKDOWN TYPOGRAPHY
      ========================================
    */
    .markdown-body {

      border-bottom: 1px solid var(--stroke-soft);

      margin-top: 0;
      margin-bottom: 1.25em;
    }

    .markdown-body ul, 
    .markdown-body ol {

      margin-bottom: 1.5em;
      padding-left: 1.5em;
    }

    .markdown-body li {
      margin-bottom: 0.5em;
    }

    .markdown-body li > ul, 
    .markdown-body li > ol {
      margin-top: 0.5em;
    }

    .markdown-body strong {
      color: var(--text-heading);
      font-weight: 600;
    }

    .markdown-body a {
      color: var(--accent-secondary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }

    .markdown-body a:hover {
      border-bottom-color: var(--accent-secondary);
    }

    .markdown-body code {
      font-family: var(--font-mono);
      background: rgba(255, 255, 255, 0.08);
      padding: 0.2em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;
      color: #93c5fd; /* Light blue tint for inline code */
    }

    .markdown-body pre {
      background: #0d1117;
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-md);
      padding: 1.25em;
      overflow-x: auto;
      margin-bottom: 1.5em;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.2);
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #e2e8f0;
      font-size: 0.9em;
      line-height: 1.6;
    }

    .markdown-body blockquote {
      margin: 0 0 1.5em 0;
      padding: 0.5em 0 0.5em 1.5em;
      border-left: 4px solid var(--accent-primary);
      color: var(--text-muted);
      background: linear-gradient(to right, rgba(139, 92, 246, 0.05), transparent);
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .markdown-body blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-body hr {
      border: none;
      height: 1px;
      background: var(--stroke-strong);
      margin: 3em 0;
    }

    /* ========================================
      TASK CARD STYLES (STRUCTURED CARDS)
      ========================================
    */
    .task-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .task-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--stroke-soft);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .task-card:hover {
      border-color: var(--stroke-strong);
      transform: translateY(-2px);
    }
    .task-card h3 {
      margin-top: 0;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25em;
      color: var(--accent-secondary);
    }
    .objective-card {
      border-left: 4px solid var(--accent-primary);
    }
    .instructions-list {
      padding-left: 20px;
    }
    .instructions-list li {
      margin-bottom: 12px;
    }
    .criteria-checklist {
      list-style: none;
      padding-left: 0;
    }
    .criteria-checklist li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }
    .criteria-checklist li::before {
      content: "✓";
      color: #10b981;
      font-weight: bold;
      flex-shrink: 0;
    }

    /* KaTeX overrides for dark mode */
    .katex {
      color: var(--text-heading);
      font-size: 1.1em;
    }

    /* ========================================
      TRANSITIONS & ANIMATIONS
      ========================================
    */
    .transition-opacity { transition: opacity 400ms ease, transform 400ms ease; }
    .opacity-100 { opacity: 1; transform: translateY(0); }
    .opacity-0 { opacity: 0; transform: translateY(10px); }
    .hidden { display: none !important; }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce){
      .transition-opacity { transition: none !important; }
      .btn { transition: none !important; }
      .topbar { animation: none !important; }
    }
  </style>

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nUse additive strategies to **improve delignification selectivity** in alkaline and sulfite pulping so you can:\n- Lower **kappa number** without overcooking the pulp\n- Preserve **cellulose degree of polymerization (DP)** and **hemicellulose yield**\n- Improve **pulp yield** and downstream strength/viscosity\n- Match the additive choice to the pulping system: **polysulfide, anthraquinone (AQ), or carbohydrate stabilizers**\n\n## When to use this guide\nApply it when you are:\n- Designing or optimizing a **kraft, soda, or NSSC/semichemical cook**\n- Seeing good delignification but **poor yield or viscosity loss**\n- Trying to reduce chemical charge or severity while keeping the same pulp quality\n\n## Prerequisites\nHave the following available before you start:\n1. **Access to a pulping line or lab digester** capable of controlled alkaline cooking\n2. **Kappa number test method** for cooked pulp\n3. **Viscosity or DP measurement setup** for pulp quality tracking\n4. **Yield measurement capability** for cooked pulp\n5. **Accurate cooking control data**: alkali charge, sulfidity, temperature profile, time, and H-factor\n6. **A chip impregnation setup or impregnation logs** showing penetration quality\n7. For AQ work: a **reliable anthraquinone source** and dosing procedure compatible with your alkaline process\n8. For polysulfide work: a **kraft-compatible polysulfide addition plan** or supply method\n\n## What success looks like\nYou should be able to compare cooks and identify combinations that:\n- Reduce kappa number at the same severity, or\n- Preserve yield/viscosity at the same kappa number, or\n- Improve both within process limits\n\n## Practical baseline\nBefore changing additives, record a baseline cook with:\n- Wood species and chip size\n- Active alkali charge\n- Sulfidity\n- Maximum temperature and cooking time\n- Chip impregnation conditions\n- Kappa number, yield, viscosity, rejects, and screened rejects"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement the Additives in a Controlled Trial\n\n## Step 1: Establish a clean baseline cook\n**The Action:** Run or collect a reference cook with no additive change.\n\n**Why it matters:** You need a stable comparison point to judge whether an additive improves selectivity or simply changes the cook unpredictably.\n\n**How (Example):**\n- Record: active alkali = 18%, max temp = 170\u00b0C, hold time = 60 min, sulfidity = 25%\n- Measure: kappa = 18.5, yield = 47.2%, viscosity = 920 mL/g\n\n## Step 2: Choose the right additive for the process\n**The Action:** Match the additive to the pulping system.\n\n**Why it matters:** Each additive works through a different mechanism and is strongest in certain systems.\n\n**How (Example):**\n- **Kraft cook:** test polysulfide, AQ, or both\n- **Soda cook:** prioritize AQ because no sulfide is present\n- **NSSC/semichemical:** use carbohydrate-stabilizing strategies cautiously, since yield preservation is a major goal\n\n## Step 3: Dose the additive in a controlled way\n**The Action:** Introduce only one additive change at a time and keep all other variables fixed.\n\n**Why it matters:** This isolates the effect on lignin removal and carbohydrate preservation.\n\n**How (Example):**\n- Trial A: baseline\n- Trial B: baseline + AQ at a set mill/lab dose\n- Trial C: baseline + polysulfide under kraft conditions\n- Trial D: baseline + carbohydrate stabilizer or stabilizing condition\n\n## Step 4: Track the right response variables\n**The Action:** Measure kappa number, yield, viscosity/DP, and rejects after each trial.\n\n**Why it matters:** Additives should improve selectivity, not just drive kappa down.\n\n**How (Example):**\nUse a scorecard like this:\n- Kappa number: lower is better, but not at any cost\n- Yield: higher is better\n- Viscosity/DP: higher is better\n- Rejects: lower is better\n\n## Step 5: Compare selectivity, not just delignification\n**The Action:** Evaluate how much lignin is removed per unit of carbohydrate loss.\n\n**Why it matters:** The best additive is the one that shifts the cook toward better tradeoffs.\n\n**How (Example):**\nIf two cooks both reach kappa 16:\n- Cook 1 yield = 45.0%, viscosity = 850\n- Cook 2 yield = 46.5%, viscosity = 980\nChoose Cook 2 because it improved selectivity."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Optimize Around Transport, Severity, and Process Limits\n\n## Step 6: Verify chip impregnation before blaming the chemistry\n**The Action:** Check whether chemicals and additives penetrate chips uniformly.\n\n**Why it matters:** Poor transport can hide the real benefit of polysulfide or AQ and create uneven cooks.\n\n**How (Example):**\n- Inspect chip moisture and size distribution\n- Review impregnation time and liquor penetration\n- Look for evidence of undercooked chip cores or high rejects\n\n## Step 7: Tune severity to the additive, not the other way around\n**The Action:** Adjust temperature-time severity and alkali charge so the additive can work in its best window.\n\n**Why it matters:** Additives help most when lignin fragmentation is active but carbohydrate damage is still controllable.\n\n**How (Example):**\n- If kappa stays high but viscosity is excellent, modestly increase severity\n- If kappa is acceptable but viscosity collapses, reduce severity and rely more on AQ/selectivity improvement\n\n## Step 8: Use polysulfide to improve kraft yield and carbohydrate retention\n**The Action:** Apply polysulfide where kraft cooking benefits from better carbohydrate preservation.\n\n**Why it matters:** Polysulfide can suppress early alkaline degradation and reduce peeling reactions.\n\n**How (Example):**\n- Compare baseline kraft cook vs. kraft + polysulfide\n- Look for higher yield at similar kappa\n- Confirm whether hemicellulose retention improved\n\n## Step 9: Use AQ as a selectivity enhancer in alkaline pulping\n**The Action:** Add AQ when you want faster lignin removal with less damage to carbohydrates.\n\n**Why it matters:** AQ cycles redox states and can improve delignification while stabilizing carbohydrate end groups.\n\n**How (Example):**\n- In soda pulping, run AQ trials at the same alkali charge and temperature profile\n- Check whether kappa drops faster or viscosity stays higher at the same kappa\n\n## Step 10: Apply carbohydrate stabilization logic where peeling and chain scission dominate\n**The Action:** Identify the main carbohydrate degradation route and address it directly.\n\n**Why it matters:** Not all quality loss comes from lignin removal; some comes from alkaline degradation of polysaccharides.\n\n**How (Example):**\n- If DP drops sharply early in the cook, focus on end-group protection and reducing harsh initial conditions\n- If hemicellulose yield is low, reduce exposure to the most damaging pH-temperature period"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Put the Trial into Mill Practice\n\n## Step 11: Build a decision rule for adoption\n**The Action:** Define the acceptance criteria before full-scale use.\n\n**Why it matters:** You need a clear rule for deciding whether the additive is worth the cost and complexity.\n\n**How (Example):**\nAdopt the additive if it delivers at least one of these:\n- 1\u20132 kappa points lower at the same yield\n- 1\u20132% higher yield at the same kappa\n- Noticeably higher viscosity/DP at comparable delignification\n\n## Step 12: Integrate the additive with process control\n**The Action:** Link additive use to operating controls like alkali charge, sulfidity, H-factor, and impregnation quality.\n\n**Why it matters:** Additives are not standalone fixes; they work best as part of a controlled cook strategy.\n\n**How (Example):**\n- Use AQ only when impregnation is stable and temperature control is tight\n- Use polysulfide when kraft conditions are already optimized and yield improvement is the target\n- Recheck chip penetration if performance becomes inconsistent\n\n## Step 13: Monitor for long-term tradeoffs\n**The Action:** Track additive performance over multiple cooks, chip lots, and seasons.\n\n**Why it matters:** Wood variability can change how well the additive protects carbohydrates or accelerates delignification.\n\n**How (Example):**\nCreate a log of:\n- Wood species and source\n- Additive dose\n- Kappa number\n- Yield\n- Viscosity\n- Rejects\n- Downstream bleaching response\n\n## Final takeaway\nTreat polysulfide, AQ, and carbohydrate stabilizers as **selectivity tools**. Their job is to shift pulping toward **better lignin removal with less carbohydrate damage**. The best implementation is the one that matches the process chemistry, transport conditions, and severity window of your specific cook."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
