      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;

      padding: 6px 14px;

      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.03em;

      -webkit-backdrop-filter: blur(12px);

    .dot {

      box-shadow: 0 0 8px var(--accent-primary);
    }

    .title {
      margin: 8px 0 0 0;

      line-height: 1.1;

      -webkit-background-clip: text;
      background-clip: text;

      border: 1px solid var(--stroke-soft);

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a practical operating plan for **alkaline delignification** that lets you:\n- Set **effective alkali** to drive lignin removal\n- Adjust **sulfidity** to improve selectivity in kraft cooking\n- Use **H-factor** to control total cook severity\n- Balance **kappa number**, **yield**, and **viscosity** for the target pulp type:\n  - **Kraft**: strong, selective delignification\n  - **Soda**: sulfur-free cooking with a different operating window\n  - **NSSC**: mild partial delignification and chip softening\n\n## Prerequisites\nYou need access to the following technical resources:\n- A **kraft / soda / NSSC batch digester** or **continuous digester control system**\n- A way to measure or specify **active alkali** and **effective alkali** in the cook liquor\n- A method to set or calculate **sulfidity** for kraft cooks\n- A **time-temperature profile** logger or digester controller that can compute **H-factor**\n- Standard pulp QC tools for verifying results:\n  - **Kappa number** test setup\n  - **Viscosity** measurement method for pulp\n  - **Yield** tracking from chip-to-pulp mass balance\n- Operating data for your wood furnish:\n  - Chip species and moisture content\n  - Baseline chip bulk density or impregnation behavior\n\n## What to define before you start\n1. **Target pulp type**: kraft, soda, or NSSC\n2. **Target quality window**:\n   - Kappa number range\n   - Minimum acceptable viscosity\n   - Expected yield range\n3. **Constraints**:\n   - Maximum cook temperature\n   - Maximum allowable alkali charge\n   - Sulfur restrictions or environmental limits\n\n## Example setup\n- **Kraft pulp** target: kappa 18\u201320, high viscosity, high selectivity\n- **Soda pulp** target: same kappa goal, but with no sulfide available\n- **NSSC** target: partial delignification only, higher yield, softer chips for refining"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set the Chemical Driving Force\n\n## Step 1: Choose the pulping route and define the chemical strategy\n**Action:** Decide whether the cook is kraft, soda, or NSSC before setting chemicals.  \n**Why:** The route determines whether sulfide is available and how aggressive the cook can be.  \n**How (Example):**\n- **Kraft:** plan to use hydroxide + sulfide\n- **Soda:** use hydroxide only\n- **NSSC:** use a milder alkaline charge and stop short of full delignification\n\n## Step 2: Set the effective alkali target\n**Action:** Specify the effective alkali charge needed to reach the desired lignin removal.  \n**Why:** Effective alkali is the actual chemical driving force for delignification and carbohydrate side reactions.  \n**How (Example):**\n- If the cook is under-delignifying, increase effective alkali in small increments\n- If viscosity or yield are dropping too fast, reduce effective alkali or severity\n- Example control logic: \u201cIncrease effective alkali by 1\u20132 percentage points of oven-dry wood for the next trial cook\u201d\n\n## Step 3: Set sulfidity for kraft cooks\n**Action:** Choose a sulfidity level that improves selectivity without violating mill or product constraints.  \n**Why:** Sulfide accelerates lignin removal and can reduce lignin condensation, often allowing lower severity for the same kappa number.  \n**How (Example):**\n- **Higher sulfidity:** use when you want faster delignification at lower severity\n- **Lower sulfidity:** use when sulfur reduction is needed, but expect to adjust alkali or time\n- Example template: \u201cRun kraft at moderate sulfidity and compare kappa/viscosity against a lower-sulfidity baseline\u201d\n\n## Step 4: Define the initial charge window\n**Action:** Establish a starting combination of alkali and sulfidity for trial operation.  \n**Why:** A controlled starting point lets you tune the cook based on measured pulp outcomes instead of guessing.  \n**How (Example):**\n- Kraft: moderate effective alkali + moderate sulfidity\n- Soda: slightly higher effective alkali to compensate for no sulfide\n- NSSC: lower effective alkali, aiming only for partial lignin removal\n\n## Step 5: Record the expected reaction tradeoff\n**Action:** Write down what you expect to happen to lignin, carbohydrate, and pulp properties.  \n**Why:** This creates a reference for evaluating whether the cook was too mild or too severe.  \n**How (Example):**\n- \u201cIf kappa remains high, increase chemical severity.\u201d\n- \u201cIf viscosity falls too much, reduce chemical severity or shorten the cook.\u201d\n- \u201cIf yield is too low for NSSC, back off the cook severity.\u201d"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Control Severity with H-factor and Tune the Balance\n\n## Step 6: Set the temperature-time profile and compute H-factor\n**Action:** Program the cook temperature ramp, hold time, and total exposure so the controller can calculate H-factor.  \n**Why:** H-factor captures the cumulative thermal severity that strongly affects both delignification and carbohydrate loss.  \n**How (Example):**\n- Use a digester recipe with ramp, peak temperature, and hold time\n- Compare two cooks with different profiles using the same H-factor target\n- Example: \u201cKeep H-factor constant while testing a lower alkali charge to improve selectivity\u201d\n\n## Step 7: Balance H-factor against effective alkali\n**Action:** Adjust time and temperature only after reviewing how much chemical driving force is already present.  \n**Why:** Alkali sets the reaction potential, while H-factor determines how long and how hard that chemistry acts.  \n**How (Example):**\n- If lignin removal is too slow, raise H-factor by extending time or increasing peak temperature\n- If carbohydrates are degrading, reduce H-factor before increasing alkali further\n- Example rule: \u201cUse the lowest H-factor that still reaches the target kappa number\u201d\n\n## Step 8: Use sulfidity as a selectivity lever in kraft\n**Action:** If kraft cooks are too harsh on carbohydrates, test higher sulfidity before simply increasing alkali or temperature.  \n**Why:** Sulfide can improve delignification efficiency, allowing the same kappa target at lower severity.  \n**How (Example):**\n- Trial A: lower sulfidity, longer cook\n- Trial B: higher sulfidity, shorter cook\n- Compare kappa, viscosity, and yield to see which gives better selectivity\n\n## Step 9: Compensate carefully in soda pulping\n**Action:** In soda cooks, compensate for the lack of sulfide with controlled alkali and H-factor adjustments.  \n**Why:** Soda relies more heavily on hydroxide, so the operating window often needs more severity to achieve the same delignification.  \n**How (Example):**\n- Increase effective alkali modestly\n- Extend H-factor only as far as viscosity and yield allow\n- Use result-based tuning: \u201cIf kappa drops but viscosity collapses, reduce time before further increasing alkali\u201d\n\n## Step 10: Keep NSSC intentionally mild\n**Action:** Limit alkali charge and H-factor so chips are softened and partially delignified, not fully cooked.  \n**Why:** NSSC performance depends on preserving much of the original wood structure for downstream refining.  \n**How (Example):**\n- Stop the cook at a lower kappa reduction than kraft would target\n- Aim for improved fiber softness and refining response rather than maximum lignin removal\n- Example: \u201cTarget moderate chip weakening while preserving high yield\u201d"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Validate the Cook and Create an Operating Window\n\n## Step 11: Measure the three outcome indicators after each cook\n**Action:** Evaluate kappa number, viscosity, and yield on every trial or production run.  \n**Why:** These three results tell you whether the chemistry and severity were balanced correctly.  \n**How (Example):**\n- **Low kappa + high viscosity + acceptable yield:** good selectivity\n- **Low kappa + low viscosity:** overcooked or too severe\n- **High kappa + high viscosity:** undercooked or too mild\n\n## Step 12: Map the response to the control variables\n**Action:** Compare outcome data against sulfidity, effective alkali, and H-factor to find the best combination.  \n**Why:** The same kappa number can come from different operating points, but pulp quality may differ.  \n**How (Example):**\n- Create a simple table:\n  - Run 1: lower sulfidity, higher H-factor\n  - Run 2: higher sulfidity, lower H-factor\n  - Run 3: higher alkali, shorter time\n- Pick the setting that gives the best viscosity and yield at target kappa\n\n## Step 13: Build an operating window for each product\n**Action:** Define acceptable ranges for alkali, sulfidity, and H-factor for kraft, soda, and NSSC separately.  \n**Why:** Each process has different priorities and cannot use the same recipe logic.  \n**How (Example):**\n- **Kraft:** optimize selectivity and lignin removal\n- **Soda:** allow higher alkali or severity to compensate for no sulfide\n- **NSSC:** keep severity low and prioritize yield and chip softening\n\n## Step 14: Standardize the control rule\n**Action:** Convert your findings into a simple operating rule for the mill or lab.  \n**Why:** Repeatable control prevents cooks from drifting into overcooking or undercooking.  \n**How (Example):**\n- \u201cSet effective alkali first, adjust sulfidity if kraft selectivity is weak, then tune H-factor to hit final kappa.\u201d\n- \u201cDo not increase H-factor once viscosity falls below the minimum specification.\u201d\n\n## Final takeaway\nTreat **effective alkali** as the chemical force, **sulfidity** as the selectivity enhancer, and **H-factor** as the severity dial. Control them together to hit the target kappa number while preserving carbohydrate integrity and pulp quality."
  }
]

  (function () {

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
