<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "In alkaline and sulfite pulping, delignification does not begin with bond cleavage alone. It begins with chip impregnation: the penetration of cooking liquor into the wood structure. Wood chips are a porous, multiscale composite with lumens, pits, middle lamellae, and cell-wall regions that do not all wet and fill at the same speed. Before rapid lignin removal can occur, liquor must displace trapped air, enter the chip, and reach reactive sites within the cell wall. This is why chip size, moisture content, species anatomy, chip quality, and liquor composition strongly affect cooking performance.\n\nImpregnation is followed by diffusion, the movement of dissolved chemicals through the chip and the movement of dissolved lignin fragments back out into the bulk liquor. In practice, pulping is often transport-limited at first and reaction-limited later. Early in the cook, alkali must diffuse inward to establish the high pH needed for phenolic group deprotonation and bond cleavage. As delignification proceeds, soluble fragments must diffuse outward to prevent local saturation and redeposition. If penetration is slow or uneven, the chip develops a reaction gradient: the surface cooks faster than the core, increasing rejects, heterogeneity, and carbohydrate damage at the exterior.\n\nThe main transport variables are temperature, time, liquor-to-wood ratio, alkali concentration, sulfidity in kraft, chip permeability, and circulation or flow conditions. Higher temperature reduces viscosity and accelerates diffusion, but it also accelerates reactions. That means transport and kinetics are coupled: a process that improves penetration can also increase peeling reactions, carbohydrate hydrolysis, and secondary lignin condensation if severity is too high. In mainstream kraft cooking, sulfide improves delignification by promoting cleavage of lignin structures and suppressing some condensation pathways, but it does not remove the need for efficient chip impregnation. Soda pulping relies entirely on hydroxide and therefore often needs careful impregnation and severity control to achieve comparable penetration and selectivity. NSSC uses milder alkali and sulfite-based chemistry, so impregnation and diffusion remain especially important because the process aims for partial delignification while preserving more carbohydrate integrity."
  },
  {
    "id": "lesson_page_2",
    "content": "Delignification kinetics describe how fast lignin is removed once chemicals are present at the reaction sites. A useful way to think about the cook is as overlapping phases. The first phase is rapid initial delignification of the most accessible lignin, often associated with phenolic structures in the middle lamella and outer cell-wall regions. The second phase is bulk delignification, where diffusion into less accessible regions and slower chemical reactions become important. The final phase is residual delignification, in which the remaining lignin is more condensed, less accessible, and more difficult to remove.\n\nThese phases are why a single reaction rate rarely explains the whole cook. Transport can dominate early, while intrinsic chemical kinetics dominate once the chip is fully impregnated. Temperature dependence is commonly captured by Arrhenius behavior, but in real cooks the apparent rate also depends on how much reactant has penetrated the chip and how quickly products are removed. For that reason, kinetic models in pulping often combine reaction terms with diffusion or mass-transfer terms.\n\nSelectivity is central. The goal is not maximum lignin removal at any cost; it is the best balance between delignification and carbohydrate preservation. At low to moderate severity, alkali removes lignin efficiently while limiting cellulose loss. As severity rises, carbohydrate peeling reactions and chain scission increase, and cellulose degree of polymerization can fall. Acetyl group removal from hemicellulose also changes local chemistry and can affect alkali demand. Thus, when a cook seems \u201cslow,\u201d the answer is not always to simply increase temperature or time. It may be more effective to improve chip impregnation, increase effective alkali, adjust sulfidity, or modify circulation so that the chemistry reaches the chip more uniformly.\n\nThis is also where kappa number and pulp quality metrics connect to kinetics. A target kappa number is achieved not only by the total chemical charge, but by the time history of alkali availability inside the chip. Nonuniform impregnation can create a misleading average cook: the bulk liquor may seem adequate while the chip interior remains undercooked."
  },
  {
    "id": "lesson_page_3",
    "content": "In kraft pulping, impregnation is especially important because the process depends on maintaining a strongly alkaline environment throughout the chip. Effective alkali must diffuse inward fast enough to support lignin fragmentation and dissolution before the surface becomes overcooked. Sulfidity improves selectivity and accelerates delignification, but only if the liquor actually reaches internal chip regions. This is why cooking severity is often described with a time\u2013temperature integration such as H-factor, but H-factor by itself does not fully represent impregnation quality. Two cooks with the same nominal severity can produce very different results if one has better diffusion and circulation.\n\nIn soda pulping, the absence of sulfide means impregnation and alkali efficiency become even more critical. Soda cooking can be effective for certain feedstocks, especially agricultural residues and some hardwoods, but it generally has less delignification power and different selectivity than kraft. A well-impregnated soda cook can outperform a poorly penetrated kraft cook in practice, because reaction chemistry can only act where liquor reaches. For this reason, chip preparation, pre-steaming, liquor circulation, and retention of adequate liquor in the chip bed are important process controls.\n\nNSSC pulping uses a milder chemical system designed to achieve partial delignification while preserving strength and yield. Because NSSC typically stops short of the extensive delignification targeted in kraft, the cook is more sensitive to uneven impregnation: if chemical penetration is incomplete, the already mild process may leave too much residual lignin in chip cores. On the other hand, if severity is pushed too high, carbohydrate damage can compromise the yield and strength advantages that make NSSC attractive. Across all three processes, the key design principle is the same: transport sets up the chemistry, and chemistry determines how far the cook can proceed before selectivity collapses."
  },
  {
    "id": "lesson_page_4",
    "content": "Summary: Chip impregnation is the prerequisite step that gets liquor into the wood structure. Diffusion then carries alkali inward and dissolved lignin fragments outward. These transport steps interact with reaction kinetics to determine the apparent delignification rate, the final kappa number, and the extent of carbohydrate preservation. In kraft, soda, and NSSC cooking, better penetration usually means better selectivity and more uniform pulp, while poor impregnation creates undercooked cores, overcooked surfaces, and unstable quality. The practical lesson is that delignification performance cannot be predicted from chemistry alone; it must be understood as a coupled transport-and-reaction problem."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
