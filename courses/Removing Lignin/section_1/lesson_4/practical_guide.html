  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **multi-criteria decision framework** to compare delignification routes and select the one that best fits a specific downstream application. By the end, you should be able to:\n- Define the decision problem clearly.\n- Separate **non-negotiable constraints** from **preferred goals**.\n- Compare candidate routes using a structured scorecard.\n- Identify the most robust option using sensitivity analysis.\n\n## Prerequisites\nYou need access to the following technical resources:\n- **Spreadsheet software**: Microsoft Excel, Google Sheets, or LibreOffice Calc.\n- **Reference sources**: access to journal articles, review papers, vendor datasheets, or process reports for route performance data.\n- **Basic process data** for your feedstock and target application, such as:\n  - lignin content\n  - cellulose/hemicellulose composition\n  - moisture and ash content\n  - target product requirements (e.g., pulp brightness, enzymatic digestibility, lignin purity)\n- Optional but useful:\n  - **Python** with `pandas` and `numpy` for automated scoring\n  - A citation manager or note system to track evidence for each score\n\n## What you must define first\nBefore comparing routes, write down:\n1. **The final application** \u2014 pulp, biofuels, lignin products, or specialty materials.\n2. **The feedstock** \u2014 wood species, agricultural residue, or other biomass.\n3. **The hard limits** \u2014 for example, max carbohydrate loss or max operating pressure.\n4. **The success metrics** \u2014 for example, lignin removal, fiber integrity, or lignin purity.\n\n## Example objective statement\n- **Biofuel case**: \u201cSelect a delignification pretreatment that maximizes enzymatic digestibility while keeping cellulose loss below 10%.\u201d\n- **Pulp case**: \u201cSelect a route that achieves high brightness and low residual lignin while preserving fiber strength.\u201d"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Set Up the Evaluation Framework\n\n## Step 1: Separate constraints from goals\n### Action\nCreate two lists: one for **constraints** and one for **goals**.\n### Why\nThis prevents you from treating all criteria as equally flexible.\n### How (Example)\n- **Constraints**:\n  - Carbohydrate loss \u2264 10%\n  - Maximum temperature \u2264 180\u00b0C\n  - No chlorine-based reagents\n  - Solvent must be recoverable with existing equipment\n- **Goals**:\n  - Maximize lignin removal\n  - Maximize pulp brightness\n  - Minimize energy demand\n  - Improve lignin purity\n\n## Step 2: Choose the criteria you will score\n### Action\nSelect 5\u201310 criteria that match the application.\n### Why\nA scorecard works best when each criterion reflects a real decision need.\n### How (Example)\nFor a biochemical refinery, use:\n- Lignin removal efficiency\n- Carbohydrate preservation\n- Cellulose degree of polymerization retention\n- Enzymatic digestibility\n- Chemical cost\n- Energy demand\n- Safety / hazard level\n- Waste handling burden\n\nFor a pulp process, use:\n- Residual lignin\n- Brightness\n- Fiber integrity\n- Chemical recovery burden\n- Operating cost\n- Equipment compatibility\n\n## Step 3: Define a common scoring scale\n### Action\nUse the same scale for every criterion, such as 1\u20135 or 1\u201310.\n### Why\nThis makes different route families directly comparable.\n### How (Example)\nUse a 1\u20135 scale:\n- 5 = excellent\n- 4 = good\n- 3 = acceptable\n- 2 = weak\n- 1 = poor\n\nWrite a short rule for each score so your ratings stay consistent.\n\n## Step 4: Assign weights\n### Action\nGive each criterion a weight based on importance.\n### Why\nNot every criterion matters equally in every application.\n### How (Example)\nFor biofuel pretreatment:\n- Carbohydrate preservation = 30%\n- Enzymatic digestibility = 25%\n- Lignin removal = 20%\n- Chemical cost = 10%\n- Energy demand = 10%\n- Safety/waste = 5%\n\nFor pulp bleaching:\n- Brightness = 30%\n- Residual lignin = 25%\n- Fiber integrity = 20%\n- Chemical recovery = 15%\n- Cost = 10%"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Score Candidate Routes and Rank Them\n\n## Step 5: Build a comparison table\n### Action\nList candidate routes in rows and criteria in columns.\n### Why\nA structured table makes tradeoffs visible at a glance.\n### How (Example)\nCandidate routes may include:\n- Alkaline delignification\n- Oxidative delignification\n- Organosolv process\n- Enzymatic or biological assistance\n- Hybrid pretreatment\n\nExample table structure:\n- Rows = routes\n- Columns = criteria\n- Additional columns = weighted score and notes\n\n## Step 6: Score each route using evidence\n### Action\nAssign a score to each route for each criterion using literature, experiments, or plant data.\n### Why\nEvidence-based scoring reduces bias and makes the decision defensible.\n### How (Example)\nIf an organosolv route gives high-purity lignin but requires costly solvent recovery:\n- Lignin purity = 5\n- Solvent recovery burden = 2\n- Equipment compatibility = 3\n- Overall score = weighted result from the table\n\nIf an alkaline route preserves cost and simplicity but damages carbohydrates:\n- Lignin removal = 4\n- Carbohydrate preservation = 2\n- Chemical cost = 4\n- Overall score = balanced by the weights\n\n## Step 7: Compute the weighted total\n### Action\nMultiply each score by its weight and sum the results.\n### Why\nThis converts many criteria into one comparable decision value.\n### How (Example)\nFor each route:\n- Weighted score = \u03a3(score \u00d7 weight)\n- Rank routes from highest to lowest total\n\nIf two routes are close, check the route against the **most important constraint** first instead of relying on the total alone.\n\n## Step 8: Test sensitivity\n### Action\nChange key assumptions and rerun the ranking.\n### Why\nThis shows whether the best route is stable or fragile.\n### How (Example)\nTest scenarios such as:\n- Feedstock moisture increases\n- Chemical prices rise by 20%\n- Carbohydrate loss becomes more important than lignin purity\n- Solvent recovery efficiency drops\n\nIf one route stays near the top in most scenarios, it is more robust than a route that only wins under one narrow assumption set."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Final Validation and Practical Use\n\n## Step 9: Check process realities before final selection\n### Action\nReview scalability, safety, waste treatment, and downstream compatibility.\n### Why\nA high-scoring route can still fail in real operation if it is hard to integrate.\n### How (Example)\nBefore choosing a route, ask:\n- Can the equipment handle the required pressure and corrosion?\n- Is solvent recovery available and economical?\n- Will the effluent treatment system handle the waste stream?\n- Does the route support the downstream step, such as fermentation, bleaching, or lignin purification?\n\n## Step 10: Document the decision clearly\n### Action\nWrite a short decision memo that records your criteria, weights, scores, and final choice.\n### Why\nThis makes the selection transparent and easy to defend later.\n### How (Example)\nInclude:\n1. Application and feedstock\n2. Constraints\n3. Criteria and weights\n4. Route scores\n5. Sensitivity results\n6. Final recommendation and rationale\n\n## Step 11: Use the framework iteratively\n### Action\nUpdate the scorecard when new data arrives.\n### Why\nRoute selection improves as measurements replace assumptions.\n### How (Example)\nIf pilot data show lower carbohydrate loss than expected, revise the scores and rerun the ranking.\n\n## Practical takeaway\nThe best delignification route is not the one with the maximum lignin removal. It is the one that best balances:\n- lignin removal\n- carbohydrate preservation\n- cost\n- safety\n- equipment fit\n- downstream performance\n\nUse the framework as a repeatable decision tool, not a one-time ranking exercise."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
