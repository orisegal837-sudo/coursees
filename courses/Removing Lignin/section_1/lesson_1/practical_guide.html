  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a **delignification target-setting framework** that matches the intended biomass application. By the end, you should be able to:\n- Define **how much lignin to remove** for a specific end use.\n- Identify **which lignin fraction/location** matters most.\n- Choose **performance metrics** that capture both removal and preservation.\n- Compare candidate delignification processes using a **tradeoff-based scorecard**.\n\n## Prerequisites\nYou do **not** need specialized lab equipment to start defining targets, but you do need access to specific technical resources:\n- A **biomass composition dataset** for your feedstock, or the ability to run compositional analysis.\n- Access to at least one of the following analytical methods:\n  - **Kappa number** testing setup\n  - **Klason lignin** analysis capability\n  - **Acid-soluble lignin** measurement method\n  - **Cellulose degree of polymerization (DP)** testing method\n- A way to measure **carbohydrate retention / sugar recovery** after pretreatment.\n- If evaluating downstream conversion, access to **enzymatic hydrolysis assay** or **pulping/bleaching performance tests**.\n- A spreadsheet tool such as **Excel**, **Google Sheets**, or **Python/pandas** for organizing metrics and comparing options.\n\n## What to prepare before implementing\nCreate a simple project sheet with these fields:\n- Feedstock type: **softwood, hardwood, or grass**\n- Intended product: **paper pulp, bioethanol, fiber, composite, or other**\n- Primary success metric: e.g., **residual lignin**, **digestibility**, **brightness**, **yield**\n- Preservation metrics: e.g., **cellulose retention**, **hemicellulose retention**, **solids yield**\n- Process constraints: **temperature, pH, time, chemical cost, energy use**\n\n## Why this matters\nIf you do not define the target first, you can easily over-process biomass and lose valuable carbohydrates, or under-process it and leave lignin too intact for downstream conversion. The objective must be tied to the intended product, not just to lignin removal in general."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Define the Application and the Success Criteria\n\n## 1) Identify the end use of the biomass\n### Action\nWrite down the final application before selecting any delignification method.\n\n### Why\nDifferent products require different balances between lignin removal and structure preservation.\n\n### How (Example)\nUse a table like this:\n- **Paper pulp** \u2192 prioritize brightness, fiber quality, and acceptable yield\n- **Bioethanol** \u2192 prioritize enzymatic digestibility and sugar release\n- **Fiber manufacturing** \u2192 prioritize structural integrity and partial lignin removal\n- **Composite material** \u2192 prioritize stiffness, hydrophobicity, and controlled lignin retention\n\n## 2) Translate the application into measurable targets\n### Action\nConvert the product goal into 1 primary metric and 2\u20134 secondary metrics.\n\n### Why\nA single metric like lignin removal is not enough to judge process quality.\n\n### How (Example)\nFor a bioethanol pretreatment:\n- **Primary target:** maximize enzymatic digestibility\n- **Secondary targets:** residual lignin < target threshold, cellulose retention > target threshold, sugar loss < target threshold\n\nFor paper pulp:\n- **Primary target:** reduce lignin to a suitable kappa number\n- **Secondary targets:** maintain brightness, maintain pulp yield, avoid excessive cellulose damage\n\n## 3) Set a baseline\n### Action\nMeasure or estimate the untreated feedstock properties.\n\n### Why\nYou need a starting point to calculate improvement and tradeoffs.\n\n### How (Example)\nRecord:\n- Initial lignin content\n- Cellulose and hemicellulose content\n- Solids moisture content\n- Initial kappa number or acid-insoluble lignin\n- Baseline enzymatic digestibility, if relevant\n\n## 4) Define the acceptable tradeoff window\n### Action\nDecide what can be sacrificed and what must be preserved.\n\n### Why\nDelignification is a balance between accessibility and material damage.\n\n### How (Example)\nA biomass-to-ethanol project may allow moderate hemicellulose loss, but should preserve most cellulose and avoid excessive inhibitor formation. A composite project may accept only partial lignin removal if stiffness and water resistance are improved."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Choose Metrics and Build a Decision Framework\n\n## 1) Select the core performance metrics\n### Action\nChoose metrics that measure both lignin removal and biomass preservation.\n\n### Why\nA process that removes lignin effectively but destroys carbohydrates is usually not a good process.\n\n### How (Example)\nUse a metric set such as:\n- **Residual lignin / lignin removal efficiency**\n- **Cellulose retention**\n- **Hemicellulose retention**\n- **Overall mass yield**\n- **Selectivity for lignin over polysaccharides**\n- **Enzymatic digestibility**\n- **Brightness or pulping quality**, if relevant\n\n## 2) Add process-intensity metrics\n### Action\nTrack operating severity and resource use alongside material results.\n\n### Why\nDelignification must be practical, not just chemically effective.\n\n### How (Example)\nRecord:\n- Reaction time\n- Temperature\n- Pressure\n- pH\n- Reagent loading\n- Energy demand\n- Solvent or oxidant consumption\n\n## 3) Match the target to the feedstock\n### Action\nAdjust target thresholds based on biomass type.\n\n### Why\nSoftwoods, hardwoods, and grasses differ in lignin chemistry and accessibility.\n\n### How (Example)\n- **Softwoods:** often require more aggressive delignification because lignin structure can be more resistant\n- **Hardwoods:** may respond differently due to lignin composition and distribution\n- **Grasses:** often require careful control because of distinct lignin\u2013carbohydrate associations and silica-related processing issues in some cases\n\n## 4) Build a weighted scorecard\n### Action\nAssign weights to each metric based on the final application.\n\n### Why\nThis lets you compare candidate methods fairly.\n\n### How (Example)\nFor ethanol pretreatment:\n- Digestibility = 40%\n- Cellulose retention = 25%\n- Lignin reduction = 20%\n- Reagent/energy use = 15%\n\nFor fiber products:\n- Mechanical integrity = 35%\n- Partial delignification = 25%\n- Hydrophobicity = 20%\n- Yield and cost = 20%\n\n## 5) Compare candidate processes using tradeoffs\n### Action\nEvaluate each process against your scorecard.\n\n### Why\nThe best process is usually the one with the best balance, not the highest single metric.\n\n### How (Example)\nCompare two alkaline oxidation conditions:\n- Process A: higher lignin removal but lower cellulose retention\n- Process B: slightly lower lignin removal but better yield and less carbohydrate damage\n\nChoose Process B if your application values preserved structure and downstream recovery more than maximum delignification."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Apply the Framework in Practice and Refine It\n\n## 1) Run a small screening study\n### Action\nTest 2\u20135 candidate delignification conditions at small scale.\n\n### Why\nEarly screening reveals which conditions meet your target without excessive loss.\n\n### How (Example)\nSet up a matrix varying:\n- Chemical dose\n- Time\n- Temperature\n- pH\nThen measure:\n- Residual lignin\n- Carbohydrate loss\n- Mass yield\n- Digestibility or pulp quality\n\n## 2) Interpret results as a balance, not a single number\n### Action\nReview each candidate by looking at the full metric set.\n\n### Why\nHigh lignin removal can hide poor selectivity or high material loss.\n\n### How (Example)\nA process that achieves 60% lignin removal but loses 30% cellulose may be worse than one that achieves 50% lignin removal with only 8% cellulose loss.\n\n## 3) Refine the target thresholds\n### Action\nAdjust your target if the results show the original goal is unrealistic or too conservative.\n\n### Why\nTargets should be feedstock-aware and downstream-aware.\n\n### How (Example)\nIf a grass feedstock consistently shows higher carbohydrate sensitivity than expected, relax the lignin-removal target slightly and increase the emphasis on carbohydrate preservation.\n\n## 4) Finalize the decision template\n### Action\nCreate a reusable template for future biomass projects.\n\n### Why\nThis turns delignification into a repeatable engineering workflow.\n\n### How (Example)\nUse this final template:\n1. **Application:** what product is being made?\n2. **Primary target metric:** what defines success?\n3. **Preservation metrics:** what must be protected?\n4. **Process metrics:** what operational limits apply?\n5. **Decision rule:** which process wins under the weighted scorecard?\n\n## Final takeaway\nA good delignification plan does not start with chemistry; it starts with the product. Define the application, set measurable targets, choose preservation metrics, and evaluate methods by selectivity, yield, and process intensity. That approach makes the process design defensible and application-specific."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
