  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nTurn biomass characterization data into a **specific delignification target** that matches the end use of the feedstock. By the end of this workflow, you should be able to state:\n- **How much lignin must be removed or modified**\n- **How much carbohydrate damage is acceptable**\n- **What structural opening is needed**\n- **Which success metric defines the endpoint**\n\nThis is the practical bridge from feedstock analysis to process design for:\n- **Pulping**: target kappa, brightness, yield, fiber strength\n- **Bioethanol pretreatment**: target digestibility, pore opening, glucan retention\n- **Lignin recovery**: target selective lignin extraction with minimal sugar loss\n\n## Technical prerequisites\nHave access to the following before you start:\n- **Feedstock composition data**: lignin, cellulose, hemicellulose, ash, extractives, moisture\n- **Lignin chemistry data**: S/G/H ratio if available\n- **Structure/accessibility data**: microscopy, porosity, particle size, cell-wall thickness, crystallinity\n- **Process chemistry options**: alkaline, oxidative, sulfite, organosolv, or combined pretreatment/pulping route\n- **Application metrics** relevant to your use case:\n  - Kappa number and brightness for pulp\n  - Digestibility and sugar yield for biofuels\n  - Lignin purity and yield for valorization\n  - Cellulose DP and pulp yield where carbohydrate preservation matters\n\n## What you will produce\nA practical target statement such as:\n- \u201cReduce residual lignin to improve enzymatic digestibility by X% while retaining at least Y% glucan.\u201d\n- \u201cReach kappa number Z with acceptable yield loss and brightness gain.\u201d\n- \u201cExtract lignin selectively while minimizing cellulose DP loss.\u201d"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Diagnose the Real Problem Lignin Is Causing\n\n## Step 1: Identify the bottleneck before choosing the target\n\n### The Action\nAsk: **What exactly is lignin preventing in this feedstock?**\n- Blocking enzyme access?\n- Lowering pulp brightness?\n- Reducing fiber bonding?\n- Preventing chemical penetration?\n- Causing poor delignification efficiency?\n\n### Why it matters\nIf you do not define the problem, you will choose the wrong endpoint. \u201cLess lignin\u201d is not always the correct goal; sometimes the real need is **better accessibility**, **lignin redistribution**, or **selective removal of a specific fraction**.\n\n### How to do it: example/template\nUse this decision template:\n- **If the problem is enzyme inhibition** \u2192 target **structural opening + moderate lignin reduction + high carbohydrate retention**\n- **If the problem is low brightness** \u2192 target **deep lignin removal + low residual chromophores**\n- **If the problem is weak pulp yield** \u2192 target **controlled delignification + minimal cellulose damage**\n- **If the problem is poor chemical penetration** \u2192 target **porosity increase + surface deconstruction**\n\nExample:\n- Feedstock: corn stover for ethanol\n- Problem: enzymes cannot access cellulose efficiently\n- Target: \u201cIncrease accessibility and digestibility, not complete lignin removal; preserve glucan and limit DP loss.\u201d\n\n## Step 2: Classify the feedstock difficulty\n\n### The Action\nRate the feedstock using the properties that matter most:\n- **High lignin vs low lignin**\n- **Condensed lignin vs less condensed lignin**\n- **Dense tissue vs open tissue**\n- **High crystallinity vs low crystallinity**\n- **High extractives/ash vs clean biomass**\n- **Low porosity vs high porosity**\n\n### Why it matters\nThe physical and chemical properties determine how aggressive your target must be. Two materials with the same lignin content can require very different delignification goals.\n\n### How to do it: example/template\nCreate a quick feedstock profile:\n- **Lignin content**: high / medium / low\n- **Lignin type**: guaiacyl-rich / syringyl-rich / mixed\n- **Wall structure**: dense / moderate / open\n- **Access limitation**: low / moderate / severe\n- **Carbohydrate sensitivity**: low / moderate / high\n\nExample:\n- Hardwood chips: moderate lignin, more syringyl-rich, easier to delignify than softwood\n- Resulting target: stronger brightness-focused delignification may be feasible without excessive severity"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Convert Feedstock Properties into Measurable Targets\n\n## Step 3: Translate the feedstock profile into four design questions\n\n### The Action\nFor each feedstock, answer these four questions:\n1. **How much lignin must be removed or modified?**\n2. **How much carbohydrate loss can be tolerated?**\n3. **How much structural opening is required?**\n4. **What product quality metric defines success?**\n\n### Why it matters\nThese four questions turn a vague goal into a measurable target set. They force you to balance delignification against product quality and yield.\n\n### How to do it: example/template\nBuild a target sheet like this:\n- **Residual lignin target**: specify a range, not just \u201clow\u201d\n- **Carbohydrate recovery target**: glucan/holocellulose retention threshold\n- **Structural target**: porosity increase, particle size reduction, wall disruption\n- **Success metric**: digestibility, brightness, kappa number, lignin purity, yield, or DP\n\nExample target statements:\n- **Bioethanol pretreatment**: \u201cReduce residual lignin enough to improve enzymatic digestibility by 30% while retaining at least 85% of glucan.\u201d\n- **Pulping**: \u201cAchieve kappa number 18\u201320 with acceptable yield and brightness targets.\u201d\n- **Lignin valorization**: \u201cExtract lignin selectively with minimal carbohydrate contamination and limited cellulose degradation.\u201d\n\n## Step 4: Match the target to the application\n\n### The Action\nChoose the endpoint based on the downstream product:\n- **Pulp mill** \u2192 brightness, kappa, yield, fiber strength\n- **Bioethanol line** \u2192 digestibility, sugar yield, low inhibitor formation\n- **Biorefinery with lignin recovery** \u2192 lignin selectivity, purity, low sugar loss\n- **Fiber products** \u2192 bonding ability, structural integrity, yield\n\n### Why it matters\nDifferent industries define success differently. The same feedstock can require a mild, moderate, or severe delignification target depending on whether the final product is fuel, pulp, or recovered lignin.\n\n### How to do it: example/template\nUse this mapping:\n- **Recalcitrant agricultural residues** \u2192 prioritize penetration, partial delignification, hemicellulose preservation\n- **Woody biomass for pulp** \u2192 prioritize extensive delignification and brightness\n- **Enzyme-based biorefinery feedstocks** \u2192 prioritize accessibility and lignin redistribution\n- **Lignin extraction routes** \u2192 prioritize selectivity and polymer preservation"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Set the Final Delignification Window and Validate It\n\n## Step 5: Define the target as a balanced window, not a single number\n\n### The Action\nWrite the target as a **range of acceptable outcomes**:\n- Residual lignin window\n- Minimum carbohydrate recovery\n- Acceptable cellulose DP floor\n- Desired endpoint metric\n\n### Why it matters\nDeeper delignification usually improves performance, but it can also damage carbohydrates or create condensation products. A window helps you avoid overprocessing.\n\n### How to do it: example/template\nUse a target format like this:\n- **Residual lignin**: 8\u201312%\n- **Glucan retention**: \u226585%\n- **DP loss**: \u226420%\n- **Endpoint**: digestibility +25% or brightness above target value\n\nExample:\n- For softwood pulp: prioritize deeper delignification, but set a yield floor to prevent overcooking\n- For pretreatment: prioritize enough lignin disruption to raise enzyme access, but stop before major sugar loss\n\n## Step 6: Check that the process chemistry can realistically meet the target\n\n### The Action\nMatch the target to the process type:\n- **Alkaline**: good for bulk lignin removal and fiber swelling\n- **Oxidative**: useful for bleaching and chromophore removal\n- **Sulfite**: useful for lignin modification and solubilization\n- **Organosolv**: useful for selective fractionation and lignin recovery\n- **Combined methods**: useful when one chemistry cannot satisfy all constraints\n\n### Why it matters\nA target that ignores process limits will fail in practice. The chemistry must be capable of reaching the residual lignin, yield, and DP balance you set.\n\n### How to do it: example/template\nValidation checklist:\n- Can this chemistry reach the lignin removal level required?\n- Will it preserve enough carbohydrates?\n- Will it improve the right endpoint metric?\n- Does it create unwanted condensation or inhibitor formation?\n\nFinal example statement:\n- \u201cThis feedstock requires strong penetration and moderate lignin removal. An alkaline or combined pretreatment is appropriate, with the target set by digestibility gain, not complete delignification.\u201d\n\n## Final takeaway\nDo not choose a delignification goal based on lignin content alone. Choose it by aligning **feedstock difficulty**, **process capability**, and **product requirements** into one measurable target window."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
