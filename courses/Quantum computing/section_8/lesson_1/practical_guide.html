  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a working understanding of **hybrid quantum-classical optimization** by implementing two near-term algorithms:\n- **VQE (Variational Quantum Eigensolver)** for estimating ground-state energies\n- **QAOA (Quantum Approximate Optimization Algorithm)** for solving combinatorial optimization problems like **Max-Cut**\n\nBy the end, you should be able to:\n1. Construct a parameterized quantum circuit.\n2. Measure a cost function from circuit samples.\n3. Use a classical optimizer to update circuit parameters.\n4. Interpret results under realistic **NISQ** noise and hardware limits.\n\n## Prerequisites\nUse these specific tools/access before starting:\n- **Python 3.10+**\n- **Qiskit 1.x** with Aer simulator installed\n- **NumPy** and **SciPy** for optimization and linear algebra\n- Access to either:\n  - a local **Qiskit Aer** noisy simulator, or\n  - an IBM Quantum account with a real backend\n- For VQE examples: a chemistry/physics Hamiltonian source such as\n  - **Qiskit Nature**\n  - or a prepared Pauli Hamiltonian file\n- For QAOA examples: a graph library such as\n  - **NetworkX** for generating Max-Cut instances\n\n## What to prepare\n- A notebook or Python script with:\n  - a circuit-building function\n  - an expectation-value estimator\n  - a classical optimization loop\n  - result logging for parameter values, energy, and convergence\n\n## Why this setup matters\nVQE and QAOA are not \u201csingle-run\u201d algorithms. They require repeated execution, measurement, and parameter updates. If your environment cannot simulate shots, transpile circuits, and run classical optimization loops, you will not see the core workflow in action.\n\n## How to get ready\n- Install dependencies:\n  - `pip install qiskit qiskit-aer numpy scipy networkx`\n- Confirm you can:\n  - run a Bell-state circuit\n  - measure counts from shots\n  - compute a simple expectation value from bitstrings\n- If using hardware, verify:\n  - your account is active\n  - your backend supports the gate set you need\n  - your transpilation pipeline works on that backend"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement VQE Step by Step\n\n## Step 1: Define the target Hamiltonian\n**Action:** Write the problem Hamiltonian as a weighted sum of Pauli strings.\n\n**Why:** VQE minimizes the expectation value of this Hamiltonian, so the Hamiltonian is the objective function.\n\n**How (Example):**\n```python\nH = 0.5 * \"ZI\" + -1.2 * \"IZ\" + 0.8 * \"XX\"\n```\nIn practice, store terms as tuples:\n```python\nterms = [(0.5, \"ZI\"), (-1.2, \"IZ\"), (0.8, \"XX\")]\n```\n\n## Step 2: Choose an ansatz circuit\n**Action:** Build a parameterized trial state.\n\n**Why:** The ansatz defines the search space for the ground state.\n\n**How (Example):**\n- Start with a **hardware-efficient ansatz** if you want easy execution.\n- Use a **problem-inspired ansatz** if you know the structure of the Hamiltonian.\n\nTemplate:\n```python\nfrom qiskit.circuit import QuantumCircuit, Parameter\n\ntheta = Parameter(\"theta\")\nqc = QuantumCircuit(2)\nqc.ry(theta, 0)\nqc.cx(0, 1)\n```\n\n## Step 3: Decompose measurements into Pauli expectations\n**Action:** Measure each Pauli term by rotating into the correct basis and sampling shots.\n\n**Why:** You cannot directly measure an abstract Hamiltonian; you estimate each term from counts.\n\n**How (Example):**\n- For **Z** terms: measure directly in the computational basis.\n- For **X** terms: apply **H** before measurement.\n- For **Y** terms: apply **S\u2020 then H** before measurement.\n\nExample basis change for a `Y` term:\n```python\nqc.sdg(qubit)\nqc.h(qubit)\nqc.measure(qubit, clbit)\n```\n\n## Step 4: Compute the energy estimate\n**Action:** Convert shot counts into expectation values and sum the weighted terms.\n\n**Why:** This is the numerical objective the optimizer will minimize.\n\n**How (Example):**\n- Convert bitstrings to \u00b11 eigenvalues.\n- Multiply each term\u2019s expectation by its coefficient.\n- Add the results to get the total energy.\n\nPseudo-template:\n```python\nenergy = sum(coeff * expval(term) for coeff, term in terms)\n```\n\n## Step 5: Run the classical optimizer\n**Action:** Feed the energy function into an optimizer such as COBYLA or SPSA.\n\n**Why:** The optimizer searches parameter values that reduce the measured energy.\n\n**How (Example):**\n```python\nfrom scipy.optimize import minimize\nresult = minimize(vqe_objective, x0=[0.1], method=\"COBYLA\")\n```\nFor noisy hardware, prefer optimizers that tolerate stochastic objectives, such as **SPSA**.\n\n## Step 6: Track convergence and noise effects\n**Action:** Log energy versus iteration and compare simulator vs noisy hardware.\n\n**Why:** VQE success depends on whether the energy decreases consistently and remains stable under noise.\n\n**How (Example):**\n- Run the same circuit with:\n  - ideal simulation\n  - noisy simulation\n  - hardware\n- Compare final energies and iteration curves.\n\n## Practical VQE checklist\n- Keep circuit depth shallow enough for hardware\n- Use enough shots to stabilize energy estimates\n- Reuse transpiled circuits when possible\n- Apply readout-error mitigation if available"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Implement QAOA Step by Step\n\n## Step 1: Encode the optimization problem\n**Action:** Turn your combinatorial problem into a cost Hamiltonian.\n\n**Why:** QAOA needs a quantum objective that rewards good solutions.\n\n**How (Example):**\nFor **Max-Cut**, each edge contributes a penalty when two connected vertices are on the same side of the cut.\n\nExample graph:\n```python\nimport networkx as nx\nG = nx.Graph()\nG.add_edges_from([(0, 1), (1, 2), (0, 2)])\n```\n\n## Step 2: Initialize the circuit in superposition\n**Action:** Apply Hadamards to all qubits.\n\n**Why:** This creates a uniform starting distribution over all candidate bitstrings.\n\n**How (Example):**\n```python\nfor q in range(n):\n    qc.h(q)\n```\n\n## Step 3: Apply alternating cost and mixer layers\n**Action:** Build p layers of:\n1. cost unitary\n2. mixer unitary\n\n**Why:** The cost layer adds phase information tied to solution quality, and the mixer redistributes amplitude to explore the search space.\n\n**How (Example):**\n- Cost unitary: encode edge penalties with phase rotations.\n- Mixer unitary: usually `RX` rotations on every qubit.\n\nTemplate:\n```python\nfor layer in range(p):\n    apply_cost_layer(qc, gamma[layer], G)\n    apply_mixer_layer(qc, beta[layer], n)\n```\n\n## Step 4: Define the QAOA objective\n**Action:** Measure sampled bitstrings and compute the problem score.\n\n**Why:** The optimizer needs a scalar objective such as cut value or cost.\n\n**How (Example):**\n- For Max-Cut, evaluate each sampled bitstring by counting crossing edges.\n- Average over all measured samples.\n\nExample scoring idea:\n```python\ndef cut_value(bitstring, G):\n    return sum(bitstring[u] != bitstring[v] for u, v in G.edges())\n```\n\n## Step 5: Optimize parameters\n**Action:** Tune the layer parameters `gamma` and `beta` with a classical optimizer.\n\n**Why:** QAOA performance depends on selecting the right interference pattern.\n\n**How (Example):**\n```python\nx0 = [0.1] * (2 * p)\nresult = minimize(qaoa_objective, x0=x0, method=\"COBYLA\")\n```\n\n## Step 6: Balance depth and noise\n**Action:** Test several values of `p` and compare solution quality to circuit depth.\n\n**Why:** Larger `p` can improve accuracy, but deeper circuits suffer more from decoherence and gate errors.\n\n**How (Example):**\n- Run `p = 1, 2, 3`\n- Record best cut value and execution stability\n- Stop increasing `p` once hardware noise outweighs the gain\n\n## Practical QAOA checklist\n- Match the circuit layout to device connectivity\n- Use transpilation to reduce routing overhead\n- Start with small graph instances\n- Use many shots for noisy objectives\n- Prefer a classical optimizer robust to stochastic measurements"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Make the Workflow Hardware-Ready\n\n## Step 1: Transpile for the target backend\n**Action:** Convert your circuit to native gates and device connectivity.\n\n**Why:** A circuit that looks good in theory may be expensive or impossible to run directly on hardware.\n\n**How (Example):**\n```python\nfrom qiskit import transpile\ncompiled = transpile(qc, backend=backend, optimization_level=3)\n```\nCheck that:\n- the qubit mapping is valid\n- the gate count is minimized\n- circuit depth is still acceptable\n\n## Step 2: Add mitigation where possible\n**Action:** Apply readout correction or symmetry checks.\n\n**Why:** Noise can bias the expectation values and hide useful signal.\n\n**How (Example):**\n- Calibrate measurement errors using a readout mitigation tool\n- Reject samples that violate known symmetries in VQE chemistry problems\n\n## Step 3: Use a realistic shot budget\n**Action:** Allocate enough measurement shots for stable objective estimates.\n\n**Why:** Too few shots make the cost function too noisy for optimization.\n\n**How (Example):**\n- Start with 1,000 shots for simulation\n- Increase to 5,000 or more if the variance is too high\n- Reuse the same shot budget across iterations for fair comparison\n\n## Step 4: Compare against classical baselines\n**Action:** Benchmark your result against a classical method or exact solver on small instances.\n\n**Why:** Near-term success means measurable usefulness, not just running a quantum circuit.\n\n**How (Example):**\n- VQE: compare estimated ground-state energy to exact diagonalization on small molecules\n- QAOA: compare cut value to brute-force optimum on small graphs\n\n## Step 5: Interpret the result correctly\n**Action:** Decide whether the algorithm is useful based on problem size, noise, and convergence.\n\n**Why:** VQE and QAOA are practical workflows for NISQ devices, not guaranteed speedups.\n\n**How (Example):**\nA good outcome may look like:\n- stable convergence\n- better-than-random solutions\n- a meaningful estimate on a problem too large for straightforward classical simulation\n\n## Final implementation rule\nTreat VQE and QAOA as a **closed loop**:\n1. build a parameterized circuit\n2. measure noisy samples\n3. estimate an objective\n4. update parameters classically\n5. repeat until improvement plateaus\n\nThat loop is the core pattern behind practical near-term quantum algorithms."

            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
