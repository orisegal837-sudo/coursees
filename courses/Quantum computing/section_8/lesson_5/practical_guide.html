      font-family: var(--font-sans);
      background-color: var(--bg-base);
      color: var(--text-main);

      padding: 6px 14px;

      background: rgba(255, 255, 255, 0.03);
      border-radius: 999px;
      color: var(--text-main);

      font-weight: 500;
      letter-spacing: 0.03em;

      -webkit-backdrop-filter: blur(12px);

      box-shadow: 0 0 8px var(--accent-primary);

    .title {

  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a **practical fault-tolerant quantum computing (FTQC) resource-estimation workflow** that answers:\n- **Can this quantum application be run reliably?**\n- **How many logical qubits, physical qubits, and cycles are required?**\n- **What is the bottleneck: error correction, T gates, routing, or runtime?**\n\nBy the end, you should be able to take a target algorithm and turn it into a realistic estimate of:\n- **Logical error rate**\n- **Physical qubit count**\n- **Circuit depth / runtime**\n- **Magic-state or T-gate overhead**\n- **Whether the application is feasible on a given hardware target**\n\n## Prerequisites\n### Technical access and tools\n- **A quantum circuit framework**: one of\n  - `Qiskit`\n  - `Cirq`\n  - `tket`\n- **A resource estimation or fault-tolerance toolkit**: one of\n  - `Qiskit Aer` + custom counting scripts\n  - `pytket` compilation tools\n  - a surface-code estimator package or notebook\n- **A Python environment** with:\n  - `numpy`\n  - `scipy`\n  - `matplotlib`\n- **Access to a target hardware specification**, such as:\n  - physical 2-qubit gate error rate\n  - measurement error rate\n  - coherence time estimates\n  - qubit connectivity / architecture model\n- **A target algorithm description**, such as:\n  - chemistry Hamiltonian simulation\n  - Shor-style arithmetic circuit\n  - Grover search\n  - QAOA / variational circuit\n\n## What you should prepare before estimating\n1. **Pick one concrete algorithm**.\n   - Example: a chemistry simulation that needs high-precision phase estimation.\n2. **Identify the logical circuit form**.\n   - Example: number of logical qubits, T-count, T-depth, Clifford count.\n3. **Choose the fault-tolerance model**.\n   - Example: surface code with magic-state distillation.\n4. **Gather hardware error data**.\n   - Example: physical gate error = `1e-3`, measurement error = `2e-3`.\n\n## Why this matters\nYou cannot judge feasibility from \u201cqubit count\u201d alone. FTQC feasibility depends on the **full stack**: algorithm cost, logical protection, and machine overhead. This workflow makes that tradeoff explicit."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Characterize the Target Algorithm\n\n## Action\nWrite down the algorithm in terms of **logical resources**, not hardware details.\n\n## Why\nFTQC estimation starts with the algorithm\u2019s intrinsic cost. If you begin with the physical machine, you lose track of what the algorithm actually requires.\n\n## How (Example)\nCreate a resource sheet with these fields:\n- **Logical qubits**: how many clean qubits the algorithm needs\n- **Clifford gates**: CNOT, H, S, measurements\n- **T gates**: total count of non-Clifford operations\n- **T depth**: number of sequential T layers\n- **Circuit depth**: total logical depth\n- **Measurement rounds**: if iterative or adaptive\n\nExample template:\n```text\nAlgorithm: Phase estimation for chemistry\nLogical qubits: 120\nT count: 1.2e8\nT depth: 4.0e7\nClifford count: 8.5e8\nMeasurement rounds: 3.0e6\n```\n\n## Action\nSeparate the algorithm into **critical subroutines**.\n\n## Why\nDifferent subroutines drive different costs. Arithmetic may dominate T count, while repeated sampling may dominate runtime.\n\n## How (Example)\nBreak the application into blocks:\n- State preparation\n- Oracle or Hamiltonian evolution\n- Arithmetic / rotation synthesis\n- Measurement and repetition\n\nExample:\n```text\nChemistry workflow:\n- State prep: moderate cost\n- Time evolution: high Clifford cost\n- Phase estimation: very high T-depth\n- Final readout: low cost\n```\n\n## Action\nEstimate whether the algorithm is **T-limited**, **qubit-limited**, or **runtime-limited**.\n\n## Why\nThis tells you where optimization effort should go.\n\n## How (Example)\n- If `T count` dominates, focus on reducing non-Clifford gates.\n- If logical qubits dominate, focus on compaction and layout.\n- If depth dominates, focus on parallelization and architecture-aware compilation."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Convert Logical Cost into Fault-Tolerant Cost\n\n## Action\nChoose an error-correcting code and fix a target logical failure rate.\n\n## Why\nFault tolerance is an optimization problem: stronger protection requires more qubits and time. You need a code model to translate logical needs into physical overhead.\n\n## How (Example)\nUse a surface-code assumption for a first estimate:\n- Physical gate error: `p = 1e-3`\n- Target logical error per operation: `<= 1e-12`\n- Code distance chosen to suppress logical errors below the target\n\nExample template:\n```text\nCode: Surface code\nPhysical 2Q error: 1e-3\nMeasurement error: 2e-3\nTarget logical error/op: 1e-12\nChosen code distance: d = 25\n```\n\n## Action\nTranslate logical qubits into **physical qubits**.\n\n## Why\nOne logical qubit may require hundreds or thousands of physical qubits depending on code distance and layout overhead.\n\n## How (Example)\nEstimate:\n- data qubits for encoding\n- ancilla qubits for syndrome extraction\n- routing / buffer qubits\n- factory qubits for magic-state production\n\nExample:\n```text\n1 logical qubit -> ~2,000 physical qubits\n120 logical qubits -> ~240,000 physical qubits\n+ 80,000 qubits for distillation factories\nTotal estimate: ~320,000 physical qubits\n```\n\n## Action\nConvert T-count and T-depth into **magic-state factory demand**.\n\n## Why\nIn many fault-tolerant architectures, T gates are the expensive bottleneck because they require distilled magic states.\n\n## How (Example)\nUse a simple factory model:\n- T count = total magic states needed\n- T depth = how many states must be supplied in parallel\n- More parallel demand = more factories\n\nExample:\n```text\nT count: 1.2e8\nT depth: 4.0e7\nFactory throughput requirement: 3 magic states per cycle\nFactories needed: 24\n```\n\n## Action\nAdd overhead for routing, decoding, measurement, and scheduling.\n\n## Why\nA gate count alone underestimates the real runtime. FTQC is a systems problem.\n\n## How (Example)\nInclude these multipliers:\n- routing via SWAP-like movement\n- syndrome extraction cycles\n- decoder latency\n- measurement delays\n- idle-error padding\n\nExample:\n```text\nLogical depth: 1e9 cycles\nRouting overhead: x1.3\nDecoder/measurement overhead: x1.2\nEstimated wall-clock cycles: 1.56e9\n```"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Decide Feasibility and Improve the Design\n\n## Action\nCompare the estimated physical cost to your available or projected hardware budget.\n\n## Why\nA quantum application is only realistic if the required hardware, runtime, and logical fidelity are within plausible limits.\n\n## How (Example)\nCheck these decision questions:\n1. **Qubit budget**: Can the device supply this many physical qubits?\n2. **Runtime budget**: Can the algorithm finish before qubit loss or drift becomes dominant?\n3. **Error budget**: Is the total logical failure probability acceptable?\n4. **Factory budget**: Can the architecture support the necessary T-state throughput?\n\nExample decision table:\n```text\nAvailable qubits: 100,000\nRequired qubits: 320,000 -> Not feasible\nAvailable cycle budget: 2e8\nRequired cycles: 1.56e9 -> Not feasible\n```\n\n## Action\nTry the main optimization levers if the estimate is too expensive.\n\n## Why\nMost FTQC improvements come from reducing overhead at the algorithm, compiler, or architecture level.\n\n## How (Example)\nApply these interventions:\n- **Reduce T count** using better arithmetic or phase-gradient methods\n- **Reduce T depth** by parallelizing non-Clifford layers\n- **Lower logical qubit count** by reusing registers\n- **Improve compilation** to reduce routing overhead\n- **Use a better code/decoder** to reduce required code distance\n- **Redesign the algorithm** to be more FTQC-friendly\n\nExample:\n```text\nBefore optimization:\n- T count: 1.2e8\n- Physical qubits: 320,000\n\nAfter optimization:\n- T count: 4.5e7\n- Physical qubits: 180,000\n- Feasibility: potentially within target architecture\n```\n\n## Action\nDocument your final estimate as a full-stack FTQC report.\n\n## Why\nA good estimate must be reproducible and tied to assumptions.\n\n## How (Example)\nUse this final report format:\n```text\nAlgorithm: ______________________\nHardware model: __________________\nCode: ____________________________\nPhysical error rates: _____________\nLogical error target: _____________\nLogical qubits: ___________________\nT count / T depth: ________________\nEstimated physical qubits: ________\nEstimated runtime: ________________\nFeasible? Yes / No / Maybe\nMain bottleneck: _________________\n```\n\n## Final takeaway\nFTQC feasibility is determined by the interaction of **error rates, code distance, non-Clifford cost, routing overhead, and distillation demand**. If you can estimate those together, you can tell whether a quantum application is merely theoretically interesting or practically buildable."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
