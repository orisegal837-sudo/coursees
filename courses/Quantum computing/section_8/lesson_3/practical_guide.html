  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **small quantum machine learning prototype** in one of three styles:\n1. **Quantum kernel classifier** \u2014 estimate data similarity with a quantum circuit and train a classical SVM.\n2. **Quantum feature map pipeline** \u2014 encode classical inputs into quantum states and inspect how the embedding changes separability.\n3. **Variational quantum classifier** \u2014 train a parameterized circuit to predict labels from measurement outcomes.\n\nBy the end, you should be able to:\n- Encode classical data into a quantum circuit\n- Run either a kernel-based or variational QML workflow\n- Compare performance against a classical baseline\n- Identify when the quantum approach is useful, noisy, or unhelpful\n\n## Prerequisites\nUse specific tools so you can execute the workflow end to end:\n- **Python 3.10+**\n- **Qiskit** (`qiskit`, `qiskit-machine-learning`, `qiskit-aer`)\n- **scikit-learn** for classical baselines and SVMs\n- **NumPy** and **Matplotlib** for data handling and visualization\n- Access to either:\n  - **IBM Quantum Runtime / IBM Quantum account** for real hardware, or\n  - **Qiskit Aer simulator** for local testing\n- A dataset with labels, such as:\n  - `sklearn.datasets.make_moons`\n  - `make_circles`\n  - a small binary classification dataset from CSV\n\n## Recommended setup\n- Work in a fresh virtual environment\n- Install packages before coding\n- Start with a **2-feature binary dataset** so you can visualize decision boundaries and kernel effects clearly\n\n## What to keep in mind\n- QML is usually **hybrid**: quantum circuit + classical optimizer or classifier\n- You are not trying to replace all classical ML\n- Your goal is to test whether a quantum circuit gives a useful embedding or trainable model for your data"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement a Quantum Kernel Workflow\n\n## Step 1: Prepare the data\n**Action:** Select a small labeled dataset and normalize features to a bounded range.\n\n**Why:** Quantum feature maps usually expect inputs in a compact range, and kernel behavior is easier to study on low-dimensional data.\n\n**How (Example):**\n```python\nfrom sklearn.datasets import make_moons\nfrom sklearn.preprocessing import MinMaxScaler\n\nX, y = make_moons(n_samples=100, noise=0.15, random_state=42)\nX = MinMaxScaler(feature_range=(0, 1)).fit_transform(X)\n```\n\n## Step 2: Define a quantum feature map\n**Action:** Choose a feature map circuit that maps each input vector `x` to a quantum state `|\u03c6(x)\u27e9`.\n\n**Why:** The feature map controls the geometry of the quantum Hilbert space and determines whether classes become more separable.\n\n**How (Example):**\nUse a built-in feature map such as `ZZFeatureMap` in Qiskit:\n```python\nfrom qiskit.circuit.library import ZZFeatureMap\n\nfeature_map = ZZFeatureMap(feature_dimension=2, reps=2)\n```\n\n## Step 3: Estimate the quantum kernel matrix\n**Action:** Compute pairwise similarities `K(x_i, x_j)` for all samples.\n\n**Why:** A quantum kernel method turns quantum state overlap estimation into a Gram matrix that a classical SVM can use.\n\n**How (Example):**\n```python\nfrom qiskit_machine_learning.kernels import FidelityQuantumKernel\nfrom qiskit_aer import AerSimulator\n\nbackend = AerSimulator()\nquantum_kernel = FidelityQuantumKernel(feature_map=feature_map)\nkernel_matrix = quantum_kernel.evaluate(x_vec=X)\n```\n\n## Step 4: Train a classical classifier on the kernel\n**Action:** Fit a support vector machine using the quantum kernel matrix.\n\n**Why:** This cleanly separates the quantum similarity calculation from classical optimization.\n\n**How (Example):**\n```python\nfrom sklearn.svm import SVC\n\nsvm = SVC(kernel='precomputed')\nsvm.fit(kernel_matrix, y)\n```\n\n## Step 5: Evaluate the result\n**Action:** Measure accuracy and compare it to a classical SVM using an RBF kernel.\n\n**Why:** A quantum kernel is only useful if it beats or matches a strong classical baseline under the same conditions.\n\n**How (Example):**\n```python\nfrom sklearn.metrics import accuracy_score\n\npred = svm.predict(kernel_matrix)\nprint(\"Train accuracy:\", accuracy_score(y, pred))\n```\n\n## Step 6: Inspect kernel quality\n**Action:** Check whether the kernel matrix contains meaningful structure or is close to random.\n\n**Why:** If states become nearly orthogonal too quickly, the kernel may concentrate and stop being informative.\n\n**How (Example):**\n- Plot the kernel matrix as a heatmap\n- Compare same-class and different-class similarity distributions\n- Reduce or increase `reps` to see how expressiveness changes"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Build and Train a Variational Quantum Model\n\n## Step 1: Define the model structure\n**Action:** Create a variational classifier with three blocks: encoding, ansatz, and measurement.\n\n**Why:** This is the standard hybrid architecture for prediction tasks.\n\n**How (Example):**\n- Encoding: map features to rotations\n- Ansatz: trainable rotation and entanglement layers\n- Measurement: expectation value of `Z` on one qubit\n\nExample skeleton:\n```python\nfrom qiskit.circuit.library import ZZFeatureMap, RealAmplitudes\n\nfeature_map = ZZFeatureMap(2, reps=1)\nansatz = RealAmplitudes(num_qubits=2, reps=2)\n```\n\n## Step 2: Connect circuit output to a loss\n**Action:** Define how the measured quantum output becomes a prediction.\n\n**Why:** Training requires a numeric objective that can be optimized by a classical routine.\n\n**How (Example):**\n- Use expectation value near `+1` for class 0\n- Use expectation value near `-1` for class 1\n- Define loss as mean squared error or classification loss\n\nExample rule:\n```text\nprediction = 1 if <Z> > 0 else 0\n```\n\n## Step 3: Choose an optimizer\n**Action:** Pick a classical optimizer that works well with noisy, shot-based evaluations.\n\n**Why:** Variational circuits are usually optimized with gradients or gradient-free methods under noise.\n\n**How (Example):**\nCommon choices:\n- `COBYLA` for simple gradient-free training\n- `SPSA` for noise-tolerant optimization\n\nExample:\n```python\nfrom qiskit_algorithms.optimizers import COBYLA\noptimizer = COBYLA(maxiter=50)\n```\n\n## Step 4: Train the circuit\n**Action:** Run repeated circuit evaluations, update parameters, and track the loss curve.\n\n**Why:** The model learns by adjusting circuit parameters so measurement outcomes align with labels.\n\n**How (Example):**\nUse a Qiskit machine learning classifier or a custom training loop:\n```python\n# conceptually: evaluate circuit -> compute loss -> optimizer updates theta\n```\n\n## Step 5: Test robustness\n**Action:** Repeat training with different seeds, shot counts, and ansatz depths.\n\n**Why:** Variational models are sensitive to noise, initialization, and circuit design.\n\n**How (Example):**\n- Compare `reps=1` vs `reps=3`\n- Try 1024 shots vs 8192 shots\n- Run 3\u20135 random initializations and compare final accuracy"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Limits, Benchmarking, and Decision Rules\n\n## Step 1: Benchmark against classical baselines\n**Action:** Compare quantum results to strong classical models on the same dataset.\n\n**Why:** A QML method is only meaningful if it competes fairly with classical alternatives.\n\n**How (Example):**\n- Classical SVM with RBF kernel\n- Logistic regression\n- Small random forest for comparison\n\n## Step 2: Diagnose failure modes\n**Action:** Check whether poor performance comes from the data, the circuit, or hardware noise.\n\n**Why:** Many QML experiments fail because of feature-map design, barren plateaus, or shot noise\u2014not because QML is fundamentally impossible.\n\n**How (Example):**\nLook for:\n- Nearly constant kernel values\n- Flat training loss\n- Accuracy that changes wildly across runs\n- Higher noise on hardware than simulator\n\n## Step 3: Tune the model with intent\n**Action:** Adjust the circuit only after you have a clear hypothesis.\n\n**Why:** Blindly adding more qubits or layers usually worsens trainability and hardware compatibility.\n\n**How (Example):**\n- If the kernel is too random, simplify the feature map\n- If the variational model underfits, add one layer or more entanglement\n- If training is unstable, reduce depth or use SPSA\n\n## Step 4: Choose the right QML approach\n**Action:** Select kernels, feature maps, or variational models based on the task.\n\n**Why:** Each approach solves a different practical problem.\n\n**How (Example):**\n- **Use quantum kernels** when you want a clean similarity-based classifier with minimal training\n- **Use feature maps** when your main question is whether quantum embedding improves separability\n- **Use variational models** when you need an adaptable, trainable circuit for prediction\n\n## Final rule of thumb\nIf the quantum circuit does not provide a better embedding or a practical trainable model, a classical baseline will often win. Start small, benchmark honestly, and only increase complexity when you see a clear gain."
  }

  (function () {

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
