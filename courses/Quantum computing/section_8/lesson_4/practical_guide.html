  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a working mental and practical model of **quantum communication** so you can:\n- Encode information into **quantum states** instead of classical bits.\n- Implement or simulate **quantum key distribution (QKD)**.\n- Understand how **entanglement-based protocols** detect tampering.\n- Design the building blocks of a **quantum internet**: links, repeaters, swapping, and purification.\n\n## What you need\n### Technical prerequisites\n- **Python 3.10+**\n- One quantum SDK:\n  - **Qiskit** (`pip install qiskit`) for circuit simulation\n  - or **Cirq** (`pip install cirq`) if you prefer Google\u2019s ecosystem\n- A simulator backend:\n  - Qiskit Aer (`pip install qiskit-aer`)\n- Optional but useful:\n  - **NumPy** for state-vector checks\n  - **Matplotlib** for plotting error rates and key statistics\n- Access to a local machine with enough RAM to simulate small quantum circuits (2\u201320 qubits is enough for learning)\n- Optional access to a cloud quantum provider if you want to run small demos on real hardware (IBM Quantum or similar)\n\n## Setup target\nBy the end of the implementation, you should be able to:\n1. Prepare qubits in different bases.\n2. Measure them and compare the outcomes with the sender\u2019s basis choices.\n3. Estimate eavesdropping by tracking the **quantum bit error rate (QBER)**.\n4. Simulate entanglement generation and Bell-state measurements.\n5. Model a simple repeater chain that extends entanglement across multiple nodes."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement the Core Communication Workflow\n\n## 1) Encode information into quantum states\n### The Action\nPrepare qubits in states that represent bits using different bases.\n\n### Why\nQuantum communication depends on the fact that some states are **non-orthogonal**, so they cannot be perfectly measured without disturbance.\n\n### How (Example)\nUse BB84-style encodings:\n- Bit `0` in Z basis \u2192 `|0\u27e9`\n- Bit `1` in Z basis \u2192 `|1\u27e9`\n- Bit `0` in X basis \u2192 `|+\u27e9 = (|0\u27e9 + |1\u27e9)/\u221a2`\n- Bit `1` in X basis \u2192 `|\u2212\u27e9 = (|0\u27e9 \u2212 |1\u27e9)/\u221a2`\n\nIn Qiskit, you can build a sender circuit by randomly selecting bit + basis, then applying `X` and `H` gates accordingly.\n\n---\n\n## 2) Transmit through a noisy quantum channel\n### The Action\nSimulate a channel that introduces loss, bit flips, or phase flips.\n\n### Why\nReal channels are not perfect; communication protocols must tolerate **decoherence** and **noise**.\n\n### How (Example)\nCreate a simple noise model:\n- 2% depolarizing noise on each qubit\n- occasional bit-flip errors\n- optional measurement noise\n\nTemplate idea:\n- Sender prepares 100 qubits\n- Channel applies noise\n- Receiver measures each qubit in a chosen basis\n- Compare sender and receiver data later\n\n---\n\n## 3) Perform basis reconciliation\n### The Action\nHave sender and receiver publicly compare which bases they used, and keep only matching events.\n\n### Why\nIf the bases do not match, the measurement outcome is not useful for key extraction.\n\n### How (Example)\nBB84 workflow:\n1. Sender randomly chooses bit and basis.\n2. Receiver randomly chooses a measurement basis.\n3. Over a classical channel, both reveal **only the basis choices**.\n4. Keep the positions where bases match.\n5. Discard all mismatches.\n\nExample output table:\n- Round 1: Sender basis = X, Receiver basis = Z \u2192 discard\n- Round 2: Sender basis = Z, Receiver basis = Z \u2192 keep\n- Round 3: Sender basis = X, Receiver basis = X \u2192 keep\n\n---\n\n## 4) Estimate the quantum bit error rate (QBER)\n### The Action\nCompare a subset of the retained bits to estimate error.\n\n### Why\nA high QBER suggests eavesdropping or excessive channel noise.\n\n### How (Example)\n- Take 20% of the matched-basis bits as a test sample\n- Reveal those test bits publicly\n- Compute the error rate:\n  - `QBER = (number of mismatches) / (sample size)`\n- If QBER is above your chosen threshold, abort the key\n\nA simple practical rule:\n- Low QBER \u2192 continue\n- High QBER \u2192 discard and retry\n\n---\n\n## 5) Apply error correction and privacy amplification\n### The Action\nClean up the raw key and shorten it to remove any information an eavesdropper may have gained.\n\n### Why\nEven a good channel produces errors, and privacy amplification ensures the final key is secure.\n\n### How (Example)\n- Use a classical error-correction method such as parity checks\n- Then apply a hash function to compress the corrected key\n- Example: convert a 256-bit raw key into a 128-bit final secret key using a universal hash\n\nIf you are only simulating, you can implement this as:\n- reconcile bits\n- estimate leakage\n- hash the remaining string with SHA-256 and truncate to desired length"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Add Entanglement and Repeater Logic\n\n## 1) Generate entangled pairs\n### The Action\nCreate Bell pairs between two nodes.\n\n### Why\nEntanglement enables stronger security checks and is the foundation of networked quantum communication.\n\n### How (Example)\nPrepare `|\u03a6+\u27e9 = (|00\u27e9 + |11\u27e9)/\u221a2`:\n1. Start with `|00\u27e9`\n2. Apply `H` to qubit 0\n3. Apply `CNOT` from qubit 0 to qubit 1\n4. Measure both ends in chosen bases\n\nUse this to verify correlated outcomes and build an entanglement-based QKD demo.\n\n---\n\n## 2) Test Bell correlations with CHSH-style measurements\n### The Action\nMeasure entangled pairs in multiple bases and compare statistics.\n\n### Why\nBell inequality violation shows the correlations are genuinely quantum and can support security certification.\n\n### How (Example)\n- Choose measurement settings for Alice and Bob such as `A0, A1` and `B0, B1`\n- Collect many runs\n- Compute the CHSH value `S`\n- If `S > 2`, the results violate local hidden-variable bounds\n\nPractical use:\n- Use the Bell violation as a confidence signal that your entangled channel behaves correctly.\n\n---\n\n## 3) Implement entanglement swapping\n### The Action\nConnect two short entangled links into one longer entangled link.\n\n### Why\nThis is the core mechanism that lets a network extend quantum links beyond direct transmission distance.\n\n### How (Example)\nSuppose you have:\n- Node A entangled with Node B\n- Node C entangled with Node D\n\nAt the middle node, perform a **Bell-state measurement** on the two local qubits. The result projects the outer qubits into an entangled state even though they never interacted directly.\n\nImplementation pattern:\n- Create two Bell pairs\n- Perform Bell measurement on the middle qubits\n- Condition the final state on the measurement result\n- Verify the outer qubits are entangled\n\n---\n\n## 4) Add purification for noisy links\n### The Action\nUse multiple low-quality entangled pairs to produce a higher-fidelity pair.\n\n### Why\nNetwork links are noisy, and purification improves the chance that repeaters can maintain useful entanglement.\n\n### How (Example)\nBasic purification loop:\n1. Generate two noisy Bell pairs\n2. Apply local gates and measurements\n3. Keep one pair only if the measurement outcomes satisfy the purification condition\n4. Reject otherwise\n\nPractical checkpoint:\n- Compare fidelity before and after purification\n- Your goal is to see fidelity increase at the cost of lower pair yield\n\n---\n\n## 5) Simulate a simple quantum repeater chain\n### The Action\nModel nodes connected by short links and extend entanglement step by step.\n\n### Why\nThis is the network-level architecture needed for the quantum internet.\n\n### How (Example)\nBuild a 3-node chain:\n- Node 1\u2013Node 2: entangled link\n- Node 2\u2013Node 3: entangled link\n- Node 2 performs entanglement swapping\n- Node 1 and Node 3 become entangled\n\nThen scale to more hops:\n- Create links on each segment\n- Swap entanglement at intermediate nodes\n- Purify when fidelity drops below threshold"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Turn the Model into a Small Prototype\n\n## Recommended prototype project\nBuild a **mini quantum-network simulator** with three modules:\n1. **BB84 key exchange module**\n2. **Entanglement verification module**\n3. **Repeater chain module**\n\n## Implementation order\n### 1) Start with BB84\n- Generate random bits and bases\n- Simulate transmission through a noisy channel\n- Reconcile bases and compute QBER\n- Output a final shared key\n\n### 2) Add entanglement-based security\n- Generate Bell pairs\n- Run Bell-state measurements\n- Measure CHSH statistics\n- Compare results against BB84 security signals\n\n### 3) Add repeater behavior\n- Create multiple entangled links\n- Perform swapping at intermediate nodes\n- Add purification when fidelity is too low\n- Track how distance affects success rate\n\n## Useful validation checks\n- **Basis match rate** should be about 50% in BB84 with random choices\n- **QBER** should rise when you inject more noise or simulate interception\n- **Bell-state correlations** should exceed classical limits in ideal simulations\n- **Purification** should increase fidelity but reduce the number of successful pairs\n- **Swapping** should create long-range entanglement without direct transmission\n\n## Final takeaway\nIf your prototype can:\n- detect eavesdropping,\n- generate and verify entanglement,\n- and extend links through swapping and purification,\n\nthen you have implemented the core ideas behind quantum communication and the quantum internet in a practical, testable form."
  }
]

    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
