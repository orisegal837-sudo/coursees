  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nImplement the workflow behind **Shor\u2019s algorithm** in a way you can actually run and inspect:\n1. Choose a composite integer **N** to factor.\n2. Pick a random base **a** with `gcd(a, N) = 1`.\n3. Use a quantum circuit to **estimate the order r** of `a mod N`.\n4. Convert the measured phase into a candidate denominator using **continued fractions**.\n5. Use classical `gcd` checks to recover nontrivial factors of **N**.\n\n## What you need\nThese are the concrete technical prerequisites:\n- **Python 3.10+**\n- **Qiskit** (`qiskit`, `qiskit-aer`)\n- **NumPy**\n- A quantum backend:\n  - local simulator via **Qiskit Aer**, or\n  - access to **IBM Quantum** if you want to run on real hardware\n- A notebook or editor capable of running Python, such as **Jupyter Notebook** or **VS Code**\n\n## Before you start\nMake sure you can do these basic tasks:\n- Compute `gcd(a, N)` in Python\n- Build and run a small quantum circuit\n- Measure qubits and read counts\n- Implement or import a continued-fractions routine\n\n## Small test target\nStart with a toy number that is easy to verify manually:\n- `N = 15`\n- Try `a = 2`, `a = 4`, `a = 7`, or `a = 11`\n\nThis keeps the circuit small enough to inspect while still showing the full factoring pipeline."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the Classical Front End\n\n## 1) Pick a valid base `a`\n**Action:** Choose a random integer `a` such that `1 < a < N`.\n\n**Why:** Shor\u2019s algorithm only works on bases that are coprime to `N`. If `a` shares a factor with `N`, you may already have found a factor immediately.\n\n**How (example):**\n```python\nfrom math import gcd\n\nN = 15\na = 2\nif gcd(a, N) > 1:\n    print(\"Found factor:\", gcd(a, N))\nelse:\n    print(\"Proceed to quantum order finding\")\n```\n\n## 2) Define the goal of the quantum step\n**Action:** Set the target as finding the order `r` such that `a**r % N == 1`.\n\n**Why:** The quantum circuit does not factor `N` directly; it estimates this hidden period.\n\n**How (example):**\n```python\ndef order_classical(a, N):\n    r = 1\n    while pow(a, r, N) != 1:\n        r += 1\n    return r\n\nprint(order_classical(2, 15))  # example output: 4\n```\n\n## 3) Prepare a verification path\n**Action:** Plan to verify the candidate order classically after measurement.\n\n**Why:** The quantum output is probabilistic and often gives only an approximation of `k/r`.\n\n**How (example):**\n- Measure a phase-like value.\n- Convert it to a fraction.\n- Test the denominator against `pow(a, r, N) == 1`.\n\n## 4) Set up the factoring test\n**Action:** Prepare the final gcd checks you will use after finding `r`.\n\n**Why:** Even with the correct order, the factor extraction step can fail if `r` is odd or if `a^(r/2) \u2261 -1 mod N`.\n\n**How (example):**\n```python\nfrom math import gcd\n\ndef try_factor(a, r, N):\n    if r % 2 != 0:\n        return None\n    x = pow(a, r // 2, N)\n    p = gcd(x - 1, N)\n    q = gcd(x + 1, N)\n    return p, q\n```"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Implement the Quantum Order-Finding Circuit\n\n## 1) Create the counting and work registers\n**Action:** Allocate one register for the superposition over exponents `x`, and one register for the modular computation.\n\n**Why:** The counting register stores all candidate exponents at once, and the work register holds `a^x mod N`.\n\n**How (example):**\n- Use `m` qubits for phase estimation / counting.\n- Use enough qubits to represent values up to `N - 1` for the work register.\n\n```python\nfrom qiskit import QuantumCircuit\nfrom math import ceil, log2\n\nN = 15\nn_work = ceil(log2(N))\nn_count = 2 * n_work  # simple teaching choice\nqc = QuantumCircuit(n_count + n_work, n_count)\n```\n\n## 2) Prepare uniform superposition\n**Action:** Apply Hadamard gates to the counting register.\n\n**Why:** This creates the parallel evaluation needed for interference.\n\n**How (example):**\n```python\nfor q in range(n_count):\n    qc.h(q)\n```\n\n## 3) Apply modular exponentiation\n**Action:** Implement the controlled unitary that maps `|x\u27e9|1\u27e9 -> |x\u27e9|a^x mod N\u27e9`.\n\n**Why:** This is the core arithmetic operation that encodes the periodic structure.\n\n**How (example):**\n- For a teaching/demo implementation, use a prebuilt Qiskit modular exponentiation circuit if available.\n- For a minimal toy demo, hard-code the mapping for very small `N`.\n\nConceptual template:\n```python\n# Pseudocode: append controlled modular multiplication circuit here\n# qc.append(modexp_gate, range(n_count + n_work))\n```\n\n## 4) Apply the inverse Quantum Fourier Transform\n**Action:** Run the inverse QFT on the counting register.\n\n**Why:** The QFT converts periodic amplitude patterns into sharp peaks in the measurement distribution.\n\n**How (example):**\n```python\nfrom qiskit.circuit.library import QFT\n\nqc.append(QFT(n_count, inverse=True, do_swaps=True), range(n_count))\n```\n\n## 5) Measure the counting register\n**Action:** Measure only the counting register.\n\n**Why:** The measurement reveals a value related to `k/r`, which is what you will decode classically.\n\n**How (example):**\n```python\nfor i in range(n_count):\n    qc.measure(i, i)\n```\n\n## 6) Run the circuit\n**Action:** Execute the circuit on a simulator with many shots.\n\n**Why:** Repeated shots expose the clustered output values created by interference.\n\n**How (example):**\n```python\nfrom qiskit_aer import AerSimulator\nfrom qiskit import transpile\n\nsim = AerSimulator()\ncompiled = transpile(qc, sim)\nresult = sim.run(compiled, shots=4096).result()\ncounts = result.get_counts()\nprint(counts)\n```"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Decode the Phase and Recover the Factors\n\n## 1) Convert the measured bitstring into a phase estimate\n**Action:** Interpret the measured integer `y` as an estimate of `y / 2^m \u2248 k / r`.\n\n**Why:** The QFT gives you a rational approximation to the hidden period.\n\n**How (example):**\n```python\nfrom fractions import Fraction\n\nm = n_count\nmost_common = max(counts, key=counts.get)\ny = int(most_common, 2)\nphase = Fraction(y, 2**m).limit_denominator(N)\nprint(phase)\n```\n\n## 2) Recover a candidate order\n**Action:** Use the denominator of the fraction as a candidate `r`.\n\n**Why:** Continued fractions can reconstruct the period from the measured phase.\n\n**How (example):**\n```python\ncandidate_r = phase.denominator\nprint(\"Candidate order:\", candidate_r)\n```\n\n## 3) Verify the candidate order classically\n**Action:** Check whether `pow(a, candidate_r, N) == 1`.\n\n**Why:** Measurement noise and approximation errors can produce the wrong denominator.\n\n**How (example):**\n```python\nif pow(a, candidate_r, N) == 1:\n    print(\"Valid order\")\nelse:\n    print(\"Invalid order, retry with more shots or a new a\")\n```\n\n## 4) Extract factors from `r`\n**Action:** If `r` is even, compute `gcd(a^(r/2) \u00b1 1, N)`.\n\n**Why:** This is the classical step that turns order finding into factoring.\n\n**How (example):**\n```python\nif candidate_r % 2 == 0:\n    x = pow(a, candidate_r // 2, N)\n    f1 = gcd(x - 1, N)\n    f2 = gcd(x + 1, N)\n    print(f1, f2)\n```\n\n## 5) Repeat when needed\n**Action:** Retry with a new `a` if the run fails.\n\n**Why:** Shor\u2019s algorithm is probabilistic; some bases do not produce useful factors.\n\n**How (example):**\n- If `r` is odd, restart with another `a`.\n- If `gcd(a^(r/2) \u00b1 1, N)` gives only trivial factors, try again.\n\n## 6) Use the result as a template for larger numbers\n**Action:** Once the toy case works, scale the same workflow to larger `N`.\n\n**Why:** The structure of the algorithm stays the same; only the circuit size and error tolerance change.\n\n**How (example):**\n- Increase register sizes.\n- Improve modular exponentiation implementation.\n- Use more shots or error mitigation on noisy hardware."

      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
