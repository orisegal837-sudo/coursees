  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild and run the **Deutsch\u2013Jozsa algorithm** in a quantum programming environment so you can:\n1. Prepare the required input and output qubits.\n2. Implement a black-box oracle for a promised Boolean function.\n3. Use **phase kickback** and **Hadamard interference** to distinguish:\n   - **constant** functions, and\n   - **balanced** functions.\n4. Verify the result by measuring the input register.\n\n## What you need\n### Technical prerequisites\n- **Python 3.10+**\n- **Qiskit 1.x** installed via `pip install qiskit`\n- A local simulator such as:\n  - `qiskit-aer` (`pip install qiskit-aer`), or\n  - IBM Quantum access if you want to run on hardware\n- A code editor or notebook environment such as:\n  - VS Code\n  - Jupyter Notebook\n- Basic familiarity with:\n  - qubits and measurement\n  - Hadamard gates\n  - tensor products / multi-qubit states\n  - controlled operations and oracle-style circuits\n\n## Implementation target\nYou will create two test oracles:\n- a **constant oracle**: always returns 0 or always returns 1\n- a **balanced oracle**: returns 1 for exactly half the inputs\n\nThen you will run the Deutsch\u2013Jozsa circuit and confirm:\n- `|0...0\u27e9` on measurement means **constant**\n- anything else means **balanced**\n\n## Recommended folder setup\n- `dj_algorithm.py` \u2014 circuit construction and execution\n- `oracles.py` \u2014 constant and balanced oracle definitions\n- `run_tests.py` \u2014 simulator runs and result checks"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the Circuit Step by Step\n\n## Step 1: Initialize the registers\n### The Action\nCreate:\n- an **input register** of `n` qubits initialized to `|0...0\u27e9`\n- one **output qubit** initialized to `|1\u27e9`\n\n### Why it matters\nThe output qubit must start in `|1\u27e9` so that, after Hadamard, it becomes the superposition `( |0\u27e9 - |1\u27e9 ) / \u221a2`, which enables **phase kickback**.\n\n### How (example)\n```python\nfrom qiskit import QuantumCircuit\n\nn = 3\nqc = QuantumCircuit(n + 1, n)\n# input qubits are all |0>\n# output qubit is the last qubit; flip it to |1>\nqc.x(n)\n```\n\n## Step 2: Apply Hadamard gates to all qubits\n### The Action\nApply `H` to every input qubit and the output qubit.\n\n### Why it matters\nThis creates a uniform superposition over all inputs and prepares the output qubit for phase kickback.\n\n### How (example)\n```python\nfor q in range(n + 1):\n    qc.h(q)\n```\n\nAfter this step, the state is effectively:\n- a superposition over every `x \u2208 {0,1}^n`\n- tensored with `( |0\u27e9 - |1\u27e9 ) / \u221a2`\n\n## Step 3: Insert the oracle\n### The Action\nAdd a unitary `U_f` that implements:\n`U_f |x\u27e9|y\u27e9 = |x\u27e9|y \u2295 f(x)\u27e9`\n\n### Why it matters\nThe oracle writes the function value into the phase of each basis state instead of storing it in a classical bit string.\n\n### How (example)\nFor a simple balanced oracle on 1 input qubit, define `f(x)=x`:\n```python\n# for n=1, this is just a CNOT from input to output\nqc.cx(0, 1)\n```\nFor a constant-1 oracle, you can flip the output regardless of input:\n```python\nqc.x(n)\n```\nFor a general custom oracle, you can build a circuit that encodes your chosen promise function.\n\n## Step 4: Apply Hadamards again to the input register\n### The Action\nApply `H` only to the input qubits.\n\n### Why it matters\nThis recombines amplitudes so constant functions reinforce `|0...0\u27e9`, while balanced functions cancel it out.\n\n### How (example)\n```python\nfor q in range(n):\n    qc.h(q)\n```\n\n## Step 5: Measure the input register\n### The Action\nMeasure only the input qubits into classical bits.\n\n### Why it matters\nYou only need the input register measurement to determine whether the function is constant or balanced.\n\n### How (example)\n```python\nqc.measure(range(n), range(n))\n```"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Run, Verify, and Interpret Results\n\n## Step 6: Simulate the circuit with a constant oracle\n### The Action\nRun the full Deutsch\u2013Jozsa circuit using a constant oracle and collect shot statistics.\n\n### Why it matters\nA constant function should always produce the all-zero measurement outcome on the input register.\n\n### How (example)\n```python\nfrom qiskit_aer import AerSimulator\nfrom qiskit import transpile\n\nsim = AerSimulator()\ncompiled = transpile(qc, sim)\nresult = sim.run(compiled, shots=1024).result()\ncounts = result.get_counts()\nprint(counts)\n```\nExpected result pattern:\n- `{'000': 1024}` for `n = 3`\n- or overwhelmingly the all-zero string on a noisy simulator\n\n## Step 7: Simulate the circuit with a balanced oracle\n### The Action\nReplace the oracle with a balanced one and rerun the same circuit.\n\n### Why it matters\nBalanced functions should never produce the all-zero string in the ideal noiseless case.\n\n### How (example)\nIf `f(x)=x` for one qubit, then `CNOT` is balanced:\n```python\nqc.cx(0, 1)\n```\nFor `n=3`, a simple balanced oracle can flip the output when the first input qubit is `1`:\n```python\nqc.cx(0, 3)\n```\nExpected result pattern:\n- any bitstring except `000`\n- for example: `101`, `010`, `111`, etc.\n\n## Step 8: Interpret the measurement result\n### The Action\nCheck whether the only observed input string is `0...0`.\n\n### Why it matters\nThat single measurement tells you the promised class of the function.\n\n### How (example)\n```python\ndef interpret(counts, n):\n    zero = '0' * n\n    return 'constant' if list(counts.keys()) == [zero] else 'balanced'\n```\n\n## Step 9: Confirm the interference explanation\n### The Action\nExplain the result in amplitude terms, not just bit outcomes.\n\n### Why it matters\nThe algorithm\u2019s quantum advantage comes from **constructive and destructive interference** of phases.\n\n### How (example)\nUse this mental model:\n- each input `x` gets amplitude `+1` or `-1` after the oracle\n- the second Hadamard transforms the sum of all those signs\n- constant functions keep all signs aligned\n- balanced functions cancel positive and negative contributions exactly\n\n## Step 10: Test both promised cases in one script\n### The Action\nAutomate the circuit generation so you can swap oracles and compare outputs.\n\n### Why it matters\nThis makes the algorithm reproducible and helps you see the promise structure clearly.\n\n### How (example)\nWrite a function like:\n```python\ndef deutsch_jozsa_circuit(oracle_builder, n):\n    qc = QuantumCircuit(n + 1, n)\n    qc.x(n)\n    for q in range(n + 1):\n        qc.h(q)\n    oracle_builder(qc, n)\n    for q in range(n):\n        qc.h(q)\n    qc.measure(range(n), range(n))\n    return qc\n```"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Extensions and Validation\n\n## Step 11: Compare quantum and classical query cost\n### The Action\nImplement a classical checker that samples the oracle multiple times and compare it with the quantum circuit using one query.\n\n### Why it matters\nThis highlights the **query advantage**: the quantum algorithm resolves the promise with a single oracle call.\n\n### How (example)\nClassical approach:\n- query `f(x)` on several random inputs\n- infer whether outputs vary\n- note that certainty may require many queries\n\nQuantum approach:\n- one oracle application\n- one measurement round\n\n## Step 12: Add visualization or debugging tools\n### The Action\nDraw the circuit and inspect the statevector or probabilities for small `n`.\n\n### Why it matters\nSeeing the circuit and amplitudes makes the interference story concrete.\n\n### How (example)\n```python\nprint(qc.draw())\n```\nFor small examples, use a statevector simulator to verify that:\n- constant oracle \u2192 amplitude concentrated on `|0...0\u27e9`\n- balanced oracle \u2192 zero amplitude on `|0...0\u27e9`\n\n## Step 13: Generalize to custom promised functions\n### The Action\nConstruct different balanced and constant oracles and confirm the algorithm still works.\n\n### Why it matters\nThe Deutsch\u2013Jozsa algorithm is not about one special function; it is about a promise class.\n\n### How (example)\nTry these test cases:\n- constant 0: `f(x)=0`\n- constant 1: `f(x)=1`\n- balanced by first bit: `f(x)=x_0`\n- balanced by parity on one subset of inputs, if implemented as a valid promise oracle\n\n## Final takeaway\nIf your implementation is correct, you should observe:\n- **constant oracle** \u2192 always measure `000...0`\n- **balanced oracle** \u2192 never measure `000...0` in the ideal case\n\nThat is the practical signature of the Deutsch\u2013Jozsa algorithm: one query, global interference, and a clean separation between constant and balanced functions."
  }

    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
