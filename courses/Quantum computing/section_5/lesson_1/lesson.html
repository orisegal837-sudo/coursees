  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "The Deutsch\u2013Jozsa algorithm is one of the first places where quantum computing shows a clear advantage in a clean, mathematically precise setting. Its job is simple: given a black-box Boolean function f:{0,1}^n\\to{0,1}, determine whether f is constant (always 0 or always 1) or balanced (outputs 0 on exactly half of all inputs and 1 on the other half). The promise is that f is guaranteed to be one of those two types.\n\nClassically, you may need to query the function many times to be confident. Quantumly, the Deutsch\u2013Jozsa algorithm solves the promised problem with a single oracle query, followed by measurement. The key idea is not speed through brute force, but speed through interference: the circuit arranges amplitudes so that constant functions produce one measurement pattern, while balanced functions cancel that pattern out.\n\nThis lesson builds directly on your prior knowledge of superposition, Dirac notation, unitary gates, tensor products, and measurement probabilities. We will focus on the algorithmic structure: the oracle model, the circuit, and the interference argument that makes the result work."
  },
  {
    "id": "lesson_page_2",
    "content": "Start with the standard setup. The input register contains n qubits, initialized to |0...0\u27e9, and an output qubit initialized to |1\u27e9. Apply Hadamard gates to all qubits. This creates the state\n\n|\u03c8\u2080\u27e9 = (1/\u221a(2^n)) \\sum_x |x\u27e9 (|0\u27e9 - |1\u27e9)/\u221a2.\n\nNow apply the oracle U_f, defined by\n\nU_f |x\u27e9|y\u27e9 = |x\u27e9|y \\oplus f(x)\u27e9.\n\nBecause the output qubit is in the state (|0\u27e9 - |1\u27e9)/\u221a2, the oracle acts as a phase kickback:\n\nU_f \\left(|x\u27e9 (|0\u27e9 - |1\u27e9)/\u221a2\\right) = (-1)^{f(x)} |x\u27e9 (|0\u27e9 - |1\u27e9)/\u221a2.\n\nSo the oracle does not just compute f(x); it writes the function value into the phase of each basis state |x\u27e9. That is the crucial quantum trick.\n\nAfter the oracle, apply Hadamard gates again to the input register. The amplitude of |0...0\u27e9 becomes proportional to\n\n(1/2^n) \\sum_x (-1)^{f(x)}.\n\nIf f is constant 0, this sum is +2^n, so the |0...0\u27e9 outcome occurs with probability 1. If f is constant 1, the sum is -2^n, which still gives |0...0\u27e9 with probability 1 because probability uses the squared magnitude. If f is balanced, the positive and negative terms cancel exactly, so the amplitude of |0...0\u27e9 is 0. Therefore measuring the input register returns |0...0\u27e9 if and only if the function is constant."
  },
  {
    "id": "lesson_page_3",
    "content": "The Deutsch\u2013Jozsa algorithm is best understood as an interference experiment. The first Hadamards create equal-weight paths through all possible inputs. The oracle assigns a phase of +1 or -1 to each path depending on f(x). The second Hadamards recombine those paths. If the phases line up, they interfere constructively at |0...0\u27e9. If half are positive and half are negative, they cancel destructively.\n\nThis is a classic example of why phase matters in quantum computing even when it does not directly show up in a single measurement basis. A function value hidden in phase can be revealed later by the right basis change.\n\nWhy is this an advantage? Classically, if you want certainty on a promised input, you may need to inspect enough values to rule out one case. Quantumly, the algorithm extracts a global property of the entire function with one query because the oracle acts on a superposition of all inputs at once.\n\nA useful way to remember the algorithm:\n1. Prepare |0...0\u27e9|1\u27e9.\n2. Apply H to every qubit.\n3. Query the oracle once.\n4. Apply H to the input register again.\n5. Measure the input register.\n\nInterpretation:\n- Outcome |0...0\u27e9 means constant.\n- Any other outcome means balanced.\n\nThe algorithm is not primarily a practical benchmarking tool; it is a conceptual milestone showing how quantum parallelism and interference can solve a promise problem more efficiently than classical sampling."
  },
  {
    "id": "lesson_page_4",
    "content": "Summary: The Deutsch\u2013Jozsa algorithm determines whether a promised Boolean function is constant or balanced using a single quantum oracle query. It works by preparing a uniform superposition, using phase kickback to encode f(x) as phases, and then applying Hadamard interference to amplify the constant case and cancel the balanced case. The algorithm is an early and elegant demonstration that quantum advantage can come from global amplitude interference, not just from faster hardware.\n\nKey ideas to retain:\n- The oracle is used once.\n- The output qubit is prepared to enable phase kickback.\n- Hadamard gates before and after the oracle create and decode interference.\n- Measuring |0...0\u27e9 indicates a constant function; anything else indicates balanced.\n- The lesson highlights the difference between classical function evaluation and quantum query complexity."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
