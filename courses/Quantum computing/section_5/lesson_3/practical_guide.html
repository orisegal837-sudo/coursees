    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild and run Grover\u2019s search algorithm to find a marked item in an unstructured search space, using:\n- a **phase oracle** to mark the target,\n- a **diffusion operator** to amplify it,\n- and **measurement** to retrieve the answer with high probability.\n\nBy the end, you should be able to:\n1. Encode a search problem into `n` qubits.\n2. Construct an oracle that flips the phase of the target state.\n3. Apply the Grover iteration the correct number of times.\n4. Measure the circuit and verify that the target appears most often.\n\n## Prerequisites\nUse these concrete tools before you start:\n- **Python 3.10+**\n- **Qiskit** installed (`pip install qiskit qiskit-aer`)\n- A local simulator such as **AerSimulator**\n- Basic access to a terminal or notebook environment (Jupyter, VS Code, or Colab)\n- A target search problem you can encode as a bitstring, such as finding `101` among `2^3 = 8` states\n\n## What you need to define first\n- **Search size**: choose `n` qubits so the search space has `N = 2^n` items.\n- **Marked item**: choose the one basis state you want to amplify.\n- **Oracle condition**: define how the circuit recognizes that state.\n\n## Example setup\nIf you want to search among 8 possible states:\n- use `n = 3` qubits,\n- set the marked state to `|101\u27e9`,\n- prepare the state in uniform superposition,\n- apply Grover iterations, then measure many times to see `101` dominate."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the Oracle and Prepare Superposition\n\n## Step 1: Prepare the uniform superposition\n**Action:** Apply Hadamard gates to all search qubits.\n\n**Why:** Grover\u2019s algorithm needs every candidate to start with equal probability amplitude.\n\n**How (Example):**\n```python\nfrom qiskit import QuantumCircuit\n\nn = 3\nqc = QuantumCircuit(n, n)\nqc.h(range(n))\n```\nThis creates the equal superposition over all `2^n` basis states.\n\n## Step 2: Build a phase oracle for the marked item\n**Action:** Create a circuit that flips the sign of the target state and leaves all others unchanged.\n\n**Why:** The oracle does not reveal the answer directly; it creates the phase difference that interference will later amplify.\n\n**How (Example):**\nTo mark `|101\u27e9`, invert the qubits corresponding to `0` bits, apply a multi-controlled phase flip, then undo the inversions:\n```python\ndef grover_oracle_for_101(qc):\n    # Target is |101>, so flip the middle qubit to match a |111> control pattern\n    qc.x(1)\n    qc.h(2)\n    qc.mcx([0,1], 2)\n    qc.h(2)\n    qc.x(1)\n```\nThis is a common pattern: convert the target into a control-friendly form, apply a controlled phase flip, then restore the qubits.\n\n## Step 3: Verify the oracle behavior\n**Action:** Test the oracle on a statevector simulator before adding the rest of Grover\u2019s algorithm.\n\n**Why:** If the oracle marks the wrong state, the amplification step will strengthen the wrong result.\n\n**How (Example):**\nCheck that the target amplitude changes sign while other amplitudes remain unchanged.\n\n## Step 4: Assemble the Grover iteration skeleton\n**Action:** Define one Grover iteration as: oracle \u2192 diffusion.\n\n**Why:** Grover\u2019s speedup comes from repeating this exact pair of operations.\n\n**How (Example):**\n```python\ndef grover_iteration(qc):\n    grover_oracle_for_101(qc)\n    diffusion_operator(qc)\n```\n"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Implement Diffusion, Iterate Correctly, and Measure\n\n## Step 1: Build the diffusion operator\n**Action:** Implement inversion about the mean using Hadamard, X, multi-controlled phase, X, Hadamard.\n\n**Why:** This step causes constructive interference for the marked state and destructive interference for many unmarked states.\n\n**How (Example):**\n```python\ndef diffusion_operator(qc):\n    n = qc.num_qubits\n    qc.h(range(n))\n    qc.x(range(n))\n    qc.h(n-1)\n    qc.mcx(list(range(n-1)), n-1)\n    qc.h(n-1)\n    qc.x(range(n))\n    qc.h(range(n))\n```\nThis reflects all amplitudes about their average.\n\n## Step 2: Compute the number of Grover iterations\n**Action:** Choose the iteration count near `k \u2248 (\u03c0/4)\u221aN`.\n\n**Why:** Too few iterations under-amplify the target; too many rotate past it and reduce success probability.\n\n**How (Example):**\nFor `n = 3`, `N = 8`, so:\n- `k \u2248 (\u03c0/4)\u221a8 \u2248 2.2`\n- use `2` iterations as a practical choice.\n\n## Step 3: Apply the iterations\n**Action:** Repeat the Grover iteration the chosen number of times.\n\n**Why:** Each repetition rotates the quantum state closer to the marked item.\n\n**How (Example):**\n```python\nfor _ in range(2):\n    grover_iteration(qc)\n```\n\n## Step 4: Measure and inspect the result\n**Action:** Add measurement gates and run many shots on a simulator.\n\n**Why:** Grover\u2019s algorithm is probabilistic; repeated measurements reveal whether the target has been amplified successfully.\n\n**How (Example):**\n```python\nqc.measure(range(n), range(n))\n```\nThen run the circuit on `AerSimulator` with, for example, `1024` shots and check whether `101` is the most frequent outcome.\n\n## Step 5: Validate and tune\n**Action:** Compare measured counts against the expected target and adjust the iteration count if needed.\n\n**Why:** The best result occurs near the optimal number of iterations, not arbitrarily many.\n\n**How (Example):**\n- If the target is not dominant, increase or decrease the iteration count by 1.\n- For larger `N`, recompute `k \u2248 (\u03c0/4)\u221aN` before rerunning.\n\n## Practical check\nIf your circuit is correct, the marked bitstring should appear more often than any other outcome after the optimal number of iterations."
  },

    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Tips, Common Mistakes, and Next Steps\n\n## Common mistakes to avoid\n- **Marking the wrong state:** Make sure your oracle matches the exact bitstring you want.\n- **Running too many iterations:** Grover\u2019s rotation continues past the optimum, lowering success probability.\n- **Forgetting qubit order:** Qiskit bitstring order can be reversed relative to circuit wire order.\n- **Skipping simulator tests:** Always test the oracle and diffusion operator separately before combining them.\n\n## Debugging checklist\n1. Confirm the superposition step uses `H` on every search qubit.\n2. Confirm the oracle flips only the marked state\u2019s phase.\n3. Confirm the diffusion operator is a reflection about the mean.\n4. Confirm the iteration count is close to `(\u03c0/4)\u221aN`.\n5. Confirm the measurement histogram peaks at the target bitstring.\n\n## Next steps\nOnce the basic version works, try these extensions:\n- **Change the marked item** and rebuild the oracle.\n- **Increase the search size** to see the quadratic speedup pattern.\n- **Implement multiple marked states** to explore generalized Grover search.\n- **Compare statevector amplitudes before and after each iteration** to visualize amplitude amplification.\n\n## Minimal implementation template\nUse this as your starting point:\n```python\nfrom qiskit import QuantumCircuit\n\nn = 3\nqc = QuantumCircuit(n, n)\nqc.h(range(n))\n\nfor _ in range(2):\n    grover_oracle_for_101(qc)\n    diffusion_operator(qc)\n\nqc.measure(range(n), range(n))\n```\nThis template gives you the core structure needed to implement Grover\u2019s algorithm in practice and adapt it to other search problems."

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
