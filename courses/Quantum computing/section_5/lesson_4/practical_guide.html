  <textarea id="markdown-source" style="display:none;">

  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild and run a **Quantum Phase Estimation (QPE)** circuit that:\n1. Takes a known eigenstate \\(|\\psi\\rangle\\) of a unitary \\(U\\)\n2. Applies controlled powers of \\(U\\) using a counting register\n3. Uses the **inverse QFT** to convert phase information into a measurable bit string\n4. Measures the counting register to recover an estimate of \\(\\phi\\) in \\(U|\\psi\\rangle = e^{2\\pi i\\phi}|\\psi\\rangle\\)\n\n## What you need\n### Technical prerequisites\n- **Python 3.10+**\n- **Qiskit** installed (`qiskit`, and optionally `qiskit-aer` for simulation)\n- A quantum simulator backend, such as:\n  - `AerSimulator` from Qiskit Aer\n  - or a cloud provider account if you want to run on hardware\n- Basic familiarity with:\n  - single-qubit gates: `H`, `X`, `P`, `Z`\n  - controlled gates and multi-qubit circuits\n  - reading measurement bit strings\n\n### Recommended setup\n- A code editor or notebook environment such as:\n  - Jupyter Notebook\n  - VS Code\n  - Google Colab\n\n## Implementation target\nFor your first working version, use a **simple one-qubit unitary** with a known phase, such as a phase gate. This makes it easy to verify whether QPE returns the correct binary fraction.\n\n## How to prepare\n- Install packages:\n  - `pip install qiskit qiskit-aer`\n- Choose a phase that has a short binary representation for testing.\n  - Example: \\(\\phi = 1/4\\), which is binary `0.01`\n- Decide the number of counting qubits `t`.\n  - Start with `t = 3` or `t = 4` so the expected bit string is easy to inspect."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the QPE Circuit\n\n## Step 1: Define the unitary and its eigenstate\n### The action\nCreate a unitary \\(U\\) with a known eigenstate \\(|\\psi\\rangle\\).\n\n### Why this matters\nQPE only works cleanly when the input state is an eigenstate of the unitary. That ensures the unitary contributes only a phase factor and does not mix states.\n\n### How (example)\nUse a phase gate on a single qubit:\n- Let \\(U = P(2\\pi\\phi)\\)\n- Use \\(|\\psi\\rangle = |1\\rangle\\), which is an eigenstate of the phase gate\n\nExample:\n```python\nfrom qiskit import QuantumCircuit\nphi = 1/4\nU = QuantumCircuit(1)\nU.p(2 * 3.141592653589793 * phi, 0)\n```\n\n## Step 2: Initialize the registers\n### The action\nCreate:\n- a **counting register** with `t` qubits initialized to \\(|0\\rangle^{\\otimes t}\\)\n- a **system register** holding the eigenstate\n\n### Why this matters\nThe counting register stores the phase estimate, while the system register acts as the reference state on which the unitary acts.\n\n### How (example)\nFor `t = 4`:\n```python\nt = 4\nqc = QuantumCircuit(t + 1, t)\nqc.x(t)  # prepare |1> in the system qubit\n```\n\n## Step 3: Put the counting register into uniform superposition\n### The action\nApply a Hadamard gate to every counting qubit.\n\n### Why this matters\nSuperposition lets all phase paths accumulate simultaneously, which is the starting point for interference-based estimation.\n\n### How (example)\n```python\nfor q in range(t):\n    qc.h(q)\n```\n\n## Step 4: Apply controlled powers of the unitary\n### The action\nApply controlled versions of \\(U^{2^k}\\) from each counting qubit to the system qubit.\n\n### Why this matters\nThis is where phase kickback occurs. Each control qubit encodes a different binary-weighted contribution to the phase.\n\n### How (example)\nFor a phase gate, repeated powers are easy to implement because the phase angle doubles each time:\n```python\nfor k in range(t):\n    angle = 2 * 3.141592653589793 * phi * (2 ** k)\n    qc.cp(angle, k, t)\n```\n\n## Step 5: Apply the inverse QFT to the counting register\n### The action\nRun the inverse QFT on the counting qubits.\n\n### Why this matters\nThe inverse QFT transforms the hidden phase pattern into a computational basis state that can be measured.\n\n### How (example)\nYou can use Qiskit\u2019s built-in inverse QFT:\n```python\nfrom qiskit.circuit.library import QFT\nqc.append(QFT(t, inverse=True, do_swaps=True), range(t))\n```\n\n## Step 6: Measure the counting register\n### The action\nMeasure the counting qubits into classical bits.\n\n### Why this matters\nMeasurement converts the interference pattern into a classical estimate of \\(\\phi\\).\n\n### How (example)\n```python\nqc.measure(range(t), range(t))\n```\n"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Run, Decode, and Verify the Phase Estimate\n\n## Step 7: Simulate the circuit\n### The action\nRun the circuit on a simulator and collect measurement counts.\n\n### Why this matters\nSimulation lets you validate that the circuit returns the expected binary phase before moving to more complex unitaries or hardware.\n\n### How (example)\n```python\nfrom qiskit_aer import AerSimulator\nfrom qiskit import transpile\n\nbackend = AerSimulator()\ncompiled = transpile(qc, backend)\nresult = backend.run(compiled, shots=1024).result()\ncounts = result.get_counts()\nprint(counts)\n```\n\n## Step 8: Decode the most likely bit string\n### The action\nTake the most frequent measurement result and convert it into a fraction.\n\n### Why this matters\nQPE outputs a binary approximation of the phase, not the phase value directly.\n\n### How (example)\nIf the most common result is `0100` with `t = 4`, interpret it as:\n- binary `0100` = 4\n- estimated phase = `4 / 16 = 0.25`\n\nSo the estimate is \\(\\hat{\\phi} = 1/4\\).\n\n## Step 9: Check the result against the expected phase\n### The action\nCompare the measured estimate with the known phase used to build the unitary.\n\n### Why this matters\nVerification confirms that your controlled-unitary stage and inverse QFT are wired correctly.\n\n### How (example)\nIf you used \\(\\phi = 1/4\\), expect the dominant output to be `0100` for 4 counting qubits.\n\n```python\ndef bitstring_to_phase(bitstring):\n    return int(bitstring, 2) / (2 ** len(bitstring))\n\nbest = max(counts, key=counts.get)\nprint(best, bitstring_to_phase(best))\n```\n\n## Step 10: Handle non-exact phases\n### The action\nRepeat the experiment with a phase that does not have an exact `t`-bit binary expansion.\n\n### Why this matters\nReal QPE often returns an approximation, not an exact fraction. You should understand the probability spread around the nearest binary value.\n\n### How (example)\nTry:\n- \\(\\phi = 0.3\\)\n- `t = 4` or `t = 5`\n\nYou should see the most likely result near the nearest binary fraction, not necessarily an exact match.\n\n## Practical next step\nOnce the basic circuit works, replace the simple phase gate with a more meaningful unitary:\n- a two-qubit operator\n- a Hamiltonian evolution operator\n- a block-encoded unitary used in a larger algorithm like HHL or phase-based estimation"
  },

    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Common Pitfalls and Upgrade Path\n\n## Common pitfalls\n- **Input is not an eigenstate**: QPE breaks down or returns a mixture of phases.\n- **Wrong controlled-power ordering**: the bit string may appear reversed or scrambled.\n- **Missing swaps in inverse QFT**: output bits may be in the wrong order.\n- **Too few counting qubits**: the phase estimate will be too coarse.\n\n## Upgrade path\n1. Increase the number of counting qubits to improve precision.\n2. Replace the toy phase gate with a real unitary from your application.\n3. Use QPE as a subroutine inside a larger workflow:\n   - order finding\n   - Hamiltonian simulation\n   - quantum linear system solvers\n\n## Final implementation checklist\n- [ ] Counting register prepared in superposition\n- [ ] Eigenstate correctly initialized\n- [ ] Controlled \\(U^{2^k}\\) gates applied in the correct order\n- [ ] Inverse QFT added to the counting register\n- [ ] Measurement results decoded into a phase estimate\n- [ ] Estimated phase matches the expected value within precision\n\n## Takeaway\nA working QPE implementation is a complete demonstration of how quantum interference can turn an abstract eigenvalue phase into a concrete classical bit string."

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
