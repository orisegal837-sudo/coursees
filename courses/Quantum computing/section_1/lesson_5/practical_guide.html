  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBy the end of this implementation guide, you should be able to:\n1. **Represent pure and mixed quantum states** using density matrices.\n2. **Compute expectation values** from a density matrix with `tr(\u03c1A)`.\n3. **Extract the state of a subsystem** using the partial trace.\n4. **Model general measurements** with POVMs and compute outcome probabilities.\n5. **Apply these tools in practice** to analyze noisy, open, or entangled quantum systems.\n\n## Technical Prerequisites\nUse the following specific tools to implement the concepts:\n- **Python 3.10+**\n- **NumPy** for matrix operations\n- **SciPy** for linear algebra utilities if needed\n- **Qiskit** (optional but helpful) for state preparation and measurement examples\n- A notebook environment such as **Jupyter Notebook** or **Google Colab**\n\nInstall the core packages:\n```bash\npip install numpy scipy qiskit\n```\n\n## What you should have ready\n- A way to create complex-valued matrices and vectors.\n- Familiarity with **bra-ket notation** and matrix multiplication.\n- Access to a small quantum state example, such as a single qubit or two-qubit Bell state.\n\n## Implementation target\nYou will build a small workflow that can:\n- convert a ket into a density matrix,\n- mix states probabilistically,\n- reduce a bipartite state to one subsystem,\n- evaluate measurement probabilities for both projective measurements and POVMs."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement Density Matrices and Basic State Analysis\n\n## Step 1: Convert a pure state into a density matrix\n**Action:** Start with a state vector `|\u03c8\u27e9` and compute `\u03c1 = |\u03c8\u27e9\u27e8\u03c8|`.\n\n**Why:** This gives a matrix representation that works for both pure and mixed states.\n\n**How (Example):**\n```python\nimport numpy as np\n\npsi = np.array([1/np.sqrt(2), 1/np.sqrt(2)], dtype=complex)\nrho = np.outer(psi, np.conjugate(psi))\nprint(rho)\n```\n\nFor `|+\u27e9`, the result should be:\n```python\n[[0.5+0.j 0.5+0.j]\n [0.5+0.j 0.5+0.j]]\n```\n\n## Step 2: Build a mixed state from a probabilistic ensemble\n**Action:** Create a weighted sum of pure-state projectors.\n\n**Why:** Mixed states model classical uncertainty about which pure state was prepared.\n\n**How (Example):**\n```python\npsi0 = np.array([1, 0], dtype=complex)\npsi1 = np.array([0, 1], dtype=complex)\n\np0, p1 = 0.7, 0.3\nrho_mix = p0 * np.outer(psi0, psi0.conj()) + p1 * np.outer(psi1, psi1.conj())\nprint(rho_mix)\n```\n\n## Step 3: Verify the density matrix properties\n**Action:** Check Hermiticity, positivity, and unit trace.\n\n**Why:** These conditions confirm you have a valid quantum state.\n\n**How (Example):**\n```python\nis_hermitian = np.allclose(rho, rho.conj().T)\ntrace_one = np.isclose(np.trace(rho), 1)\nprint(is_hermitian, trace_one)\n```\n\nFor purity, compute:\n```python\npurity = np.real(np.trace(rho @ rho))\nprint(purity)\n```\n- `purity = 1` means the state is pure.\n- `purity < 1` means the state is mixed.\n\n## Step 4: Compute expectation values with `tr(\u03c1A)`\n**Action:** Define an observable matrix `A` and compute its expected value.\n\n**Why:** This is the standard way to calculate measurement averages in the density matrix formalism.\n\n**How (Example):**\n```python\nZ = np.array([[1, 0], [0, -1]], dtype=complex)\nexpectation = np.trace(rho @ Z)\nprint(np.real(expectation))\n```\n\nUse this pattern for any observable, including multi-qubit operators."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Use the Partial Trace and Model General Measurements\n\n## Step 5: Compute a reduced density matrix with the partial trace\n**Action:** For a bipartite state `\u03c1_AB`, sum over the basis of subsystem `B` to obtain `\u03c1_A = tr_B(\u03c1_AB)`.\n\n**Why:** This isolates what is observable from subsystem `A` alone and removes inaccessible correlations.\n\n**How (Example):**\nFor a two-qubit state, reshape the matrix into subsystem blocks and sum over the traced subsystem.\n\n```python\ndef partial_trace_B(rho_ab, dA, dB):\n    rho_ab = rho_ab.reshape(dA, dB, dA, dB)\n    rho_a = np.zeros((dA, dA), dtype=complex)\n    for b in range(dB):\n        rho_a += rho_ab[:, b, :, b]\n    return rho_a\n```\n\nTest it on a Bell state:\n```python\nbell = np.array([1, 0, 0, 1], dtype=complex) / np.sqrt(2)\nrho_bell = np.outer(bell, bell.conj())\nrho_a = partial_trace_B(rho_bell, 2, 2)\nprint(rho_a)\n```\nExpected result:\n```python\n[[0.5+0.j 0. +0.j]\n [0. +0.j 0.5+0.j]]\n```\n\n## Step 6: Confirm the difference between product and entangled states\n**Action:** Compare the reduced state of a product state and a Bell state.\n\n**Why:** This shows that a subsystem can be mixed even when the full system is pure.\n\n**How (Example):**\n```python\nproduct = np.array([1, 0, 0, 0], dtype=complex)\nrho_product = np.outer(product, product.conj())\nprint(partial_trace_B(rho_product, 2, 2))\n```\nThis should return a pure local state, unlike the Bell state case.\n\n## Step 7: Implement a POVM and compute outcome probabilities\n**Action:** Define positive semidefinite operators `E_i` that sum to identity, then compute `p(i) = tr(\u03c1E_i)`.\n\n**Why:** POVMs let you model realistic measurements beyond orthonormal basis projectors.\n\n**How (Example):**\nA simple two-outcome POVM:\n```python\nE0 = np.array([[0.8, 0], [0, 0.2]], dtype=complex)\nE1 = np.eye(2, dtype=complex) - E0\n\np0 = np.trace(rho @ E0)\np1 = np.trace(rho @ E1)\nprint(np.real(p0), np.real(p1))\n```\nVerify that `E0 + E1 = I`.\n\n## Step 8: Represent a measurement using Kraus operators\n**Action:** Define operators `M_i` such that `E_i = M_i\u2020 M_i` and `\u03a3 M_i\u2020M_i = I`.\n\n**Why:** Kraus operators give you both the outcome probabilities and the post-measurement state.\n\n**How (Example):**\n```python\nM0 = np.array([[np.sqrt(0.8), 0], [0, np.sqrt(0.2)]], dtype=complex)\nE0_check = M0.conj().T @ M0\n```\nFor outcome `i`, compute:\n```python\np_i = np.trace(M0 @ rho @ M0.conj().T)\nrho_i = (M0 @ rho @ M0.conj().T) / p_i\n```\n\nThis is useful when simulating noisy detectors or state collapse under general measurements."
  },

    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Put It All Together in a Real Quantum Workflow\n\n## Step 9: Combine state preparation, subsystem reduction, and measurement\n**Action:** Build a small script or notebook that prepares a state, converts it to `\u03c1`, reduces it with a partial trace, and evaluates measurement outcomes.\n\n**Why:** Real quantum analysis often requires all three tools in sequence.\n\n**How (Example):**\n1. Prepare a Bell state.\n2. Compute `\u03c1_AB`.\n3. Reduce to `\u03c1_A`.\n4. Evaluate `tr(\u03c1_A Z)`.\n5. Compare with a POVM outcome probability.\n\n## Step 10: Use the tools for realistic tasks\n**Action:** Apply density matrices, partial trace, and POVMs to tasks such as:\n- quantum noise analysis,\n- entanglement detection,\n- state discrimination,\n- measurement simulation.\n\n**Why:** These concepts are the standard language for noisy intermediate-scale quantum devices and open quantum systems.\n\n**How (Example):**\n- Model bit-flip noise by mixing `\u03c1` with `X\u03c1X`.\n- Model a qubit entangled with an environment, then trace out the environment.\n- Design a POVM to distinguish non-orthogonal states better than a projective measurement.\n\n## Step 11: Sanity-check your implementation\n**Action:** Add validation checks to every function.\n\n**Why:** Quantum code often fails silently if traces, dimensions, or positivity are wrong.\n\n**How (Example):**\n- Confirm `np.isclose(np.trace(rho), 1)`.\n- Confirm `np.allclose(rho, rho.conj().T)`.\n- Confirm POVM completeness: `sum(E_i) == I`.\n- Confirm reduced states have the right dimension.\n\n## Final takeaway\nIf your code can:\n- create valid density matrices,\n- reduce a composite state correctly,\n- and compute general measurement probabilities,\n\nthen you have the core practical toolkit needed to analyze realistic quantum systems."

    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
