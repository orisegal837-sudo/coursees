  <textarea id="markdown-source" style="display:none;">

  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild the working math toolkit needed to:\n- Represent a **qubit** as a complex vector in **C\u00b2**\n- Compute **measurement probabilities** from amplitudes\n- Read and manipulate **Dirac notation** confidently\n- Recognize how **quantum gates** act as matrices on quantum states\n- Prepare for **multi-qubit systems**, **entanglement**, and **measurement operators**\n\n## Prerequisites\nYou should have access to the following technical tools:\n1. **Python 3.10+**\n2. **NumPy** (`pip install numpy`) for complex numbers, vectors, matrices, and tensor products\n3. A Python notebook environment such as **Jupyter Notebook** or **Google Colab**\n4. Optional but useful: **Matplotlib** for visualizing amplitudes and measurement outcomes\n\n## What you need to be able to do before starting\n- Create and manipulate complex numbers in Python\n- Work with vectors and matrices in NumPy\n- Understand basic matrix multiplication\n- Run small scripts or notebook cells to test formulas\n\n## Setup example\n```python\nimport numpy as np\n```\n\n## Working model to keep in mind\nA single qubit state looks like:\n```python\npsi = np.array([1/np.sqrt(2), 1j/np.sqrt(2)], dtype=complex)\n```\nThis represents:\n\\[\n|\\psi\\rangle = \\alpha|0\\rangle + \\beta|1\\rangle\n\\]\nwhere `alpha` and `beta` are complex amplitudes."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement Complex Numbers, States, and Probabilities\n\n## Step 1: Represent amplitudes as complex numbers\n### The Action\nCreate qubit amplitudes using Python complex values.\n### Why\nQuantum states depend on both magnitude and phase, and phase is encoded by the imaginary part.\n### How (Example)\n```python\nalpha = 1/np.sqrt(2)\nbeta = 1j/np.sqrt(2)\n```\n\n## Step 2: Store a qubit as a NumPy vector\n### The Action\nRepresent the qubit state as a 2-element complex array.\n### Why\nA qubit is a vector in C\u00b2, so NumPy arrays are the correct computational model.\n### How (Example)\n```python\npsi = np.array([alpha, beta], dtype=complex)\n```\n\n## Step 3: Compute the conjugate transpose (bra)\n### The Action\nTake the complex conjugate and transpose of the state vector.\n### Why\nThe bra-ket formalism uses \u27e8\u03c8| as the conjugate transpose of |\u03c8\u27e9.\n### How (Example)\n```python\nbra = np.conjugate(psi).T\n```\n\n## Step 4: Check normalization\n### The Action\nVerify that the state has total probability 1.\n### Why\nA valid quantum state must satisfy \u27e8\u03c8|\u03c8\u27e9 = 1.\n### How (Example)\n```python\nnorm = np.vdot(psi, psi)   # same as <psi|psi>\nprint(norm)\n```\nIf the result is not 1, normalize it:\n```python\npsi = psi / np.sqrt(np.vdot(psi, psi))\n```\n\n## Step 5: Compute measurement probabilities\n### The Action\nSquare the magnitude of each amplitude.\n### Why\nMeasurement probabilities come from modulus squared: |\u03b1|\u00b2 and |\u03b2|\u00b2.\n### How (Example)\n```python\nprob_0 = abs(psi[0])**2\nprob_1 = abs(psi[1])**2\nprint(prob_0, prob_1)\n```\n\n## Step 6: Test phase effects with two states\n### The Action\nCompare states with the same magnitudes but different phases.\n### Why\nPhase changes interference behavior even when probabilities look similar.\n### How (Example)\n```python\npsi1 = np.array([1/np.sqrt(2), 1/np.sqrt(2)], dtype=complex)\npsi2 = np.array([1/np.sqrt(2), 1j/np.sqrt(2)], dtype=complex)\n```\nBoth have the same measurement probabilities in the computational basis, but they behave differently under gates like Hadamard."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Inner Products, Gates, Eigenvalues, and Multi-Qubit Systems\n\n## Step 1: Use inner products to measure overlap\n### The Action\nCompute \u27e8u|v\u27e9 using conjugate dot products.\n### Why\nInner products tell you whether states are orthogonal and how much one state overlaps with another.\n### How (Example)\n```python\nu = np.array([1, 0], dtype=complex)\nv = np.array([0, 1], dtype=complex)\nprint(np.vdot(u, v))   # 0 means orthogonal\n```\n\n## Step 2: Work in orthonormal bases\n### The Action\nUse the computational basis {|0\u27e9, |1\u27e9} and alternate bases like {|+\u27e9, |\u2212\u27e9}.\n### Why\nDifferent bases reveal different properties of the same quantum state.\n### How (Example)\n```python\nzero = np.array([1, 0], dtype=complex)\none = np.array([0, 1], dtype=complex)\nplus = (zero + one) / np.sqrt(2)\nminus = (zero - one) / np.sqrt(2)\n```\n\n## Step 3: Apply quantum gates as matrices\n### The Action\nMultiply a gate matrix by a state vector.\n### Why\nQuantum evolution is modeled by linear transformations.\n### How (Example)\n```python\nH = (1/np.sqrt(2)) * np.array([[1, 1], [1, -1]], dtype=complex)\nnew_state = H @ zero\n```\nThis sends |0\u27e9 to |+\u27e9.\n\n## Step 4: Check that a gate is unitary\n### The Action\nVerify that U U\u2020 = I.\n### Why\nUnitary matrices preserve norms and keep states valid.\n### How (Example)\n```python\nI = np.eye(2, dtype=complex)\nprint(H @ H.conj().T)\nprint(np.allclose(H @ H.conj().T, I))\n```\n\n## Step 5: Understand Hermitian matrices and eigenvalues\n### The Action\nTest whether a matrix equals its conjugate transpose and inspect its eigenvalues.\n### Why\nHermitian matrices represent observables; their eigenvalues are measurable outcomes.\n### How (Example)\n```python\nZ = np.array([[1, 0], [0, -1]], dtype=complex)\nprint(np.allclose(Z, Z.conj().T))\nprint(np.linalg.eig(Z))\n```\n\n## Step 6: Build multi-qubit states with tensor products\n### The Action\nUse the Kronecker product to combine qubits.\n### Why\nAn n-qubit system lives in a 2^n-dimensional space.\n### How (Example)\n```python\nzero_zero = np.kron(zero, zero)\nentangled = (np.kron(zero, zero) + np.kron(one, one)) / np.sqrt(2)\n```\nThis creates the Bell state \\((|00\\rangle + |11\\rangle)/\\sqrt{2}\\).\n\n## Step 7: Track state growth carefully\n### The Action\nVerify vector sizes after each tensor product or gate application.\n### Why\nDimension mismatches are one of the most common implementation errors.\n### How (Example)\n```python\nprint(zero_zero.shape)   # (4,)\n```"

    "content": "# Page 4 \u2014 Practice Workflow and Mastery Checks\n\n## Recommended practice workflow\n1. **Write the state by hand first** in Dirac notation.\n2. **Translate it into a NumPy complex vector**.\n3. **Check normalization** before doing anything else.\n4. **Apply a gate matrix** and inspect the resulting amplitudes.\n5. **Compute probabilities** with modulus squared.\n6. **Use inner products** to verify orthogonality or overlap.\n7. **Expand to multi-qubit states** with tensor products.\n\n## Quick mastery checklist\nYou should be able to do the following without looking up formulas:\n- Convert `|\u03c8\u27e9 = \u03b1|0\u27e9 + \u03b2|1\u27e9` into a 2-element complex vector\n- Compute `\u27e8\u03c8|\u03c8\u27e9` and normalize a state\n- Find measurement probabilities from amplitudes\n- Apply a gate like Hadamard using matrix multiplication\n- Confirm whether a matrix is unitary or Hermitian\n- Build a two-qubit state using `np.kron`\n- Recognize why entangled states cannot be split into separate single-qubit states\n\n## Minimal test script\n```python\nimport numpy as np\n\nzero = np.array([1, 0], dtype=complex)\none = np.array([0, 1], dtype=complex)\nH = (1/np.sqrt(2)) * np.array([[1, 1], [1, -1]], dtype=complex)\n\npsi = H @ zero\nprint('state:', psi)\nprint('norm:', np.vdot(psi, psi))\nprint('probabilities:', abs(psi[0])**2, abs(psi[1])**2)\n```\n\n## Final takeaway\nIf you can consistently move between notation, vectors, matrices, and probabilities, you now have the linear algebra foundation needed for quantum gates, measurements, and entanglement."

  (function () {

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
