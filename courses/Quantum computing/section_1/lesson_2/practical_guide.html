    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBy the end of this guide, you will be able to:\n1. **Write a quantum state in Dirac notation** as a ket, such as \\(|\\psi\\rangle\\).\n2. **Convert between vector form and bra-ket form** for single-qubit states.\n3. **Read amplitudes from inner products** like \\(\\langle 0|\\psi\\rangle\\) and \\(\\langle 1|\\psi\\rangle\\).\n4. **Apply the Born rule** to turn amplitudes into measurement probabilities.\n5. **Check normalization** so your probabilities sum to 1.\n\n## Prerequisites\nUse these technical prerequisites before you begin:\n- A **Python 3.10+** installation.\n- The **NumPy** library for complex vectors and matrix operations.\n- A Jupyter notebook, VS Code, or any Python IDE.\n- Optional: a quantum SDK such as **Qiskit** or **Cirq** if you want to test the same ideas on real quantum circuit objects.\n\n## What you should already have ready\n- A way to represent complex numbers in code.\n- A basic understanding of vectors, transpose, conjugation, and inner products.\n- Access to a terminal so you can install packages.\n\n## Setup example\n```bash\npip install numpy\n```\n\n## Core mindset for the lesson\nTreat every ket as a column vector and every bra as its conjugate transpose. Then use inner products to extract amplitudes and squared magnitudes to compute probabilities."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Represent States in Ket and Bra Form\n\n## 1) Write the state as a column vector\n### The Action\nDefine your qubit state \\(|\\psi\\rangle\\) as a 2-component complex vector.\n\n### The Why\nDirac notation is easiest to use when you can map it directly to linear algebra objects.\n\n### The How (Example)\nIf\n\\[\n|\\psi\\rangle = a|0\\rangle + b|1\\rangle,\n\\]\nthen represent it as:\n```python\nimport numpy as np\n\npsi = np.array([[a], [b]], dtype=complex)\n```\nExample:\n```python\npsi = np.array([[1/2], [np.sqrt(3)/2]], dtype=complex)\n```\n\n## 2) Convert the ket to a bra\n### The Action\nTake the complex conjugate transpose of the ket.\n\n### The Why\nThe bra \\(\\langle\\psi|\\) is what you use in inner products and overlaps.\n\n### The How (Example)\n```python\nbra_psi = psi.conj().T\n```\nIf\n\\[\n|\\psi\\rangle = \\begin{pmatrix} a \\\\ b \\end{pmatrix},\n\\]\nthen\n\\[\n\\langle\\psi| = (a^*, b^*).\n\\]\n\n## 3) Verify normalization\n### The Action\nCompute \\(\\langle\\psi|\\psi\\rangle\\).\n\n### The Why\nA valid quantum state must have total probability 1.\n\n### The How (Example)\n```python\nnorm = bra_psi @ psi\nprint(norm)\n```\nFor a normalized state, the result should be close to 1.\n\n## 4) Read amplitudes from basis bras\n### The Action\nUse \\(\\langle 0|\\psi\\rangle\\) and \\(\\langle 1|\\psi\\rangle\\) to extract coefficients.\n\n### The Why\nThese inner products give the measurement amplitudes directly.\n\n### The How (Example)\n```python\nket0 = np.array([[1], [0]], dtype=complex)\nket1 = np.array([[0], [1]], dtype=complex)\n\namp_0 = ket0.conj().T @ psi\namp_1 = ket1.conj().T @ psi\n```\nThis returns the amplitudes \\(a\\) and \\(b\\)."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Apply the Born Rule to Get Probabilities\n\n## 1) Compute basis measurement probabilities\n### The Action\nSquare the magnitude of each amplitude.\n\n### The Why\nThe Born rule converts complex amplitudes into observable probabilities.\n\n### The How (Example)\nIf\n\\[\n|\\psi\\rangle = \\alpha|0\\rangle + \\beta|1\\rangle,\n\\]\nthen:\n\\[\nP(0) = |\\alpha|^2, \\quad P(1) = |\\beta|^2.\n\\]\nIn code:\n```python\np0 = abs(amp_0[0, 0])**2\np1 = abs(amp_1[0, 0])**2\n```\n\n## 2) Check that probabilities sum to 1\n### The Action\nAdd all measurement probabilities and confirm they total 1.\n\n### The Why\nThis is the practical test that your state is normalized.\n\n### The How (Example)\n```python\nprint(p0 + p1)\n```\nFor the state\n\\[\n|\\psi\\rangle = \\frac{1}{2}|0\\rangle + \\frac{\\sqrt{3}}{2}|1\\rangle,\n\\]\nyou get:\n- \\(P(0) = 1/4\\)\n- \\(P(1) = 3/4\\)\n\n## 3) Practice with a phase factor\n### The Action\nCompare states that differ only by a complex phase.\n\n### The Why\nPhases can affect later interference, but not direct measurement probabilities in the same basis.\n\n### The How (Example)\nCompare:\n\\[\n\\frac{1}{\\sqrt{2}}|0\\rangle + \\frac{1}{\\sqrt{2}}|1\\rangle\n\\]\nwith\n\\[\n\\frac{1}{\\sqrt{2}}|0\\rangle + \\frac{i}{\\sqrt{2}}|1\\rangle.\n\\]\nBoth give:\n- \\(P(0) = 1/2\\)\n- \\(P(1) = 1/2\\)\n\n## 4) Compute probabilities from any orthonormal basis\n### The Action\nUse the same overlap-and-square process for any basis vector \\(|k\\rangle\\).\n\n### The Why\nQuantum measurements are basis-dependent, but the rule stays the same.\n\n### The How (Example)\nFor basis states \\(|+\\rangle\\) and \\(|-\\rangle\\):\n\\[\nP(+) = |\\langle +|\\psi\\rangle|^2, \\quad P(-) = |\\langle -|\\psi\\rangle|^2.\n\\]\nIf \\(|\\psi\\rangle = |+\\rangle\\), then:\n- \\(P(+) = 1\\)\n- \\(P(-) = 0\\)"
  },

    "content": "# Page 4 \u2014 Step 3: Use Dirac Notation Correctly in Practice\n\n## 1) Distinguish inner products from outer products\n### The Action\nUse \\(\\langle\\phi|\\psi\\rangle\\) for a scalar and \\(|\\psi\\rangle\\langle\\phi|\\) for an operator.\n\n### The Why\nMixing these up is one of the most common notation mistakes.\n\n### The How (Example)\n```python\nphi = np.array([[1/np.sqrt(2)], [1/np.sqrt(2)]], dtype=complex)\ninner = phi.conj().T @ psi      # scalar\nouter = psi @ phi.conj().T      # 2x2 matrix\n```\n- Inner product: one number\n- Outer product: a matrix such as a projector\n\n## 2) Build projectors for measurement outcomes\n### The Action\nForm operators like \\(|0\\rangle\\langle 0|\\) and \\(|1\\rangle\\langle 1|\\).\n\n### The Why\nProjectors represent measurement outcomes in operator form.\n\n### The How (Example)\n```python\nproj0 = ket0 @ ket0.conj().T\nproj1 = ket1 @ ket1.conj().T\n```\nThese can be used to compute outcome probabilities as:\n```python\np0 = (psi.conj().T @ proj0 @ psi)[0, 0].real\n```\n\n## 3) Turn the notation into a repeatable workflow\n### The Action\nFor any state and basis, follow this sequence:\n1. Write the ket.\n2. Convert the basis vector to a bra.\n3. Compute the overlap.\n4. Square the magnitude.\n5. Verify the probabilities sum to 1.\n\n### The Why\nThis is the standard operational method for reading quantum states and measurements.\n\n### The How (Template)\n```python\n# 1. State vector\npsi = ...\n\n# 2. Basis vector\nk = ...\n\n# 3. Overlap\namp = k.conj().T @ psi\n\n# 4. Probability\nprob = abs(amp[0, 0])**2\n```\n\n## Final check\nIf you can explain why \\(\\langle k|\\psi\\rangle\\) returns an amplitude, why \\(|\\langle k|\\psi\\rangle|^2\\) returns a probability, and why \\(\\langle\\psi|\\psi\\rangle = 1\\) for normalized states, you can confidently read and compute quantum measurements in Dirac notation."

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
