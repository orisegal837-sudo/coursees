  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild the ability to take an arbitrary quantum gate or circuit and rewrite it into a **universal, hardware-executable gate sequence**.\n\nBy the end, you should be able to:\n- Identify whether a gate set is **universal** for single-qubit or full multi-qubit computation.\n- Recognize when you need an **entangling gate** such as **CNOT** or **CZ**.\n- Decompose arbitrary single-qubit unitaries into standard rotation gates.\n- Prepare circuits for compilation against a specific hardware gate set.\n\n## Technical prerequisites\nYou should have access to:\n- **Python 3.10+**\n- **Qiskit** or **Cirq** installed locally\n- A quantum simulator such as:\n  - **Qiskit Aer**, or\n  - **Cirq + simulator backend**\n- Optional but useful:\n  - Access to a hardware-targeted transpiler backend, such as **IBM Quantum** through Qiskit Runtime\n  - A notebook environment like **Jupyter Lab** or **Google Colab**\n\n## What to prepare before implementing\n1. Install your SDK and simulator.\n2. Make sure you can create and draw a simple circuit.\n3. Verify you can inspect the backend\u2019s native gate set.\n4. Choose one target hardware basis, such as:\n   - `u3`, `cx` in Qiskit-style compilation, or\n   - `rz`, `sx`, `x`, `cx` for IBM-style native gates.\n\n## Practical setup example\n- In Qiskit, confirm you can run:\n  - `QuantumCircuit(1)`\n  - `qc.h(0)`\n  - `qc.cx(0,1)`\n- Then inspect a backend\u2019s basis gates with:\n  - `backend.configuration().basis_gates`\n\nThis gives you the concrete target your decompositions must eventually match."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Decompose Single-Qubit Gates\n\n## Step 1: Express arbitrary 1-qubit behavior as rotations\n\n### The Action\nRewrite any single-qubit unitary as a sequence of elementary rotations, typically in the form:\n- `Rz(\u03b1)`\n- `Ry(\u03b2)`\n- `Rz(\u03b4)`\n\n### Why it matters\nA single qubit has only a 2\u00d72 unitary to manage, and rotation gates are the standard hardware-friendly primitives for representing it.\n\n### How (Example)\nUse the Euler-angle style decomposition:\n- `U = e^{i\u03b3} Rz(\u03b1) Ry(\u03b2) Rz(\u03b4)`\n\nIf you are using Qiskit, test this by building a custom unitary and asking the compiler to decompose it into basis gates.\n\n---\n\n## Step 2: Ignore global phase during circuit logic\n\n### The Action\nTreat the factor `e^{i\u03b3}` as non-essential when you are reasoning about measurement outcomes or compiling standard circuits.\n\n### Why it matters\nGlobal phase changes the matrix representation but not observable measurement probabilities.\n\n### How (Example)\nIf two decompositions differ only by a phase factor, consider them operationally equivalent for most circuit compilation tasks.\n\n---\n\n## Step 3: Translate to your hardware\u2019s native rotations\n\n### The Action\nMap abstract rotations into the basis supported by your target device.\n\n### Why it matters\nA mathematically valid decomposition is not useful unless the hardware can execute it directly.\n\n### How (Example)\nIf the backend supports `rz`, `sx`, and `x`, rewrite a target unitary into those gates rather than keeping it in an abstract matrix form.\n\nFor example:\n- `H` may be expressed through a short sequence of `rz` and `sx` gates depending on the compiler\u2019s rules.\n\n---\n\n## Step 4: Verify equivalence numerically\n\n### The Action\nCompare the original unitary and the decomposed unitary with a matrix-distance check.\n\n### Why it matters\nYou want to confirm the decomposition preserves the intended operation up to global phase.\n\n### How (Example)\n- Simulate both versions.\n- Compare statevectors on input states like `|0\u27e9` and `|1\u27e9`.\n- Confirm measurement outcomes match within numerical tolerance."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Decompose Multi-Qubit Circuits and Add Entanglement\n\n## Step 1: Ensure your gate set includes an entangling gate\n\n### The Action\nUse a gate set containing at least one two-qubit entangling gate, such as `CNOT` or `CZ`.\n\n### Why it matters\nSingle-qubit gates alone cannot generate entanglement, so they cannot represent full quantum computation.\n\n### How (Example)\nIf your target algorithm uses Bell states or controlled logic, confirm the compiled circuit includes something like:\n- `cx(control, target)`\n- `cz(control, target)`\n\n---\n\n## Step 2: Convert between equivalent entangling gates\n\n### The Action\nReplace non-native entangling gates with an equivalent gate pattern supported by the hardware.\n\n### Why it matters\nHardware often prefers one interaction type over another, even if the gates are mathematically equivalent.\n\n### How (Example)\nUse Hadamard conjugation to relate `CZ` and `CNOT`:\n- `CNOT = (I \u2297 H) CZ (I \u2297 H)`\n\nSo if a backend supports `CZ` cheaply, the compiler may transform a `CNOT`-heavy circuit into `CZ` plus basis changes.\n\n---\n\n## Step 3: Decompose large circuits into local + entangling structure\n\n### The Action\nRewrite the circuit as alternating layers of:\n- single-qubit rotations\n- entangling two-qubit gates\n\n### Why it matters\nThis is the standard structure most compilers optimize efficiently.\n\n### How (Example)\nA circuit with a custom 2-qubit unitary can often be lowered into:\n1. local rotations on qubit 0\n2. local rotations on qubit 1\n3. `cx(0,1)`\n4. more local rotations\n5. another `cx(0,1)`\n\nThis kind of pattern is much easier to compile than a dense 4\u00d74 matrix.\n\n---\n\n## Step 4: Simplify adjacent gates\n\n### The Action\nCancel inverse pairs and merge compatible rotations.\n\n### Why it matters\nDecomposition often creates redundant operations; removing them reduces depth and noise.\n\n### How (Example)\n- `Rz(\u03b8) Rz(-\u03b8)` \u2192 remove both\n- `H H` \u2192 identity\n- consecutive rotations around the same axis \u2192 merge angles\n\n---\n\n## Step 5: Respect hardware connectivity\n\n### The Action\nInsert routing operations when qubits that need to interact are not directly connected.\n\n### Why it matters\nEven a valid logical circuit may be impossible on restricted hardware topology without routing.\n\n### How (Example)\nIf qubits 0 and 2 are not connected, the compiler may insert SWAP-style movement before applying the entangling gate between them."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Compile, Optimize, and Validate the Final Circuit\n\n## Step 1: Choose the best decomposition for the target backend\n\n### The Action\nSelect the decomposition that matches the backend\u2019s native gate set and minimizes cost.\n\n### Why it matters\nThe shortest mathematical decomposition is not always the best physically; native compatibility and error rate matter more.\n\n### How (Example)\nIf a device executes `rz` nearly for free but `cx` is expensive, prefer decompositions that reduce two-qubit gate count even if they add more single-qubit rotations.\n\n---\n\n## Step 2: Run transpilation at an appropriate optimization level\n\n### The Action\nPass the circuit through the compiler/transpiler with an optimization setting tuned to your goal.\n\n### Why it matters\nOptimization can remove redundant gates, improve routing, and match the backend basis.\n\n### How (Example)\nIn Qiskit, transpile with a backend target and compare results at different optimization levels to see how the final circuit changes.\n\n---\n\n## Step 3: Validate correctness after compilation\n\n### The Action\nTest that the compiled circuit is functionally equivalent to the original circuit.\n\n### Why it matters\nA valid-looking compiled circuit can still be wrong if decomposition or routing was applied incorrectly.\n\n### How (Example)\n- Compare output probabilities on representative inputs.\n- Check known states such as Bell-state preparation.\n- Confirm that compiled and original circuits agree up to numerical tolerance.\n\n---\n\n## Step 4: Use the compiled circuit as your deployment artifact\n\n### The Action\nTreat the decomposed, optimized circuit as the version ready for simulation or hardware execution.\n\n### Why it matters\nThis is the practical endpoint of universal gate decomposition: a circuit that the machine can actually run.\n\n### How (Example)\nA high-level algorithm expressed with custom unitaries becomes a final circuit composed only of the device\u2019s allowed gates, such as:\n- `rz`\n- `sx`\n- `x`\n- `cx`\n\n## Final takeaway\nA universal gate set gives you the building blocks; decomposition gives you the method; compilation turns abstract quantum logic into an executable hardware circuit."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
