  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild the ability to:\n- **Predict** how CNOT and Controlled-Z act on all 2-qubit basis states.\n- **Create entanglement** from product states like `|+\u27e9|0\u27e9`.\n- **Convert** between CNOT and CZ using Hadamard gates.\n- **Recognize** how these gates are represented in circuit diagrams and compiled for hardware.\n\n## Prerequisites\nBefore you start, make sure you have:\n- **A Python environment** with `qiskit` installed (`pip install qiskit`).\n- **A quantum circuit simulator** available through Qiskit Aer (`pip install qiskit-aer`) or another simulator backend.\n- **Basic linear algebra support**: vectors, matrices, tensor products, and matrix multiplication.\n- **Access to a notebook or Python script** where you can print statevectors and circuit diagrams.\n\n## What you should be able to do first\n1. Create a 2-qubit circuit.\n2. Apply `H`, `X`, `CNOT`, and `CZ` gates.\n3. Inspect the resulting statevector.\n4. Read a simple circuit diagram with control and target symbols.\n\n## Quick setup example\n```python\nfrom qiskit import QuantumCircuit\nfrom qiskit.quantum_info import Statevector\n\nqc = QuantumCircuit(2)\nqc.h(0)\nqc.cx(0, 1)\nprint(qc)\nprint(Statevector.from_instruction(qc))\n```"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step-by-Step Implementation\n\n## Step 1: Test CNOT on the computational basis\n**Action:** Prepare each basis input `|00\u27e9, |01\u27e9, |10\u27e9, |11\u27e9` and apply CNOT.\n\n**Why:** You need to verify the gate\u2019s exact truth table before using it in larger circuits.\n\n**How (Example):**\n```python\nfrom qiskit import QuantumCircuit\nfrom qiskit.quantum_info import Statevector\n\nbasis_states = {\n    \"00\": [0,0],\n    \"01\": [0,1],\n    \"10\": [1,0],\n    \"11\": [1,1],\n}\n\nfor label, bits in basis_states.items():\n    qc = QuantumCircuit(2)\n    if bits[0] == 1: qc.x(0)\n    if bits[1] == 1: qc.x(1)\n    qc.cx(0, 1)\n    print(label, Statevector.from_instruction(qc))\n```\nExpected mapping:\n- `|00\u27e9 \u2192 |00\u27e9`\n- `|01\u27e9 \u2192 |01\u27e9`\n- `|10\u27e9 \u2192 |11\u27e9`\n- `|11\u27e9 \u2192 |10\u27e9`\n\n---\n\n## Step 2: Test CZ on the computational basis\n**Action:** Apply CZ to the same four basis states.\n\n**Why:** CZ does not flip bits; it only changes the sign of `|11\u27e9`.\n\n**How (Example):**\n```python\nfor label, bits in basis_states.items():\n    qc = QuantumCircuit(2)\n    if bits[0] == 1: qc.x(0)\n    if bits[1] == 1: qc.x(1)\n    qc.cz(0, 1)\n    print(label, Statevector.from_instruction(qc))\n```\nExpected mapping:\n- `|00\u27e9 \u2192 |00\u27e9`\n- `|01\u27e9 \u2192 |01\u27e9`\n- `|10\u27e9 \u2192 |10\u27e9`\n- `|11\u27e9 \u2192 -|11\u27e9`\n\n---\n\n## Step 3: Create a Bell state with CNOT\n**Action:** Prepare `|+\u27e9|0\u27e9` and apply CNOT.\n\n**Why:** This is the simplest demonstration that a two-qubit gate can create entanglement.\n\n**How (Example):**\n```python\nqc = QuantumCircuit(2)\nqc.h(0)\nqc.cx(0, 1)\nprint(Statevector.from_instruction(qc))\n```\nYou should get:\n- `( |00\u27e9 + |11\u27e9 ) / \u221a2`\n\n---\n\n## Step 4: Create the same entanglement with CZ\n**Action:** Use Hadamard gates to turn CZ into a CNOT-like entangler.\n\n**Why:** This is the standard rewriting rule used in hardware-aware compilation.\n\n**How (Example):**\n```python\nqc = QuantumCircuit(2)\nqc.h(1)\nqc.h(0)\nqc.cz(0, 1)\nqc.h(1)\nqc.h(0)\nprint(Statevector.from_instruction(qc))\n```\nA cleaner identity to use in practice is:\n```python\n# CNOT = (I \u2297 H) CZ (I \u2297 H)\nqc = QuantumCircuit(2)\nqc.h(1)\nqc.cz(0, 1)\nqc.h(1)\n```\nThis behaves like a CNOT up to the correct qubit ordering conventions."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Advanced Use: Compilation, Phase, and Circuit Reasoning\n\n## Step 5: Rewrite circuits using the native entangling gate\n**Action:** Check whether your hardware or backend prefers `cx` or `cz`, then rewrite the circuit accordingly.\n\n**Why:** Native gates are usually shorter, more reliable, and lower error than decomposed gates.\n\n**How (Example):**\n- If backend supports `CZ` natively, replace:\n```python\nqc.h(1)\nqc.cx(0, 1)\nqc.h(1)\n```\nwith:\n```python\nqc.cz(0, 1)\n```\n- If backend supports `CX` natively, use:\n```python\nqc.h(1)\nqc.cz(0, 1)\nqc.h(1)\n```\n\n---\n\n## Step 6: Track how phase becomes measurable\n**Action:** Add a CZ gate to a superposition and then follow it with Hadamards or other basis-change gates.\n\n**Why:** CZ changes phase, and phase differences become observable only after interference.\n\n**How (Example):**\n```python\nqc = QuantumCircuit(2)\nqc.h(0)\nqc.h(1)\nqc.cz(0, 1)\nqc.h(0)\nqc.h(1)\nprint(Statevector.from_instruction(qc))\n```\nObserve that the output probabilities differ from the all-positive superposition because the `|11\u27e9` term acquired a minus sign.\n\n---\n\n## Step 7: Use matrix structure to simplify reasoning\n**Action:** Treat CNOT as a permutation matrix and CZ as a diagonal matrix.\n\n**Why:** This helps you predict how they compose with other gates and how compilers optimize them.\n\n**How (Example):**\n- **CNOT**: think \u201cswap basis vectors conditionally.\u201d\n- **CZ**: think \u201cleave basis states in place, but flip the sign of `|11\u27e9`.\u201d\n\nPractical rule:\n- **Diagonal gates commute easily with other diagonal gates**.\n- **Permutation-style gates often need explicit routing or basis changes**.\n\n---\n\n## Step 8: Verify reversibility and unitarity\n**Action:** Apply each gate twice and confirm you return to the original state.\n\n**Why:** This builds intuition for why these gates are valid reversible quantum operations.\n\n**How (Example):**\n```python\nqc = QuantumCircuit(2)\nqc.h(0)\nqc.cx(0, 1)\nqc.cx(0, 1)\nprint(Statevector.from_instruction(qc))\n```\nDo the same for `cz`. You should recover the input state, confirming:\n- `CNOT\u00b2 = I`\n- `CZ\u00b2 = I`"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Checklist and Takeaway\n\n## Implementation checklist\nUse this checklist when building or debugging circuits:\n- [ ] Confirm the gate\u2019s truth table on all basis states.\n- [ ] Verify whether your circuit creates entanglement from a product input.\n- [ ] Check whether the gate changes a bit value or only a phase.\n- [ ] Rewrite `CNOT` and `CZ` using Hadamards when compiling for native hardware.\n- [ ] Inspect statevectors or measurement probabilities after basis changes.\n\n## Quick decision guide\n- Use **CNOT** when you want a conditional bit flip.\n- Use **CZ** when you want a conditional phase flip.\n- Use **Hadamards around CZ** when you need CNOT-like behavior.\n- Use **Hadamards around CNOT** when your hardware is CZ-native.\n\n## Minimal real-world workflow\n1. Design the algorithm in abstract gates.\n2. Identify the hardware-native entangling gate.\n3. Rewrite `CNOT` and `CZ` using local basis changes.\n4. Simulate the result and compare statevectors.\n5. Run on hardware only after verifying the entanglement pattern.\n\n## Final rule of thumb\n- **CNOT changes computational basis values.**\n- **CZ changes relative phase.**\n- **Phase becomes visible only after interference.**\n\nIf you remember those three points, you can reason correctly about most two-qubit entangling circuits."
  }

  (function () {

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
