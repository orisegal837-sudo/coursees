  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a working understanding of **Bell inequalities** by doing three things in practice:\n1. **Model entangled correlations** using a Bell state.\n2. **Test the local-hidden-variable assumptions** that lead to the CHSH inequality.\n3. **Compare classical and quantum predictions** to see why quantum mechanics can violate the classical bound of 2.\n\nBy the end, you should be able to:\n- Set up a simple Bell-test experiment on paper or in code.\n- Compute correlation values \\(E(a,b)\\).\n- Evaluate the CHSH score \\(S\\).\n- Explain why a violation does **not** imply faster-than-light signaling.\n\n## Prerequisites\nHave the following ready:\n- **Python 3.10+**\n- **NumPy** for matrix and vector calculations\n- **SciPy** or **Qiskit** if you want to simulate quantum states more conveniently\n- A notebook environment such as **JupyterLab** or **Google Colab**\n- Basic access to a quantum simulator, such as:\n  - **Qiskit Aer simulator**, or\n  - **QuTiP** for state-vector calculations\n\n## What you should know before starting\n- How to represent a two-qubit state vector.\n- How measurement probabilities are computed from amplitudes.\n- The difference between a **product state** and an **entangled state**.\n- Basic probability and expectation values."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Prepare an entangled state and inspect its correlations\n\n## 1) Create the Bell state\n**Action:** Prepare the Bell state \\(|\\Phi^+\\rangle = (|00\\rangle + |11\\rangle)/\\sqrt{2}\\).  \n**Why:** This is the simplest state that produces correlations stronger than classical shared randomness.  \n**How (Example):**\n- In Python, define the state vector:\n```python\nimport numpy as np\nphi_plus = np.array([1, 0, 0, 1]) / np.sqrt(2)\n```\n- Or build it in a simulator by applying a Hadamard gate to qubit 0, then a CNOT from qubit 0 to qubit 1.\n\n## 2) Measure in the same basis\n**Action:** Measure both qubits in the computational basis \\(\\{|0\\rangle, |1\\rangle\\}\\).  \n**Why:** Same-basis measurements reveal perfect correlation for \\(|\\Phi^+\\rangle\\).  \n**How (Example):**\n- Compute the joint probabilities:\n  - \\(P(00)=1/2\\)\n  - \\(P(11)=1/2\\)\n  - \\(P(01)=P(10)=0\\)\n- Interpret this as: if Alice gets 0, Bob gets 0; if Alice gets 1, Bob gets 1.\n\n## 3) Contrast with a classical shared-randomness model\n**Action:** Simulate a simple classical model where both parties receive the same hidden bit \\(\\lambda\\).  \n**Why:** This shows how ordinary correlation differs from entanglement when measurement settings change.  \n**How (Example):**\n- Let \\(\\lambda\\in\\{0,1\\}\\) with probability 1/2.\n- Output Alice = \\(\\lambda\\), Bob = \\(\\lambda\\).\n- You get perfect same-basis correlation, but this model will fail once you test multiple measurement directions."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Derive and test the CHSH inequality\n\n## 4) Define the Bell-test settings\n**Action:** Choose two measurement settings for each party: Alice uses \\(a, a'\\), Bob uses \\(b, b'\\).  \n**Why:** CHSH requires two possible measurement choices on each side to expose the limits of local realism.  \n**How (Example):**\n- Represent each measurement as a \u00b11 observable.\n- In a polarization experiment, you might use angles such as:\n  - Alice: 0\u00b0 and 45\u00b0\n  - Bob: 22.5\u00b0 and -22.5\u00b0\n\n## 5) Compute correlation functions\n**Action:** For each setting pair, compute \\(E(a,b)\\), the average of the product of outcomes.  \n**Why:** CHSH is built from these four correlation values.  \n**How (Example):**\n- From repeated trials, estimate:\n  \n  \\[\n  E(a,b) = \\frac{N_{++}+N_{--}-N_{+-}-N_{-+}}{N_{\\text{total}}}\n  \\]\n- Example counts:\n  - \\(N_{++}=40\\), \\(N_{--}=42\\), \\(N_{+-}=8\\), \\(N_{-+}=10\\)\n  - Then \\(E(a,b) = (40+42-8-10)/100 = 0.64\\)\n\n## 6) Calculate the CHSH score\n**Action:** Evaluate\n\\[\nS = E(a,b) + E(a,b') + E(a',b) - E(a',b')\n\\]\n**Why:** This is the standard test of local hidden-variable models.  \n**How (Example):**\n- Suppose your measured values are:\n  - \\(E(a,b)=0.70\\)\n  - \\(E(a,b')=0.68\\)\n  - \\(E(a',b)=0.71\\)\n  - \\(E(a',b')=-0.69\\)\n- Then:\n  - \\(S = 0.70 + 0.68 + 0.71 - (-0.69) = 2.78\\)\n- Since \\(2.78 > 2\\), the local-hidden-variable bound is violated.\n\n## 7) Compare with the classical limit\n**Action:** Check whether \\(|S| \\le 2\\).  \n**Why:** A value above 2 cannot be explained by any theory satisfying both locality and predetermined outcomes.  \n**How (Example):**\n- If your simulation of a hidden-variable model always stays below 2, that is expected.\n- If your quantum simulation reaches near \\(2\\sqrt{2} \\approx 2.828\\), that matches the Tsirelson bound."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Verify the quantum prediction and interpret the result\n\n## 8) Simulate the quantum-optimal settings\n**Action:** Use the singlet or Bell state with measurement directions chosen to maximize CHSH violation.  \n**Why:** This shows the gap between classical correlation limits and quantum theory.  \n**How (Example):**\n- For the singlet state, use measurement directions separated by 45\u00b0 in the standard CHSH configuration.\n- In a simulator, implement observables as Pauli-axis rotations before measurement.\n- Estimate \\(S\\) from many runs and confirm it approaches \\(2\\sqrt{2}\\).\n\n## 9) Check no-signaling at the local level\n**Action:** Compare Alice\u2019s marginal outcome distribution for different Bob settings.  \n**Why:** This confirms that Bell violation does not enable communication.  \n**How (Example):**\n- Compute Alice\u2019s marginals for Bob choosing \\(b\\) versus \\(b'\\).\n- You should find Alice\u2019s local probabilities remain approximately 50/50, even though the joint correlations differ.\n\n## 10) Document the physical conclusion\n**Action:** Record the three key statements your test supports.  \n**Why:** This turns the experiment into a reusable conceptual result.  \n**How (Example):**\nWrite the conclusion in this form:\n- **Entanglement** produces correlations not reducible to independent local states.\n- **Bell inequalities** define the classical limit for local hidden-variable theories.\n- **Quantum mechanics** violates that limit while still respecting no-signaling.\n\n## 11) Extend to a device-independent use case\n**Action:** Use Bell violation as a certification tool for quantum hardware or protocols.  \n**Why:** Bell tests can validate quantum behavior without trusting internal device details.  \n**How (Example):**\n- Run a Bell test on a quantum cloud backend.\n- Use the observed CHSH value to assess whether the hardware exhibits genuine entanglement.\n- Apply the result to device-independent cryptography or randomness generation."
  }

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
