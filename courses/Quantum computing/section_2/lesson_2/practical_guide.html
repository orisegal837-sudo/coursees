    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a working mental and practical model of a single qubit that you can use to:\n- Write qubit states in **Dirac notation**.\n- Convert between amplitudes and the **Bloch sphere** parameters \\(\\theta\\) and \\(\\phi\\).\n- Predict **measurement probabilities** in the Z basis.\n- Distinguish **global phase** from **relative phase**.\n- Interpret common single-qubit gates as **rotations** on the Bloch sphere.\n\n## Prerequisites\nYou need the following technical tools ready:\n1. **Python 3.10+**\n2. **NumPy** for complex vectors and matrix operations\n   - Install: `pip install numpy`\n3. **Qiskit** for preparing and measuring single-qubit states\n   - Install: `pip install qiskit`\n4. **Matplotlib** for plotting Bloch-sphere coordinates or measurement comparisons\n   - Install: `pip install matplotlib`\n5. Optional but useful:\n   - A Jupyter Notebook environment\n   - Access to IBM Quantum or a local Qiskit simulator\n\n## What you should be able to do before starting\n- Multiply complex numbers.\n- Work with vectors and matrices.\n- Recognize a unit vector and normalize it.\n- Use the Born rule: probability = squared magnitude of amplitude.\n\n## Setup check\nUse this quick test to confirm your environment:\n```python\nimport numpy as np\nfrom qiskit import QuantumCircuit\nprint(np.array([1+1j, 0]))\n```\n\n## Example target state vocabulary\nYou should become comfortable reading and writing states like:\n- `|0\u27e9`\n- `|1\u27e9`\n- `(|0\u27e9 + |1\u27e9)/sqrt(2)`\n- `(|0\u27e9 - |1\u27e9)/sqrt(2)`\n- `\u03b1|0\u27e9 + \u03b2|1\u27e9` with `|\u03b1|\u00b2 + |\u03b2|\u00b2 = 1`"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Step 1: Represent and Normalize a Qubit State\n\n## Action\nWrite a single-qubit state as a 2D complex vector and verify it has unit norm.\n\n## Why\nA qubit is not just \u201ca bit with probabilities\u201d; it is a normalized complex vector. If you cannot normalize and interpret the amplitudes, you cannot reason about measurement or phase correctly.\n\n## How (Example)\nStart from the Dirac form:\n\\[\n|\\psi\\rangle = \\alpha|0\\rangle + \\beta|1\\rangle\n\\]\nConvert it into a vector:\n```python\nimport numpy as np\n\nalpha = 1/np.sqrt(3)\nbeta = np.sqrt(2/3) * 1j\npsi = np.array([alpha, beta], dtype=complex)\n\nnorm = np.vdot(psi, psi)\nprint(norm)  # should be 1\n```\n\n### Checklist\n- Confirm `|\u03b1|\u00b2 + |\u03b2|\u00b2 = 1`.\n- Treat `|0\u27e9 = [1, 0]` and `|1\u27e9 = [0, 1]`.\n- Use `np.vdot(psi, psi)` to compute the norm.\n\n---\n\n## Action\nCompute Z-basis measurement probabilities from the amplitudes.\n\n## Why\nMeasurement is the bridge between the abstract state and the observable outcome. In the computational basis, the squared magnitudes of amplitudes tell you what you will see.\n\n## How (Example)\n```python\np0 = abs(alpha)**2\np1 = abs(beta)**2\nprint(p0, p1)\n```\nFor a state `\u03b1|0\u27e9 + \u03b2|1\u27e9`:\n- Probability of `0` is `|\u03b1|\u00b2`\n- Probability of `1` is `|\u03b2|\u00b2`\n\n### Practice case\nFor the state:\n\\[\n|\\psi\\rangle = \\frac{1}{\\sqrt{2}}|0\\rangle + \\frac{1}{\\sqrt{2}}|1\\rangle\n\\]\nboth outcomes occur with probability `1/2`.\n\n---\n\n## Action\nCheck whether two states differ only by global phase.\n\n## Why\nGlobal phase changes the vector representation but not the physics. This is a key simplification when comparing qubit states.\n\n## How (Example)\nCompare these states:\n```python\npsi1 = np.array([1/np.sqrt(2), 1/np.sqrt(2)], dtype=complex)\npsi2 = np.exp(1j*np.pi/3) * psi1\n```\nThese describe the same physical state because `psi2` is just `psi1` multiplied by a single complex phase factor.\n\n### Rule of thumb\n- **Global phase**: same physics\n- **Relative phase**: different physics"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Step 2: Convert to Bloch Sphere Parameters\n\n## Action\nRewrite the qubit in Bloch-sphere form:\n\\[\n|\\psi\\rangle = \\cos(\\theta/2)|0\\rangle + e^{i\\phi}\\sin(\\theta/2)|1\\rangle\n\\]\n\n## Why\nThis form separates **probability distribution** from **phase information**. It gives you a direct geometric interpretation of any pure qubit state.\n\n## How (Example)\nGiven amplitudes `\u03b1` and `\u03b2`, extract the parameters:\n- \\(\\theta = 2\\arccos(|\\alpha|)\\)\n- \\(\\phi = \\arg(\\beta) - \\arg(\\alpha)\\) when `\u03b1` is nonzero\n\nExample:\n```python\nalpha = 1/np.sqrt(2)\nbeta = 1j/np.sqrt(2)\n\ntheta = 2 * np.arccos(abs(alpha))\nphi = np.angle(beta) - np.angle(alpha)\nprint(theta, phi)\n```\nThis state lies on the equator because `|\u03b1| = |\u03b2| = 1/\u221a2`, and its relative phase is `\u03c0/2`.\n\n### Interpretation guide\n- `\u03b8 = 0` \u2192 north pole \u2192 `|0\u27e9`\n- `\u03b8 = \u03c0` \u2192 south pole \u2192 `|1\u27e9`\n- `\u03b8 = \u03c0/2` \u2192 equator \u2192 equal superposition\n- `\u03c6` changes the longitude on the sphere\n\n---\n\n## Action\nMap familiar states to Bloch-sphere locations.\n\n## Why\nYou need instant recognition of common states so you can reason about gate effects and measurements visually.\n\n## How (Example)\nUse this lookup table:\n- `|0\u27e9 = [1, 0]` \u2192 north pole\n- `|1\u27e9 = [0, 1]` \u2192 south pole\n- `|+\u27e9 = (|0\u27e9 + |1\u27e9)/\u221a2` \u2192 +X axis\n- `|\u2212\u27e9 = (|0\u27e9 - |1\u27e9)/\u221a2` \u2192 \u2212X axis\n- `(|0\u27e9 + i|1\u27e9)/\u221a2` \u2192 +Y axis\n- `(|0\u27e9 - i|1\u27e9)/\u221a2` \u2192 \u2212Y axis\n\n### Quick exercise\nTake each state and identify:\n1. Its Z-basis probabilities.\n2. Whether the state differs from another by relative phase.\n3. Its approximate Bloch-sphere location."

    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Step 3: Use Gates, Measurements, and Phase to Predict Behavior\n\n## Action\nTreat single-qubit gates as rotations and predict how they change the state before measuring.\n\n## Why\nThis connects the algebra of unitary matrices with the geometry of the Bloch sphere. It lets you anticipate outcomes instead of calculating from scratch every time.\n\n## How (Example)\nTry these standard transformations:\n\n### X gate\n```python\nX = np.array([[0, 1], [1, 0]], dtype=complex)\n```\n- Swaps `|0\u27e9` and `|1\u27e9`\n- Acts like a 180\u00b0 rotation around the X-axis\n\n### Z gate\n```python\nZ = np.array([[1, 0], [0, -1]], dtype=complex)\n```\n- Leaves `|0\u27e9` unchanged\n- Adds a phase of `-1` to `|1\u27e9`\n- Changes relative phase, not Z-basis probabilities\n\n### H gate\n```python\nH = (1/np.sqrt(2)) * np.array([[1, 1], [1, -1]], dtype=complex)\n```\n- Moves between Z and X basis\n- Example: `H|0\u27e9 = |+\u27e9`, `H|1\u27e9 = |\u2212\u27e9`\n\n### Test it in code\n```python\npsi = np.array([1, 0], dtype=complex)\nprint(H @ psi)  # should produce |+>\n```\n\n---\n\n## Action\nSimulate measurement and compare outcomes to your Bloch-sphere intuition.\n\n## Why\nMeasurement collapses the quantum state into a classical result. You should be able to predict the probabilities from the state description alone.\n\n## How (Example)\n```python\np0 = abs(psi[0])**2\np1 = abs(psi[1])**2\noutcome = np.random.choice([0, 1], p=[p0, p1])\nprint(outcome)\n```\nIf the state is `|+\u27e9`, repeated Z-basis measurements should produce roughly 50% `0` and 50% `1`.\n\n---\n\n## Action\nCompare states that differ by global phase versus relative phase.\n\n## Why\nThis is the most important conceptual test. It tells you whether two vectors represent the same physical state or truly different ones.\n\n## How (Example)\nCompare:\n```python\npsi_a = np.array([1/np.sqrt(2), 1/np.sqrt(2)], dtype=complex)\npsi_b = np.exp(1j*np.pi/4) * psi_a\npsi_c = np.array([1/np.sqrt(2), -1/np.sqrt(2)], dtype=complex)\n```\n- `psi_a` and `psi_b` are physically equivalent.\n- `psi_c` is different because the sign changes the relative phase.\n\n## Final practice workflow\n1. Write the state in vector form.\n2. Normalize it.\n3. Compute measurement probabilities.\n4. Convert to Bloch-sphere coordinates.\n5. Apply a gate.\n6. Predict the new probabilities.\n7. Verify by simulation.\n\n## Success criterion\nYou have mastered the lesson when you can look at a state like `(|0\u27e9 - i|1\u27e9)/\u221a2` and immediately say:\n- It is normalized.\n- It lies on the equator.\n- Its relative phase is nonzero.\n- It measures `0` and `1` with equal probability in the Z basis.\n- A phase-sensitive gate may change how it behaves next."

              <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Previous</span>
          </button>
          <button type="button" class="btn btn-primary" id="nextBtn" aria-label="Next section">
            <span>Continue to Next</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
