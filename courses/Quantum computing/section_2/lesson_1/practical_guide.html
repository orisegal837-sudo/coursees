  <textarea id="markdown-source" style="display:none;">

  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a working linear algebra workflow for quantum computing so you can:\n- Represent quantum states as vectors in complex vector spaces\n- Treat quantum gates and observables as linear maps and matrices\n- Move confidently between bases without losing the underlying physics\n- Use outer products and tensor products correctly in quantum models\n- Recognize when decomposition tools like SVD and diagonalization clarify a problem\n\n## Prerequisites\nHave these technical pieces ready before you start:\n- **Python 3.10+**\n- **NumPy** for complex vectors, matrices, tensor products, and Hermitian/unitary checks\n- **SciPy** for decomposition tools such as SVD and eigendecomposition\n- **Jupyter Notebook** or another interactive Python environment\n- Optional but useful: **Qiskit** or **Cirq** if you want to test the concepts on actual quantum circuit objects\n- A basic working environment with `pip` installed\n\n## What you should be able to do by the end\n- Encode a qubit state like `|\u03c8\u27e9 = \u03b1|0\u27e9 + \u03b2|1\u27e9` as a normalized complex vector\n- Build matrix representations of gates in a chosen basis\n- Verify whether a matrix is unitary or Hermitian\n- Construct projectors with outer products\n- Build multi-qubit states and operators with tensor products\n- Interpret basis changes as coordinate changes, not physical state changes"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the Core State-and-Operator Workflow\n\n## 1) Represent quantum states as normalized vectors\n**Action:** Create quantum states as complex column vectors and enforce normalization.\n\n**Why:** Quantum states must preserve total probability, so their vector norm must equal 1.\n\n**How (Example):**\n```python\nimport numpy as np\n\npsi = np.array([1/np.sqrt(2), 1j/np.sqrt(2)], dtype=complex)\nprint(np.linalg.norm(psi))  # should be 1.0\n```\nIf the norm is not 1, divide by the norm before using the state.\n\n---\n\n## 2) Treat operators as linear maps, not just raw matrices\n**Action:** Define gates and observables as functions that act linearly on vectors.\n\n**Why:** This keeps the distinction clear between the abstract operator and its coordinate matrix.\n\n**How (Example):**\n```python\nX = np.array([[0, 1], [1, 0]], dtype=complex)\nZ = np.array([[1, 0], [0, -1]], dtype=complex)\n\nphi = X @ psi\n```\nThink of `X` as the matrix representation of the Pauli-X operator in the computational basis.\n\n---\n\n## 3) Verify linearity explicitly when designing custom operators\n**Action:** Test whether an operator respects addition and scalar multiplication.\n\n**Why:** Only linear maps behave like valid quantum operators in this framework.\n\n**How (Example):**\n```python\na, b = 2+0j, -1j\nv = np.array([1, 0], dtype=complex)\nw = np.array([0, 1], dtype=complex)\nT = X\n\nleft = T @ (a*v + b*w)\nright = a*(T @ v) + b*(T @ w)\nprint(np.allclose(left, right))\n```\n\n---\n\n## 4) Check unitarity for state-preserving evolution\n**Action:** Test whether a matrix is unitary before using it as a quantum gate.\n\n**Why:** Unitary matrices preserve norms, so they preserve probability.\n\n**How (Example):**\n```python\nI = np.eye(2, dtype=complex)\nprint(np.allclose(X.conj().T @ X, I))\n```\nUse the same pattern for any candidate gate matrix."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Master Basis Changes, Outer Products, and Tensor Products\n\n## 5) Change basis to simplify the operator you are studying\n**Action:** Express states and operators in a basis that makes the structure easier to see.\n\n**Why:** The same operator can look complicated in one basis and simple, even diagonal, in another.\n\n**How (Example):**\nFor the Hadamard basis, use the unitary change-of-basis matrix:\n```python\nH = (1/np.sqrt(2)) * np.array([[1, 1], [1, -1]], dtype=complex)\n```\nA basis change for an operator `A` is:\n```python\nA_prime = H.conj().T @ A @ H\n```\nUse this to inspect how observables transform across bases.\n\n---\n\n## 6) Build projectors and density matrices with outer products\n**Action:** Construct `|v\u27e9\u27e8w|` directly using vector outer products.\n\n**Why:** Outer products turn state data into operator data, which is how projectors and density matrices are built.\n\n**How (Example):**\n```python\nv = np.array([1, 0], dtype=complex)\nw = np.array([1/np.sqrt(2), 1/np.sqrt(2)], dtype=complex)\nouter = np.outer(v, np.conj(w))\n```\nFor a projector onto `|v\u27e9`:\n```python\nP = np.outer(v, np.conj(v))\n```\n\n---\n\n## 7) Use tensor products to scale from one qubit to many qubits\n**Action:** Build multi-qubit states and operators with Kronecker products.\n\n**Why:** The state space of `n` qubits is the tensor product of `n` single-qubit spaces, with dimension `2^n`.\n\n**How (Example):**\n```python\nzero = np.array([1, 0], dtype=complex)\none = np.array([0, 1], dtype=complex)\n\npsi_2q = np.kron(zero, one)   # |01>\nX_on_first = np.kron(X, np.eye(2, dtype=complex))\n```\nUse identities on qubits you are not acting on.\n\n---\n\n## 8) Track gate order carefully in compositions\n**Action:** Apply matrix multiplication in the exact circuit order.\n\n**Why:** Matrix multiplication is not commutative, so `AB` and `BA` usually mean different physics.\n\n**How (Example):**\n```python\nstate_after = Z @ (X @ psi)\n```\nThis means apply `X` first, then `Z`.\n\n---\n\n## 9) Use diagonalization and SVD to reveal structure\n**Action:** Compute eigenvalues for Hermitian operators and SVD for general matrices.\n\n**Why:** Diagonal or low-rank structure exposes measurement outcomes, rank, and entanglement patterns.\n\n**How (Example):**\n```python\nvals, vecs = np.linalg.eigh(Z)\nU, S, Vh = np.linalg.svd(np.outer(psi, np.conj(psi)))\n```\nInterpret eigenvectors as basis states that simplify the operator, and singular values as a summary of rank and structure."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Put the Pieces Together in Real Quantum Models\n\n## 10) Map a quantum problem into the right basis before solving it\n**Action:** Identify whether the computational basis, X basis, or another orthonormal basis makes the operator simpler.\n\n**Why:** Good basis choice reduces algebra and makes measurements or diagonalization easier.\n\n**How (Example):**\nIf an observable is diagonal in the X basis, transform it before analyzing measurement probabilities.\n\n---\n\n## 11) Build a small validation checklist for every matrix you use\n**Action:** Before using a matrix in a model, verify its type and physical role.\n\n**Why:** This prevents mixing up operators, projectors, and basis-change matrices.\n\n**How (Example):**\nCheck:\n- Is it **unitary** if it represents evolution?\n- Is it **Hermitian** if it represents an observable?\n- Is it **idempotent** (`P @ P == P`) if it represents a projector?\n- Is it correctly sized for the full tensor-product space?\n\n```python\ndef is_unitary(U):\n    return np.allclose(U.conj().T @ U, np.eye(U.shape[0]))\n```\n\n---\n\n## 12) Practice with a minimal end-to-end quantum linear algebra task\n**Action:** Combine state creation, basis choice, operator application, and measurement projection in one notebook exercise.\n\n**Why:** Integration is what turns theory into usable intuition.\n\n**How (Example):**\n1. Create `|0\u27e9` and `|1\u27e9`\n2. Form a superposition state\n3. Apply a gate sequence\n4. Build a projector with an outer product\n5. Compute measurement probabilities with inner products\n6. Rewrite the same operator in a different basis and compare results\n\nBy repeating this workflow, you will internalize the core quantum-linear-algebra pattern: **states are vectors, operators are linear maps, matrices are basis-dependent representations, and tensor products scale the system up**."
  }

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
