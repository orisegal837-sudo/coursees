  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nImplement and verify the **quantum measurement postulates** in practice by:\n1. Computing **projective measurement probabilities** using the Born rule.\n2. Applying **state collapse** after a measurement outcome.\n3. Extending the same workflow to **POVMs** and **Kraus-operator measurements**.\n4. Using these tools for tasks like **state discrimination** and **measurement simulation**.\n\n## Prerequisites\nUse the following technical setup:\n- **Python 3.10+**\n- **NumPy** for linear algebra\n- **Qiskit** *or* **Cirq** for circuit-based measurement experiments\n- Optional but useful:\n  - **SciPy** for optimization\n  - **Matplotlib** for visualizing outcome probabilities\n  - A quantum simulator backend such as **Aer** (Qiskit) or **DensityMatrixSimulator** (Cirq)\n\n## What you should already have ready\n- A working Python environment with package installation access.\n- Basic ability to create vectors, matrices, and complex-valued arrays.\n- Access to a simulator if you want to test measurements on circuits.\n\n## Minimal installation example\n```bash\npip install numpy qiskit scipy matplotlib\n```\n\n## Implementation target\nBy the end of this guide, you should be able to:\n- Define a quantum state \\(|\\psi\\rangle\\) or density matrix \\(\\rho\\).\n- Define projectors \\(P_k\\), POVM elements \\(E_m\\), and Kraus operators \\(M_m\\).\n- Compute probabilities from \\(\\langle\\psi|P_k|\\psi\\rangle\\) and \\(\\mathrm{tr}(\\rho E_m)\\).\n- Update the state after measurement using projection or Kraus evolution."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement Projective Measurement First\n\n## 1) Encode the quantum state\n### The Action\nRepresent the state as either a state vector or density matrix.\n\n### Why\nProjective measurements are easiest to verify directly from vectors, and they provide the baseline for all later generalizations.\n\n### How (Example)\n```python\nimport numpy as np\n\n# |psi> = alpha|0> + beta|1>\nalpha = 1/np.sqrt(3)\nbeta = np.sqrt(2/3)\npsi = np.array([alpha, beta], dtype=complex)\n```\n\nIf you prefer a density matrix:\n```python\nrho = np.outer(psi, np.conj(psi))\n```\n\n## 2) Define measurement projectors\n### The Action\nCreate orthogonal projectors for the measurement basis.\n\n### Why\nA projective measurement is fully specified by projectors that sum to the identity.\n\n### How (Example)\n```python\nP0 = np.array([[1, 0], [0, 0]], dtype=complex)\nP1 = np.array([[0, 0], [0, 1]], dtype=complex)\n```\nCheck the rules:\n```python\nI = np.eye(2)\nassert np.allclose(P0 @ P0, P0)\nassert np.allclose(P1 @ P1, P1)\nassert np.allclose(P0 @ P1, np.zeros((2,2)))\nassert np.allclose(P0 + P1, I)\n```\n\n## 3) Compute Born-rule probabilities\n### The Action\nCalculate outcome probabilities using \\(p(k)=\\langle\\psi|P_k|\\psi\\rangle\\).\n\n### Why\nThis is the direct operational meaning of the measurement postulate.\n\n### How (Example)\n```python\np0 = np.vdot(psi, P0 @ psi)\np1 = np.vdot(psi, P1 @ psi)\nprint(p0.real, p1.real)\n```\nFor the density matrix form:\n```python\np0 = np.trace(rho @ P0)\np1 = np.trace(rho @ P1)\n```\n\n## 4) Update the state after the outcome\n### The Action\nProject the state onto the measured subspace and renormalize.\n\n### Why\nMeasurement changes the state; it does not merely reveal a pre-existing label.\n\n### How (Example)\n```python\noutcome = 0\nP = P0 if outcome == 0 else P1\np = np.vdot(psi, P @ psi).real\npsi_post = (P @ psi) / np.sqrt(p)\nprint(psi_post)\n```\nFor a basis measurement in the Z basis, this gives the collapse to \\(|0\\rangle\\) or \\(|1\\rangle\\)."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Extend to POVMs and Kraus Operators\n\n## 1) Replace projectors with POVM elements\n### The Action\nDefine positive semidefinite operators \\(E_m\\) that sum to the identity.\n\n### Why\nPOVMs describe the most general measurement and are essential for noisy, indirect, and optimized readout.\n\n### How (Example)\nFor a simple binary POVM on a qubit:\n```python\nE0 = np.array([[0.8, 0.0], [0.0, 0.2]], dtype=complex)\nE1 = np.eye(2) - E0\n```\nVerify validity:\n```python\n# Positive semidefinite check via eigenvalues\nprint(np.linalg.eigvalsh(E0))\nprint(np.linalg.eigvalsh(E1))\nassert np.allclose(E0 + E1, np.eye(2))\n```\n\n## 2) Compute POVM probabilities\n### The Action\nUse \\(p(m)=\\langle\\psi|E_m|\\psi\\rangle\\) or \\(\\mathrm{tr}(\\rho E_m)\\).\n\n### Why\nThe Born rule survives in generalized form even when outcomes are not projectors.\n\n### How (Example)\n```python\np0 = np.vdot(psi, E0 @ psi).real\np1 = np.vdot(psi, E1 @ psi).real\nprint(p0, p1)\n```\nFor mixed states:\n```python\np0 = np.trace(rho @ E0).real\np1 = np.trace(rho @ E1).real\n```\n\n## 3) Add the post-measurement update with Kraus operators\n### The Action\nChoose Kraus operators \\(M_m\\) such that \\(E_m = M_m^\\dagger M_m\\), then update the state as \\(\\rho_m = M_m\\rho M_m^\\dagger/p(m)\\).\n\n### Why\nA POVM gives probabilities, but Kraus operators tell you how the system changes after the outcome.\n\n### How (Example)\n```python\nM0 = np.array([[np.sqrt(0.8), 0.0], [0.0, np.sqrt(0.2)]], dtype=complex)\nM1 = np.array([[np.sqrt(0.2), 0.0], [0.0, np.sqrt(0.8)]], dtype=complex)\n\nE0_check = M0.conj().T @ M0\nE1_check = M1.conj().T @ M1\n```\nState update:\n```python\np0 = np.trace(M0 @ rho @ M0.conj().T).real\nrho0 = (M0 @ rho @ M0.conj().T) / p0\n```\n\n## 4) Use POVMs for state discrimination\n### The Action\nDesign a measurement that maximizes success probability for distinguishing non-orthogonal states.\n\n### Why\nThis is a practical case where POVMs outperform projective measurements.\n\n### How (Example)\nIf you need to distinguish \\(|0\\rangle\\) from \\(|+\\rangle\\), a projective Z-basis measurement is not optimal. Instead, search for a POVM \\(\\{E_0,E_1\\}\\) that maximizes average success probability over the prior distribution."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Put the Measurement Pipeline Into Practice\n\n## 1) Build a reusable measurement function\n### The Action\nWrite one function for projective measurements and one for POVMs.\n\n### Why\nA reusable API makes it easy to test new measurement scenarios without rewriting the same linear algebra.\n\n### How (Example)\n```python\ndef projective_measure(psi, projectors):\n    probs = [np.vdot(psi, P @ psi).real for P in projectors]\n    return probs\n\n\ndef povm_measure(rho, elements):\n    probs = [np.trace(rho @ E).real for E in elements]\n    return probs\n```\n\n## 2) Validate every measurement numerically\n### The Action\nCheck three conditions: probabilities are nonnegative, they sum to 1, and the post-measurement state is normalized.\n\n### Why\nThese checks catch invalid operators and implementation mistakes quickly.\n\n### How (Example)\n```python\nprobs = povm_measure(rho, [E0, E1])\nassert all(p >= -1e-12 for p in probs)\nassert np.isclose(sum(probs), 1.0)\n```\n\n## 3) Simulate a real quantum workflow\n### The Action\nApply measurement to one of these use cases:\n- syndrome readout in error correction\n- weak measurement on a qubit\n- distinguishing signal states in a noisy channel\n- tomography-style measurement collection\n\n### Why\nThis shows that measurement is not just a terminal readout step; it is part of a processing pipeline.\n\n### How (Example)\nExample workflow:\n1. Prepare a qubit state.\n2. Apply a noise channel.\n3. Measure with a POVM.\n4. Update the state using Kraus operators.\n5. Repeat adaptively based on the observed outcome.\n\n## 4) Final checkpoint\n### The Action\nConfirm you can explain and compute all three layers:\n- **Projectors** for ideal projective measurement\n- **POVM elements** for general probabilities\n- **Kraus operators** for state update\n\n### Why\nThis is the complete operational measurement picture used in quantum information.\n\n### How (Example)\nFor any measurement you define, be able to answer:\n- What are the operators?\n- Do they sum to identity?\n- What are the outcome probabilities?\n- What is the post-measurement state?"

    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
