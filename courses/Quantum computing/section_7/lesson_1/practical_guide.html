  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a practical understanding of **what physically causes noise in real qubits** and how to use **T1** and **T2** to predict whether a circuit is likely to lose useful quantum information.\n\nBy the end of this guide, you should be able to:\n- Identify the main physical noise sources in quantum hardware.\n- Distinguish **energy relaxation** from **dephasing**.\n- Explain why **T1** affects populations and **T2** affects phase coherence.\n- Estimate whether a circuit depth is likely to be limited by decoherence.\n- Recognize when a quantum algorithm is especially vulnerable to phase noise.\n\n## Prerequisites\nYou do **not** need full quantum hardware access, but you do need the following technical tools:\n- **Python 3.10+**\n- **NumPy** and **Matplotlib** for simple simulations and plots\n- **Qiskit Aer** or **Cirq** if you want to model noisy circuits locally\n- Access to either:\n  - a **quantum simulator** with noise models, or\n  - a cloud provider such as **IBM Quantum** (for real backend calibration data)\n- Basic familiarity with:\n  - qubit states \\(|0\\rangle, |1\\rangle, |+\\rangle\\)\n  - density matrices\n  - unitary vs. non-unitary evolution\n\n## What to prepare before implementation\n- Choose one target qubit platform to study, such as **superconducting qubits** or **trapped ions**.\n- Gather typical backend metrics:\n  - **T1 time**\n  - **T2 time**\n  - gate times for single- and two-qubit operations\n  - readout error rates\n- Decide one test circuit to analyze, such as:\n  - a Ramsey-style superposition circuit\n  - a Bell-state circuit\n  - a small Grover or QPE demo\n\n## Why this matters\nT1 and T2 are not abstract definitions; they are the first practical indicators of whether a physical qubit can preserve information long enough for your circuit to work.\n\n## Example setup\nIf you are using IBM Quantum:\n- Open a backend calibration page.\n- Note values like:\n  - `T1 = 120 \u00b5s`\n  - `T2 = 85 \u00b5s`\n  - single-qubit gate time `= 35 ns`\n- Compute whether a 200-gate circuit is likely to fit comfortably inside the coherence window."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Identify and Model the Main Noise Sources\n\n## Step 1: Separate relaxation from dephasing\n### Action\nClassify each noise mechanism as either:\n- **energy relaxation**: qubit loses energy and decays toward \\(|0\\rangle\\)\n- **dephasing**: qubit keeps its energy but loses phase relationship\n\n### Why\nThis tells you whether the noise changes **measurement probabilities** or mainly destroys **interference**.\n\n### How (Example)\n- Start with \\(|1\\rangle\\): if the state decays to \\(|0\\rangle\\), you are seeing **T1-type behavior**.\n- Start with \\(|+\\rangle\\): if the Z-basis probabilities stay near 50/50 but interference disappears, you are seeing **T2-type behavior**.\n\n---\n\n## Step 2: Model amplitude damping for T1\n### Action\nImplement or use an amplitude damping channel to simulate spontaneous decay.\n\n### Why\nAmplitude damping is the standard practical model for relaxation due to environment coupling.\n\n### How (Example)\nUse a decay probability based on elapsed time `t`:\n- `p = 1 - exp(-t / T1)`\n\nTemplate idea:\n- if the qubit is in \\(|1\\rangle\\), it decays to \\(|0\\rangle\\) with probability `p`\n- if the qubit is in a superposition, the excited component shrinks accordingly\n\nIf you are using Qiskit Aer, configure an amplitude damping error on the relevant gates or idle periods.\n\n---\n\n## Step 3: Model dephasing for T2\n### Action\nAdd a phase damping or phase-flip model to simulate loss of coherence.\n\n### Why\nDephasing is what destroys the off-diagonal terms that enable quantum interference.\n\n### How (Example)\nFor a superposition state, represent the effect as shrinking coherence terms in the density matrix.\nA simple intuition is:\n- diagonal terms stay similar\n- off-diagonal terms decay like `exp(-t / T2)`\n\nPractical test:\n- Prepare \\(|+\\rangle\\)\n- Let it idle for time `t`\n- Measure in the X basis\n- As dephasing increases, the X-basis signal collapses toward classical randomness\n\n---\n\n## Step 4: Include real hardware noise sources\n### Action\nMap hardware issues to their likely effect on circuits.\n\n### Why\nReal systems fail for multiple reasons, not just T1 and T2.\n\n### How (Example)\nUse this mapping:\n- **Imperfect pulses** \u2192 over-rotation / under-rotation errors\n- **Crosstalk** \u2192 unwanted operations on neighboring qubits\n- **Thermal effects** \u2192 spontaneous decay and thermal excitation\n- **Magnetic/electric fluctuations** \u2192 frequency drift and phase noise\n- **Readout error** \u2192 wrong classical bit at measurement\n\nA practical workflow is to attach each source to either:\n- a gate error model\n- an idle-time error model\n- a readout error model"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Translate T1/T2 Into Circuit-Level Decisions\n\n## Step 5: Compute the usable coherence budget\n### Action\nCompare the total circuit time to T1 and T2.\n\n### Why\nA circuit is only reliable if its total runtime is short relative to the qubit\u2019s noise timescales.\n\n### How (Example)\nEstimate:\n- total circuit time = number of gates \u00d7 average gate duration\n\nThen compare:\n- if total time is much smaller than **T1** and **T2**, noise may be manageable\n- if total time approaches or exceeds **T2**, phase-sensitive algorithms will degrade quickly\n\nRule of thumb:\n- deep circuits are more exposed than shallow ones\n- algorithms relying on interference are more fragile than simple sampling tasks\n\n---\n\n## Step 6: Check which algorithms are most sensitive\n### Action\nClassify your target algorithm by its dependence on coherence.\n\n### Why\nDifferent algorithms fail in different ways under the same noise.\n\n### How (Example)\nHigh sensitivity to decoherence:\n- **Grover\u2019s algorithm**\n- **Quantum Phase Estimation (QPE)**\n- **Variational algorithms** with long optimization circuits\n\nLower sensitivity:\n- short diagnostic circuits\n- some near-term sampling tasks with limited depth\n\nIf your algorithm depends on phase interference, prioritize reducing T2-related exposure.\n\n---\n\n## Step 7: Simulate a noisy experiment and compare outcomes\n### Action\nRun the same circuit once ideally and once with noise.\n\n### Why\nThis makes T1 and T2 effects visible in a concrete result.\n\n### How (Example)\n1. Prepare a Bell state or \\(|+\\rangle\\) state.\n2. Simulate it without noise.\n3. Simulate it with:\n   - amplitude damping\n   - phase damping\n   - readout error\n4. Compare measurement histograms and state fidelities.\n\nWhat to look for:\n- **T1 effects**: population drifts toward \\(|0\\rangle\\)\n- **T2 effects**: interference fringes or basis-sensitive signals weaken\n\n---\n\n## Step 8: Use the relation between T1, T2, and pure dephasing\n### Action\nEstimate whether phase noise is dominated by relaxation or by independent dephasing.\n\n### Why\nThis helps you decide whether hardware improvement should focus on energy decay or phase stability.\n\n### How (Example)\nUse the relation:\n- `1/T2 = 1/(2T1) + 1/T\u03c6`\n\nInterpretation:\n- if `T2` is close to `2T1`, relaxation may be the main limit\n- if `T2` is much shorter than `2T1`, strong pure dephasing is likely present"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Apply the Analysis in Practice\n\n## Step 9: Turn the noise model into mitigation choices\n### Action\nChoose mitigation based on the dominant error source.\n\n### Why\nThe best fix depends on whether the problem is decay, dephasing, or control/readout error.\n\n### How (Example)\n- **Relaxation-dominated device**: shorten circuit depth, reduce idle time, schedule operations tightly\n- **Dephasing-dominated device**: improve pulse calibration, use dynamical decoupling, reduce phase-sensitive idle periods\n- **Readout-heavy error**: apply measurement calibration or post-processing correction\n- **Crosstalk-heavy device**: re-map qubits to reduce adjacency conflicts\n\n---\n\n## Step 10: Build a simple noise-aware workflow\n### Action\nCreate a repeatable checklist for every circuit you run.\n\n### Why\nThis keeps T1/T2 analysis part of your normal development process.\n\n### How (Example)\nBefore execution:\n- record backend `T1`, `T2`, and gate times\n- estimate total circuit duration\n- identify whether the algorithm is phase-sensitive\n\nDuring simulation:\n- add amplitude damping for relaxation\n- add phase damping for dephasing\n- include readout error\n\nAfter execution:\n- compare ideal vs noisy outputs\n- note whether errors look like population loss or coherence loss\n- adjust circuit depth or qubit mapping accordingly\n\n## Final takeaway\nUse **T1** as your estimate of how quickly energy leaks from the qubit, and **T2** as your estimate of how quickly superposition quality disappears. In practice, these numbers tell you whether your circuit is physically runnable on a given device before noise overwhelms the computation."
  }
]

  (function () {

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
