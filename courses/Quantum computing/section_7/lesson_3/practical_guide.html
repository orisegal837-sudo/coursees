    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBy the end of this workflow, you will be able to:\n1. **Estimate average gate performance** with randomized benchmarking (RB).\n2. **Reconstruct a quantum channel** with process tomography.\n3. **Compare the two methods** so you can choose the right tool for benchmarking vs diagnosis.\n4. **Interpret common noise signatures** such as decoherence, depolarization, coherent rotation errors, and SPAM effects.\n\n## Prerequisites\nUse these specific technical prerequisites before starting:\n- **A quantum SDK**: either **Qiskit** (recommended) or **Cirq** installed locally.\n- **A simulator backend** with noise support:\n  - Qiskit Aer, or\n  - a hardware-accessible backend from IBM Quantum / IonQ / Rigetti if you want real-device data.\n- **Linear algebra and plotting libraries**:\n  - `numpy`\n  - `scipy`\n  - `matplotlib`\n- For tomography analysis, have access to at least one of:\n  - **Qiskit Experiments**, or\n  - a custom reconstruction workflow using `numpy.linalg`.\n- If using real hardware, you need:\n  - an account on the provider platform,\n  - API token access,\n  - permission to run short calibration/characterization jobs.\n\n## What to prepare before measuring noise\n- Decide the **target unit** of characterization:\n  - a single gate, such as an `X`, `SX`, `CZ`, or `CNOT`, or\n  - a small subsystem, such as one or two qubits.\n- Decide whether your goal is:\n  - **benchmarking** \u2192 use RB,\n  - **diagnosis** \u2192 use tomography,\n  - **both** \u2192 run RB first, then tomography on suspicious gates.\n- Record the ideal reference:\n  - target unitary,\n  - expected output state,\n  - gate duration and qubit mapping.\n\n## Example setup\nIf you are studying a noisy single-qubit `X` gate:\n- Use **Qiskit Aer** to add a depolarizing or amplitude-damping noise model.\n- Prepare to run RB on Clifford sequences that include `X`-equivalent operations.\n- Prepare tomography by selecting input states like `|0\u27e9`, `|1\u27e9`, `|+\u27e9`, and `|i\u27e9` and measuring in `X`, `Y`, and `Z` bases."
  },

    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement Randomized Benchmarking\n\n## Step 1: Define the gate set and sequence lengths\n**Action:** Choose a Clifford gate set and a list of sequence lengths, such as 1, 2, 4, 8, 16, 32.\n\n**Why:** RB measures how fidelity decays as random sequences get longer, so you need a range of lengths to fit an exponential trend.\n\n**How (Example):**\n```python\nlengths = [1, 2, 4, 8, 16, 32]\n```\n\n## Step 2: Generate random Clifford sequences\n**Action:** Sample random Clifford circuits for each length and append the inverse Clifford so the ideal net circuit is the identity.\n\n**Why:** The inverse ensures that any deviation from perfect output is caused by noise, not by the intended algorithm.\n\n**How (Example):**\n- Build a random circuit of 8 Cliffords.\n- Compute the inverse operation.\n- Append the inverse so the ideal output should return to `|0\u27e9`.\n\n## Step 3: Execute each sequence repeatedly\n**Action:** Run each sequence many times, collecting measurement counts for each length.\n\n**Why:** RB is statistical; survival probability is estimated from repeated shots.\n\n**How (Example):**\n- For each sequence length, run 20\u201350 random sequences.\n- For each sequence, use 1,000\u201310,000 shots depending on simulator or hardware availability.\n- Record the probability of measuring the correct final state, usually `|0\u27e9`.\n\n## Step 4: Fit the decay curve\n**Action:** Fit the measured survival probabilities to the RB model:\n\\[\nA p^m + B\n\\]\nwhere `m` is sequence length.\n\n**Why:** The fitted parameter `p` summarizes the average noise per Clifford or per gate.\n\n**How (Example):**\n- Use nonlinear least squares with `scipy.optimize.curve_fit`.\n- Extract `p`, then convert it into an average error estimate if needed.\n- Compare this value across different calibration runs or devices.\n\n## Step 5: Interpret the RB result\n**Action:** Use the fit to assess average performance and stability.\n\n**Why:** RB gives a robust, compact benchmark, especially useful for tracking calibration changes and comparing hardware.\n\n**How (Example):**\n- If decay is shallow, the device has lower average error.\n- If the fitted `p` changes after recalibration, the hardware performance likely shifted.\n- If RB is good but circuits still fail, suspect structured coherent errors or crosstalk that RB may not fully expose."
  },

    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Implement Process Tomography\n\n## Step 1: Choose an informationally complete experiment design\n**Action:** Select a set of input states and measurement bases that span the single-qubit operator space.\n\n**Why:** Tomography works by solving a linear inverse problem, so you need enough independent data to reconstruct the channel.\n\n**How (Example):**\nFor a single qubit, use inputs such as:\n- `|0\u27e9`\n- `|1\u27e9`\n- `|+\u27e9`\n- `|i\u27e9`\n\nMeasure outputs in:\n- `Z` basis,\n- `X` basis,\n- `Y` basis.\n\n## Step 2: Run the device process on each preparation-measurement pair\n**Action:** For every prepared state, apply the target gate or channel, then measure in each chosen basis.\n\n**Why:** The output probabilities encode the channel\u2019s action on different parts of the Bloch sphere.\n\n**How (Example):**\n- Prepare `|+\u27e9`, apply the noisy gate, then measure in the `X` basis.\n- Repeat for all input-output combinations.\n- Collect probabilities or frequencies from shot counts.\n\n## Step 3: Reconstruct the process\n**Action:** Use the measured data to solve for the channel in a chosen representation, such as the process matrix `\u03c7` or Pauli transfer matrix.\n\n**Why:** This gives a detailed description of how the actual device transforms states.\n\n**How (Example):**\n- Build a linear system from the measured probabilities.\n- Solve with least squares or a dedicated tomography routine.\n- If available, apply constrained reconstruction to enforce physicality.\n\n## Step 4: Check physical consistency\n**Action:** Verify whether the reconstructed map is completely positive and trace preserving (CPTP).\n\n**Why:** Noise models must represent valid quantum channels; unphysical results often indicate insufficient data or measurement error.\n\n**How (Example):**\n- Inspect eigenvalues of the reconstructed process matrix.\n- If small negative eigenvalues appear, use a constrained fit or maximum-likelihood tomography.\n\n## Step 5: Diagnose the dominant error type\n**Action:** Compare the reconstructed channel with the intended unitary and look for signatures of common noise.\n\n**Why:** Tomography tells you not just how much error exists, but what kind.\n\n**How (Example):**\n- **Depolarization:** output moves toward the maximally mixed state.\n- **Dephasing:** off-diagonal terms shrink in the density matrix.\n- **Amplitude damping:** population relaxes toward `|0\u27e9`.\n- **Coherent rotation error:** the channel looks like a slightly miscalibrated unitary.\n\n## Step 6: Use tomography selectively\n**Action:** Apply tomography to a few key gates or small subsystems rather than the full device.\n\n**Why:** Tomography scales poorly and becomes expensive quickly as qubit count grows.\n\n**How (Example):**\n- Characterize only the most important gate in a variational circuit.\n- Use tomography to investigate a gate that had a poor RB score or unexpected algorithmic behavior."

. Run RB to get a stable performance baseline.\n2. Identify the worst gate or qubit pair.\n3. Run tomography on that target.\n4. Match the reconstructed noise channel to a mitigation or recalibration step.\n5. Re-run RB to verify improvement.\n\nThis workflow gives you both the **broad metric** and the **mechanistic explanation** needed to diagnose quantum noise effectively."

    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
