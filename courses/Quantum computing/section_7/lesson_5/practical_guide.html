  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nBuild a working mental and practical model of **stabilizer-based quantum error correction** and **surface codes** so you can:\n- represent a code space using commuting Pauli operators,\n- measure **syndromes** without reading out the logical qubit,\n- understand how **surface-code parity checks** detect and localize errors,\n- connect syndrome data to a **decoder** that suggests corrections.\n\n## Prerequisites\nUse these technical prerequisites before implementing anything:\n- **Python 3.10+**\n- **NumPy** for matrix/tensor operations\n- **Qiskit** or **Cirq** for circuit simulation and Pauli measurements\n- A simulator backend such as **Qiskit Aer** or **Cirq simulator**\n- Optional but useful: **networkx** or a matching library for decoding graphs\n- Access to a notebook environment: **JupyterLab** or **Google Colab**\n\n## What you should prepare\n1. Install your quantum SDK and simulator.\n2. Create a small project folder for QEC experiments.\n3. Decide whether you want to prototype:\n   - a **2-qubit or 3-qubit toy stabilizer code**, or\n   - a **small surface-code patch** on a grid.\n\n## Concrete setup example\n**Action:** Install the core tools.\n**Why:** You need a simulator to test stabilizer measurements and observe syndromes.\n**How (Example):**\n```bash\npip install numpy qiskit qiskit-aer networkx matplotlib\n```\n\n**Action:** Create a notebook called `qec_stabilizers.ipynb`.\n**Why:** You will iterate on circuits, measurement results, and syndrome tables.\n**How (Example):**\n- Open JupyterLab\n- Create a notebook\n- Add sections: `Pauli operators`, `Stabilizers`, `Syndrome extraction`, `Surface code toy model`"
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement a Basic Stabilizer Code\n\n## Step 1: Define the stabilizer generators\n**Action:** Choose a small commuting set of Pauli operators, such as `Z \u2297 Z` for a parity check.\n**Why:** Stabilizer generators define the valid code space.\n**How (Example):**\n- Use two qubits.\n- Define one stabilizer: `S = Z\u2297Z`.\n- A state is valid if measuring `S` gives `+1`.\n\nExample code idea:\n```python\nfrom qiskit.quantum_info import SparsePauliOp\nS = SparsePauliOp.from_list([(\"ZZ\", 1)])\n```\n\n## Step 2: Prepare a code state\n**Action:** Create a state that should satisfy the stabilizer.\n**Why:** You need a baseline to confirm the stabilizer measurement works.\n**How (Example):**\n- Prepare `(|00\u27e9 + |11\u27e9)/\u221a2`.\n- This Bell state is a `+1` eigenstate of `ZZ`.\n\nExample circuit template:\n```python\nfrom qiskit import QuantumCircuit\nqc = QuantumCircuit(2, 1)\nqc.h(0)\nqc.cx(0, 1)\n```\n\n## Step 3: Measure the stabilizer, not the logical qubit\n**Action:** Add a syndrome-measurement routine using an ancilla qubit.\n**Why:** Syndrome measurements reveal error fingerprints without directly collapsing the encoded data.\n**How (Example):**\n- Initialize ancilla in `|0\u27e9`.\n- Entangle ancilla with data qubits using parity-check gates.\n- Measure ancilla only.\n\nTemplate for a `ZZ` parity check:\n```python\nqc = QuantumCircuit(3, 1)   # 2 data qubits + 1 ancilla\n# prepare data state first\nqc.cx(0, 2)\nqc.cx(1, 2)\nqc.measure(2, 0)\n```\n\n## Step 4: Inject simple errors and observe syndromes\n**Action:** Apply `X`, `Z`, or `Y` errors to one data qubit and re-measure the stabilizer.\n**Why:** This shows how an error flips syndrome outcomes.\n**How (Example):**\n- Insert `qc.x(0)` before syndrome measurement.\n- Compare ancilla results with the no-error case.\n- Record whether the stabilizer outcome changes from `+1` to `-1`.\n\n## Step 5: Build a syndrome table\n**Action:** Map each observed measurement pattern to a likely error.\n**Why:** Decoding starts with a lookup from syndrome to correction.\n**How (Example):**\nCreate a table like:\n- syndrome `0` \u2192 no detected error\n- syndrome `1` \u2192 likely `X` error on qubit 0\n- syndrome `1` with a different check \u2192 likely `X` error on qubit 1"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Extend to a Surface-Code Style Layout\n\n## Step 1: Arrange qubits on a 2D grid\n**Action:** Lay out data qubits on a small lattice and place ancillas between neighborhoods.\n**Why:** Surface codes depend on local interactions only.\n**How (Example):**\n- Use a `2x2`, `3x3`, or small patch for simulation.\n- Assign each ancilla to one local parity check.\n- Keep each stabilizer low-weight and spatially local.\n\n## Step 2: Separate X-type and Z-type checks\n**Action:** Implement two kinds of stabilizers:\n- `Z` checks to detect `X` errors\n- `X` checks to detect `Z` errors\n**Why:** Anticommutation makes these checks sensitive to complementary error types.\n**How (Example):**\n- For a `Z` check, measure parity in the computational basis.\n- For an `X` check, use Hadamards before and after parity measurement.\n\nTemplate:\n```python\n# X-check pattern\nqc.h(data_qubits)\n# parity measurement\nqc.h(data_qubits)\n```\n\n## Step 3: Repeat syndrome rounds over time\n**Action:** Run the same stabilizer measurements in multiple cycles.\n**Why:** Repetition helps separate persistent data errors from temporary measurement noise.\n**How (Example):**\n- Measure all checks for 5\u201310 rounds.\n- Store results as a time series:\n  - round 1: `00110`\n  - round 2: `00100`\n  - round 3: `00110`\n\n## Step 4: Convert syndromes into an error graph\n**Action:** Represent changed stabilizer outcomes as defect nodes and likely error chains as edges.\n**Why:** Surface-code decoding is usually a graph problem.\n**How (Example):**\n- Each flipped stabilizer becomes a node.\n- Connect nearby defects with edges weighted by error likelihood.\n- Use a matching algorithm to pair defects into the simplest explanation.\n\n## Step 5: Decode and apply corrections\n**Action:** Infer the most likely error chain and apply a correction operation.\n**Why:** The goal is to restore the logical state, not merely identify noise.\n**How (Example):**\n- If the decoder predicts an `X` error on one qubit, apply `X` there.\n- If the correction matches the true error chain up to a stabilizer, the logical information remains intact.\n\nPractical note:\n- In many real systems, the decoder is classical software running after quantum measurements.\n- Start with simple minimum-weight matching before trying advanced decoders."
  },

l qubit.\n\nThat is the core workflow behind stabilizer codes and surface-code-based fault tolerance."

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
