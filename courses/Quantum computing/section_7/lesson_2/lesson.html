<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "Up to now, you have treated quantum circuits as ideal, reversible, unitary transformations acting on pure states. That model is correct for closed systems, but real devices interact with their environment. Qubits lose energy, pick up unwanted phase, and suffer readout and control imperfections. To describe this, we move from unitary evolution to quantum channels.\n\nA quantum channel is a mathematical map that takes an input state to an output state, while preserving the rules of quantum mechanics. It must send density matrices to density matrices: the result must remain Hermitian, positive semidefinite, and trace 1. Unlike a unitary gate, a channel need not be reversible, and it can turn pure states into mixed states.\n\nThe standard way to represent a channel is with Kraus operators. If a channel acts on a state \u03c1, we write\n\nE(\u03c1) = \u03a3_k K_k \u03c1 K_k\u2020\n\nwhere the K_k are called Kraus operators. The condition for the output to remain a valid quantum state is\n\n\u03a3_k K_k\u2020 K_k = I.\n\nThis means the channel preserves total probability. In a sense, each Kraus operator represents one possible interaction with the environment, and the sum over all of them captures the full noisy process."
  },
  {
    "id": "lesson_page_2",
    "content": "This formula is the operator-sum representation. It generalizes the idea of a projective measurement and fits naturally with the density matrix formalism you already know.\n\nA useful way to think about Kraus operators is as a bookkeeping tool for hidden information. The environment may \u201clearn\u201d something about the qubit, but because we do not track the environment directly, we must average over all possible environmental outcomes. That averaging produces mixed states and irreversible behavior.\n\nMany common noise processes can be written with simple Kraus operators.\n\nAmplitude damping models energy relaxation, such as decay from |1\u27e9 to |0\u27e9. A standard Kraus form is\nK0 = [[1, 0], [0, \u221a(1-\u03b3)]],  K1 = [[0, \u221a\u03b3], [0, 0]]\nwith damping strength \u03b3.\n\nPhase damping models loss of phase coherence without energy loss. It leaves computational basis probabilities unchanged but suppresses off-diagonal terms in the density matrix.\n\nDepolarizing noise models a random Pauli error with some probability, pushing the state toward the maximally mixed state.\n\nThese channels are mainstream, widely used approximations for hardware noise in superconducting, trapped-ion, and other platforms."
  },
  {
    "id": "lesson_page_3",
    "content": "Kraus operators are not unique. The same channel can often be written with many different Kraus decompositions, as long as they produce the same map E(\u03c1). This is important conceptually: the physical channel is what matters, not the particular algebraic representation.\n\nThere is also a deep relation between channels and unitary evolution. Any noisy channel can be viewed as arising from a unitary acting on a larger system that includes an environment, followed by tracing out that environment. This is the Stinespring dilation picture. It explains why channels are linear, completely positive, and trace-preserving.\n\nIn practice, quantum channels are central to noise modeling, error mitigation, and quantum error correction. Error mitigation tries to estimate ideal results despite noise, while error correction actively encodes information across multiple qubits so that errors can be detected and fixed. Kraus operators give the mathematical language for both.\n\nFor example, if a device has a measured T1 relaxation time, you can model relaxation over a circuit duration with an amplitude damping channel. If it has significant dephasing, you can model phase damping. Then you can predict how much a circuit\u2019s output distribution will deviate from the ideal one."
  },
  {
    "id": "lesson_page_4",
    "content": "Summary: Quantum channels extend quantum mechanics to open systems. They replace ideal unitary evolution with more general maps that preserve valid density matrices. Kraus operators provide the most common representation: E(\u03c1)=\u03a3_k K_k \u03c1 K_k\u2020, with \u03a3_k K_k\u2020K_k=I. This framework is the standard language for modeling decoherence, readout-related imperfections, and other realistic noise processes, and it is foundational for error mitigation and quantum error correction."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
