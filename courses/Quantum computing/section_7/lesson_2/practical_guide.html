  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild the ability to **model realistic noisy quantum behavior** using **quantum channels** and **Kraus operators** instead of only ideal unitary gates. By the end, you should be able to:\n\n- Represent a noisy process as a **trace-preserving channel**.\n- Write and verify a **Kraus operator decomposition**.\n- Apply common noise models such as **amplitude damping**, **phase damping**, and **depolarizing noise** to a density matrix.\n- Use these models to estimate how noise changes circuit outputs.\n\n## Prerequisites\nOnly the technical prerequisites needed to implement this in practice:\n\n- **Python 3.10+**\n- **NumPy** for matrix operations: `pip install numpy`\n- Optional but useful:\n  - **Qiskit** for running circuit simulations: `pip install qiskit`\n  - **Matplotlib** for plotting results: `pip install matplotlib`\n  - A quantum SDK with noise models, such as:\n    - Qiskit Aer\n    - Cirq\n    - PennyLane\n\n## What you should already have access to\n- A Python notebook or script environment\n- A way to create and manipulate **density matrices**\n- If you want to test on hardware-style noise, access to a simulator that supports **noise channels**\n\n## Working definition to use\nKeep this formula at the center of your implementation:\n\n\\[\n\\mathcal{E}(\\rho)=\\sum_k K_k \\rho K_k^\\dagger\n\\]\n\nwith the validity condition:\n\n\\[\n\\sum_k K_k^\\dagger K_k=I\n\\]\n\nUse this as your checklist whenever you define a new channel."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Implement a Basic Quantum Channel Workflow\n\n## Step 1: Represent states as density matrices\n\n- **Action:** Switch from pure-state vectors to density matrices.\n- **Why:** Channels act naturally on density matrices, not just state vectors.\n- **How (Example):**\n  ```python\n  import numpy as np\n\n  ket0 = np.array([[1], [0]], dtype=complex)\n  rho0 = ket0 @ ket0.conj().T  # |0><0|\n  ```\n\n## Step 2: Define Kraus operators for a channel\n\n- **Action:** Create a list of Kraus matrices for the noise process.\n- **Why:** Kraus operators are the practical representation of a quantum channel.\n- **How (Example):** Amplitude damping with damping rate `gamma`:\n  ```python\n  gamma = 0.2\n  K0 = np.array([[1, 0], [0, np.sqrt(1 - gamma)]], dtype=complex)\n  K1 = np.array([[0, np.sqrt(gamma)], [0, 0]], dtype=complex)\n  kraus_ops = [K0, K1]\n  ```\n\n## Step 3: Apply the channel to a state\n\n- **Action:** Compute \\(\\sum_k K_k \\rho K_k^\\dagger\\).\n- **Why:** This gives the noisy output state after the environment interaction.\n- **How (Example):**\n  ```python\n  def apply_channel(rho, kraus_ops):\n      out = np.zeros_like(rho, dtype=complex)\n      for K in kraus_ops:\n          out += K @ rho @ K.conj().T\n      return out\n\n  rho_out = apply_channel(rho0, kraus_ops)\n  print(rho_out)\n  ```\n\n## Step 4: Verify the channel is valid\n\n- **Action:** Check that \\(\\sum_k K_k^\\dagger K_k = I\\).\n- **Why:** This confirms the channel preserves total probability and outputs a valid quantum state.\n- **How (Example):**\n  ```python\n  identity_check = sum(K.conj().T @ K for K in kraus_ops)\n  print(identity_check)\n  ```\n\n## Step 5: Test whether the output remains physical\n\n- **Action:** Confirm the output is Hermitian, trace 1, and positive semidefinite.\n- **Why:** A valid channel must map valid states to valid states.\n- **How (Example):**\n  ```python\n  print(np.allclose(rho_out, rho_out.conj().T))   # Hermitian\n  print(np.trace(rho_out))                        # Should be 1\n  print(np.linalg.eigvals(rho_out))               # Should be nonnegative\n  ```"
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Model Common Noise Channels and Use Them in Practice\n\n## Step 1: Implement amplitude damping\n\n- **Action:** Model energy relaxation from \\(|1\\rangle\\) to \\(|0\\rangle\\).\n- **Why:** This captures T1-style decay, one of the most common hardware noise sources.\n- **How (Example):**\n  ```python\n  gamma = 0.1\n  K0 = np.array([[1, 0], [0, np.sqrt(1 - gamma)]], dtype=complex)\n  K1 = np.array([[0, np.sqrt(gamma)], [0, 0]], dtype=complex)\n  ```\n\n## Step 2: Implement phase damping\n\n- **Action:** Build a channel that destroys coherence but keeps basis-state probabilities the same.\n- **Why:** This models dephasing, which is often caused by uncontrolled phase noise.\n- **How (Example):** A simple implementation can reduce off-diagonal terms directly:\n  ```python\n  def phase_damp(rho, lam):\n      out = rho.copy().astype(complex)\n      out[0,1] *= np.sqrt(1-lam)\n      out[1,0] *= np.sqrt(1-lam)\n      return out\n  ```\n\n## Step 3: Implement depolarizing noise\n\n- **Action:** Mix the state with the maximally mixed state.\n- **Why:** This approximates random Pauli errors and general loss of information.\n- **How (Example):**\n  ```python\n  def depolarize(rho, p):\n      I = np.eye(rho.shape[0], dtype=complex)\n      return (1 - p) * rho + p * I / rho.shape[0]\n  ```\n\n## Step 4: Compare ideal vs noisy outputs\n\n- **Action:** Run the same state through an ideal evolution and a noisy channel.\n- **Why:** This quantifies the impact of the environment on your circuit result.\n- **How (Example):**\n  - Start with \\(|+\\rangle\\)\n  - Apply Hadamard ideally\n  - Then apply amplitude damping or dephasing\n  - Compare output probabilities\n\n## Step 5: Connect noise parameters to hardware behavior\n\n- **Action:** Translate measured device properties into channel parameters.\n- **Why:** This makes your model physically meaningful rather than abstract.\n- **How (Example):**\n  - Use **T1** to estimate amplitude damping over gate duration.\n  - Use **T2** or dephasing rates to estimate phase damping.\n  - Use readout error rates to decide when to model measurement errors separately."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Advanced Use: Channel Equivalence, Dilation, and Error Workflows\n\n## Step 1: Remember Kraus decompositions are not unique\n\n- **Action:** Do not treat one Kraus list as the only correct representation.\n- **Why:** Different Kraus sets can represent the same physical channel.\n- **How (Example):** If two different operator sets produce the same \\(\\mathcal{E}(\\rho)\\) for every input, they are equivalent descriptions of the same noise.\n\n## Step 2: Interpret channels as unitary-plus-environment processes\n\n- **Action:** Think of noise as arising from a larger unitary interaction followed by discarding the environment.\n- **Why:** This explains why channels are linear, completely positive, and trace-preserving.\n- **How (Example):**\n  - Combine the system qubit with an ancilla environment.\n  - Apply a joint unitary.\n  - Trace out the environment to recover the noisy system state.\n\n## Step 3: Use channels in simulation and mitigation pipelines\n\n- **Action:** Insert channels into circuit simulations where real hardware noise would occur.\n- **Why:** You can estimate how far noisy results drift from ideal outputs.\n- **How (Example):**\n  - Add amplitude damping after each gate.\n  - Add phase damping before measurement.\n  - Compare ideal and noisy expectation values.\n\n## Step 4: Apply the model to error mitigation and correction planning\n\n- **Action:** Use the channel model to decide whether mitigation or correction is more appropriate.\n- **Why:** Different noise types have different best responses.\n- **How (Example):**\n  - If noise is mild, apply **zero-noise extrapolation** or other mitigation methods.\n  - If errors accumulate significantly, design **error-correcting codes** that can detect and fix them.\n\n## Final implementation checklist\n- Confirm each channel preserves trace.\n- Verify outputs remain valid density matrices.\n- Match noise parameters to device characterization data.\n- Use the channel model to predict circuit degradation before running on hardware."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
