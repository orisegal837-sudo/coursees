<body>
  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "Variational quantum algorithms combine a parameterized circuit with a classical optimizer. The quantum device evaluates a cost function, usually an expectation value such as energy in VQE or objective value in QAOA, and the classical side updates parameters to reduce that cost. In the NISQ era, this workflow is attractive because it can use shallow circuits and repeated measurement shots rather than long fault-tolerant computations. But the same ingredients that make variational methods practical also make them fragile: finite-shot sampling, gate infidelity, decoherence, and readout error can all distort the objective landscape the optimizer sees.\n\nA useful way to think about the problem is to separate three layers. The abstract circuit is the ideal parameterized model. The compiled circuit reflects hardware constraints such as connectivity, native gates, and SWAP insertion. The observed circuit is what actually runs on hardware, where noise changes the state before measurement. Variational training happens on the observed layer, not the abstract one, so optimization quality depends on how faithfully the hardware preserves the intended cost landscape.\n\nThis lesson focuses on three major obstacles. First, noise adds randomness and bias to measured costs and gradients. Second, barren plateaus make gradients vanish exponentially with system size or depth, which makes optimization extremely difficult. Third, error mitigation tries to reduce the impact of noise without full quantum error correction, allowing variational methods to remain useful on today\u2019s devices."
  },
  {
    "id": "lesson_page_2",
    "content": "Noise affects variational algorithms in several distinct ways. Shot noise is the random fluctuation from estimating probabilities with a finite number of measurements. Decoherence and gate infidelity change the quantum state before measurement, which can bias the expectation values themselves. Readout error corrupts the final classical bitstring counts. In practice, these errors combine, so a measured objective may differ from the true noiseless objective in both variance and mean.\n\nFor gradient-based methods, noise is especially problematic because gradients are already estimated approximately. Parameter-shift, finite-difference, and stochastic methods all depend on repeated circuit evaluations, so the gradient estimate inherits shot noise and hardware noise. This can cause unstable updates, slow convergence, or apparent optimizer failure even when the ansatz is expressive enough.\n\nBarren plateaus are a separate but related challenge. A barren plateau is a region of parameter space where the gradient of the cost function becomes extremely small, often shrinking exponentially with the number of qubits. When this happens, the optimizer receives almost no useful signal about which direction improves the cost. Broad, highly expressive hardware-efficient ansatzes are especially vulnerable, because deep random-looking circuits tend to produce nearly uniform local statistics.\n\nThe main lesson is that not every optimization failure is caused by a bad optimizer. Sometimes the cost landscape itself is nearly flat, or the measured gradients are dominated by noise. Good variational design therefore balances expressibility, trainability, circuit depth, and hardware constraints."
  },
  {
    "id": "lesson_page_3",
    "content": "Error mitigation aims to improve the estimate of the ideal cost function without implementing full fault tolerance. It does not remove all errors, but it can make variational training far more reliable. A common idea is calibration-based correction. For readout error mitigation, one measures known basis states, builds a confusion matrix describing how the hardware reports each state, and then uses that matrix to approximately invert the effect of readout bias on measured counts.\n\nOther mitigation strategies target the circuit itself. Zero-noise extrapolation runs the same computation at several artificially increased noise levels, then extrapolates back to the zero-noise limit. Probabilistic error cancellation uses a calibrated noise model to statistically undo errors, though it can be expensive in sampling overhead. Symmetry verification and post-selection discard outputs that violate known conserved quantities, such as particle number or parity, when such symmetries apply to the problem ansatz.\n\nIn variational algorithms, mitigation is usually applied inside the optimization loop. The goal is not just a better final answer, but a smoother and more trustworthy cost estimate at each iteration. This is why readout mitigation, batching, careful initialization, and noise-aware optimizers like COBYLA or SPSA are commonly used together. SPSA is often helpful because it tolerates noisy objectives, while COBYLA can work well when gradients are unreliable or unavailable.\n\nThe best practical strategy is to reduce noise at several levels at once: use shallow and problem-informed ansatzes, preserve symmetries where possible, keep measurement cost manageable, and apply mitigation methods that match the dominant hardware error."
  },
  {
    "id": "lesson_page_4",
    "content": "Variational algorithms succeed only when the optimizer can see a meaningful signal through the noise. Shot noise, decoherence, gate errors, and readout error all distort that signal, while barren plateaus can erase it almost completely. Noise mitigation cannot fully solve trainability, but it can make NISQ optimization much more stable and useful.\n\nThe key ideas are: distinguish true landscape problems from hardware-induced measurement error; prefer ansatzes that balance expressibility with trainability; use noisy-objective optimizers wisely; and apply mitigation methods such as readout correction, zero-noise extrapolation, symmetry checks, or post-selection when appropriate. In the NISQ era, success is often less about perfect quantum execution and more about making imperfect execution good enough for optimization."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
