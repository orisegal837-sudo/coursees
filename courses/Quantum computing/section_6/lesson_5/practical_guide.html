  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **practical workflow for training variational quantum algorithms on NISQ hardware** while accounting for:\n- **Shot noise** and hardware-induced randomness\n- **Barren plateaus** and vanishing gradients\n- **Error mitigation** methods that improve optimization reliability\n\nBy the end, you should be able to:\n1. Set up a VQA experiment with a shallow ansatz.\n2. Measure how noise changes your cost function and gradients.\n3. Detect whether training failure is due to noise or a flat landscape.\n4. Apply mitigation techniques during the optimization loop.\n\n## Technical Prerequisites\nUse the following tools and access:\n- **Python 3.10+**\n- A quantum SDK such as **Qiskit Runtime** or **PennyLane**\n- Access to a **NISQ backend** or a high-fidelity simulator that supports noise models\n- A classical optimizer library, such as **SciPy optimize**\n- Measurement mitigation support, such as:\n  - Qiskit Ignis / Qiskit Runtime mitigation tools, or\n  - PennyLane mitigation utilities, or\n  - a custom confusion-matrix correction script\n- Optional but useful:\n  - A backend calibration API or device status page\n  - Access to a simulator with configurable **readout error**, **decoherence**, and **gate error** models\n\n## What You Need Before You Start\n- A small benchmark problem, such as:\n  - **VQE** for a 2\u20136 qubit Hamiltonian\n  - **QAOA** for a tiny MaxCut instance\n- A parameterized circuit with a manageable number of layers\n- A way to run the same circuit many times with repeated shots\n\n## Working Rule\nAlways compare three versions of the same objective:\n1. **Ideal / noiseless** cost\n2. **Noisy / hardware-like** cost\n3. **Mitigated** cost\n\nThis comparison is the foundation for diagnosing whether optimization issues come from the ansatz, the optimizer, or the device."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the Baseline Variational Workflow\n\n## Step 1: Define a simple ansatz and cost function\n**The Action:** Create a shallow parameterized circuit and a measurable cost.\n\n**Why it matters:** You need a controlled baseline before introducing noise or mitigation.\n\n**How (Example):**\n- For VQE, use a 2-qubit hardware-efficient ansatz:\n  - `RY(theta)` on each qubit\n  - one entangling layer, such as `CNOT(0,1)`\n- Define cost as the expectation value of a Hamiltonian:\n  - Example: `H = Z0 + Z1 + 0.5 * X0 X1`\n\n## Step 2: Run the ideal simulation first\n**The Action:** Evaluate the cost using a noiseless simulator.\n\n**Why it matters:** This gives you the target landscape and shows whether the ansatz can, in principle, optimize successfully.\n\n**How (Example):**\n- Run the circuit with a large shot count or analytic expectation evaluation.\n- Record:\n  - initial cost\n  - cost after several optimizer steps\n  - gradient magnitudes if available\n\n## Step 3: Add finite-shot sampling\n**The Action:** Re-run the same circuit with limited measurement shots.\n\n**Why it matters:** Shot noise is often the first source of instability in real experiments.\n\n**How (Example):**\n- Compare `shots=100`, `shots=1000`, and `shots=10000`.\n- Observe how the cost estimate fluctuates between runs at the same parameters.\n- Keep a log like:\n  - parameters\n  - measured cost\n  - number of shots\n  - variance across repeated trials\n\n## Step 4: Estimate gradients under noise\n**The Action:** Compute gradients using a noisy estimator such as parameter-shift or SPSA-style perturbations.\n\n**Why it matters:** Training depends on gradient quality, and noise often destroys gradient signal before it affects the final cost.\n\n**How (Example):**\n- With parameter-shift, evaluate the circuit at `theta + pi/2` and `theta - pi/2`.\n- Repeat several times and average the result.\n- Compare the gradient from:\n  - noiseless simulation\n  - shot-limited simulation\n  - hardware execution\n\n## Step 5: Separate \u201cbad optimizer\u201d from \u201cbad landscape\u201d\n**The Action:** Test whether failure comes from optimization settings or from the cost landscape itself.\n\n**Why it matters:** A flat gradient is not solved by simply changing learning rates.\n\n**How (Example):**\n- Try the same problem with 2 ansatz depths:\n  - shallow: 1 entangling layer\n  - deeper: 4 entangling layers\n- If the deeper circuit has much smaller gradients, you may be seeing a barren plateau.\n- If both gradients are noisy but nonzero, the issue is more likely measurement noise or optimizer sensitivity."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Diagnose Noise, Barren Plateaus, and Apply Mitigation\n\n## Step 6: Measure the noise contribution directly\n**The Action:** Compare ideal and hardware-like outputs at the same parameter values.\n\n**Why it matters:** You need to know whether the hardware is biasing the cost or just adding variance.\n\n**How (Example):**\n- For one parameter setting, record:\n  - noiseless expectation value\n  - noisy simulated value\n  - hardware value\n- Track both:\n  - **bias** = average shift from the ideal cost\n  - **variance** = spread across repeated measurements\n\n## Step 7: Check for barren plateau behavior\n**The Action:** Study how gradient size changes with qubit count or circuit depth.\n\n**Why it matters:** Barren plateaus can make optimization impossible even on perfect hardware.\n\n**How (Example):**\n- Increase qubits from 2 to 4 to 6 while keeping the ansatz structure similar.\n- For each size, sample random parameter initializations and compute gradient norms.\n- If gradient norms collapse rapidly as size grows, the circuit is likely entering a barren plateau regime.\n\n## Step 8: Apply readout error mitigation\n**The Action:** Calibrate measurement errors and correct observed counts.\n\n**Why it matters:** Readout bias can significantly distort expectation values, especially for Pauli-based cost estimation.\n\n**How (Example):**\n1. Prepare calibration states like `|00\u27e9`, `|01\u27e9`, `|10\u27e9`, `|11\u27e9`.\n2. Measure them to build a confusion matrix.\n3. Use matrix inversion or built-in mitigation to correct observed bitstring counts.\n4. Recompute the cost with corrected probabilities.\n\n## Step 9: Use mitigation methods inside the optimization loop\n**The Action:** Integrate mitigation at each iteration rather than only at the end.\n\n**Why it matters:** The optimizer needs a stable signal throughout training, not just a polished final answer.\n\n**How (Example):**\n- For each iteration:\n  1. Run the parameterized circuit\n  2. Apply readout mitigation\n  3. Estimate the objective\n  4. Feed the mitigated cost into the optimizer\n- Use **SPSA** when gradients are too noisy.\n- Use **COBYLA** when gradient estimation is unreliable or unavailable.\n\n## Step 10: Consider advanced mitigation when needed\n**The Action:** Choose a stronger mitigation method only if the overhead is acceptable.\n\n**Why it matters:** Some mitigation methods improve accuracy but increase runtime and sampling cost.\n\n**How (Example):**\n- **Zero-noise extrapolation:** run the same circuit with amplified noise and extrapolate to zero noise.\n- **Symmetry verification:** discard samples that violate known symmetries like particle number or parity.\n- **Post-selection:** keep only outcomes consistent with the expected subspace.\n\n## Step 11: Tune the full workflow for trainability\n**The Action:** Reduce error sources at multiple levels at once.\n\n**Why it matters:** No single fix solves all NISQ problems.\n\n**How (Example):**\n- Use a shallower ansatz.\n- Preserve problem symmetries.\n- Keep measurement overhead manageable.\n- Initialize parameters near a problem-informed starting point instead of random values."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Checklist for Running on NISQ Hardware\n\n## Final Deployment Checklist\nBefore launching a real run, verify the following:\n- The ansatz is **shallow enough** for the target hardware coherence time.\n- The circuit respects **native connectivity** to avoid excessive SWAP insertion.\n- Shot count is high enough for stable estimates but not wasteful.\n- Gradient estimates remain meaningful under sampling noise.\n- Readout mitigation is calibrated and tested.\n- The optimizer choice matches the noise level.\n\n## Recommended Operating Pattern\nUse this loop:\n1. **Start on an ideal simulator**\n2. **Move to a noisy simulator**\n3. **Test readout mitigation**\n4. **Run on hardware with low shot count first**\n5. **Increase complexity only if training remains stable**\n\n## Quick Decision Guide\n- If the cost is noisy but gradients are present: increase shots, use SPSA, and apply readout mitigation.\n- If gradients shrink rapidly with circuit size: simplify the ansatz and reduce depth.\n- If hardware results differ strongly from the simulator: inspect gate errors, decoherence, and compilation overhead.\n- If training stalls everywhere: the ansatz may be too expressive or poorly matched to the problem.\n\n## Example Success Criteria\nYour implementation is working if:\n- The mitigated cost is consistently closer to the ideal cost than the raw hardware cost.\n- Optimizer steps reduce the cost more often than not.\n- Gradient estimates are stable enough to guide training.\n- Increasing depth no longer causes immediate trainability collapse.\n\n## Bottom Line\nTreat NISQ variational training as a **signal recovery problem**:\n- preserve useful signal with a good ansatz,\n- reduce noise with calibration and mitigation,\n- and use optimizers that can survive imperfect measurements."
  }
]

  <script>
  (function () {

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
