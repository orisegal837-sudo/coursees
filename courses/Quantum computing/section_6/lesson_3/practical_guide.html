  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective & Prerequisites\n\n## Objective\nImplement a **Variational Quantum Eigensolver (VQE)** workflow that:\n1. Encodes a Hermitian operator as a sum of measurable Pauli terms.\n2. Prepares a parameterized quantum state with an ansatz circuit.\n3. Estimates the energy \\(E(\\theta)=\\langle \\psi(\\theta)|H|\\psi(\\theta)\\rangle\\) from circuit measurements.\n4. Uses a classical optimizer to minimize the energy and approximate the ground-state value.\n\n## What you should be able to produce\n- A working VQE script or notebook.\n- A plotted energy-versus-iteration curve.\n- A final parameter set \\(\\theta^*\\) and estimated ground-state energy.\n- A benchmark comparison against a known reference value or simulator result.\n\n## Technical prerequisites\nInstall and have access to:\n- **Python 3.10+**\n- **Qiskit** (`qiskit`, `qiskit-aer`, and optionally `qiskit-nature` for chemistry examples)\n- **PennyLane** (optional alternative SDK if you prefer differentiable QNodes)\n- **NumPy** and **SciPy**\n- A simulator backend such as **AerSimulator** or a PennyLane default device\n- Optional hardware access: **IBM Quantum account** and a configured runtime/backend if you want to test on real devices\n\n## Recommended starting problem\nUse a **small Hamiltonian** first:\n- 1\u20132 qubits for a toy Hamiltonian, or\n- **H\u2082 in a minimal basis** if you want a standard physics/chemistry benchmark.\n\n## Why this matters\nVQE is not about solving the full eigenvalue problem directly. It is about creating a loop where the quantum circuit proposes states and the classical optimizer searches for the lowest measured energy. Your setup must be small, measurable, and simulator-friendly before you move to hardware."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the VQE Problem Setup\n\n## Step 1: Write the Hamiltonian in Pauli form\n### Action\nExpress the target Hamiltonian as a weighted sum of Pauli strings:\n\\[\nH = \\sum_j c_j P_j\n\\]\nwhere each \\(P_j\\) is a tensor product of I, X, Y, Z.\n\n### Why\nThe quantum device measures Pauli observables term-by-term. VQE becomes practical only when the Hamiltonian is decomposed into operators you can estimate from shots.\n\n### How (Example)\nFor a 2-qubit toy model, define something like:\n- \\(0.5\\, Z_0\\)\n- \\(0.5\\, Z_1\\)\n- \\(0.2\\, X_0 X_1\\)\n- \\(-0.3\\, Y_0 Y_1\\)\n\nIn Qiskit, represent it as a `SparsePauliOp`; in PennyLane, use observables such as `qml.PauliZ(0) @ qml.PauliZ(1)`.\n\n## Step 2: Choose a measurement strategy\n### Action\nGroup commuting Pauli terms and decide which basis changes are needed before measurement.\n\n### Why\nEach Pauli term must be measured in a compatible basis. Proper grouping reduces the number of circuit executions and lowers runtime.\n\n### How (Example)\n- For **Z terms**, measure directly in the computational basis.\n- For **X terms**, apply a **Hadamard (H)** gate before measurement.\n- For **Y terms**, apply **S\u2020 followed by H** before measurement.\n\nIf you have terms like \\(Z_0Z_1\\) and \\(Z_0\\), measure them together in one shot group.\n\n## Step 3: Construct the ansatz circuit\n### Action\nBuild a parameterized circuit with a manageable number of layers and parameters.\n\n### Why\nThe ansatz determines what states VQE can search over. It must be expressive enough to capture the ground state but simple enough to optimize reliably.\n\n### How (Example)\nStart with a hardware-efficient ansatz:\n1. Apply single-qubit rotation gates such as `RY(\u03b8)` and `RZ(\u03b8)`.\n2. Add an entangling layer using CNOTs or CZ gates.\n3. Repeat for 1\u20132 layers only at first.\n\nExample structure:\n- Layer 1: `RY(\u03b80)`, `RY(\u03b81)`\n- Entangle: `CNOT(0,1)`\n- Layer 2: `RZ(\u03b82)`, `RZ(\u03b83)`\n\n## Step 4: Pick the classical optimizer\n### Action\nChoose an optimizer suited to noisy, nonconvex objectives.\n\n### Why\nVQE objective values are estimated from finite shots, so the optimization landscape is noisy. Robust optimizers often outperform gradient-heavy ones on real hardware.\n\n### How (Example)\nGood first choices:\n- **COBYLA** for simple derivative-free optimization\n- **SPSA** for noisy hardware experiments\n\nSet a small iteration budget at first, such as 50\u2013100 steps, and record each energy value."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Implement the Optimization Loop\n\n## Step 5: Define the energy evaluation function\n### Action\nCreate a function that prepares the ansatz state, measures each Pauli term, and returns the estimated total energy.\n\n### Why\nThis function is the heart of VQE. The optimizer calls it repeatedly with new parameter values.\n\n### How (Example)\nWrite a function with this structure:\n1. Receive a parameter vector `theta`.\n2. Bind `theta` into the ansatz circuit.\n3. Run the circuit for many shots.\n4. Estimate each \\(\\langle P_j \\rangle\\).\n5. Return \\(E(\\theta)=\\sum_j c_j\\langle P_j\\rangle\\).\n\nTemplate logic:\n```python\nenergy = 0\nfor coeff, pauli_term in hamiltonian_terms:\n    energy += coeff * estimate_expectation(theta, pauli_term)\nreturn energy\n```\n\n## Step 6: Connect the energy function to the optimizer\n### Action\nPass the energy function into the optimizer and let it propose new parameters iteratively.\n\n### Why\nVQE is a closed-loop hybrid algorithm: quantum evaluation provides the cost, and classical optimization updates the circuit.\n\n### How (Example)\nPseudo-workflow:\n1. Initialize `theta = random_small_values()`.\n2. Compute `E(theta)`.\n3. Optimizer suggests updated `theta`.\n4. Repeat until the energy change is below a threshold.\n\nIn practice, track:\n- current energy\n- best energy so far\n- parameter values\n- number of function evaluations\n\n## Step 7: Run on a simulator first\n### Action\nTest the full pipeline on an ideal simulator before using real hardware.\n\n### Why\nSimulation helps isolate problems in Hamiltonian encoding, ansatz design, measurement logic, and optimizer settings.\n\n### How (Example)\nUse a simulator backend with a larger shot count first, such as 8,192 or 16,384 shots, to reduce sampling noise and confirm convergence behavior.\n\n## Step 8: Verify against a known reference\n### Action\nCompare the final estimated energy to an exact diagonalization result or a trusted benchmark.\n\n### Why\nYou need to know whether VQE is converging to the correct ground-state energy or just finding a local minimum.\n\n### How (Example)\nFor an H\u2082 benchmark:\n- compute the exact ground-state energy with a classical reference method\n- compare it to the final VQE estimate\n- report the absolute error\n\nA successful run should show the energy decreasing over iterations and approaching the reference value."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Move to Hardware and Improve Reliability\n\n## Step 9: Prepare for noisy hardware execution\n### Action\nAdapt the workflow for shot noise, readout error, and transpilation constraints.\n\n### Why\nReal devices introduce errors that can distort expectation values and slow or destabilize optimization.\n\n### How (Example)\nBefore running on hardware:\n- transpile the circuit for the target backend\n- keep the ansatz shallow\n- increase shots per energy evaluation\n- optionally apply readout mitigation\n\nIf using IBM Quantum, select a backend with low queue time and sufficient qubit connectivity for your entangling pattern.\n\n## Step 10: Tune the ansatz and optimizer together\n### Action\nAdjust circuit depth, entanglement pattern, and optimizer settings based on observed convergence.\n\n### Why\nVQE performance depends on the balance between expressibility and trainability. Too little expressibility misses the target state; too much can make optimization unstable.\n\n### How (Example)\nIf convergence stalls:\n- try a slightly richer ansatz with one additional layer\n- switch from COBYLA to SPSA if noise is high\n- reduce parameter count if the optimizer behaves erratically\n\n## Step 11: Log and visualize results\n### Action\nStore the energy at every iteration and plot the optimization trace.\n\n### Why\nA convergence plot helps diagnose whether the algorithm is working, plateauing, or oscillating due to noise.\n\n### How (Example)\nRecord:\n- iteration index\n- energy value\n- parameter vector norm or selected parameters\n- shot count and backend name\n\nThen plot `energy vs. iteration` and mark the best observed value.\n\n## Step 12: Use the same pattern for other variational algorithms\n### Action\nReuse your VQE structure for related hybrid algorithms.\n\n### Why\nVQE is the template for many variational workflows, including QAOA and variational machine-learning models.\n\n### How (Example)\nReplace the Hamiltonian with a problem cost operator, keep the ansatz/optimizer loop, and reuse the same measurement-and-update pattern.\n\n## Final implementation checklist\n- [ ] Hamiltonian decomposed into Pauli terms\n- [ ] Ansatz circuit implemented\n- [ ] Expectation values estimated from shots\n- [ ] Classical optimizer connected\n- [ ] Simulator test passed\n- [ ] Hardware run or hardware-ready setup completed\n- [ ] Convergence plot generated\n- [ ] Final energy compared to a benchmark"
  }
]

      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
