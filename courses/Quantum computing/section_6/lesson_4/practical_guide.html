    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nImplement a small **QAOA workflow** that:\n1. Encodes a combinatorial optimization problem into a **cost Hamiltonian**.\n2. Builds a **parameterized alternating circuit** with cost and mixer layers.\n3. Runs a **classical optimization loop** to tune the QAOA parameters.\n4. Tests one or more **QAOA extensions** such as warm-starting or constraint-preserving mixers.\n\nUse this when you want to solve problems like **Max-Cut**, simple scheduling constraints, routing subproblems, or binary decision problems on NISQ-style hardware or simulators.\n\n## Prerequisites\nUse these concrete tools before starting:\n- **Python 3.10+**\n- A quantum SDK such as **Qiskit 1.x** or **PennyLane 0.4x**\n- A simulator backend such as **Qiskit Aer** or **PennyLane default.qubit**\n- A classical optimizer package such as **SciPy** or the optimizer modules bundled with your SDK\n- Access to either:\n  - a **local quantum simulator**, or\n  - a cloud quantum service such as **IBM Quantum** if you want to test hardware execution\n- For graph-based examples, install **NetworkX**\n\n## What to prepare\n- A **small problem instance** first, ideally 4\u20138 variables\n- A **baseline classical solution** if you want to try warm-start QAOA\n- A way to **estimate expectation values from shots**, because QAOA is measurement-driven\n\n## Suggested project structure\n- `problem.py` \u2014 define the objective and constraints\n- `qaoa_circuit.py` \u2014 build cost and mixer layers\n- `optimize.py` \u2014 run the classical parameter search\n- `evaluate.py` \u2014 measure bitstring frequencies and compute performance\n- `extensions.py` \u2014 add warm-start, custom mixers, or adaptive variants"

    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the Core QAOA Circuit\n\n## Step 1: Define the optimization problem as a binary objective\n**Action:** Write the objective as a function over bitstrings.\n\n**Why:** QAOA operates on binary computational basis states, so you need a direct mapping from candidate solutions to scores.\n\n**How (Example):**\nFor Max-Cut on a graph, define the cost of a bitstring `z` as the number of edges crossing the partition.\n```python\nimport networkx as nx\n\ndef maxcut_cost(bitstring, graph):\n    cut = 0\n    for u, v in graph.edges():\n        if bitstring[u] != bitstring[v]:\n            cut += 1\n    return cut\n```\n\n## Step 2: Convert the objective into a cost Hamiltonian\n**Action:** Build the operator whose eigenvalues match your objective values.\n\n**Why:** The cost Hamiltonian is what lets the quantum circuit assign phases based on solution quality.\n\n**How (Example):**\nFor Max-Cut, each edge contributes a Pauli-Z interaction term. In Qiskit, you can represent this as a `SparsePauliOp` or use a built-in problem class if available.\n```python\nfrom qiskit.quantum_info import SparsePauliOp\n\n# Example for a 2-qubit edge term: 0.5 * (I - Z_i Z_j)\nterms = [\n    (\"II\", 0.5),\n    (\"ZZ\", -0.5)\n]\ncost_op = SparsePauliOp.from_list(terms)\n```\n\n## Step 3: Initialize the standard QAOA starting state\n**Action:** Prepare a uniform superposition across all bitstrings.\n\n**Why:** This gives the algorithm a neutral starting point from which the mixer can explore the full search space.\n\n**How (Example):**\nApply Hadamard gates to every qubit.\n```python\nfrom qiskit import QuantumCircuit\n\nqc = QuantumCircuit(2)\nqc.h([0, 1])\n```\n\n## Step 4: Add one cost layer and one mixer layer\n**Action:** Alternate the cost unitary and mixer unitary using parameters `gamma` and `beta`.\n\n**Why:** This alternating structure is the defining mechanism of QAOA.\n\n**How (Example):**\n- Cost layer: implement `exp(-i * gamma * H_cost)`\n- Mixer layer: implement `exp(-i * beta * sum(X_i))`\n```python\n# Conceptual pattern\nfor qubit in range(n):\n    qc.rz(2 * gamma * coeff, qubit)\n# mixer\nfor qubit in range(n):\n    qc.rx(2 * beta, qubit)\n```\n\n## Step 5: Generalize to p layers\n**Action:** Repeat the cost-and-mixer pair `p` times.\n\n**Why:** Increasing depth boosts expressibility, but also increases noise and optimization difficulty.\n\n**How (Example):**\nStore parameters as arrays:\n```python\ngammas = [0.4, 0.7]\nbetas = [0.2, 0.5]\n```\nand apply them layer by layer in a loop.\n\n## Step 6: Measure the bitstrings and compute the expected cost\n**Action:** Run the circuit with many shots and estimate the average objective value.\n\n**Why:** QAOA is evaluated from measurement outcomes, not from a closed-form exact answer on hardware.\n\n**How (Example):**\n1. Sample the circuit 1,000\u201310,000 times.\n2. Count bitstring frequencies.\n3. Compute the weighted average cost.\n```python\nexpected_cost = sum(maxcut_cost(bs, graph) * p for bs, p in distribution.items())\n```"
  },

    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Optimize Parameters and Add Practical Extensions\n\n## Step 1: Wrap the circuit in a classical optimization loop\n**Action:** Create an objective function that returns the measured expectation value for given parameters.\n\n**Why:** The classical optimizer needs a scalar value to search for better `gamma` and `beta` settings.\n\n**How (Example):**\n```python\ndef objective(params):\n    gammas = params[:p]\n    betas = params[p:]\n    return estimate_energy(gammas, betas)\n```\nThen call a derivative-free optimizer:\n```python\nfrom scipy.optimize import minimize\nresult = minimize(objective, x0=initial_params, method=\"COBYLA\")\n```\n\n## Step 2: Choose an optimizer suited to shot noise\n**Action:** Prefer noisy-robust optimizers such as COBYLA or SPSA.\n\n**Why:** QAOA measurements fluctuate because they are based on finite shots, so exact-gradient methods can be unstable or expensive.\n\n**How (Example):**\n- Use **COBYLA** for a lightweight baseline.\n- Use **SPSA** if evaluation noise is high or hardware access is costly.\n\n## Step 3: Benchmark against a classical baseline\n**Action:** Compare the best QAOA solution with a classical heuristic or exact solver on small instances.\n\n**Why:** You need a reference point to know whether the quantum routine is actually improving solution quality.\n\n**How (Example):**\nFor small Max-Cut graphs, compare against brute force or a greedy cut heuristic.\n```python\n# Pseudocode\nqaoa_best = run_qaoa(graph)\nclassical_best = brute_force_maxcut(graph)\nprint(qaoa_best, classical_best)\n```\n\n## Step 4: Try warm-start QAOA\n**Action:** Initialize from a classical approximate solution instead of the uniform superposition.\n\n**Why:** If a good approximate solution already exists, warm-starting can reduce search effort and improve convergence.\n\n**How (Example):**\n- Solve a relaxed classical version first.\n- Convert that result into biased initial qubit amplitudes or custom initial state preparation.\n- Run QAOA from that state rather than `|+...+>`.\n\n## Step 5: Use constraint-preserving mixers when feasibility matters\n**Action:** Replace the standard X mixer with a mixer that only moves within valid states.\n\n**Why:** Some optimization problems have hard constraints, and a standard mixer can generate invalid solutions.\n\n**How (Example):**\nFor a scheduling or assignment problem, design a mixer that preserves one-hot encoding by swapping amplitudes only between valid basis states.\n\n## Step 6: Experiment with adaptive or layerwise strategies\n**Action:** Start with small depth and grow the circuit gradually.\n\n**Why:** This reduces the risk of overfitting, barren optimization landscapes, and unnecessary hardware noise.\n\n**How (Example):**\n- Begin with `p = 1`\n- Optimize parameters\n- Increase to `p = 2`\n- Reuse the previous solution as the initial guess\n\n## Step 7: Transfer parameters across problem sizes\n**Action:** Reuse learned parameters from smaller instances to initialize larger ones.\n\n**Why:** This can accelerate training and improve stability when scaling up.\n\n**How (Example):**\nIf a 6-node graph produces good `gammas` and `betas`, use those values as the starting point for an 8-node graph with the same graph family."

ompleted\n- [ ] Warm-start or other extension tested\n- [ ] Simulator results validated before hardware execution\n\n## Practical takeaway\nIf your circuit alternates **cost phases** and **mixer exploration**, and you keep the circuit shallow enough for noisy hardware, you have a workable QAOA implementation. From there, extensions like **warm-starting**, **constraint-preserving mixers**, and **adaptive depth selection** are the main levers for better real-world performance."

          <button type="button" class="btn btn-primary" id="nextBtn" aria-label="Next section">
            <span>Continue to Next</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </section>
  </main>

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
