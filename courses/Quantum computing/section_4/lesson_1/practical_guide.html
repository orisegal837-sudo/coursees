  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a **hardware-aware quantum workflow in Python** that can:\n- Create a logical quantum circuit.\n- Adapt that circuit to a specific backend\u2019s constraints.\n- Run it on a **simulator** or **real quantum hardware**.\n- Interpret the output as **measurement counts**, not deterministic values.\n\n## What you need\n### Technical prerequisites\n- **Python 3.10+** installed locally.\n- One of these SDKs installed:\n  - **Qiskit** for IBM Quantum backends\n  - **Cirq** for Google-style circuit workflows and simulators\n  - **PennyLane** for hybrid quantum-classical workflows\n  - **Amazon Braket SDK** for AWS-managed simulators and devices\n- Access to at least one execution target:\n  - A **local simulator** (included in the SDK or available as an extra package)\n  - Or a **cloud quantum account** for a real backend\n- Basic access credentials for your provider, for example:\n  - IBM Quantum API token\n  - AWS credentials for Braket\n- A code editor or notebook environment such as **Jupyter**, **VS Code**, or **Google Colab**.\n\n## What to keep in mind before coding\n- **Different hardware families impose different constraints.**\n  - Superconducting devices often require routing around limited connectivity.\n  - Trapped-ion systems may allow denser connectivity but slower gates.\n  - Neutral-atom and photonic systems may use different native operations.\n- Your goal is not just to write a correct circuit, but to make it **executable on the chosen machine**.\n\n## Example setup checklist\n- Install packages:\n  - `pip install qiskit qiskit-aer`\n  - or `pip install cirq`\n  - or `pip install pennylane`\n  - or `pip install amazon-braket-sdk`\n- Log in or configure your provider credentials.\n- Confirm you can run a small test circuit on a simulator before using hardware."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build the Circuit with Hardware in Mind\n\n## Step 1: Choose a target backend first\n**Action:** Select the device or simulator before writing the final version of your circuit.\n\n**Why:** The backend determines the native gate set, connectivity, and depth limits, which directly affect whether your circuit will compile efficiently.\n\n**How (Example):**\n- If you plan to run on IBM hardware, target a superconducting backend with limited qubit connectivity.\n- If you plan to run on a trapped-ion device, expect stronger connectivity but slower execution.\n- If you just want to validate logic, use a noiseless simulator first.\n\n## Step 2: Write the logical circuit\n**Action:** Construct your circuit in the SDK using abstract gates and measurements.\n\n**Why:** This gives you a clean version of your algorithm before the compiler modifies it.\n\n**How (Example):**\n- In Qiskit, define qubits, apply `H`, `CX`, and measurement operations.\n- In Cirq, build a circuit with `cirq.H`, `cirq.CNOT`, and `cirq.measure`.\n- Example pattern:\n  - Prepare a Bell state.\n  - Measure both qubits.\n\n## Step 3: Inspect the circuit for hardware-sensitive patterns\n**Action:** Check for multi-qubit gates, long chains, and assumptions about full connectivity.\n\n**Why:** These are the main reasons circuits become expensive or fail on real devices.\n\n**How (Example):**\n- Look for repeated `CNOT` operations across distant qubits.\n- Reduce unnecessary two-qubit gates.\n- Reorder logic if it lowers routing overhead.\n\n## Step 4: Keep the native gate mismatch in mind\n**Action:** Assume your logical gates may not exist directly on the backend.\n\n**Why:** SDKs will decompose your circuit into the backend\u2019s native operations, which can increase depth and noise.\n\n**How (Example):**\n- A logical `CZ` may be rewritten into native entangling gates plus basis rotations.\n- A rotation gate may be broken into the device\u2019s preferred single-qubit rotation family."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Compile, Execute, and Analyze Results\n\n## Step 1: Transpile or compile for the backend\n**Action:** Run the SDK\u2019s compilation step against the chosen backend.\n\n**Why:** Compilation adapts your abstract circuit to the machine\u2019s constraints and reveals the real implementation cost.\n\n**How (Example):**\n- In Qiskit, use transpilation for a specific backend configuration.\n- In Cirq, route or optimize the circuit for the target device.\n- In Braket or PennyLane, pass the circuit through the device-specific execution pipeline.\n- After compilation, compare the logical circuit with the transformed one.\n\n## Step 2: Inspect the compiled circuit\n**Action:** Review the compiled output before execution.\n\n**Why:** This helps you catch SWAP insertion, gate explosion, and routing inefficiencies early.\n\n**How (Example):**\n- Compare depth before and after compilation.\n- Check whether additional SWAP gates were inserted.\n- Verify that measurement qubits still match your intended output.\n\n## Step 3: Execute on a simulator or hardware backend\n**Action:** Run the compiled circuit on the selected backend.\n\n**Why:** This produces the actual measurement outcomes your workflow is designed to analyze.\n\n**How (Example):**\n- On a simulator, request either exact state-vector results or sampled shots.\n- On hardware, specify a shot count such as 1,000 or 10,000.\n- Example flow:\n  1. Submit job.\n  2. Wait for completion.\n  3. Retrieve counts or probabilities.\n\n## Step 4: Interpret results statistically\n**Action:** Read output as measurement frequencies, not as a single deterministic answer.\n\n**Why:** Quantum hardware returns sampled outcomes governed by probability distributions and noise.\n\n**How (Example):**\n- If you expected a Bell state, look for roughly equal counts of `00` and `11`.\n- If the hardware result is skewed, consider noise, readout error, or imperfect compilation.\n\n## Step 5: Debug by comparing three layers\n**Action:** Compare the abstract circuit, the compiled circuit, and the measured counts.\n\n**Why:** This isolates whether problems come from logic, compilation, or hardware noise.\n\n**How (Example):**\n- Wrong on ideal simulator: fix circuit logic.\n- Right on simulator, wrong on hardware: inspect backend constraints and noise.\n- Compiled circuit looks much larger than expected: reduce entanglement or simplify routing."
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Practical Workflow Habits for Real Projects\n\n## Step 1: Automate backend switching\n**Action:** Write your code so the backend can be changed with a single variable or configuration block.\n\n**Why:** This makes it easy to compare simulators, noisy simulators, and real hardware without rewriting circuits.\n\n**How (Example):**\n- Use a Python variable like `backend_name = 'aer_simulator'` or `backend_name = 'ibm_oslo'`.\n- Run the same circuit across multiple targets in a loop.\n\n## Step 2: Use shot-based experiments intentionally\n**Action:** Treat shot count as a tunable experimental setting.\n\n**Why:** More shots reduce sampling error but cost more time or budget.\n\n**How (Example):**\n- Use 100 shots for quick debugging.\n- Use 1,000\u201310,000 shots for more reliable distributions.\n- Compare how the histogram stabilizes as shots increase.\n\n## Step 3: Match algorithm structure to device strengths\n**Action:** Prefer circuit designs that fit the chosen hardware family.\n\n**Why:** Hardware-aware design improves fidelity and reduces compilation overhead.\n\n**How (Example):**\n- On sparse superconducting hardware, minimize long-range entanglement.\n- On trapped ions, exploit higher connectivity where appropriate.\n- On neutral atoms, consider array-friendly layouts.\n\n## Step 4: Build a reusable development loop\n**Action:** Follow the repeatable cycle: design, compile, run, measure, refine.\n\n**Why:** This is the most practical way to move from theoretical circuits to reliable execution.\n\n**How (Example):**\n1. Prototype on a simulator.\n2. Compile for a target backend.\n3. Inspect the physical circuit.\n4. Run a small shot count on hardware.\n5. Refine the circuit and repeat.\n\n## Final takeaway\nUse SDKs as **compilers and execution managers**, not just circuit libraries. The best quantum Python workflows respect the machine first and the algorithm second."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
