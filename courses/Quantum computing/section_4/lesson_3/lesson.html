  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "lesson_page_1",
    "content": "Cirq is a Python SDK for writing quantum circuits and moving them through a practical workflow: construct an abstract circuit, simulate it, sample measurement outcomes, and then target a real backend when available. Since you already know the linear algebra behind qubits, gates, measurement, and tensor products, the new focus here is the software workflow that turns those ideas into runnable code.\n\nIn Cirq, you usually work with three layers of representation. First is the circuit itself, written with qubits and gates. Second is the simulator, which computes ideal state evolution or noisy approximations on your computer. Third is hardware execution, where the circuit is compiled for a specific device and measured repeatedly in shots. This layered view is important because the circuit you write is often not identical to the circuit actually executed after compilation and hardware constraints are applied.\n\nCirq is especially associated with Google\u2019s quantum ecosystem, but the workflow concepts are general: define qubits, build operations, add measurements, choose a simulator or backend, and inspect the resulting data. The main practical outputs are state vectors from simulation, sampled bitstrings from repeated measurements, and counts or histograms from execution."
  },
  {
    "id": "lesson_page_2",
    "content": "A Cirq circuit is built from qubits and operations. Qubits are commonly labeled with coordinates or names, for example cirq.LineQubit(0) and cirq.LineQubit(1). Gates are applied by calling them on qubits, and the resulting operations are appended to a circuit.\n\nA minimal example looks like this in spirit:\n- create qubits\n- apply H to place a qubit into superposition\n- apply CNOT to create entanglement\n- measure one or more qubits\n\nBecause you already understand matrix composition and noncommutativity, the key point is how Cirq stores that ordered composition. The circuit order matters exactly as in the mathematics: the first operation you place is not interchangeable with the next one unless the gates commute.\n\nCirq also supports parameterized circuits, which are very useful for experiments and sweeps. Instead of hard-coding every angle, you can define symbols and later evaluate many values in batch. This is common in variational algorithms, calibration routines, and hardware benchmarking. The SDK handles symbolic parameters, repeated execution, and result collection so that you can automate an experiment rather than manually rewriting circuits each time."
  },
  {
    "id": "lesson_page_3",
    "content": "Simulation in Cirq lets you inspect ideal behavior before spending hardware time. A simulator can return the final quantum state, intermediate state information, or measurement samples depending on the method you choose. This is useful for verifying that a circuit creates the expected amplitudes, phases, and entanglement.\n\nThe distinction between simulate and sample matters. Simulation can give exact amplitudes for an ideal model, while sampling means running many shots and collecting measurement outcomes. Sampling introduces finite-shot randomness, so even a perfectly prepared 50-50 superposition will not produce exactly equal counts every time. That variation is shot noise, not a bug.\n\nWhen you move to real hardware, additional effects appear: decoherence, readout error, gate infidelity, and device connectivity constraints. Cirq workflows therefore separate the abstract circuit from the compiled circuit. Compilation may insert SWAPs, decompose gates into hardware-native operations, and respect directional or connectivity limits. In practice, a successful hardware workflow usually looks like: write circuit, simulate locally, compile for device, submit shots, then analyze counts and compare them to the ideal simulation."
  },
  {
    "id": "lesson_page_4",
    "content": "The core Cirq workflow is: build a circuit, simulate it, sample it, and execute it on hardware when available. The conceptual bridge from quantum theory to software is that the circuit is the mathematical model, the simulator is the idealized experiment, and the hardware run is the noisy physical experiment.\n\nWhat you should remember: Cirq lets you express quantum operations in Python, test them with simulation, and then adapt them for real devices through compilation and backend selection. Use simulation to validate logic, sampling to understand measurement statistics, and hardware execution to observe real-world constraints. If you can keep the abstract, compiled, and executed versions of a circuit separate in your mind, you will avoid one of the most common sources of confusion in practical quantum programming."
  }
]

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
