  <textarea id="markdown-source" style="display:none;">
    [
  {
    "id": "guide_page_1",
    "content": "# Page 1 \u2014 Objective and Prerequisites\n\n## Objective\nBuild a working Cirq workflow in Python that lets you:\n1. **Create quantum circuits** with qubits and gates.\n2. **Simulate** those circuits locally to inspect ideal behavior.\n3. **Sample measurement outcomes** with repeated shots.\n4. **Prepare circuits for hardware execution** by compiling them for a target device.\n\n## Technical Prerequisites\nMake sure you have these specific tools ready:\n- **Python 3.9+** installed locally\n- **Cirq** installed via `pip install cirq`\n- **NumPy** installed via `pip install numpy`\n- **SymPy** installed via `pip install sympy` for parameterized circuits\n- Access to a **Python IDE or notebook** such as Jupyter, VS Code, or Colab\n- Optional but useful: access to a **quantum hardware provider compatible with Cirq** or a Cirq-supported device simulator\n\n## What You Will Build\nA small quantum workflow using a 2-qubit circuit that:\n- creates superposition and entanglement,\n- adds measurements,\n- simulates the state locally,\n- samples many shots,\n- and shows how the same circuit would be adapted for hardware.\n\n## Setup Check\nBefore coding, confirm you can import the required packages:\n```python\nimport cirq\nimport numpy as np\nimport sympy\n```\n\nIf that works, you are ready to start building circuits."
  },
  {
    "id": "guide_page_2",
    "content": "# Page 2 \u2014 Build Your First Cirq Circuit\n\n## Step 1: Define Qubits\n**Action:** Create qubits with clear labels.\n\n**Why it matters:** Qubits are the basic objects that operations act on, and clear naming makes circuits easier to debug.\n\n**How (Example):**\n```python\nimport cirq\n\nq0 = cirq.LineQubit(0)\nq1 = cirq.LineQubit(1)\n```\n\n## Step 2: Apply Gates in Order\n**Action:** Add gates to the qubits in the correct sequence.\n\n**Why it matters:** Cirq preserves the mathematical order of operations, so circuit order directly affects the result.\n\n**How (Example):**\n```python\ncircuit = cirq.Circuit()\ncircuit.append(cirq.H(q0))\ncircuit.append(cirq.CNOT(q0, q1))\n```\n\nThis creates a Bell-state-style entangled circuit.\n\n## Step 3: Add Measurements\n**Action:** Measure the qubits you want to observe.\n\n**Why it matters:** Measurements convert quantum information into classical bitstrings that can be sampled and analyzed.\n\n**How (Example):**\n```python\ncircuit.append(cirq.measure(q0, q1, key='m'))\nprint(circuit)\n```\n\n## Step 4: Use Parameterized Gates When Needed\n**Action:** Replace fixed angles with symbolic parameters if you want to sweep values later.\n\n**Why it matters:** Parameterization lets you reuse one circuit structure for many experiments without rewriting code.\n\n**How (Example):**\n```python\ntheta = sympy.Symbol('theta')\ncircuit = cirq.Circuit(\n    cirq.rx(theta)(q0),\n    cirq.CNOT(q0, q1),\n    cirq.measure(q0, q1, key='m')\n)\n```\n\nLater, you can assign values to `theta` during simulation or execution."
  },
  {
    "id": "guide_page_3",
    "content": "# Page 3 \u2014 Simulate, Sample, and Analyze Results\n\n## Step 5: Simulate the Ideal Circuit\n**Action:** Run the circuit on a Cirq simulator before using hardware.\n\n**Why it matters:** Simulation helps confirm your logic, expected amplitudes, and entanglement pattern without device noise.\n\n**How (Example):**\n```python\nsimulator = cirq.Simulator()\nresult = simulator.simulate(cirq.Circuit(cirq.H(q0), cirq.CNOT(q0, q1)))\nprint(result.final_state_vector)\n```\n\nIf you want a measurement-free check, simulate a circuit before adding measurement gates.\n\n## Step 6: Sample Many Shots\n**Action:** Execute the measured circuit repeatedly to collect bitstrings.\n\n**Why it matters:** Quantum measurements are probabilistic, so repeated shots reveal the distribution of outcomes.\n\n**How (Example):**\n```python\ncircuit = cirq.Circuit(\n    cirq.H(q0),\n    cirq.CNOT(q0, q1),\n    cirq.measure(q0, q1, key='m')\n)\n\nsample_result = simulator.run(circuit, repetitions=1000)\nprint(sample_result)\n```\n\nYou should see counts concentrated around outcomes like `00` and `11` for a Bell state.\n\n## Step 7: Interpret Sampling Noise\n**Action:** Compare observed counts to the ideal expectation.\n\n**Why it matters:** Shot noise is normal; finite repetitions never give perfectly exact probabilities.\n\n**How (Example):**\n- If the ideal Bell state predicts 50% `00` and 50% `11`, then `487/513` or `520/480` split is still reasonable for 1000 shots.\n- Do not treat small fluctuations as circuit failure.\n\n## Step 8: Inspect Parameter Sweeps\n**Action:** Evaluate the same circuit for multiple parameter values.\n\n**Why it matters:** Sweeps are essential for variational algorithms, calibration, and experiment automation.\n\n**How (Example):**\n```python\nresolver = cirq.ParamResolver({'theta': np.pi / 2})\nresult = simulator.run(circuit, param_resolver=resolver, repetitions=100)\nprint(result)\n```"
  },
  {
    "id": "guide_page_4",
    "content": "# Page 4 \u2014 Prepare for Hardware Execution\n\n## Step 9: Separate Abstract, Simulated, and Compiled Circuits\n**Action:** Treat the circuit you wrote, the circuit you simulated, and the circuit that runs on hardware as different artifacts.\n\n**Why it matters:** Hardware often imposes constraints such as allowed gate sets, connectivity limits, and directional couplings.\n\n**How (Example):**\n- **Abstract circuit:** `H` and `CNOT` as you originally wrote them\n- **Compiled circuit:** a version rewritten into device-native operations\n- **Executed circuit:** the actual shot-based run on hardware\n\n## Step 10: Compile for a Specific Device\n**Action:** Use Cirq\u2019s compilation tools to adapt your circuit to a backend.\n\n**Why it matters:** A device may not support your original gate directly, or may require a specific qubit layout.\n\n**How (Example):**\n```python\n# Example pattern; exact compiler/backend depends on the target device\ncompiled_circuit = cirq.optimize_for_target_gateset(circuit)\nprint(compiled_circuit)\n```\n\nThis may decompose gates or rewrite them into a supported native form.\n\n## Step 11: Execute and Compare\n**Action:** Run the compiled circuit on the backend, then compare hardware counts with simulator results.\n\n**Why it matters:** This helps you identify real-device effects such as decoherence, gate error, and readout error.\n\n**How (Example):**\n- Run the circuit on hardware with a fixed number of shots.\n- Collect counts or histograms.\n- Compare the distribution to your simulated baseline.\n\n## Step 12: Use a Repeatable Workflow\n**Action:** Standardize your process for every Cirq experiment.\n\n**Why it matters:** A consistent workflow reduces mistakes and makes results easier to reproduce.\n\n**How (Template):**\n1. Define qubits\n2. Build circuit\n3. Add measurements\n4. Simulate locally\n5. Sample multiple shots\n6. Compile for hardware\n7. Submit to backend\n8. Compare noisy data with ideal output\n\n## Final Check\nIf you can move smoothly from circuit construction to simulation, sampling, and backend preparation, you have the core Cirq workflow in place."
  }

  <script>
  (function () {
  // ==========================================
  // 1. HELPER FUNCTIONS
  // ==========================================

  function escapeHtml(s){
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function simpleMarkdownToHtml(md){
    var lines = String(md || '').replace(/\r\n/g, '\n').split('\n');
    var html = [];
    var inCodeFence = false;
    var codeLang = '';
    var codeBuf = [];

    function flushCode(){
      if(!codeBuf.length) return;
      var code = escapeHtml(codeBuf.join('\n'));
      html.push('<pre><code' + (codeLang ? ' class="language-' + escapeHtml(codeLang) + '"' : '') + '>' + code + '</code></pre>');
      codeBuf = [];
      codeLang = '';
    }

    for(var i=0;i<lines.length;i++){
      var line = lines[i];

      var fenceMatch = line.match(/^\s*```(\w+)?\s*$/);
      if(fenceMatch){
        if(!inCodeFence){
          inCodeFence = true;
          codeLang = fenceMatch[1] || '';
          codeBuf = [];
        } else {
          inCodeFence = false;
          flushCode();
        }
        continue;
      }

      if(inCodeFence){
        codeBuf.push(line);
        continue;
      }

      if(/^\s*---\s*$/.test(line)){
        html.push('<hr/>');
        continue;
      }

      var headingMatch = line.match(/^(#{1,6})\s+(.*)$/);
      if(headingMatch){
        var level = headingMatch[1].length;
        var text = headingMatch[2].trim();
        html.push('<h' + level + '>' + renderInline(text) + '</h' + level + '>');
        continue;
      }

      var ulMatch = line.match(/^\s*-\s+(.*)$/);
      if(ulMatch){
        var items = [];
        while(i < lines.length && (m = lines[i].match(/^\s*-\s+(.*)$/))){
          items.push('<li>' + renderInline(m[1].trim()) + '</li>');
          i++;
        }
        i--;
        html.push('<ul>' + items.join('') + '</ul>');
        continue;
      }

      if(line.trim() === ''){
        continue;
      }

      html.push('<p>' + renderInline(line.trim()) + '</p>');
    }

    flushCode();
    return html.join('');

    function renderInline(text){
      var out = escapeHtml(text);
      out = out.replace(/`([^`]+)`/g, function(_, code){ return '<code>' + code + '</code>'; });
      out = out.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      return out;
    }
  }

  // ==========================================
  // 2. DATA EXTRACTION & DYNAMIC PAGE CREATION
  // ==========================================

  var rawEl = document.getElementById('markdown-source');
  var raw = rawEl ? rawEl.value : '[]';

  var lessonParts;
  try {
    var parsedData = JSON.parse(raw.trim());
    // UPDATED LOGIC: Handle both a direct array or the `{ parts: [...] }` object structure
    lessonParts = Array.isArray(parsedData) ? parsedData : (parsedData.parts || []);
  } catch(e) {
    lessonParts = []; 
  }
  if(!Array.isArray(lessonParts)) lessonParts = [];

  var wrapper = document.getElementById('sections-wrapper');
  if (wrapper) wrapper.innerHTML = ''; 

  lessonParts.forEach(function(part) {
    var article = document.createElement('article');
    article.id = part.id;
    article.className = 'lesson-section transition-opacity duration-300 opacity-0 hidden';
    
    var innerDiv = document.createElement('div');
    innerDiv.className = 'markdown-body';
    innerDiv.setAttribute('data-content-target', part.id);
    
    article.appendChild(innerDiv);
    if (wrapper) wrapper.appendChild(article);
  });

  // ==========================================
  // 3. MARKDOWN PARSING & INJECTION
  // ==========================================

  var hasMarked = typeof window.marked !== 'undefined' && window.marked && typeof window.marked.parse === 'function';
  
  if(hasMarked){
    try{
      // Attach the KaTeX extension so formulas render properly
      if (typeof window.markedKatex !== 'undefined') {
        window.marked.use(window.markedKatex({
          throwOnError: false,
          output: 'html'
        }));
      }
      window.marked.setOptions({ breaks: false, gfm: true });
    }catch(e){}
  }

  lessonParts.forEach(function (part) {
    var target = document.querySelector('[data-content-target="' + part.id + '"]');
    if (target) {
      var content = (part.content || '').trim();
      // If the content starts with an HTML tag, inject it directly to bypass Markdown escaping
      if (content.startsWith('<')) {
        target.innerHTML = content;
      } else {
        target.innerHTML = hasMarked ? window.marked.parse(content) : simpleMarkdownToHtml(content);
      }
    }
  });

  // ==========================================
  // 4. NAVIGATION STATE & LOGIC
  // ==========================================

  var sections = lessonParts
    .map(function(part){ return document.getElementById(part.id); })
    .filter(Boolean);

  var currentIndex = 0; 

  var contentStatus = document.getElementById('content-status');
  var prevBtn = document.getElementById('prevBtn');
  var nextBtn = document.getElementById('nextBtn');

  function updateMeta(index) {
    if(contentStatus) contentStatus.textContent = 'Section ' + (index + 1) + ' of ' + lessonParts.length;

    var atFirst = index === 0;
    var atLast = index === lessonParts.length - 1;

    if(prevBtn){
      prevBtn.disabled = atFirst;
    }
    if(nextBtn){
      nextBtn.disabled = atLast;
    }
    
    var cardElement = document.querySelector('.card');
    if(cardElement && window.scrollY > cardElement.offsetTop) {
        window.scrollTo({ top: cardElement.offsetTop - 20, behavior: 'smooth' });
    }
  }

  function showSection(index) {
    if(!sections.length) return;
    sections.forEach(function (section, i) {
      if (i === index) {
        section.classList.remove('hidden');
        requestAnimationFrame(function () {
          section.classList.remove('opacity-0');
          section.classList.add('opacity-100');
        });
      } else {
        section.classList.add('opacity-0');
        section.classList.remove('opacity-100');
        section.classList.add('hidden');
      }
    });
    currentIndex = index;
    updateMeta(index);
  }

  function transitionTo(index) {
    if(!sections.length) return;
    if (index < 0 || index >= sections.length || index === currentIndex) return;

    var current = sections[currentIndex];
    if(!current) return;

    current.classList.add('opacity-0');
    current.classList.remove('opacity-100');

    window.setTimeout(function () {
      current.classList.add('hidden'); 
      
      var next = sections[index];
      if(!next) return;

      next.classList.remove('hidden'); 
      requestAnimationFrame(function () {
        next.classList.remove('opacity-0');
        next.classList.add('opacity-100');
      });

      currentIndex = index;
      updateMeta(index);
    }, 400);
  }

  // ==========================================
  // 5. EVENT LISTENERS & INITIALIZATION
  // ==========================================

  if(prevBtn) prevBtn.addEventListener('click', function () { transitionTo(currentIndex - 1); });
  if(nextBtn) nextBtn.addEventListener('click', function () { transitionTo(currentIndex + 1); });

  document.addEventListener('keydown', function (event) {
    if (event.key === 'ArrowLeft') transitionTo(currentIndex - 1);
    if (event.key === 'ArrowRight') transitionTo(currentIndex + 1);
  });

  if(sections.length) {
    showSection(0);
  } else {
    updateMeta(0); 
  }

})();
  </script>
</body>
</html>
